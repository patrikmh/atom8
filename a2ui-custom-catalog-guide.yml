            - heading "Defining Your Own Catalog ¶" [level=1] [ref=e138]:
              - text: Defining Your Own Catalog
              - link "¶" [ref=e139] [cursor=pointer]:
                - /url: https://a2ui.org/guides/defining-your-own-catalog/#defining-your-own-catalog
            - paragraph [ref=e140]:
              - text: While the
              - link "Basic Catalog" [ref=e141] [cursor=pointer]:
                - /url: https://github.com/google/A2UI/blob/main/specification/v0_9/catalogs/basic/catalog.json
              - text: is useful for starting out and bootstrapping an application, most production applications will define their own catalog to reflect their specific design system.
            - paragraph [ref=e142]: By defining your own catalog, you restrict the agent to using exactly the components and visual language that exist in your application, rather than generic inputs or buttons.
            - heading "Why Define Your Own Catalog? ¶" [level=2] [ref=e143]:
              - text: Why Define Your Own Catalog?
              - link "¶" [ref=e144] [cursor=pointer]:
                - /url: https://a2ui.org/guides/defining-your-own-catalog/#why-define-your-own-catalog
            - paragraph [ref=e145]:
              - text: Every A2UI surface is driven by a
              - strong [ref=e146]: Catalog
              - text: . A catalog is simply a JSON Schema file that tells the agent which components, functions, and themes are available for it to use.
            - paragraph [ref=e147]: "Defining your own catalog offers the following benefits:"
            - list [ref=e148]:
              - listitem [ref=e149]:
                - strong [ref=e150]: Design System Alignment
                - text: ": Restrict the agent to using exactly the components and visual language that exist in your application."
              - listitem [ref=e151]:
                - strong [ref=e152]: Security and Type Safety
                - text: ": You register entire catalogs with your client application, ensuring that only trusted components are rendered."
              - listitem [ref=e153]:
                - strong [ref=e154]: No Mappers Needed
                - text: ": It is recommended to build catalogs that directly reflect your client's design system rather than trying to map a generic catalog (like the Basic Catalog) to it through an adapter."
            - paragraph [ref=e155]: The Basic Catalog is just one example and is intentionally sparse to remain easily implementable by different renderers.
            - heading "How It Works ¶" [level=2] [ref=e156]:
              - text: How It Works
              - link "¶" [ref=e157] [cursor=pointer]:
                - /url: https://a2ui.org/guides/defining-your-own-catalog/#how-it-works
            - list [ref=e158]:
              - listitem [ref=e159]:
                - strong [ref=e160]: Define the Catalog
                - text: ": Create a catalog definition (JSON Schema) listing the components, functions, and styles your application supports."
              - listitem [ref=e161]:
                - strong [ref=e162]: Register the Catalog
                - text: ": Register the catalog and its corresponding component implementations (renderers) with your client application."
              - listitem [ref=e163]:
                - strong [ref=e164]: Announce Support
                - text: ": The client informs the agent which catalogs it supports (via"
                - code [ref=e165]: supportedCatalogIds
                - text: ).
              - listitem [ref=e166]:
                - strong [ref=e167]: Agent Selects Catalog
                - text: ": The agent chooses a catalog for a given UI surface (via"
                - code [ref=e168]: catalogId
                - text: inside the creation message, like
                - code [ref=e169]: createSurface
                - text: ).
              - listitem [ref=e170]:
                - strong [ref=e171]: Agent Generates UI
                - text: ": The agent generates component messages using the components defined in that catalog by name."
            - heading "Implementation Guide ¶" [level=2] [ref=e172]:
              - text: Implementation Guide
              - link "¶" [ref=e173] [cursor=pointer]:
                - /url: https://a2ui.org/guides/defining-your-own-catalog/#implementation-guide
            - paragraph [ref=e174]: It is recommended to create catalogs that directly map to your existing component library.
            - generic [ref=e175]:
