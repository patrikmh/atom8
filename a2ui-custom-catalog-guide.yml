              - button [ref=e193] [cursor=pointer]
              - button [ref=e194] [cursor=pointer]
            - heading "Security Considerations ¶" [level=2] [ref=e195]:
              - text: Security Considerations
              - link "¶" [ref=e196] [cursor=pointer]:
                - /url: https://a2ui.org/guides/defining-your-own-catalog/#security-considerations
            - paragraph [ref=e197]: "When defining and registering catalogs:"
            - list [ref=e198]:
              - listitem [ref=e199]:
                - strong [ref=e200]: Allowlist components
                - text: ": Only register components you trust in your catalog definition. Don't expose components that offer dangerous capabilities (e.g., executing arbitrary scripts) unless strictly controlled."
              - listitem [ref=e201]:
                - strong [ref=e202]: Validate properties
                - text: ": Always validate component properties from agent messages to ensure they match expected type constraints."
              - listitem [ref=e203]:
                - strong [ref=e204]: Sanitize text
                - text: ": Avoid rendering un-sanitized content provided by the agent unless safe bounds are established."
            - heading "Next Steps ¶" [level=2] [ref=e205]:
              - text: Next Steps
              - link "¶" [ref=e206] [cursor=pointer]:
                - /url: https://a2ui.org/guides/defining-your-own-catalog/#next-steps
