              - heading "Defining the Workflow with HandoffBuilder" [level=2] [ref=e165]
              - paragraph [ref=e166]:
                - text: The orchestration layer uses MAF’s
                - code [ref=e167]: HandoffBuilder
                - text: ", which lets you declare agents, their tools, and an explicit handoff topology. This is not a simple chain. Each agent can route to specific other agents based on descriptions you provide, and the framework enforces these routing constraints at the orchestration level."
              - button "Copy" [ref=e170] [cursor=pointer]:
                - img [ref=e171]
                - text: Copy
              - code [ref=e174]:
                - text: from agent_framework import Agent, tool from agent_framework.orchestrations import HandoffBuilder
                - generic [ref=e175]:
                  - text: "@tool("
                  - generic [ref=e176]: approval_mode="always_require"
                  - text: )
                - text: def submit_refund(
                - generic [ref=e177]: "refund_description: str, amount: str, order_id: str,"
                - text: ") -> str: \"\"\"Capture a refund request for manual review before processing.\"\"\" return"
                - generic [ref=e178]: "f\"refund recorded for order {order_id} (amount: {amount})\""
                - generic [ref=e179]:
                  - text: "@tool("
                  - generic [ref=e180]: approval_mode="always_require"
                  - text: )
                - text: def submit_replacement(
                - generic [ref=e181]: "order_id: str, shipping_preference: str, replacement_note: str,"
                - text: ") -> str: \"\"\"Capture a replacement request for manual review before processing.\"\"\" return ("
                - generic [ref=e182]: "f\"replacement recorded for order {order_id} \""
                - generic [ref=e183]: "f\"(shipping: {shipping_preference})\""
                - text: ) triage = Agent( id="triage_agent", name="triage_agent", instructions="...", client=client, require_per_service_call_history_persistence=True, ) refund = Agent( id="refund_agent", name="refund_agent", instructions="...", client=client, tools=[submit_refund], require_per_service_call_history_persistence=True, ) order = Agent( id="order_agent", name="order_agent", instructions="...", client=client, tools=[submit_replacement], require_per_service_call_history_persistence=True, )
              - paragraph [ref=e184]:
                - text: The
                - code [ref=e185]: "@tool(approval_mode=\"always_require\")"
                - text: decorator is the key integration point with HITL. When an agent calls one of these tools, the workflow pauses and emits an interrupt event that the frontend can render as an approval prompt. The workflow does not resume until the operator approves or rejects the call.
              - paragraph [ref=e186]: "With the agents defined, the handoff topology is explicit:"
              - button "Copy" [ref=e189] [cursor=pointer]:
                - img [ref=e190]
                - text: Copy
              - code [ref=e193]: builder = HandoffBuilder( name="ag_ui_handoff_workflow_demo", participants=[triage, refund, order], termination_condition=termination_condition, ) ( builder .add_handoff( triage, [refund], description=( "Refunds, damaged-item claims, " "refund status updates." ), ) .add_handoff( triage, [order], description=( "Replacement, exchange, " "shipping preference changes." ), ) .add_handoff( refund, [order], description="Replacement logistics needed after refund.", ) .add_handoff( refund, [triage], description=( "Final case closure when refund-only work is complete." ), ) .add_handoff( order, [triage], description="After replacement/shipping tasks complete.", ) .add_handoff( order, [refund], description=( "User pivots from replacement to refund processing." ), ) ) workflow = builder.with_start_agent(triage).build()
              - paragraph [ref=e194]:
                - text: Each
                - code [ref=e195]: add_handoff
                - text: call declares a directed edge in the routing graph with a natural-language description. The framework uses these descriptions to generate handoff tools for each agent, so routing decisions are grounded in the orchestration topology rather than relying solely on prompt instructions.
              - heading "Connecting to AG-UI" [level=2] [ref=e196]
              - paragraph [ref=e197]:
                - text: AG-UI is a protocol that streams agent execution events over SSE. MAF’s
                - code [ref=e198]: agent_framework.ag_ui
                - text: package provides a bridge that wraps any MAF workflow into an AG-UI-compatible endpoint with a single function call.
              - button "Copy" [ref=e201] [cursor=pointer]:
                - img [ref=e202]
                - text: Copy
              - code [ref=e205]: "from agent_framework.ag_ui import ( AgentFrameworkWorkflow, add_agent_framework_fastapi_endpoint, ) from fastapi import FastAPI app = FastAPI() demo_workflow = AgentFrameworkWorkflow( workflow_factory=lambda _thread_id: create_handoff_workflow(), name=\"ag_ui_handoff_workflow_demo\", ) add_agent_framework_fastapi_endpoint( app=app, agent=demo_workflow, path=\"/handoff_demo\", )"
              - paragraph [ref=e206]:
                - text: That is it. The
                - code [ref=e207]: workflow_factory
                - text: "creates a fresh workflow instance per thread, maintaining isolated state for each conversation. The endpoint handles all the SSE plumbing: streaming"
                - code [ref=e208]: RUN_STARTED
                - text: ","
                - code [ref=e209]: STEP_STARTED
                - text: ","
                - code [ref=e210]: TEXT_MESSAGE_*
                - text: ","
                - code [ref=e211]: TOOL_CALL_*
                - text: ", and"
                - code [ref=e212]: RUN_FINISHED
                - text: events as the workflow executes.
              - heading "Two Types of Interrupts" [level=2] [ref=e213]
              - paragraph [ref=e214]: "The demo showcases two distinct interrupt patterns that a real-world agent application needs:"
              - paragraph [ref=e215]:
                - strong [ref=e216]: Tool approval interrupts
                - text: fire when an agent calls a tool marked with
                - code [ref=e217]: approval_mode="always_require"
                - text: . The workflow pauses, the frontend renders an approval modal showing the tool name and arguments, and the operator decides whether to approve or reject the call. This is essential for actions like processing refunds or submitting replacement orders where you want a human in the loop.
              - paragraph [ref=e218]:
                - strong [ref=e219]: Information request interrupts
                - text: fire when an agent needs additional input from the user, such as an order ID or a shipping preference. The workflow pauses and the frontend presents the agent’s question in the chat. The user responds normally, and their answer is submitted back to resume the workflow from where it left off.
              - paragraph [ref=e220]:
                - text: Under the hood, information request interrupts are powered by
                - code [ref=e221]: HandoffAgentUserRequest
                - text: . When an agent completes its turn without requesting a handoff to another agent, the workflow issues a
                - code [ref=e222]: HandoffAgentUserRequest
                - text: "containing the agent’s response. This pauses execution and emits an interrupt event to the frontend. When the user replies, a response handler broadcasts the user’s message to all agents, appends it to the conversation cache, and resumes the active agent:"
              - button "Copy" [ref=e225] [cursor=pointer]:
                - img [ref=e226]
                - text: Copy
              - code [ref=e229]:
                - text: "from agent_framework.orchestrations import HandoffAgentUserRequest # Inside the handoff executor, when no handoff is requested: # The workflow pauses and waits for user input. await ctx.request_info( HandoffAgentUserRequest(agent_response), list[Message], ) # When the user responds, the handler resumes the workflow: @response_handler async def handle_response("
                - generic [ref=e230]: "self, original_request: HandoffAgentUserRequest, response: list[Message], ctx: WorkflowContext,"
                - text: ") -> None: if not response: # Empty response signals termination await ctx.yield_output(self._full_conversation) return await self._broadcast_messages(response, ctx) self._cache.extend(response) await self._run_agent_and_emit(ctx)"
              - paragraph [ref=e231]:
                - text: This means the conversation flow is fully controlled by the agents themselves. When the refund agent asks “What is your order ID?”, that question becomes a
                - code [ref=e232]: HandoffAgentUserRequest
                - text: interrupt. The user’s answer flows back through the same resume mechanism, and the agent picks up exactly where it left off.
              - paragraph [ref=e233]:
                - text: Both interrupt types use the same underlying
                - code [ref=e234]: resume.interrupts
                - text: mechanism in AG-UI. The frontend sends a resume payload with the interrupt ID and the response value, and the workflow picks up exactly where it paused.
              - heading "The Frontend Experience" [level=2] [ref=e235]
              - paragraph [ref=e236]: "The React frontend consumes the SSE stream and renders the workflow state in real time. Key UI elements include:"
              - list [ref=e237]:
                - listitem [ref=e238]:
                  - strong [ref=e239]: Active agent indicator
                  - text: showing which specialist is currently handling the case
                - listitem [ref=e240]:
                  - strong [ref=e241]: Case snapshot card
                  - text: that updates as the workflow gathers order details, amounts, and shipping preferences
                - listitem [ref=e242]:
                  - strong [ref=e243]: Chat panel
                  - text: with streaming assistant messages and user input
                - listitem [ref=e244]:
                  - strong [ref=e245]: Approval modal
                  - text: that surfaces tool call details for the operator to review before approving or rejecting
              - figure [ref=e246]:
                - button "The HITL approval modal showing the submit_refund tool call with refund details and Approve/Reject buttons image, click or press enter to enlarge" [ref=e247] [cursor=pointer]:
                  - img "The HITL approval modal showing the submit_refund tool call with refund details and Approve/Reject buttons" [ref=e248]
              - paragraph [ref=e249]: The frontend maintains a queue of pending interrupts so that multiple approval requests or information requests can be handled in sequence without losing state.
              - heading "Running the Demo" [level=2] [ref=e250]
              - paragraph [ref=e251]: "The backend is a FastAPI server and the frontend is a Vite + React application. To run:"
              - button "Copy" [ref=e254] [cursor=pointer]:
                - img [ref=e255]
                - text: Copy
              - code [ref=e258]: "# Backend (from python/ directory) uv sync uv run python samples/05-end-to-end/ag_ui_workflow_handoff/backend/server.py # Frontend (in a separate terminal) cd samples/05-end-to-end/ag_ui_workflow_handoff/frontend npm install npm run dev"
              - paragraph [ref=e259]:
                - text: Open
                - code [ref=e260]: http://127.0.0.1:5173
                - text: in a browser and try a prompt like “I need a refund for order 987654.” The triage agent routes to the refund specialist, which looks up order details, gathers a reason, and submits a refund request for your approval.
              - heading "What This Demonstrates" [level=2] [ref=e261]
              - paragraph [ref=e262]: "This sample validates several capabilities working together in a single application:"
              - list [ref=e263]:
                - listitem [ref=e264]:
                  - strong [ref=e265]: MAF workflows as AG-UI backends.
                  - text: Any workflow built with
                  - code [ref=e266]: HandoffBuilder
                  - text: (or other MAF orchestration patterns) can be exposed as an AG-UI endpoint with minimal glue code.
                - listitem [ref=e267]:
                  - strong [ref=e268]: Dynamic, non-linear routing.
                  - text: Agents hand off based on conversation context, not a fixed sequence. The routing graph is declared in code and enforced by the framework.
                - listitem [ref=e269]:
                  - strong [ref=e270]: Human-in-the-loop at the tool level.
                  - text: Sensitive actions require explicit approval. The workflow pauses cleanly and resumes after the operator responds.
                - listitem [ref=e271]:
                  - strong [ref=e272]: Thread-scoped state.
                  - text: Each conversation gets its own workflow instance, so multiple users or sessions can run concurrently without interference.
                - listitem [ref=e273]:
                  - strong [ref=e274]: Real-time streaming UI.
                  - text: Every token, tool call, and state change is streamed to the frontend as it happens.
