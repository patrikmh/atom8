          - article [ref=e142]:
            - generic [ref=e143]:
              - paragraph [ref=e144]: Multi-agent systems demo beautifully. Putting them in front of real users is another story.
              - paragraph [ref=e145]: In early prototypes, a terminal or a basic chat window is enough. But once agents start handing off to each other, pausing for approvals, or asking follow-up questions, those interfaces fall apart. Which agent is active? Why is the system waiting? What’s it about to do on the user’s behalf? Without answers to those questions, a multi-agent workflow stops feeling like a product and starts feeling opaque.
              - paragraph [ref=e146]:
                - text: This post shows what a better answer looks like. We’ll build a customer support workflow that pairs Microsoft Agent Framework (MAF) handoffs with
                - link "AG-UI" [ref=e147] [cursor=pointer]:
                  - /url: https://github.com/ag-ui-protocol/ag-ui
                - text: ", an open protocol for streaming agent execution events to a frontend over Server-Sent Events (SSE). The result is a real-time UI that shows users what’s happening, lets them respond when agents need input, and keeps them in control of sensitive actions like issuing refunds."
              - separator [ref=e148]
              - paragraph [ref=e149]:
                - strong [ref=e150]: "Note:"
                - text: This demo runs on MAF
                - strong [ref=e151]: Python
                - text: today. C# support for MAF + AG-UI is still in development.
              - separator [ref=e152]
              - heading "What You Will Build" [level=2] [ref=e153]
              - paragraph [ref=e154]: "The demo is a customer support workflow with three specialized agents:"
              - list [ref=e155]:
                - listitem [ref=e156]:
                  - strong [ref=e157]: Triage Agent
                  - text: analyzes the customer’s request and routes to the right specialist.
                - listitem [ref=e158]:
                  - strong [ref=e159]: Refund Agent
                  - text: looks up order details, gathers context, and submits refund requests.
                - listitem [ref=e160]:
                  - strong [ref=e161]: Order Agent
                  - text: handles replacements and shipping preferences.
              - iframe [ref=e164]:
