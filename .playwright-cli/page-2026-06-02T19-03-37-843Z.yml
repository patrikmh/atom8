          - blockquote [ref=e1447]:
            - paragraph [ref=e1448]: "The data from which this table is extrapolated is scant. Laurent Bossavit says in his analysis:"
            - blockquote [ref=e1449]:
              - paragraph [ref=e1450]: The "smaller projects" curve turns out to be from only two teams of first-year students, a sample size so small that extrapolating to "smaller projects in general" is totally indefensible. The GTE study does not explain its data, other than to say it came from two projects, one large and one small. The paper cited for the Bell Labs "Safeguard" project specifically disclaims having collected the fine-grained data that Boehm's data points suggest. The IBM study (Fagan's paper) contains claims that seem to contradict Boehm's graph and no numerical results that clearly correspond to his data points.
              - paragraph [ref=e1451]:
                - text: Boehm doesn't even cite a paper for the TRW data, except when writing for "Making Software" in 2010, and there he cited the original 1976 article. There exists a large study conducted at TRW at the right time for Boehm to cite it, but that paper doesn't contain the sort of data that would support Boehm's claims.
                - superscript [ref=e1452]:
                  - link "[94]" [ref=e1453] [cursor=pointer]:
                    - /url: "#cite_note-Bossavit-Leprechauns-94"
