          - figure "TestingCup – Polish Championship in Software Testing, Katowice, May 2016" [ref=e294]:
            - link [ref=e295] [cursor=pointer]:
              - /url: /wiki/File:TestingCup-Polish-Championship-in-Software-Testing-Katowice-2016.jpg
              - img [ref=e296]
            - generic [ref=e297]:
              - text: TestingCup – Polish Championship in Software Testing,
              - link "Katowice" [ref=e298] [cursor=pointer]:
                - /url: /wiki/Katowice
              - text: ", May 2016"
          - paragraph [ref=e299]:
            - text: Software testing is the act of checking whether
            - link "software" [ref=e300] [cursor=pointer]:
              - /url: /wiki/Software
            - text: meets its intended objectives and satisfies expectations.
          - paragraph [ref=e301]:
            - text: Software testing can provide objective, independent information about the
            - link "quality" [ref=e302] [cursor=pointer]:
              - /url: /wiki/Quality_(business)
            - text: of software and the
            - link "risk" [ref=e303] [cursor=pointer]:
              - /url: /wiki/Risk
            - text: of its failure to a
            - link "user" [ref=e304] [cursor=pointer]:
              - /url: /wiki/User_(computing)
            - text: or sponsor or any other stakeholder.
            - superscript [ref=e305]:
              - link "[1]" [ref=e306] [cursor=pointer]:
                - /url: "#cite_note-Kaner_1-1"
          - paragraph [ref=e307]:
            - text: Software testing can determine the
            - link "correctness" [ref=e308] [cursor=pointer]:
              - /url: /wiki/Correctness_(computer_science)
            - text: of software for specific
            - link "scenarios" [ref=e309] [cursor=pointer]:
              - /url: /wiki/Scenario_(computing)
            - text: but cannot determine correctness for all scenarios.
            - superscript [ref=e310]:
              - link "[2]" [ref=e311] [cursor=pointer]:
                - /url: "#cite_note-pan-2"
            - superscript [ref=e312]:
              - link "[3]" [ref=e313] [cursor=pointer]:
                - /url: "#cite_note-Kaner2-3"
            - text: It cannot find all
            - link "bugs" [ref=e314] [cursor=pointer]:
              - /url: /wiki/Software_bug
            - text: .
          - paragraph [ref=e315]:
            - text: Based on the criteria for measuring correctness from an
            - link "oracle" [ref=e316] [cursor=pointer]:
              - /url: /wiki/Test_oracle
            - text: ", software testing employs principles and mechanisms that might recognize a problem. Examples of oracles include"
            - link "specifications" [ref=e317] [cursor=pointer]:
              - /url: /wiki/Specification
            - text: ","
            - link "contracts" [ref=e318] [cursor=pointer]:
              - /url: /wiki/Design_by_Contract
            - text: ","
            - superscript [ref=e319]:
              - link "[4]" [ref=e320] [cursor=pointer]:
                - /url: "#cite_note-4"
            - text: comparable products, past versions of the same product, inferences about intended or expected purpose, user or customer expectations, relevant standards, and applicable laws.
          - paragraph [ref=e321]: Software testing can be functional or non-functional in nature.
          - paragraph [ref=e322]:
            - text: Software testing is often
            - link "dynamic" [ref=e323] [cursor=pointer]:
              - /url: /wiki/Dynamic_testing
            - text: "in nature: running the software to verify actual output matches expected. It can also be"
            - link "static" [ref=e324] [cursor=pointer]:
              - /url: /wiki/Static_testing
            - text: "in nature: reviewing"
            - link "code" [ref=e325] [cursor=pointer]:
              - /url: /wiki/Source_code
            - text: and its associated
            - link "documentation" [ref=e326] [cursor=pointer]:
              - /url: /wiki/Documentation
            - text: .
          - paragraph [ref=e327]: "Software testing is often used to answer the question: Does the software do what it is supposed to do and what it needs to do?"
          - paragraph [ref=e328]:
            - text: Information learned from software testing may be used to improve the process by which software is developed.
            - superscript [ref=e329]:
              - link "[5]" [ref=e330] [cursor=pointer]:
                - /url: "#cite_note-kolawa-5"
            - superscript [ref=e331]: ": 41–43"
          - paragraph [ref=e332]:
            - text: A commonly suggested approach to automated testing is the "test pyramid," wherein most of the tests are
            - link "unit tests" [ref=e333] [cursor=pointer]:
              - /url: /wiki/Unit_tests
            - text: ", followed by a smaller set of"
            - link "integration tests" [ref=e334] [cursor=pointer]:
              - /url: /wiki/Integration_testing
            - text: and finally a few
            - link "end-to-end (e2e) tests" [ref=e335] [cursor=pointer]:
              - /url: /wiki/End-to-end_testing
            - text: .
            - superscript [ref=e336]:
              - link "[6]" [ref=e337] [cursor=pointer]:
                - /url: "#cite_note-6"
            - superscript [ref=e338]:
              - link "[7]" [ref=e339] [cursor=pointer]:
                - /url: "#cite_note-7"
            - superscript [ref=e340]:
              - link "[8]" [ref=e341] [cursor=pointer]:
                - /url: "#cite_note-8"
          - generic [ref=e342]:
            - heading "Economics" [level=2] [ref=e343]
            - generic [ref=e344]:
              - text: "["
              - link "edit" [ref=e345] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=1
              - text: "]"
          - paragraph [ref=e346]:
            - text: A study conducted by
            - link "NIST" [ref=e347] [cursor=pointer]:
              - /url: /wiki/NIST
            - text: in 2002 reported that software bugs cost the U.S. economy $59.5 billion annually. More than a third of this cost could be avoided if better software testing was performed.
            - superscript [ref=e348]:
              - link "[9]" [ref=e349] [cursor=pointer]:
                - /url: "#cite_note-9"
            - superscript [ref=e350]:
              - text: "["
              - generic [ref=e351]:
                - link "dubious" [ref=e352] [cursor=pointer]:
                  - /url: /wiki/Wikipedia:Accuracy_dispute#Disputed_statement
                - text: –
                - link "discuss" [ref=e353] [cursor=pointer]:
                  - /url: /wiki/Talk:Software_testing#NIST_study
              - text: "]"
          - paragraph [ref=e354]:
            - link "Outsourcing" [ref=e355] [cursor=pointer]:
              - /url: /wiki/Outsourcing
            - text: software testing because of costs is very common, with China, the Philippines, India and Pakistan being preferred destinations.
            - superscript [ref=e356]:
              - link "[10]" [ref=e357] [cursor=pointer]:
                - /url: "#cite_note-Tholons_report-10"
          - generic [ref=e358]:
            - heading "History" [level=2] [ref=e359]
            - generic [ref=e360]:
              - text: "["
              - link "edit" [ref=e361] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=2
              - text: "]"
          - paragraph [ref=e362]:
            - link "Glenford J. Myers" [ref=e363] [cursor=pointer]:
              - /url: /wiki/Glenford_J._Myers
            - text: initially introduced the separation of
            - link "debugging" [ref=e364] [cursor=pointer]:
              - /url: /wiki/Debugging
            - text: from testing in 1979.
            - superscript [ref=e365]:
              - link "[11]" [ref=e366] [cursor=pointer]:
                - /url: "#cite_note-Myers_1979-11"
            - text: Although his attention was on breakage testing ("A successful test case is one that detects an as-yet undiscovered error."
            - superscript [ref=e367]:
              - link "[11]" [ref=e368] [cursor=pointer]:
                - /url: "#cite_note-Myers_1979-11"
            - superscript [ref=e369]: ": 16"
            - text: ), it illustrated the desire of the software engineering community to separate fundamental development activities, such as debugging, from that of verification. Software testing typically includes handling software bugs – a defect in the
            - link "code" [ref=e370] [cursor=pointer]:
              - /url: /wiki/Source_code
            - text: that causes an undesirable result.
            - superscript [ref=e371]:
              - link "[12]" [ref=e372] [cursor=pointer]:
                - /url: "#cite_note-IEEEglossary-12"
            - superscript [ref=e373]: ": 31"
            - text: Bugs generally slow testing progress and involve
            - link "programmer" [ref=e374] [cursor=pointer]:
              - /url: /wiki/Programmer
            - text: assistance to
            - link "debug" [ref=e375] [cursor=pointer]:
              - /url: /wiki/Debug
            - text: and fix.
          - paragraph [ref=e376]:
            - text: Not all defects cause a failure. For example, a defect in
            - link "dead code" [ref=e377] [cursor=pointer]:
              - /url: /wiki/Dead_code
            - text: will not be considered a failure.
          - paragraph [ref=e378]:
            - text: A defect that does not cause failure at one point in time may lead to failure later due to environmental changes. Examples of environment change include running on new
            - link "computer hardware" [ref=e379] [cursor=pointer]:
              - /url: /wiki/Computer_hardware
            - text: ", changes in"
            - link "data" [ref=e380] [cursor=pointer]:
              - /url: /wiki/Source_data
            - text: ", and interacting with different software."
            - superscript [ref=e381]:
              - link "[13]" [ref=e382] [cursor=pointer]:
                - /url: "#cite_note-13"
          - generic [ref=e383]:
            - heading "Goals" [level=2] [ref=e384]
            - generic [ref=e385]:
              - text: "["
              - link "edit" [ref=e386] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=3
              - text: "]"
          - paragraph [ref=e387]: Software testing is typically goal driven.
          - generic [ref=e388]:
            - heading "Finding bugs" [level=3] [ref=e389]
            - generic [ref=e390]:
              - text: "["
              - link "edit" [ref=e391] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=4
              - text: "]"
          - paragraph [ref=e392]:
            - text: Software testing typically includes handling software bugs – a defect in the
            - link "code" [ref=e393] [cursor=pointer]:
              - /url: /wiki/Source_code
            - text: that causes an undesirable result.
            - superscript [ref=e394]:
              - link "[12]" [ref=e395] [cursor=pointer]:
                - /url: "#cite_note-IEEEglossary-12"
            - superscript [ref=e396]: ": 31"
            - text: Bugs generally slow testing progress and involve
            - link "programmer" [ref=e397] [cursor=pointer]:
              - /url: /wiki/Programmer
            - text: assistance to
            - link "debug" [ref=e398] [cursor=pointer]:
              - /url: /wiki/Debug
            - text: and fix.
          - paragraph [ref=e399]:
            - text: Not all defects cause a failure. For example, a defect in
            - link "dead code" [ref=e400] [cursor=pointer]:
              - /url: /wiki/Dead_code
            - text: will not be considered a failure.
          - paragraph [ref=e401]:
            - text: A defect that does not cause failure at one point in time may lead to failure later due to environmental changes. Examples of environment change include running on new
            - link "computer hardware" [ref=e402] [cursor=pointer]:
              - /url: /wiki/Computer_hardware
            - text: ", changes in"
            - link "data" [ref=e403] [cursor=pointer]:
              - /url: /wiki/Source_data
            - text: ", and interacting with different software."
            - superscript [ref=e404]:
              - link "[14]" [ref=e405] [cursor=pointer]:
                - /url: "#cite_note-14"
          - paragraph [ref=e406]: A single defect may result in multiple failure symptoms.
          - generic [ref=e407]:
            - heading "Ensuring requirements are satisfied" [level=3] [ref=e408]
            - generic [ref=e409]:
              - text: "["
              - link "edit" [ref=e410] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=5
              - text: "]"
          - paragraph [ref=e411]:
            - text: Software testing may involve a Requirements gap – omission from the design for a requirement.
            - superscript [ref=e412]:
              - link "[5]" [ref=e413] [cursor=pointer]:
                - /url: "#cite_note-kolawa-5"
            - superscript [ref=e414]: ": 426"
            - text: Requirement gaps can often be
            - link "non-functional requirements" [ref=e415] [cursor=pointer]:
              - /url: /wiki/Non-functional_requirements
            - text: such as
            - link "testability" [ref=e416] [cursor=pointer]:
              - /url: /wiki/Software_testability
            - text: ","
            - link "scalability" [ref=e417] [cursor=pointer]:
              - /url: /wiki/Scalability
            - text: ","
            - link "maintainability" [ref=e418] [cursor=pointer]:
              - /url: /wiki/Maintainability
            - text: ","
            - link "performance" [ref=e419] [cursor=pointer]:
              - /url: /wiki/Computer_performance
            - text: ", and"
            - link "security" [ref=e420] [cursor=pointer]:
              - /url: /wiki/Computer_security
            - text: .
          - generic [ref=e421]:
            - heading "Code coverage" [level=3] [ref=e422]
            - generic [ref=e423]:
              - text: "["
              - link "edit" [ref=e424] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=6
              - text: "]"
          - paragraph [ref=e425]:
            - text: A fundamental limitation of software testing is that testing under all combinations of inputs and preconditions (initial state) is not feasible, even with a simple product.
            - superscript [ref=e426]:
              - link "[3]" [ref=e427] [cursor=pointer]:
                - /url: "#cite_note-Kaner2-3"
            - superscript [ref=e428]: ": 17–18"
            - superscript [ref=e429]:
              - link "[15]" [ref=e430] [cursor=pointer]:
                - /url: "#cite_note-15"
            - text: Defects that manifest in unusual conditions are difficult to find in testing. Also,
            - link "non-functional" [ref=e431] [cursor=pointer]:
              - /url: /wiki/Non-functional_requirements
            - text: dimensions of quality (how it is supposed to be versus what it is supposed to do) –
            - link "usability" [ref=e432] [cursor=pointer]:
              - /url: /wiki/Usability
            - text: ","
            - link "scalability" [ref=e433] [cursor=pointer]:
              - /url: /wiki/Scalability
            - text: ","
            - link "performance" [ref=e434] [cursor=pointer]:
              - /url: /wiki/Computer_performance
            - text: ","
            - link "compatibility" [ref=e435] [cursor=pointer]:
              - /url: /wiki/Backward_compatibility
            - text: ", and"
            - link "reliability" [ref=e436] [cursor=pointer]:
              - /url: /wiki/Reliability_(engineering)
            - text: – can be subjective; something that constitutes sufficient value to one person may not to another.
          - paragraph [ref=e437]:
            - text: Although testing for every possible input is not feasible, testing can use
            - link "combinatorics" [ref=e438] [cursor=pointer]:
              - /url: /wiki/Combinatorics
            - text: to maximize coverage while minimizing tests.
            - superscript [ref=e439]:
              - link "[16]" [ref=e440] [cursor=pointer]:
                - /url: "#cite_note-16"
          - generic [ref=e441]:
            - heading "Categories" [level=2] [ref=e442]
            - generic [ref=e443]:
              - text: "["
              - link "edit" [ref=e444] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=7
              - text: "]"
          - paragraph
          - note [ref=e445]:
            - text: "Main article:"
            - link "Software testing tactics" [ref=e446] [cursor=pointer]:
              - /url: /wiki/Software_testing_tactics
          - paragraph [ref=e447]:
            - text: Testing can be categorized many ways.
            - superscript [ref=e448]:
              - link "[17]" [ref=e449] [cursor=pointer]:
                - /url: "#cite_note-17"
          - generic [ref=e450]:
            - heading "Automated testing" [level=3] [ref=e451]
            - generic [ref=e452]:
              - text: "["
              - link "edit" [ref=e453] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=8
              - text: "]"
          - generic [ref=e454]:
            - note [ref=e455]:
              - text: This paragraph is an excerpt from
              - link "Test automation" [ref=e456] [cursor=pointer]:
                - /url: /wiki/Test_automation
              - text: .
              - generic [ref=e457]:
                - text: "["
                - link "edit" [ref=e458] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Test_automation&action=edit
                - text: "]"
            - paragraph [ref=e460]:
              - link "Test automation" [ref=e461] [cursor=pointer]:
                - /url: /wiki/Test_automation
              - text: is the use of
              - link "software" [ref=e462] [cursor=pointer]:
                - /url: /wiki/Software
              - text: (separate from the software being tested) for controlling the execution of tests and comparing actual outcome with predicted.
              - superscript [ref=e463]:
                - link "[18]" [ref=e464] [cursor=pointer]:
                  - /url: "#cite_note-18"
              - text: Test automation supports testing the
              - link "system under test" [ref=e465] [cursor=pointer]:
                - /url: /wiki/System_under_test
              - text: (SUT) without
              - link "manual interaction" [ref=e466] [cursor=pointer]:
                - /url: /wiki/Manual_testing
              - text: which can lead to faster test execution and testing more often. Test automation is a key aspect of
              - link "continuous testing" [ref=e467] [cursor=pointer]:
                - /url: /wiki/Continuous_testing
              - text: and often for
              - link "continuous integration" [ref=e468] [cursor=pointer]:
                - /url: /wiki/Continuous_integration
              - text: and
              - link "continuous delivery" [ref=e469] [cursor=pointer]:
                - /url: /wiki/Continuous_delivery
              - text: (CI/CD).
              - superscript [ref=e470]:
                - link "[19]" [ref=e471] [cursor=pointer]:
                  - /url: "#cite_note-19"
          - generic [ref=e472]:
            - heading "Levels" [level=3] [ref=e473]
            - generic [ref=e474]:
              - text: "["
              - link "edit" [ref=e475] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=9
              - text: "]"
          - paragraph [ref=e476]:
            - text: Software testing can be categorized into levels based on how much of the
            - link "software system" [ref=e477] [cursor=pointer]:
              - /url: /wiki/Software_system
            - text: is the focus of a test.
            - superscript [ref=e478]:
              - link "[20]" [ref=e479] [cursor=pointer]:
                - /url: "#cite_note-Computer.org-20"
            - superscript [ref=e480]:
              - link "[21]" [ref=e481] [cursor=pointer]:
                - /url: "#cite_note-BourqueSWEBOK14-4-21"
            - superscript [ref=e482]:
              - link "[22]" [ref=e483] [cursor=pointer]:
                - /url: "#cite_note-DooleySoftware11-22"
            - superscript [ref=e484]:
              - link "[23]" [ref=e485] [cursor=pointer]:
                - /url: "#cite_note-WiegersCreating13-23"
          - generic [ref=e486]:
            - heading "Unit testing" [level=4] [ref=e487]
            - generic [ref=e488]:
              - text: "["
              - link "edit" [ref=e489] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=10
              - text: "]"
          - generic [ref=e490]:
            - note [ref=e491]:
              - text: This paragraph is an excerpt from
              - link "Unit testing" [ref=e492] [cursor=pointer]:
                - /url: /wiki/Unit_testing
              - text: .
              - generic [ref=e493]:
                - text: "["
                - link "edit" [ref=e494] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Unit_testing&action=edit
                - text: "]"
            - paragraph [ref=e496]:
              - link "Unit testing" [ref=e497] [cursor=pointer]:
                - /url: /wiki/Unit_testing
              - text: ", a.k.a. component or module testing, is a form of software testing by which isolated"
              - link "source code" [ref=e498] [cursor=pointer]:
                - /url: /wiki/Source_code
              - text: is tested to validate expected behavior.
              - superscript [ref=e499]:
                - link "[24]" [ref=e500] [cursor=pointer]:
                  - /url: "#cite_note-Unit_testing_kolawa-24"
          - generic [ref=e501]:
            - heading "Integration testing" [level=4] [ref=e502]
            - generic [ref=e503]:
              - text: "["
              - link "edit" [ref=e504] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=11
              - text: "]"
          - generic [ref=e505]:
            - note [ref=e506]:
              - text: This paragraph is an excerpt from
              - link "Integration testing" [ref=e507] [cursor=pointer]:
                - /url: /wiki/Integration_testing
              - text: .
              - generic [ref=e508]:
                - text: "["
                - link "edit" [ref=e509] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Integration_testing&action=edit
                - text: "]"
            - paragraph [ref=e511]:
              - link "Integration testing" [ref=e512] [cursor=pointer]:
                - /url: /wiki/Integration_testing
              - text: is a form of software testing in which multiple software components, modules, or services are tested together to verify they work as expected when combined. The focus is on testing the interactions and data exchange between integrated parts, rather than testing components in isolation.
          - generic [ref=e513]:
            - heading "System testing" [level=4] [ref=e514]
            - generic [ref=e515]:
              - text: "["
              - link "edit" [ref=e516] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=12
              - text: "]"
          - generic [ref=e517]:
            - note [ref=e518]:
              - text: This paragraph is an excerpt from
              - link "System testing" [ref=e519] [cursor=pointer]:
                - /url: /wiki/System_testing
              - text: .
              - generic [ref=e520]:
                - text: "["
                - link "edit" [ref=e521] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=System_testing&action=edit
                - text: "]"
            - paragraph [ref=e523]:
              - link "System testing" [ref=e524] [cursor=pointer]:
                - /url: /wiki/System_testing
              - text: ", a.k.a. end-to-end (E2E) testing, is testing conducted on a complete"
              - link "software system" [ref=e525] [cursor=pointer]:
                - /url: /wiki/Software_system
              - text: .
          - generic [ref=e526]:
            - heading "Static, dynamic, and passive testing" [level=3] [ref=e527]: Static, dynamic, and passive testing
            - generic [ref=e528]:
              - text: "["
              - link "edit" [ref=e529] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=13
              - text: "]"
          - paragraph [ref=e530]:
            - text: There are many approaches to software testing.
            - link "Reviews" [ref=e531] [cursor=pointer]:
              - /url: /wiki/Code_review
            - text: ","
            - link "walkthroughs" [ref=e532] [cursor=pointer]:
              - /url: /wiki/Software_walkthrough
            - text: ", or"
            - link "inspections" [ref=e533] [cursor=pointer]:
              - /url: /wiki/Software_inspection
            - text: are referred to as static testing, whereas executing programmed code with a given set of
            - link "test cases" [ref=e534] [cursor=pointer]:
              - /url: /wiki/Test_case_(software)
            - text: is referred to as
            - link "dynamic testing" [ref=e535] [cursor=pointer]:
              - /url: /wiki/Dynamic_testing
            - text: .
            - superscript [ref=e536]:
              - link "[25]" [ref=e537] [cursor=pointer]:
                - /url: "#cite_note-GrahamFoundations08-25"
            - superscript [ref=e538]:
              - link "[26]" [ref=e539] [cursor=pointer]:
                - /url: "#cite_note-OberkampfVerif10-26"
          - paragraph [ref=e540]:
            - text: Static testing is often implicit, like proofreading, plus when programming tools/text editors check source code structure or compilers (precompilers) check syntax and data flow as
            - link "static program analysis" [ref=e541] [cursor=pointer]:
              - /url: /wiki/Static_program_analysis
            - text: . Dynamic testing takes place when the program itself is run. Dynamic testing may begin before the program is 100% complete in order to test particular sections of code and are applied to discrete
            - link "functions" [ref=e542] [cursor=pointer]:
              - /url: /wiki/Function_(computer_science)
            - text: or modules.
            - superscript [ref=e543]:
              - link "[25]" [ref=e544] [cursor=pointer]:
                - /url: "#cite_note-GrahamFoundations08-25"
            - superscript [ref=e545]:
              - link "[26]" [ref=e546] [cursor=pointer]:
                - /url: "#cite_note-OberkampfVerif10-26"
            - text: Typical techniques for these are either using
            - link "stubs" [ref=e547] [cursor=pointer]:
              - /url: /wiki/Method_stub
            - text: /drivers or execution from a
            - link "debugger" [ref=e548] [cursor=pointer]:
              - /url: /wiki/Debugger
            - text: environment.
            - superscript [ref=e549]:
              - link "[26]" [ref=e550] [cursor=pointer]:
                - /url: "#cite_note-OberkampfVerif10-26"
          - paragraph [ref=e551]:
            - text: Static testing involves
            - link "verification" [ref=e552] [cursor=pointer]:
              - /url: /wiki/Software_verification
            - text: ", whereas dynamic testing also involves"
            - link "validation" [ref=e553] [cursor=pointer]:
              - /url: /wiki/Software_validation
            - text: .
            - superscript [ref=e554]:
              - link "[26]" [ref=e555] [cursor=pointer]:
                - /url: "#cite_note-OberkampfVerif10-26"
          - paragraph [ref=e556]:
            - text: Passive testing means verifying the system's behavior without any interaction with the software product. Contrary to active testing, testers do not provide any test data but look at system logs and traces. They mine for patterns and specific behavior in order to make some kind of decisions.
            - superscript [ref=e557]:
              - link "[27]" [ref=e558] [cursor=pointer]:
                - /url: "#cite_note-27"
            - text: This is related to offline
            - link "runtime verification" [ref=e559] [cursor=pointer]:
              - /url: /wiki/Runtime_verification
            - text: and
            - link "log analysis" [ref=e560] [cursor=pointer]:
              - /url: /wiki/Log_analysis
            - text: .
          - generic [ref=e561]:
            - heading "Exploratory" [level=3] [ref=e562]
            - generic [ref=e563]:
              - text: "["
              - link "edit" [ref=e564] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=14
              - text: "]"
          - generic [ref=e565]:
            - note [ref=e566]:
              - text: This section is an excerpt from
              - link "Exploratory testing" [ref=e567] [cursor=pointer]:
                - /url: /wiki/Exploratory_testing
              - text: .
              - generic [ref=e568]:
                - text: "["
                - link "edit" [ref=e569] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Exploratory_testing&action=edit
                - text: "]"
            - paragraph [ref=e571]:
              - link "Exploratory testing" [ref=e572] [cursor=pointer]:
                - /url: /wiki/Exploratory_testing
              - text: is an approach to software testing that is concisely described as simultaneous learning,
              - link "test design" [ref=e573] [cursor=pointer]:
                - /url: /wiki/Test_design
              - text: and test execution.
              - link "Cem Kaner" [ref=e574] [cursor=pointer]:
                - /url: /wiki/Cem_Kaner
              - text: ", who coined the term in 1984,"
              - superscript [ref=e575]:
                - link "[28]" [ref=e576] [cursor=pointer]:
                  - /url: "#cite_note-28"
              - text: defines exploratory testing as "a style of software testing that emphasizes the personal freedom and responsibility of the individual tester to continually optimize the quality of his/her work by treating test-related learning, test design, test execution, and test result interpretation as mutually supportive activities that run in parallel throughout the project."
              - superscript [ref=e577]:
                - link "[29]" [ref=e578] [cursor=pointer]:
                  - /url: "#cite_note-29"
          - generic [ref=e579]:
            - heading "Preset testing vs adaptive testing" [level=3] [ref=e580]
            - generic [ref=e581]:
              - text: "["
              - link "edit" [ref=e582] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=15
              - text: "]"
          - paragraph [ref=e583]:
            - text: The type of testing strategy to be performed depends on whether the tests to be applied to the IUT should be decided before the testing plan starts to be executed (preset testing
            - superscript [ref=e584]:
              - link "[30]" [ref=e585] [cursor=pointer]:
                - /url: "#cite_note-30"
            - text: ) or whether each input to be applied to the IUT can be dynamically dependent on the outputs obtained during the application of the previous tests (adaptive testing
            - superscript [ref=e586]:
              - link "[31]" [ref=e587] [cursor=pointer]:
                - /url: "#cite_note-31"
            - superscript [ref=e588]:
              - link "[32]" [ref=e589] [cursor=pointer]:
                - /url: "#cite_note-32"
            - text: ).
          - generic [ref=e590]:
            - heading "Black/white box" [level=3] [ref=e591]: Black/white box
            - generic [ref=e592]:
              - text: "["
              - link "edit" [ref=e593] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=16
              - text: "]"
          - paragraph [ref=e594]:
            - text: Software testing can often be divided into white-box and black-box. These two approaches are used to describe the point of view that the tester takes when designing test cases. A hybrid approach called grey-box that includes aspects of both boxes may also be applied to software testing methodology.
            - superscript [ref=e595]:
              - link "[33]" [ref=e596] [cursor=pointer]:
                - /url: "#cite_note-LimayeSoftware09-33"
            - superscript [ref=e597]:
              - link "[34]" [ref=e598] [cursor=pointer]:
                - /url: "#cite_note-SalehSoftware09-34"
          - generic [ref=e599]:
            - heading "White-box testing" [level=4] [ref=e600]
            - generic [ref=e601]:
              - text: "["
              - link "edit" [ref=e602] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=17
              - text: "]"
          - note [ref=e603]:
            - text: "Main article:"
            - link "White-box testing" [ref=e604] [cursor=pointer]:
              - /url: /wiki/White-box_testing
          - figure "White box testing diagram" [ref=e605]:
            - link "White Box Testing Diagram" [ref=e606] [cursor=pointer]:
              - /url: /wiki/File:White_Box_Testing_Approach.png
              - img "White Box Testing Diagram" [ref=e607]
            - generic [ref=e608]: White box testing diagram
          - paragraph [ref=e609]:
            - text: White-box testing (also known as clear box testing, glass box testing, transparent box testing, and structural testing) verifies the internal structures or workings of a program, as opposed to the functionality exposed to the end-user. In white-box testing, an internal perspective of the system (the source code), as well as programming skills are used to design test cases. The tester chooses inputs to exercise paths through the code and determines the appropriate outputs.
            - superscript [ref=e610]:
              - link "[33]" [ref=e611] [cursor=pointer]:
                - /url: "#cite_note-LimayeSoftware09-33"
            - superscript [ref=e612]:
              - link "[34]" [ref=e613] [cursor=pointer]:
                - /url: "#cite_note-SalehSoftware09-34"
            - text: This is analogous to testing nodes in a circuit, e.g.,
            - link "in-circuit testing" [ref=e614] [cursor=pointer]:
              - /url: /wiki/In-circuit_test
            - text: (ICT).
          - paragraph [ref=e615]:
            - text: While white-box testing can be applied at the
            - link "unit" [ref=e616] [cursor=pointer]:
              - /url: /wiki/Unit_testing
            - text: ","
            - link "integration" [ref=e617] [cursor=pointer]:
              - /url: /wiki/Integration_testing
            - text: ", and"
            - link "system" [ref=e618] [cursor=pointer]:
              - /url: /wiki/System_testing
            - text: levels of the software testing process, it is usually done at the unit level.
            - superscript [ref=e619]:
              - link "[35]" [ref=e620] [cursor=pointer]:
                - /url: "#cite_note-AmmannIntro16-35"
            - text: It can test paths within a unit, paths between units during integration, and between subsystems during a system–level test. Though this method of test design can uncover many errors or problems, it might not detect unimplemented parts of the specification or missing requirements.
          - paragraph [ref=e621]:
            - text: "Techniques used in white-box testing include:"
            - superscript [ref=e622]:
              - link "[34]" [ref=e623] [cursor=pointer]:
                - /url: "#cite_note-SalehSoftware09-34"
            - superscript [ref=e624]:
              - link "[36]" [ref=e625] [cursor=pointer]:
                - /url: "#cite_note-EverettSoftware07-36"
          - list [ref=e626]:
            - listitem [ref=e627]:
              - link "API testing" [ref=e628] [cursor=pointer]:
                - /url: /wiki/API_testing
              - text: – testing of the application using public and private
              - link "APIs" [ref=e629] [cursor=pointer]:
                - /url: /wiki/Application_programming_interfaces
              - text: (application programming interfaces)
            - listitem [ref=e630]:
              - link "Code coverage" [ref=e631] [cursor=pointer]:
                - /url: /wiki/Code_coverage
              - text: – creating tests to satisfy some criteria of code coverage (for example, the test designer can create tests to cause all statements in the program to be executed at least once)
            - listitem [ref=e632]:
              - link "Fault injection" [ref=e633] [cursor=pointer]:
                - /url: /wiki/Fault_injection
              - text: methods – intentionally introducing faults to gauge the efficacy of testing strategies
            - listitem [ref=e634]:
              - link "Mutation testing" [ref=e635] [cursor=pointer]:
                - /url: /wiki/Mutation_testing
              - text: methods
            - listitem [ref=e636]:
              - link "Static testing" [ref=e637] [cursor=pointer]:
                - /url: /wiki/Static_testing
              - text: methods
          - paragraph [ref=e638]:
            - text: Code coverage tools can evaluate the completeness of a test suite that was created with any method, including black-box testing. This allows the software team to examine parts of a system that are rarely tested and ensures that the most important
            - link "function points" [ref=e639] [cursor=pointer]:
              - /url: /wiki/Function_points
            - text: have been tested.
            - superscript [ref=e640]:
              - link "[37]" [ref=e641] [cursor=pointer]:
                - /url: "#cite_note-CornettCode96-37"
            - text: Code coverage as a
            - link "software metric" [ref=e642] [cursor=pointer]:
              - /url: /wiki/Software_metric
            - text: "can be reported as a percentage for:"
            - superscript [ref=e643]:
              - link "[33]" [ref=e644] [cursor=pointer]:
                - /url: "#cite_note-LimayeSoftware09-33"
            - superscript [ref=e645]:
              - link "[37]" [ref=e646] [cursor=pointer]:
                - /url: "#cite_note-CornettCode96-37"
            - superscript [ref=e647]:
              - link "[38]" [ref=e648] [cursor=pointer]:
                - /url: "#cite_note-BlackPragmatic11-38"
          - definition [ref=e650]:
            - list [ref=e651]:
              - listitem [ref=e652]: Function coverage, which reports on functions executed
              - listitem [ref=e653]: Statement coverage, which reports on the number of lines executed to complete the test
              - listitem [ref=e654]: Decision coverage, which reports on whether both the True and the False branch of a given test has been executed
          - paragraph [ref=e655]:
            - text: 100% statement coverage ensures that all code paths or branches (in terms of
            - link "control flow" [ref=e656] [cursor=pointer]:
              - /url: /wiki/Control_flow
            - text: ) are executed at least once. This is helpful in ensuring correct functionality, but not sufficient since the same code may process different inputs correctly or incorrectly.
            - superscript [ref=e657]:
              - link "[39]" [ref=e658] [cursor=pointer]:
                - /url: "#cite_note-39"
          - generic [ref=e659]:
            - heading "Black-box testing" [level=4] [ref=e660]
            - generic [ref=e661]:
              - text: "["
              - link "edit" [ref=e662] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=18
              - text: "]"
          - note [ref=e663]:
            - text: "Main article:"
            - link "Black-box testing" [ref=e664] [cursor=pointer]:
              - /url: /wiki/Black-box_testing
          - figure "Black box diagram" [ref=e665]:
            - link [ref=e666] [cursor=pointer]:
              - /url: /wiki/File:Black_box_diagram.svg
              - img [ref=e667]
            - generic [ref=e668]: Black box diagram
          - paragraph [ref=e669]:
            - text: Black-box testing (also known as functional testing) describes designing test cases without knowledge of the implementation, without reading the source code. The testers are only aware of what the software is supposed to do, not how it does it.
            - superscript [ref=e670]:
              - link "[40]" [ref=e671] [cursor=pointer]:
                - /url: "#cite_note-Patton-40"
            - text: "Black-box testing methods include:"
            - link "equivalence partitioning" [ref=e672] [cursor=pointer]:
              - /url: /wiki/Equivalence_partitioning
            - text: ","
            - link "boundary value analysis" [ref=e673] [cursor=pointer]:
              - /url: /wiki/Boundary_value_analysis
            - text: ","
            - link "all-pairs testing" [ref=e674] [cursor=pointer]:
              - /url: /wiki/All-pairs_testing
            - text: ","
            - link "state transition tables" [ref=e675] [cursor=pointer]:
              - /url: /wiki/State_transition_table
            - text: ","
            - link "decision table" [ref=e676] [cursor=pointer]:
              - /url: /wiki/Decision_table
            - text: testing,
            - link "fuzz testing" [ref=e677] [cursor=pointer]:
              - /url: /wiki/Fuzz_testing
            - text: ","
            - link "model-based testing" [ref=e678] [cursor=pointer]:
              - /url: /wiki/Model-based_testing
            - text: ","
            - link "use case" [ref=e679] [cursor=pointer]:
              - /url: /wiki/Use_case
            - text: testing,
            - link "exploratory testing" [ref=e680] [cursor=pointer]:
              - /url: /wiki/Exploratory_testing
            - text: ", and specification-based testing."
            - superscript [ref=e681]:
              - link "[33]" [ref=e682] [cursor=pointer]:
                - /url: "#cite_note-LimayeSoftware09-33"
            - superscript [ref=e683]:
              - link "[34]" [ref=e684] [cursor=pointer]:
                - /url: "#cite_note-SalehSoftware09-34"
            - superscript [ref=e685]:
              - link "[38]" [ref=e686] [cursor=pointer]:
                - /url: "#cite_note-BlackPragmatic11-38"
          - paragraph [ref=e687]:
            - text: Specification-based testing aims to test the functionality of software according to the applicable requirements.
            - superscript [ref=e688]:
              - link "[41]" [ref=e689] [cursor=pointer]:
                - /url: "#cite_note-41"
            - text: This level of testing usually requires thorough
            - link "test cases" [ref=e690] [cursor=pointer]:
              - /url: /wiki/Test_case_(software)
            - text: to be provided to the tester, who then can simply verify that for a given input, the output value (or behavior), either "is" or "is not" the same as the expected value specified in the test case. Test cases are built around specifications and requirements, i.e., what the application is supposed to do. It uses external descriptions of the software, including specifications, requirements, and designs, to derive test cases. These tests can be
            - link "functional" [ref=e691] [cursor=pointer]:
              - /url: /wiki/Functional_testing
            - text: or
            - link "non-functional" [ref=e692] [cursor=pointer]:
              - /url: /wiki/Non-functional_testing
            - text: ", though usually functional. Specification-based testing may be necessary to assure correct functionality, but it is insufficient to guard against complex or high-risk situations."
            - superscript [ref=e693]:
              - link "[42]" [ref=e694] [cursor=pointer]:
                - /url: "#cite_note-42"
          - paragraph [ref=e695]:
            - text: Black box testing can be used to any level of testing although usually not at the unit level.
            - superscript [ref=e696]:
              - link "[35]" [ref=e697] [cursor=pointer]:
                - /url: "#cite_note-AmmannIntro16-35"
          - paragraph [ref=e698]: Component interface testing
          - paragraph [ref=e699]:
            - text: Component interface testing is a variation of
            - link "black-box testing" [ref=e700] [cursor=pointer]:
              - /url: /wiki/Black-box_testing
            - text: ", with the focus on the data values beyond just the related actions of a subsystem component."
            - superscript [ref=e701]:
              - link "[43]" [ref=e702] [cursor=pointer]:
                - /url: "#cite_note-MathurFound11-63-43"
            - text: The practice of component interface testing can be used to check the handling of data passed between various units, or subsystem components, beyond full integration testing between those units.
            - superscript [ref=e703]:
              - link "[44]" [ref=e704] [cursor=pointer]:
                - /url: "#cite_note-Clapp-44"
            - superscript [ref=e705]:
              - link "[45]" [ref=e706] [cursor=pointer]:
                - /url: "#cite_note-Mathur-45"
            - text: The data being passed can be considered as "message packets" and the range or data types can be checked for data generated from one unit and tested for validity before being passed into another unit. One option for interface testing is to keep a separate log file of data items being passed, often with a timestamp logged to allow analysis of thousands of cases of data passed between units for days or weeks. Tests can include checking the handling of some extreme data values while other interface variables are passed as normal values.
            - superscript [ref=e707]:
              - link "[44]" [ref=e708] [cursor=pointer]:
                - /url: "#cite_note-Clapp-44"
            - text: Unusual data values in an interface can help explain unexpected performance in the next unit.
          - generic [ref=e709]:
            - heading "Visual testing" [level=5] [ref=e710]
            - generic [ref=e711]:
              - text: "["
              - link "edit" [ref=e712] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=19
              - text: "]"
          - paragraph [ref=e713]:
            - text: The aim of visual testing is to provide developers with the ability to examine what was happening at the point of software failure by presenting the data in such a way that the developer can easily find the information he or she requires, and the information is expressed clearly.
            - superscript [ref=e714]:
              - link "[46]" [ref=e715] [cursor=pointer]:
                - /url: "#cite_note-46"
            - superscript [ref=e716]:
              - link "[47]" [ref=e717] [cursor=pointer]:
                - /url: "#cite_note-47"
          - paragraph [ref=e718]: At the core of visual testing is the idea that showing someone a problem (or a test failure), rather than just describing it, greatly increases clarity and understanding. Visual testing, therefore, requires the recording of the entire test process – capturing everything that occurs on the test system in video format. Output videos are supplemented by real-time tester input via picture-in-a-picture webcam and audio commentary from microphones.
          - paragraph [ref=e719]: Visual testing provides a number of advantages. The quality of communication is increased drastically because testers can show the problem (and the events leading up to it) to the developer as opposed to just describing it, and the need to replicate test failures will cease to exist in many cases. The developer will have all the evidence he or she requires of a test failure and can instead focus on the cause of the fault and how it should be fixed.
          - paragraph [ref=e720]:
            - link "Ad hoc testing" [ref=e721] [cursor=pointer]:
              - /url: /wiki/Ad_hoc_testing
            - text: and
            - link "exploratory testing" [ref=e722] [cursor=pointer]:
              - /url: /wiki/Exploratory_testing
            - text: are important methodologies for checking software integrity because they require less preparation time to implement, while the important bugs can be found quickly.
            - superscript [ref=e723]:
              - link "[48]" [ref=e724] [cursor=pointer]:
                - /url: "#cite_note-LewisSoftware16-48"
            - text: In ad hoc testing, where testing takes place in an improvised impromptu way, the ability of the tester(s) to base testing off documented methods and then improvise variations of those tests can result in a more rigorous examination of defect fixes.
            - superscript [ref=e725]:
              - link "[48]" [ref=e726] [cursor=pointer]:
                - /url: "#cite_note-LewisSoftware16-48"
            - text: However, unless strict documentation of the procedures is maintained, one of the limits of ad hoc testing is lack of repeatability.
            - superscript [ref=e727]:
              - link "[48]" [ref=e728] [cursor=pointer]:
                - /url: "#cite_note-LewisSoftware16-48"
          - note [ref=e729]:
            - text: "Further information:"
            - link "Graphical user interface testing" [ref=e730] [cursor=pointer]:
              - /url: /wiki/Graphical_user_interface_testing
          - generic [ref=e731]:
            - heading "Grey-box testing" [level=4] [ref=e732]
            - generic [ref=e733]:
              - text: "["
              - link "edit" [ref=e734] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=20
              - text: "]"
          - note [ref=e735]:
            - text: "Main article:"
            - link "Gray box testing" [ref=e736] [cursor=pointer]:
              - /url: /wiki/Gray_box_testing
          - paragraph [ref=e737]:
            - text: "Grey-box testing (American spelling: gray-box testing) involves using knowledge of internal data structures and algorithms for purposes of designing tests while executing those tests at the user, or black-box level. The tester will often have access to both \"the source code and the executable binary.\""
            - superscript [ref=e738]:
              - link "[49]" [ref=e739] [cursor=pointer]:
                - /url: "#cite_note-RansomeCore13-49"
            - text: Grey-box testing may also include
            - link "reverse engineering" [ref=e740] [cursor=pointer]:
              - /url: /wiki/Reverse_coding
            - text: (using dynamic code analysis) to determine, for instance, boundary values or error messages.
            - superscript [ref=e741]:
              - link "[49]" [ref=e742] [cursor=pointer]:
                - /url: "#cite_note-RansomeCore13-49"
            - text: Manipulating input data and formatting output do not qualify as grey-box, as the input and output are clearly outside of the "black box" that we are calling the system under test. This distinction is particularly important when conducting
            - link "integration testing" [ref=e743] [cursor=pointer]:
              - /url: /wiki/Integration_testing
            - text: between two modules of code written by two different developers, where only the interfaces are exposed for the test.
          - paragraph [ref=e744]:
            - text: By knowing the underlying concepts of how the software works, the tester makes better-informed testing choices while testing the software from outside. Typically, a grey-box tester will be permitted to set up an isolated testing environment with activities, such as seeding a
            - link "database" [ref=e745] [cursor=pointer]:
              - /url: /wiki/Database
            - text: . The tester can observe the state of the product being tested after performing certain actions such as executing
            - link "SQL" [ref=e746] [cursor=pointer]:
              - /url: /wiki/SQL
            - text: statements against the database and then executing queries to ensure that the expected changes have been reflected. Grey-box testing implements intelligent test scenarios based on limited information. This will particularly apply to data type handling,
            - link "exception handling" [ref=e747] [cursor=pointer]:
              - /url: /wiki/Exception_handling
            - text: ", and so on."
            - superscript [ref=e748]:
              - link "[50]" [ref=e749] [cursor=pointer]:
                - /url: "#cite_note-ref4-50"
          - paragraph [ref=e750]:
            - text: With the concept of grey-box testing, this "arbitrary distinction" between black- and white-box testing has faded somewhat.
            - superscript [ref=e751]:
              - link "[35]" [ref=e752] [cursor=pointer]:
                - /url: "#cite_note-AmmannIntro16-35"
          - generic [ref=e753]:
            - heading "Installation testing" [level=3] [ref=e754]
            - generic [ref=e755]:
              - text: "["
              - link "edit" [ref=e756] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=21
              - text: "]"
          - generic [ref=e757]:
            - note [ref=e758]:
              - text: This section is an excerpt from
              - link "Installation testing" [ref=e759] [cursor=pointer]:
                - /url: /wiki/Installation_testing
              - text: .
              - generic [ref=e760]:
                - text: "["
                - link "edit" [ref=e761] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Installation_testing&action=edit
                - text: "]"
            - generic [ref=e762]:
              - paragraph [ref=e763]:
                - link "Installation testing" [ref=e764] [cursor=pointer]:
                  - /url: /wiki/Installation_testing
                - text: is a type of software testing that verifies that
                - link "users" [ref=e765] [cursor=pointer]:
                  - /url: /wiki/User_(computing)
                - text: can successfully install and set up software in its intended environments (e.g.,
                - link "operating systems" [ref=e766] [cursor=pointer]:
                  - /url: /wiki/Operating_system
                - text: ","
                - link "computer hardware" [ref=e767] [cursor=pointer]:
                  - /url: /wiki/Computer_hardware
                - text: ). Most software systems have installation procedures that are needed before they can be used for their main purpose. Installation testing focuses on these procedures and whether they're sufficient for achieving an installed, usable software system.
                - superscript [ref=e768]:
                  - link "[51]" [ref=e769] [cursor=pointer]:
                    - /url: "#cite_note-Installation_testing_Myers_2004-51"
                - superscript [ref=e770]: ": 139"
                - text: Procedures of this kind may involve full or partial upgrades, and install/uninstall processes.
              - list [ref=e771]:
                - listitem [ref=e772]: A user must select a variety of options.
                - listitem [ref=e773]: Dependent files and libraries must be allocated, loaded or located.
                - listitem [ref=e774]: Valid hardware configurations must be present.
                - listitem [ref=e775]:
                  - text: Software systems may need connectivity to connect to other software systems.
                  - superscript [ref=e776]:
                    - link "[51]" [ref=e777] [cursor=pointer]:
                      - /url: "#cite_note-Installation_testing_Myers_2004-51"
                  - superscript [ref=e778]: ": 145"
                - listitem [ref=e779]:
                  - text: Valid, accurate, and sufficient documentation (e.g., installation guide,
                  - link "user manual" [ref=e780] [cursor=pointer]:
                    - /url: /wiki/User_guide
                  - text: ", quick reference,"
                  - link "README" [ref=e781] [cursor=pointer]:
                    - /url: /wiki/README
                  - text: file, etc.) must be present and accessible.
                  - superscript [ref=e782]:
                    - link "[52]" [ref=e783] [cursor=pointer]:
                      - /url: "#cite_note-52"
          - generic [ref=e784]:
            - heading "Compatibility testing" [level=3] [ref=e785]
            - generic [ref=e786]:
              - text: "["
              - link "edit" [ref=e787] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=22
              - text: "]"
          - note [ref=e788]:
            - text: "Main article:"
            - link "Compatibility testing" [ref=e789] [cursor=pointer]:
              - /url: /wiki/Compatibility_testing
          - paragraph [ref=e790]:
            - text: A common cause of software failure (real or perceived) is a lack of its
            - link "compatibility" [ref=e791] [cursor=pointer]:
              - /url: /wiki/Computer_compatibility
            - text: with other
            - link "application software" [ref=e792] [cursor=pointer]:
              - /url: /wiki/Application_software
            - text: ","
            - link "operating systems" [ref=e793] [cursor=pointer]:
              - /url: /wiki/Operating_system
            - text: (or operating system
            - link "versions" [ref=e794] [cursor=pointer]:
              - /url: /wiki/Software_versioning
            - text: ", old or new), or target environments that differ greatly from the original (such as a"
            - link "terminal" [ref=e795] [cursor=pointer]:
              - /url: /wiki/Computer_terminal
            - text: or
            - link "GUI" [ref=e796] [cursor=pointer]:
              - /url: /wiki/GUI
            - text: application intended to be run on the
            - link "desktop" [ref=e797] [cursor=pointer]:
              - /url: /wiki/Desktop_metaphor
            - text: now being required to become a
            - link "Web application" [ref=e798] [cursor=pointer]:
              - /url: /wiki/Web_application
            - text: ", which must render in a"
            - link "Web browser" [ref=e799] [cursor=pointer]:
              - /url: /wiki/Web_browser
            - text: ). For example, in the case of a lack of
            - link "backward compatibility" [ref=e800] [cursor=pointer]:
              - /url: /wiki/Backward_compatibility
            - text: ", this can occur because the programmers develop and test software only on the latest version of the target environment, which not all users may be running. This results in the unintended consequence that the latest work may not function on earlier versions of the target environment, or on older hardware that earlier versions of the target environment were capable of using. Sometimes such issues can be fixed by proactively"
            - link "abstracting" [ref=e801] [cursor=pointer]:
              - /url: /wiki/Abstraction_(computer_science)
            - text: operating system functionality into a separate program
            - link "module" [ref=e802] [cursor=pointer]:
              - /url: /wiki/Modular_programming
            - text: or
            - link "library" [ref=e803] [cursor=pointer]:
              - /url: /wiki/Library_(computing)
            - text: .
          - generic [ref=e804]:
            - heading "Smoke and sanity testing" [level=3] [ref=e805]
            - generic [ref=e806]:
              - text: "["
              - link "edit" [ref=e807] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=23
              - text: "]"
          - note [ref=e808]:
            - text: "Main article:"
            - link "Smoke testing (software)" [ref=e809] [cursor=pointer]:
              - /url: /wiki/Smoke_testing_(software)
          - paragraph [ref=e810]:
            - link "Sanity testing" [ref=e811] [cursor=pointer]:
              - /url: /wiki/Sanity_testing
            - text: determines whether it is reasonable to proceed with further testing.
          - paragraph [ref=e812]:
            - link "Smoke testing" [ref=e813] [cursor=pointer]:
              - /url: /wiki/Smoke_testing_(software)
            - text: consists of minimal attempts to operate the software, designed to determine whether there are any basic problems that will prevent it from working at all. Such tests can be used as
            - link "build verification test" [ref=e814] [cursor=pointer]:
              - /url: /wiki/Build_verification_test
            - text: .
          - generic [ref=e815]:
            - heading "Regression testing" [level=3] [ref=e816]
            - generic [ref=e817]:
              - text: "["
              - link "edit" [ref=e818] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=24
              - text: "]"
          - note [ref=e819]:
            - text: "Main article:"
            - link "Regression testing" [ref=e820] [cursor=pointer]:
              - /url: /wiki/Regression_testing
          - paragraph [ref=e821]:
            - text: Regression testing focuses on finding defects after a major code change has occurred. Specifically, it seeks to uncover
            - link "software regressions" [ref=e822] [cursor=pointer]:
              - /url: /wiki/Software_regression
            - text: ", as degraded or lost features, including old bugs that have come back. Such regressions occur whenever software functionality that was previously working correctly, stops working as intended. Typically, regressions occur as an"
            - link "unintended consequence" [ref=e823] [cursor=pointer]:
              - /url: /wiki/Unintended_consequence
            - text: of program changes, when the newly developed part of the software collides with the previously existing code. Regression testing is typically the largest test effort in commercial software development,
            - superscript [ref=e824]:
              - link "[53]" [ref=e825] [cursor=pointer]:
                - /url: "#cite_note-53"
            - text: due to checking numerous details in prior software features, and even new software can be developed while using some old test cases to test parts of the new design to ensure prior functionality is still supported.
          - paragraph [ref=e826]:
            - text: Common methods of regression testing include re-running previous sets of test cases and checking whether previously fixed faults have re-emerged. The depth of testing depends on the phase in the release process and the
            - link "risk" [ref=e827] [cursor=pointer]:
              - /url: /wiki/Risk_management
            - text: of the added features. They can either be complete, for changes added late in the release or deemed to be risky, or be very shallow, consisting of positive tests on each feature, if the changes are early in the release or deemed to be of low risk.
          - generic [ref=e828]:
            - heading "Acceptance testing" [level=3] [ref=e829]
            - generic [ref=e830]:
              - text: "["
              - link "edit" [ref=e831] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=25
              - text: "]"
          - note [ref=e832]:
            - text: "Main article:"
            - link "Acceptance testing" [ref=e833] [cursor=pointer]:
              - /url: /wiki/Acceptance_testing
          - paragraph [ref=e834]:
            - text: Acceptance testing is system-level testing to ensure the software meets customer expectations.
            - superscript [ref=e835]:
              - link "[54]" [ref=e836] [cursor=pointer]:
                - /url: "#cite_note-LewisSoftware16-2-54"
            - superscript [ref=e837]:
              - link "[55]" [ref=e838] [cursor=pointer]:
                - /url: "#cite_note-BorbaTesting10-55"
            - superscript [ref=e839]:
              - link "[56]" [ref=e840] [cursor=pointer]:
                - /url: "#cite_note-ClappSoftware95-56"
            - superscript [ref=e841]:
              - link "[57]" [ref=e842] [cursor=pointer]:
                - /url: "#cite_note-:0-57"
          - paragraph [ref=e843]:
            - text: Acceptance testing may be performed at the end or in the middle of a project, including after each completed user story in an agile project.
            - superscript [ref=e844]:
              - link "[58]" [ref=e845] [cursor=pointer]:
                - /url: "#cite_note-58"
          - paragraph [ref=e846]:
            - text: Tests are frequently grouped into these levels by where they are performed in the software development process, or by the level of specificity of the test.
            - superscript [ref=e847]:
              - link "[57]" [ref=e848] [cursor=pointer]:
                - /url: "#cite_note-:0-57"
          - list [ref=e849]:
            - listitem [ref=e850]: User acceptance testing (UAT)
            - listitem [ref=e851]: Operational acceptance testing (OAT)
            - listitem [ref=e852]: Contractual and regulatory acceptance testing
            - listitem [ref=e853]: Alpha and beta testing
          - paragraph [ref=e854]: Sometimes, UAT is performed by the customer, in their environment and on their own hardware.
          - paragraph [ref=e855]:
            - text: OAT is used to conduct operational readiness (prerelease) of a product, service or system as part of a
            - link "quality management system" [ref=e856] [cursor=pointer]:
              - /url: /wiki/Quality_management_system
            - text: . OAT is a common type of non-functional software testing, used mainly in
            - link "software development" [ref=e857] [cursor=pointer]:
              - /url: /wiki/Software_development
            - text: and
            - link "software maintenance" [ref=e858] [cursor=pointer]:
              - /url: /wiki/Software_maintenance
            - text: projects. This type of testing focuses on the operational readiness of the system to be supported, or to become part of the production environment. Hence, it is also known as operational readiness testing (ORT) or
            - link "operations readiness and assurance" [ref=e859] [cursor=pointer]:
              - /url: /wiki/Operations_readiness_and_assurance
            - text: (OR&A) testing.
            - link "Functional testing" [ref=e860] [cursor=pointer]:
              - /url: /wiki/Functional_testing
            - text: within OAT is limited to those tests that are required to verify the non-functional aspects of the system.
          - paragraph [ref=e861]:
            - text: In addition, the software testing should ensure that the portability of the system, as well as working as expected, does not also damage or partially corrupt its operating environment or cause other processes within that environment to become inoperative.
            - superscript [ref=e862]:
              - link "[59]" [ref=e863] [cursor=pointer]:
                - /url: "#cite_note-59"
          - paragraph [ref=e864]:
            - text: Contractual acceptance testing is performed based on the contract's acceptance criteria defined during the agreement of the contract, while regulatory acceptance testing is performed based on the relevant regulations to the software product. Both of these two tests can be performed by users or independent testers. Regulation acceptance testing sometimes involves the regulatory agencies auditing the test results.
            - superscript [ref=e865]:
              - link "[57]" [ref=e866] [cursor=pointer]:
                - /url: "#cite_note-:0-57"
          - generic [ref=e867]:
            - heading "Alpha testing" [level=3] [ref=e868]
            - generic [ref=e869]:
              - text: "["
              - link "edit" [ref=e870] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=26
              - text: "]"
          - paragraph [ref=e871]:
            - text: Alpha testing is simulated or actual operational testing by potential users/customers or an independent test team at the developers' site. Alpha testing is often employed for off-the-shelf software as a form of internal acceptance testing before the software goes to beta testing.
            - superscript [ref=e872]:
              - link "[60]" [ref=e873] [cursor=pointer]:
                - /url: "#cite_note-60"
          - generic [ref=e874]:
            - heading "Beta testing" [level=3] [ref=e875]
            - generic [ref=e876]:
              - text: "["
              - link "edit" [ref=e877] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=27
              - text: "]"
          - note [ref=e878]:
            - text: "See also:"
            - link "Software release life cycle § Beta" [ref=e879] [cursor=pointer]:
              - /url: /wiki/Software_release_life_cycle#Beta
          - paragraph [ref=e880]:
            - text: Beta testing comes after alpha testing and can be considered a form of external
            - link "user acceptance testing" [ref=e881] [cursor=pointer]:
              - /url: /wiki/User_acceptance_testing
            - text: . Versions of the software, known as
            - link "beta versions" [ref=e882] [cursor=pointer]:
              - /url: /wiki/Beta_version
            - text: ", are released to a limited audience outside of the programming team known as beta testers. The software is released to groups of people so that further testing can ensure the product has few faults or"
            - link "bugs" [ref=e883] [cursor=pointer]:
              - /url: /wiki/Computer_bug
            - text: . Beta versions can be made available to the open public to increase the
            - link "feedback" [ref=e884] [cursor=pointer]:
              - /url: /wiki/Feedback#In_organizations
            - text: field to a maximal number of future users and to deliver value earlier, for an extended or even indefinite period of time (
            - link "perpetual beta" [ref=e885] [cursor=pointer]:
              - /url: /wiki/Perpetual_beta
            - text: ).
            - superscript [ref=e886]:
              - link "[61]" [ref=e887] [cursor=pointer]:
                - /url: "#cite_note-61"
          - generic [ref=e888]:
            - heading "Functional vs non-functional testing" [level=3] [ref=e889]
            - generic [ref=e890]:
              - text: "["
              - link "edit" [ref=e891] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=28
              - text: "]"
          - paragraph [ref=e892]:
            - link "Functional testing" [ref=e893] [cursor=pointer]:
              - /url: /wiki/Functional_testing
            - text: refers to activities that verify a specific action or function of the code. These are usually found in the code requirements documentation, although some development methodologies work from use cases or user stories. Functional tests tend to answer the question of "can the user do this" or "does this particular feature work."
          - paragraph [ref=e894]:
            - link "Non-functional testing" [ref=e895] [cursor=pointer]:
              - /url: /wiki/Non-functional_testing
            - text: refers to aspects of the software that may not be related to a specific function or user action, such as
            - link "scalability" [ref=e896] [cursor=pointer]:
              - /url: /wiki/Scalability
            - text: or other
            - link "performance" [ref=e897] [cursor=pointer]:
              - /url: /wiki/Performance
            - text: ", behavior under certain"
            - link "constraints" [ref=e898] [cursor=pointer]:
              - /url: /wiki/Constraint_(mathematics)
            - text: ", or"
            - link "security" [ref=e899] [cursor=pointer]:
              - /url: /wiki/Computer_security
            - text: . Testing will determine the breaking point, the point at which extremes of scalability or performance leads to unstable execution. Non-functional requirements tend to be those that reflect the quality of the product, particularly in the context of the suitability perspective of its users.
          - generic [ref=e900]:
            - heading "Continuous testing" [level=3] [ref=e901]
            - generic [ref=e902]:
              - text: "["
              - link "edit" [ref=e903] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=29
              - text: "]"
          - note [ref=e904]:
            - text: "Main article:"
            - link "Continuous testing" [ref=e905] [cursor=pointer]:
              - /url: /wiki/Continuous_testing
          - paragraph [ref=e906]:
            - text: Continuous testing is the process of executing
            - link "automated tests" [ref=e907] [cursor=pointer]:
              - /url: /wiki/Test_automation
            - text: as part of the software delivery pipeline to obtain immediate feedback on the business risks associated with a software release candidate.
            - superscript [ref=e908]:
              - link "[62]" [ref=e909] [cursor=pointer]:
                - /url: "#cite_note-essential-62"
            - superscript [ref=e910]:
              - link "[63]" [ref=e911] [cursor=pointer]:
                - /url: "#cite_note-stickym-63"
            - text: Continuous testing includes the validation of both
            - link "functional requirements" [ref=e912] [cursor=pointer]:
              - /url: /wiki/Functional_requirements
            - text: and
            - link "non-functional requirements" [ref=e913] [cursor=pointer]:
              - /url: /wiki/Non-functional_requirements
            - text: ; the scope of testing extends from validating bottom-up requirements or user stories to assessing the system requirements associated with overarching business goals.
            - superscript [ref=e914]:
              - link "[64]" [ref=e915] [cursor=pointer]:
                - /url: "#cite_note-pnsqc-64"
            - superscript [ref=e916]:
              - link "[65]" [ref=e917] [cursor=pointer]:
                - /url: "#cite_note-shift-65"
          - generic [ref=e918]:
            - heading "Destructive testing" [level=3] [ref=e919]
            - generic [ref=e920]:
              - text: "["
              - link "edit" [ref=e921] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=30
              - text: "]"
          - note [ref=e922]:
            - text: "Main article:"
            - link "Destructive testing" [ref=e923] [cursor=pointer]:
              - /url: /wiki/Destructive_testing
          - paragraph [ref=e924]:
            - text: Destructive testing attempts to cause the software or a sub-system to fail. It verifies whether the software functions properly when it receives invalid or unexpected inputs, thereby assessing the
            - link "robustness" [ref=e925] [cursor=pointer]:
              - /url: /wiki/Robustness_(computer_science)
            - text: of input validation and error-management routines.
            - superscript [ref=e926]:
              - link "[66]" [ref=e927] [cursor=pointer]:
                - /url: "#cite_note-66"
            - link "Software fault injection" [ref=e928] [cursor=pointer]:
              - /url: /wiki/Fault_injection
            - text: ", in the form of"
            - link "fuzzing" [ref=e929] [cursor=pointer]:
              - /url: /wiki/Fuzz_testing
            - text: ", is an example of failure testing. Various commercial non-functional testing tools are linked from the"
            - link "software fault injection" [ref=e930] [cursor=pointer]:
              - /url: /wiki/Fault_injection
            - text: page; there are also numerous open-source and free software tools available that perform destructive testing.
          - note [ref=e931]:
            - text: "Further information:"
            - link "Exception handling" [ref=e932] [cursor=pointer]:
              - /url: /wiki/Exception_handling
            - text: and
            - link "Recovery testing" [ref=e933] [cursor=pointer]:
              - /url: /wiki/Recovery_testing
          - generic [ref=e934]:
            - heading "Software performance testing" [level=3] [ref=e935]
            - generic [ref=e936]:
              - text: "["
              - link "edit" [ref=e937] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=31
              - text: "]"
          - note [ref=e938]:
            - text: "Main article:"
            - link "Software performance testing" [ref=e939] [cursor=pointer]:
              - /url: /wiki/Software_performance_testing
          - paragraph [ref=e940]: Performance testing is generally executed to determine how a system or sub-system performs in terms of responsiveness and stability under a particular workload. It can also serve to investigate, measure, validate or verify other quality attributes of the system, such as scalability, reliability and resource usage.
          - paragraph [ref=e941]:
            - link "Load testing" [ref=e943] [cursor=pointer]:
              - /url: /wiki/Load_testing#Software_load_testing
            - text: is primarily concerned with testing that the system can continue to operate under a specific load, whether that be large quantities of data or a large number of
            - link "users" [ref=e944] [cursor=pointer]:
              - /url: /wiki/Load_testing
            - text: . This is generally referred to as software
            - link "scalability" [ref=e945] [cursor=pointer]:
              - /url: /wiki/Scalability
            - text: . The related load testing activity of when performed as a non-functional activity is often referred to as endurance testing.
            - link "Volume testing" [ref=e947] [cursor=pointer]:
              - /url: /wiki/Volume_testing
            - text: is a way to test software functions even when certain components (for example a file or database) increase radically in size.
            - link "Stress testing" [ref=e949] [cursor=pointer]:
              - /url: /wiki/Stress_testing
            - text: is a way to test reliability under unexpected or rare workloads. Stability testing (often referred to as load or endurance testing) checks to see if the software can continuously function well in or above an acceptable period.
          - paragraph [ref=e950]:
            - text: There is little agreement on what the specific goals of performance testing are. The terms load testing, performance testing,
            - link "scalability testing" [ref=e951] [cursor=pointer]:
              - /url: /wiki/Scalability_testing
            - text: ", and volume testing, are often used interchangeably."
          - paragraph [ref=e952]:
            - link "Real-time software" [ref=e953] [cursor=pointer]:
              - /url: /wiki/Real-time_computing
            - text: systems have strict timing constraints. To test if timing constraints are met,
            - link "real-time testing" [ref=e954] [cursor=pointer]:
              - /url: /wiki/Real-time_testing
            - text: is used.
          - generic [ref=e955]:
            - heading "Usability testing" [level=3] [ref=e956]
            - generic [ref=e957]:
              - text: "["
              - link "edit" [ref=e958] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=32
              - text: "]"
          - paragraph [ref=e959]:
            - link "Usability testing" [ref=e960] [cursor=pointer]:
              - /url: /wiki/Usability_testing
            - text: is to check if the user interface is easy to use and understand. It is concerned mainly with the use of the application. This is not a kind of testing that can be automated; actual human users are needed, being monitored by skilled
            - link "UI designers" [ref=e961] [cursor=pointer]:
              - /url: /wiki/User_experience_design#Interaction_designers
            - text: . Usability testing can use structured models to check how well an interface works. The Stanton, Theofanos, and Joshi (2015) model looks at user experience, and the Al-Sharafat and Qadoumi (2016) model is for expert evaluation, helping to assess usability in digital applications.
            - superscript [ref=e962]:
              - link "[67]" [ref=e963] [cursor=pointer]:
                - /url: "#cite_note-67"
          - generic [ref=e964]:
            - heading "Accessibility testing" [level=3] [ref=e965]
            - generic [ref=e966]:
              - text: "["
              - link "edit" [ref=e967] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=33
              - text: "]"
          - paragraph [ref=e968]:
            - link "Accessibility" [ref=e969] [cursor=pointer]:
              - /url: /wiki/Accessibility
            - text: testing is done to ensure that the software is accessible to persons with disabilities. Some of the common web accessibility tests are
          - list [ref=e970]:
            - listitem [ref=e971]: Ensuring that the color contrast between the font and the background color is appropriate
            - listitem [ref=e972]: Font Size
            - listitem [ref=e973]: Alternate Texts for multimedia content
            - listitem [ref=e974]: Ability to use the system using the computer keyboard in addition to the mouse.
          - generic [ref=e975]:
            - heading "Common standards for compliance" [level=4] [ref=e976]
            - generic [ref=e977]:
              - text: "["
              - link "edit" [ref=e978] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=34
              - text: "]"
          - list [ref=e979]:
            - listitem [ref=e980]:
              - link "Americans with Disabilities Act of 1990" [ref=e981] [cursor=pointer]:
                - /url: /wiki/Americans_with_Disabilities_Act_of_1990
            - listitem [ref=e982]:
              - link "Section 508 Amendment to the Rehabilitation Act of 1973" [ref=e983] [cursor=pointer]:
                - /url: /wiki/Section_508_Amendment_to_the_Rehabilitation_Act_of_1973
            - listitem [ref=e984]:
              - link "Web Accessibility Initiative" [ref=e985] [cursor=pointer]:
                - /url: /wiki/Web_Accessibility_Initiative
              - text: (WAI) of the
              - link "World Wide Web Consortium" [ref=e986] [cursor=pointer]:
                - /url: /wiki/World_Wide_Web_Consortium
              - text: (W3C)
          - generic [ref=e987]:
            - heading "Security testing" [level=3] [ref=e988]
            - generic [ref=e989]:
              - text: "["
              - link "edit" [ref=e990] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=35
              - text: "]"
          - paragraph [ref=e991]:
            - link "Security testing" [ref=e992] [cursor=pointer]:
              - /url: /wiki/Security_testing
            - text: is essential for software that processes confidential data to prevent
            - link "system intrusion" [ref=e993] [cursor=pointer]:
              - /url: /wiki/Backdoor_(computing)
            - text: by
            - link "hackers" [ref=e994] [cursor=pointer]:
              - /url: /wiki/Hacker_(computer_security)
            - text: .
          - paragraph [ref=e995]:
            - text: The International Organization for Standardization (ISO) defines this as a "type of testing conducted to evaluate the degree to which a test item, and associated data and information, are protected so that unauthorised persons or systems cannot use, read or modify them, and authorized persons or systems are not denied access to them."
            - superscript [ref=e996]:
              - link "[68]" [ref=e997] [cursor=pointer]:
                - /url: "#cite_note-68"
          - generic [ref=e998]:
            - heading "Internationalization and localization" [level=3] [ref=e999]
            - generic [ref=e1000]:
              - text: "["
              - link "edit" [ref=e1001] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=36
              - text: "]"
          - paragraph [ref=e1002]:
            - text: Testing for
            - link "internationalization and localization" [ref=e1003] [cursor=pointer]:
              - /url: /wiki/Internationalization_and_localization
            - text: validates that the software can be used with different languages and geographic regions. The process of
            - link "pseudolocalization" [ref=e1004] [cursor=pointer]:
              - /url: /wiki/Pseudolocalization
            - text: is used to test the ability of an application to be translated to another language, and make it easier to identify when the localization process may introduce new bugs into the product.
          - paragraph [ref=e1005]:
            - text: Globalization testing verifies that the software is adapted for a new culture, such as different currencies or time zones.
            - superscript [ref=e1006]:
              - link "[69]" [ref=e1007] [cursor=pointer]:
                - /url: "#cite_note-69"
          - paragraph [ref=e1008]: "Actual translation to human languages must be tested, too. Possible localization and globalization failures include:"
          - list [ref=e1009]:
            - listitem [ref=e1010]: Some messages may be untranslated.
            - listitem [ref=e1011]:
              - text: Software is often localized by translating a list of
              - link "strings" [ref=e1012] [cursor=pointer]:
                - /url: /wiki/String_(computer_science)
              - text: out of context, and the translator may choose the incorrect translation for an ambiguous source string.
            - listitem [ref=e1013]: Technical terminology may become inconsistent, if the project is translated by several people without proper coordination or if the translator is imprudent.
            - listitem [ref=e1014]: Literal word-for-word translations may sound inappropriate, artificial or too technical in the target language.
            - listitem [ref=e1015]:
              - text: Untranslated messages in the original language may be
              - link "hard coded" [ref=e1016] [cursor=pointer]:
                - /url: /wiki/Hard_coding
              - text: in the source code, and thus untranslatable.
            - listitem [ref=e1017]:
              - text: Some messages may be created automatically at
              - link "run time" [ref=e1018] [cursor=pointer]:
                - /url: /wiki/Run_time_(program_lifecycle_phase)
              - text: and the resulting string may be ungrammatical, functionally incorrect, misleading or confusing.
            - listitem [ref=e1019]:
              - text: Software may use a
              - link "keyboard shortcut" [ref=e1020] [cursor=pointer]:
                - /url: /wiki/Keyboard_shortcut
              - text: that has no function on the source language's
              - link "keyboard layout" [ref=e1021] [cursor=pointer]:
                - /url: /wiki/Keyboard_layout
              - text: ", but is used for typing characters in the layout of the target language."
            - listitem [ref=e1022]:
              - text: Software may lack support for the
              - link "character encoding" [ref=e1023] [cursor=pointer]:
                - /url: /wiki/Character_encoding
              - text: of the target language.
            - listitem [ref=e1024]:
              - text: Fonts and font sizes that are appropriate in the source language may be inappropriate in the target language; for example,
              - link "CJK characters" [ref=e1025] [cursor=pointer]:
                - /url: /wiki/CJK_characters
              - text: may become unreadable if the font is too small.
            - listitem [ref=e1026]: A string in the target language may be longer than the software can handle. This may make the string partly invisible to the user or cause the software to crash or malfunction.
            - listitem [ref=e1027]:
              - text: Software may lack proper support for reading or writing
              - link "bi-directional text" [ref=e1028] [cursor=pointer]:
                - /url: /wiki/Bi-directional_text
              - text: .
            - listitem [ref=e1029]: Software may display images with text that was not localized.
            - listitem [ref=e1030]:
              - text: Localized operating systems may have differently named system
              - link "configuration files" [ref=e1031] [cursor=pointer]:
                - /url: /wiki/Configuration_file
              - text: and
              - link "environment variables" [ref=e1032] [cursor=pointer]:
                - /url: /wiki/Environment_variable
              - text: and different
              - link "formats for date" [ref=e1033] [cursor=pointer]:
                - /url: /wiki/Date_and_time_notation_by_country
              - text: and
              - link "currency" [ref=e1034] [cursor=pointer]:
                - /url: /wiki/Currency
              - text: .
          - generic [ref=e1035]:
            - heading "Development testing" [level=3] [ref=e1036]
            - generic [ref=e1037]:
              - text: "["
              - link "edit" [ref=e1038] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=37
              - text: "]"
          - note [ref=e1039]:
            - text: "Main article:"
            - link "Development testing" [ref=e1040] [cursor=pointer]:
              - /url: /wiki/Development_testing
          - paragraph [ref=e1041]: Development testing is a software development process that involves the synchronized application of a broad spectrum of defect prevention and detection strategies in order to reduce software development risks, time, and costs. It is performed by the software developer or engineer during the construction phase of the software development lifecycle. Development testing aims to eliminate construction errors before code is promoted to other testing; this strategy is intended to increase the quality of the resulting software as well as the efficiency of the overall development process.
          - paragraph [ref=e1042]:
            - text: Depending on the organization's expectations for software development, development testing might include
            - link "static code analysis" [ref=e1043] [cursor=pointer]:
              - /url: /wiki/Static_code_analysis
            - text: ", data flow analysis, metrics analysis, peer code reviews, unit testing, code coverage analysis,"
            - link "traceability" [ref=e1044] [cursor=pointer]:
              - /url: /wiki/Requirements_traceability
            - text: ", and other software testing practices."
          - generic [ref=e1045]:
            - heading "A/B testing" [level=3] [ref=e1046]: A/B testing
            - generic [ref=e1047]:
              - text: "["
              - link "edit" [ref=e1048] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=38
              - text: "]"
          - note [ref=e1049]:
            - text: "Main article:"
            - link "A/B testing" [ref=e1050] [cursor=pointer]:
              - /url: /wiki/A/B_testing
          - paragraph [ref=e1051]: A/B testing is a method of running a controlled experiment to determine if a proposed change is more effective than the current approach. Customers are routed to either a current version (control) of a feature, or to a modified version (treatment) and data is collected to determine which version is better at achieving the desired outcome.
          - generic [ref=e1052]:
            - heading "Concurrent testing" [level=3] [ref=e1053]
            - generic [ref=e1054]:
              - text: "["
              - link "edit" [ref=e1055] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=39
              - text: "]"
          - note [ref=e1056]:
            - text: "Main article:"
            - link "Concurrent testing" [ref=e1057] [cursor=pointer]:
              - /url: /wiki/Concurrent_testing
          - paragraph [ref=e1058]:
            - text: Concurrent or concurrency testing assesses the behaviour and performance of software and systems that use
            - link "concurrent computing" [ref=e1059] [cursor=pointer]:
              - /url: /wiki/Concurrent_computing
            - text: ", generally under normal usage conditions. Typical problems this type of testing will expose are deadlocks, race conditions and problems with shared memory/resource handling."
          - generic [ref=e1060]:
            - heading "Conformance testing or type testing" [level=3] [ref=e1061]
            - generic [ref=e1062]:
              - text: "["
              - link "edit" [ref=e1063] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=40
              - text: "]"
          - note [ref=e1064]:
            - text: "Main article:"
            - link "Conformance testing" [ref=e1065] [cursor=pointer]:
              - /url: /wiki/Conformance_testing
          - paragraph [ref=e1066]: In software testing, conformance testing verifies that a product performs according to its specified standards. Compilers, for instance, are extensively tested to determine whether they meet the recognized standard for that language.
          - generic [ref=e1067]:
            - heading "Output comparison testing" [level=3] [ref=e1068]
            - generic [ref=e1069]:
              - text: "["
              - link "edit" [ref=e1070] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=41
              - text: "]"
          - paragraph [ref=e1071]:
            - text: Creating a display expected output, whether as
            - link "data comparison" [ref=e1072] [cursor=pointer]:
              - /url: /wiki/File_comparison
            - text: of text or screenshots of the UI,
            - superscript [ref=e1073]:
              - link "[3]" [ref=e1074] [cursor=pointer]:
                - /url: "#cite_note-Kaner2-3"
            - superscript [ref=e1075]: ": 195"
            - text: is sometimes called snapshot testing or Golden Master Testing unlike many other forms of testing, this cannot detect failures automatically and instead requires that a human evaluate the output for inconsistencies.
          - generic [ref=e1076]:
            - heading "Property testing" [level=3] [ref=e1077]
            - generic [ref=e1078]:
              - text: "["
              - link "edit" [ref=e1079] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=42
              - text: "]"
          - note [ref=e1080]:
            - text: Not to be confused with
            - link "property testing algorithms" [ref=e1081] [cursor=pointer]:
              - /url: /wiki/Property_testing
            - text: .
          - paragraph [ref=e1082]: Property testing is a testing technique where, instead of asserting that specific inputs produce specific expected outputs, the practitioner randomly generates many inputs, runs the program on all of them, and asserts the truth of some "property" that should be true for every pair of input and output. For example, every output from a serialization function should be accepted by the corresponding deserialization function, and every output from a sort function should be a monotonically increasing list containing exactly the same elements as its input.
          - paragraph [ref=e1083]: Property testing libraries allow the user to control the strategy by which random inputs are constructed, to ensure coverage of degenerate cases, or inputs featuring specific patterns that are needed to fully exercise aspects of the implementation under test.
          - paragraph [ref=e1084]:
            - text: Property testing is also sometimes known as "generative testing" or "QuickCheck testing" since it was introduced and popularized by the Haskell library
            - link "QuickCheck" [ref=e1085] [cursor=pointer]:
              - /url: /wiki/QuickCheck
            - text: .
            - superscript [ref=e1086]:
              - link "[70]" [ref=e1087] [cursor=pointer]:
                - /url: "#cite_note-70"
          - generic [ref=e1088]:
            - heading "Metamorphic testing" [level=3] [ref=e1089]
            - generic [ref=e1090]:
              - text: "["
              - link "edit" [ref=e1091] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=43
              - text: "]"
          - note [ref=e1092]:
            - text: "Main article:"
            - link "Metamorphic testing" [ref=e1093] [cursor=pointer]:
              - /url: /wiki/Metamorphic_testing
          - paragraph [ref=e1094]: Metamorphic testing (MT) is a property-based software testing technique, which can be an effective approach for addressing the test oracle problem and test case generation problem. The test oracle problem is the difficulty of determining the expected outcomes of selected test cases or to determine whether the actual outputs agree with the expected outcomes.
          - generic [ref=e1095]:
            - heading "VCR testing" [level=3] [ref=e1096]
            - generic [ref=e1097]:
              - text: "["
              - link "edit" [ref=e1098] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=44
              - text: "]"
          - paragraph [ref=e1099]: VCR testing, also known as "playback testing" or "record/replay" testing, is a testing technique for increasing the reliability and speed of regression tests that involve a component that is slow or unreliable to communicate with, often a third-party API outside of the tester's control. It involves making a recording ("cassette") of the system's interactions with the external component, and then replaying the recorded interactions as a substitute for communicating with the external system on subsequent runs of the test.
          - paragraph [ref=e1100]:
            - text: The technique was popularized in web development by the Ruby library
            - link "vcr" [ref=e1101] [cursor=pointer]:
              - /url: https://github.com/vcr/vcr
            - text: .
          - generic [ref=e1102]:
            - heading "Contract Testing" [level=3] [ref=e1103]
            - generic [ref=e1104]:
              - text: "["
              - link "edit" [ref=e1105] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=45
              - text: "]"
          - paragraph [ref=e1106]:
            - link "Contract" [ref=e1107] [cursor=pointer]:
              - /url: /wiki/Design_by_contract
            - text: testing, not to be confused with the aforementioned legally-motivated contractual acceptance testing, is a methodology consisting of testing the integration point between any two software services by checking if the requests and responses sent between each conform to a shared set of expectations commonly referred to as a contract. It is often used in the context of
            - link "distributed systems" [ref=e1108] [cursor=pointer]:
              - /url: /wiki/Distributed_computing
            - text: ","
            - link "service-oriented software architectures" [ref=e1109] [cursor=pointer]:
              - /url: /wiki/Service-oriented_architecture
            - text: ", and"
            - link "microservices" [ref=e1110] [cursor=pointer]:
              - /url: /wiki/Microservices
            - text: .
            - superscript [ref=e1111]:
              - link "[71]" [ref=e1112] [cursor=pointer]:
                - /url: "#cite_note-71"
            - superscript [ref=e1113]:
              - link "[72]" [ref=e1114] [cursor=pointer]:
                - /url: "#cite_note-72"
          - generic [ref=e1115]:
            - heading "Teamwork" [level=2] [ref=e1116]
            - generic [ref=e1117]:
              - text: "["
              - link "edit" [ref=e1118] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=46
              - text: "]"
          - generic [ref=e1119]:
            - heading "Roles" [level=3] [ref=e1120]
            - generic [ref=e1121]:
              - text: "["
              - link "edit" [ref=e1122] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=47
              - text: "]"
          - paragraph [ref=e1123]:
            - text: In an organization, testers may be in a separate team from the rest of the
            - link "software development" [ref=e1124] [cursor=pointer]:
              - /url: /wiki/Software_development
            - text: team or they may be integrated into one team. Software testing can also be performed by non-dedicated software testers.
          - paragraph [ref=e1125]: In the 1980s, the term software tester started to be used to denote a separate profession.
          - paragraph [ref=e1126]:
            - text: "Notable software testing roles and titles include:"
            - superscript [ref=e1127]:
              - link "[73]" [ref=e1128] [cursor=pointer]:
                - /url: "#cite_note-73"
            - text: test manager, test lead, test analyst, test designer, tester, automation developer, and test administrator.
            - superscript [ref=e1129]:
              - link "[74]" [ref=e1130] [cursor=pointer]:
                - /url: "#cite_note-74"
          - generic [ref=e1131]:
            - heading "Processes" [level=3] [ref=e1132]
            - generic [ref=e1133]:
              - text: "["
              - link "edit" [ref=e1134] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=48
              - text: "]"
          - paragraph [ref=e1135]:
            - text: Organizations that develop software, perform testing differently, but there are common patterns.
            - superscript [ref=e1136]:
              - link "[2]" [ref=e1137] [cursor=pointer]:
                - /url: "#cite_note-pan-2"
          - generic [ref=e1138]:
            - heading "Waterfall development" [level=4] [ref=e1139]
            - generic [ref=e1140]:
              - text: "["
              - link "edit" [ref=e1141] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=49
              - text: "]"
          - note [ref=e1142]:
            - text: "Further information:"
            - link "Capability Maturity Model Integration" [ref=e1143] [cursor=pointer]:
              - /url: /wiki/Capability_Maturity_Model_Integration
            - text: and
            - link "Waterfall model" [ref=e1144] [cursor=pointer]:
              - /url: /wiki/Waterfall_model
          - paragraph [ref=e1145]:
            - text: In
            - link "waterfall development" [ref=e1146] [cursor=pointer]:
              - /url: /wiki/Waterfall_model
            - text: ", testing is generally performed after the code is completed, but before the product is shipped to the customer."
            - superscript [ref=e1147]:
              - link "[75]" [ref=e1148] [cursor=pointer]:
                - /url: "#cite_note-75"
            - text: This practice often results in the testing phase being used as a
            - link "project" [ref=e1149] [cursor=pointer]:
              - /url: /wiki/Project_management
            - text: buffer to compensate for project delays, thereby compromising the time devoted to testing.
            - superscript [ref=e1150]:
              - link "[11]" [ref=e1151] [cursor=pointer]:
                - /url: "#cite_note-Myers_1979-11"
            - superscript [ref=e1152]: ": 145–146"
          - paragraph [ref=e1153]:
            - text: Some contend that the waterfall process allows for testing to start when the development project starts and to be a continuous process until the project finishes.
            - superscript [ref=e1154]:
              - link "[76]" [ref=e1155] [cursor=pointer]:
                - /url: "#cite_note-76"
          - generic [ref=e1156]:
            - heading "Agile development" [level=4] [ref=e1157]
            - generic [ref=e1158]:
              - text: "["
              - link "edit" [ref=e1159] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=50
              - text: "]"
          - paragraph [ref=e1160]:
            - link "Agile software development" [ref=e1161] [cursor=pointer]:
              - /url: /wiki/Agile_software_development
            - text: commonly involves testing while the code is being written and organizing teams with both programmers and testers and with team members performing both programming and testing.
          - paragraph [ref=e1162]:
            - text: One agile practice,
            - link "test-driven software development" [ref=e1163] [cursor=pointer]:
              - /url: /wiki/Test-driven_development
            - text: (TDD), is a way of
            - link "unit testing" [ref=e1164] [cursor=pointer]:
              - /url: /wiki/Unit_testing
            - text: such that unit-level testing is performed while writing the product code.
            - superscript [ref=e1165]:
              - link "[77]" [ref=e1166] [cursor=pointer]:
                - /url: "#cite_note-AgileAllianceTDD-77"
            - text: Test code is updated as new features are added and failure conditions are discovered (bugs fixed). Commonly, the unit test code is maintained with the project code, integrated in the build process, and run on each build and as part of regression testing. Goals of this
            - link "continuous integration" [ref=e1167] [cursor=pointer]:
              - /url: /wiki/Continuous_integration
            - text: is to support development and reduce defects.
            - superscript [ref=e1168]:
              - link "[78]" [ref=e1169] [cursor=pointer]:
                - /url: "#cite_note-78"
            - superscript [ref=e1170]:
              - link "[77]" [ref=e1171] [cursor=pointer]:
                - /url: "#cite_note-AgileAllianceTDD-77"
          - paragraph [ref=e1172]:
            - text: Even in organizations that separate teams by programming and testing functions, many often have the programmers perform
            - link "unit testing" [ref=e1173] [cursor=pointer]:
              - /url: /wiki/Unit_testing
            - text: .
            - superscript [ref=e1174]:
              - link "[79]" [ref=e1175] [cursor=pointer]:
                - /url: "#cite_note-79"
          - generic [ref=e1176]:
            - heading "Sample process" [level=4] [ref=e1177]
            - generic [ref=e1178]:
              - text: "["
              - link "edit" [ref=e1179] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=51
              - text: "]"
          - paragraph [ref=e1180]: The sample below is common for waterfall development. The same activities are commonly found in other development models, but might be described differently.
          - list [ref=e1181]:
            - listitem [ref=e1182]:
              - link "Requirements analysis" [ref=e1183] [cursor=pointer]:
                - /url: /wiki/Requirements_analysis
              - text: ": testing should begin in the requirements phase of the"
              - link "software development life cycle" [ref=e1184] [cursor=pointer]:
                - /url: /wiki/Software_development_life_cycle
              - text: . During the design phase, testers work to determine what aspects of a design are testable and with what parameters those tests work.
            - listitem [ref=e1185]:
              - text: "Test planning:"
              - link "test strategy" [ref=e1186] [cursor=pointer]:
                - /url: /wiki/Test_strategy
              - text: ","
              - link "test plan" [ref=e1187] [cursor=pointer]:
                - /url: /wiki/Test_plan
              - text: ","
              - link "testbed" [ref=e1188] [cursor=pointer]:
                - /url: /wiki/Testbed
              - text: creation. Since many activities will be carried out during testing, a plan is needed.
            - listitem [ref=e1189]:
              - text: "Test development: test procedures,"
              - link "test scenarios" [ref=e1190] [cursor=pointer]:
                - /url: /wiki/Scenario_test
              - text: ","
              - link "test cases" [ref=e1191] [cursor=pointer]:
                - /url: /wiki/Test_case_(software)
              - text: ", test datasets, test scripts to use in testing software."
            - listitem [ref=e1192]: "Test execution: testers execute the software based on the plans and test documents then report any errors found to the development team. This part could be complex when running tests with a lack of programming knowledge."
            - listitem [ref=e1193]:
              - text: "Test reporting: once testing is completed, testers generate metrics and make final reports on their"
              - link "test effort" [ref=e1194] [cursor=pointer]:
                - /url: /wiki/Test_effort
              - text: and whether the software tested is ready for release.
            - listitem [ref=e1195]: "Test result analysis: or defect analysis, is done by the development team usually along with the client, in order to decide what defects should be assigned, fixed, rejected (i.e. found software working properly) or deferred to be dealt with later."
            - listitem [ref=e1196]: "Defect retesting: once a defect has been dealt with by the development team, it is retested by the testing team."
            - listitem [ref=e1197]:
              - link "Regression testing" [ref=e1198] [cursor=pointer]:
                - /url: /wiki/Regression_testing
              - text: ": it is common to have a small test program built of a subset of tests, for each integration of new, modified, or fixed software, in order to ensure that the latest delivery has not ruined anything and that the software product as a whole is still working correctly."
            - listitem [ref=e1199]: "Test closure: once the test meets the exit criteria, the activities such as capturing the key outputs, lessons learned, results, logs, documents related to the project are archived and used as a reference for future projects."
          - generic [ref=e1200]:
            - heading "Quality" [level=2] [ref=e1201]
            - generic [ref=e1202]:
              - text: "["
              - link "edit" [ref=e1203] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=52
              - text: "]"
          - note [ref=e1204]:
            - text: "Main article:"
            - link "Software quality" [ref=e1205] [cursor=pointer]:
              - /url: /wiki/Software_quality
          - generic [ref=e1206]:
            - heading "Software verification and validation" [level=3] [ref=e1207]
            - generic [ref=e1208]:
              - text: "["
              - link "edit" [ref=e1209] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=53
              - text: "]"
          - note [ref=e1210]:
            - text: "Main articles:"
            - link "Verification and validation (software)" [ref=e1211] [cursor=pointer]:
              - /url: /wiki/Verification_and_validation_(software)
            - text: and
            - link "Software quality control" [ref=e1212] [cursor=pointer]:
              - /url: /wiki/Software_quality_control
          - paragraph [ref=e1213]:
            - text: Software testing is used in association with
            - link "verification and validation" [ref=e1214] [cursor=pointer]:
              - /url: /wiki/Verification_and_validation_(software)
            - text: ":"
            - superscript [ref=e1215]:
              - link "[80]" [ref=e1216] [cursor=pointer]:
                - /url: "#cite_note-tran-80"
          - list [ref=e1217]:
            - listitem [ref=e1218]: "Verification: Have we built the software right? (i.e., does it implement the requirements)."
            - listitem [ref=e1219]: "Validation: Have we built the right software? (i.e., do the deliverables satisfy the customer)."
          - paragraph [ref=e1220]:
            - text: The terms verification and validation are commonly used interchangeably in the industry; it is also common to see these two terms defined with contradictory definitions. According to the
            - generic [ref=e1221]:
              - link "IEEE Standard" [ref=e1222] [cursor=pointer]:
                - /url: /wiki/IEEE_Standards_Association
              - text: Glossary of Software Engineering Terminology
            - text: ":"
            - superscript [ref=e1223]:
              - link "[12]" [ref=e1224] [cursor=pointer]:
                - /url: "#cite_note-IEEEglossary-12"
            - superscript [ref=e1225]: ": 80–81"
          - generic [ref=e1226]:
            - definition [ref=e1227]: Verification is the process of evaluating a system or component to determine whether the products of a given development phase satisfy the conditions imposed at the start of that phase.
            - definition [ref=e1228]: Validation is the process of evaluating a system or component during or at the end of the development process to determine whether it satisfies specified requirements.
          - paragraph [ref=e1229]: "And, according to the ISO 9000 standard:"
          - generic [ref=e1230]:
            - definition [ref=e1231]: Verification is confirmation by examination and through provision of objective evidence that specified requirements have been fulfilled.
            - definition [ref=e1232]: Validation is confirmation by examination and through provision of objective evidence that the requirements for a specific intended use or application have been fulfilled.
          - paragraph [ref=e1233]: The contradiction is caused by the use of the concepts of requirements and specified requirements but with different meanings.
          - paragraph [ref=e1234]: In the case of IEEE standards, the specified requirements, mentioned in the definition of validation, are the set of problems, needs and wants of the stakeholders that the software must solve and satisfy. Such requirements are documented in a Software Requirements Specification (SRS). And, the products mentioned in the definition of verification, are the output artifacts of every phase of the software development process. These products are, in fact, specifications such as Architectural Design Specification, Detailed Design Specification, etc. The SRS is also a specification, but it cannot be verified (at least not in the sense used here – more on this subject below).
          - paragraph [ref=e1235]: But, for the ISO 9000, the specified requirements are the set of specifications, as just mentioned above, that must be verified. A specification, as previously explained, is the product of a software development process phase that receives another specification as input. A specification is verified successfully when it correctly implements its input specification. All the specifications can be verified except the SRS because it is the first one (it can be validated, though). An example scenario be that the Design Specification must implement the SRS, and the Construction phase artifacts must implement the Design Specification.
          - paragraph [ref=e1236]: So, when these words are defined in common terms, the apparent contradiction disappears.
          - paragraph [ref=e1237]: Both the SRS and the software must be validated. The SRS can be validated statically by consulting with the stakeholders. Nevertheless, running some partial implementation of the software or a prototype of any kind (dynamic testing) and obtaining positive feedback from them, can further increase the certainty that the SRS is correctly formulated. On the other hand, the software, as a final and running product (not its artifacts and documents, including the source code) must be validated dynamically with the stakeholders by executing the software and having them to try it.
          - paragraph [ref=e1238]: Some might argue that, for SRS, the input is the words of stakeholders and, therefore, SRS validation is the same as SRS verification. Thinking this way is not advisable as it only causes more confusion. It is better to think of verification as a process involving a formal and technical input document.
          - generic [ref=e1239]:
            - heading "Software quality assurance" [level=3] [ref=e1240]
            - generic [ref=e1241]:
              - text: "["
              - link "edit" [ref=e1242] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=54
              - text: "]"
          - paragraph [ref=e1243]:
            - text: In some organizations, software testing is part of a
            - link "software quality assurance" [ref=e1244] [cursor=pointer]:
              - /url: /wiki/Software_quality_assurance
            - text: (SQA) process.
            - superscript [ref=e1245]:
              - link "[3]" [ref=e1246] [cursor=pointer]:
                - /url: "#cite_note-Kaner2-3"
            - superscript [ref=e1247]: ": 347"
            - text: In SQA, software process specialists and auditors are concerned with the software development process rather than just the artifacts such as documentation, code and systems. They examine and change the
            - link "software engineering" [ref=e1248] [cursor=pointer]:
              - /url: /wiki/Software_engineering
            - text: "process itself to reduce the number of faults that end up in the delivered software: the so-called defect rate. What constitutes an acceptable defect rate depends on the nature of the software; a flight simulator video game would have much higher defect tolerance than software for an actual airplane. Although there are close links with SQA, testing departments often exist independently, and there may be no SQA function in some companies."
          - paragraph [ref=e1249]:
            - text: Software testing is an activity to investigate software under test in order to provide quality-related information to stakeholders. By contrast, QA (
            - link "quality assurance" [ref=e1250] [cursor=pointer]:
              - /url: /wiki/Quality_assurance
            - text: ) is the implementation of policies and procedures intended to prevent defects from reaching customers.
          - generic [ref=e1251]:
            - heading "Measures" [level=3] [ref=e1252]
            - generic [ref=e1253]:
              - text: "["
              - link "edit" [ref=e1254] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=55
              - text: "]"
          - paragraph [ref=e1255]:
            - text: Quality measures include such topics as
            - link "correctness" [ref=e1256] [cursor=pointer]:
              - /url: /wiki/Correctness_(computer_science)
            - text: ", completeness,"
            - link "security" [ref=e1257] [cursor=pointer]:
              - /url: /wiki/Computer_security_audit
            - text: and
            - link "ISO/IEC 9126" [ref=e1258] [cursor=pointer]:
              - /url: /wiki/ISO/IEC_9126
            - text: requirements such as capability,
            - link "reliability" [ref=e1259] [cursor=pointer]:
              - /url: /wiki/Reliability_engineering
            - text: ","
            - link "efficiency" [ref=e1260] [cursor=pointer]:
              - /url: /wiki/Algorithmic_efficiency
            - text: ","
            - link "portability" [ref=e1261] [cursor=pointer]:
              - /url: /wiki/Porting
            - text: ","
            - link "maintainability" [ref=e1262] [cursor=pointer]:
              - /url: /wiki/Maintainability
            - text: ", compatibility, and"
            - link "usability" [ref=e1263] [cursor=pointer]:
              - /url: /wiki/Usability
            - text: .
          - paragraph [ref=e1264]:
            - text: There are a number of frequently used
            - link "software metrics" [ref=e1265] [cursor=pointer]:
              - /url: /wiki/Software_metric
            - text: ", or measures, which are used to assist in determining the state of the software or the adequacy of the testing."
          - generic [ref=e1266]:
            - heading "Artifacts" [level=3] [ref=e1267]
            - generic [ref=e1268]:
              - text: "["
              - link "edit" [ref=e1269] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=56
              - text: "]"
          - paragraph [ref=e1270]:
            - text: A software testing process can produce several
            - link "artifacts" [ref=e1271] [cursor=pointer]:
              - /url: /wiki/Artifact_(software_development)
            - text: . The actual artifacts produced are a factor of the software development model used, stakeholder and organisational needs.
          - generic [ref=e1272]:
            - heading "Test plan" [level=4] [ref=e1273]
            - generic [ref=e1274]:
              - text: "["
              - link "edit" [ref=e1275] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=57
              - text: "]"
          - note [ref=e1276]:
            - text: "Main article:"
            - link "Test plan" [ref=e1277] [cursor=pointer]:
              - /url: /wiki/Test_plan
          - paragraph [ref=e1278]:
            - text: A
            - link "test plan" [ref=e1279] [cursor=pointer]:
              - /url: /wiki/Test_plan
            - text: is a document detailing the approach that will be taken for intended test activities. The plan may include aspects such as objectives, scope, processes and procedures, personnel requirements, and contingency plans.
            - superscript [ref=e1280]:
              - link "[54]" [ref=e1281] [cursor=pointer]:
                - /url: "#cite_note-LewisSoftware16-2-54"
            - text: The test plan could come in the form of a single plan that includes all test types (like an acceptance or system test plan) and planning considerations, or it may be issued as a master test plan that provides an overview of more than one detailed test plan (a plan of a plan).
            - superscript [ref=e1282]:
              - link "[54]" [ref=e1283] [cursor=pointer]:
                - /url: "#cite_note-LewisSoftware16-2-54"
            - text: A test plan can be, in some cases, part of a wide "
            - link "test strategy" [ref=e1284] [cursor=pointer]:
              - /url: /wiki/Test_strategy
            - text: "\" which documents overall testing approaches, which may itself be a master test plan or even a separate artifact."
          - generic [ref=e1285]:
            - heading "Traceability matrix" [level=4] [ref=e1286]
            - generic [ref=e1287]:
              - text: "["
              - link "edit" [ref=e1288] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=58
              - text: "]"
          - generic [ref=e1289]:
            - note [ref=e1290]:
              - text: These paragraphs are an excerpt from
              - link "Traceability matrix" [ref=e1291] [cursor=pointer]:
                - /url: /wiki/Traceability_matrix
              - text: .
              - generic [ref=e1292]:
                - text: "["
                - link "edit" [ref=e1293] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Traceability_matrix&action=edit
                - text: "]"
            - paragraph [ref=e1295]:
              - text: In
              - link "software development" [ref=e1296] [cursor=pointer]:
                - /url: /wiki/Software_development
              - text: ", a"
              - link "traceability matrix" [ref=e1297] [cursor=pointer]:
                - /url: /wiki/Traceability_matrix
              - text: (TM)
              - superscript [ref=e1298]:
                - link "[81]" [ref=e1299] [cursor=pointer]:
                  - /url: "#cite_note-Traceability_matrix_SST-81"
              - superscript [ref=e1300]: ": 244"
              - text: is a document, usually in the form of a table, used to assist in determining the completeness of a relationship by correlating any two
              - link "baselined documents" [ref=e1301] [cursor=pointer]:
                - /url: /wiki/Baseline_(configuration_management)
              - text: using a many-to-many relationship comparison.
              - superscript [ref=e1302]:
                - link "[81]" [ref=e1303] [cursor=pointer]:
                  - /url: "#cite_note-Traceability_matrix_SST-81"
              - superscript [ref=e1304]: ": 3–22"
              - text: It is often used with high-level
              - link "requirements" [ref=e1305] [cursor=pointer]:
                - /url: /wiki/Requirement
              - text: (these often consist of marketing requirements) and detailed requirements of the product to the matching parts of
              - link "high-level design" [ref=e1306] [cursor=pointer]:
                - /url: /wiki/High-level_design
              - text: ", detailed design,"
              - link "test plan" [ref=e1307] [cursor=pointer]:
                - /url: /wiki/Test_plan
              - text: ", and"
              - link "test cases" [ref=e1308] [cursor=pointer]:
                - /url: /wiki/Test_case_(software)
              - text: .
          - generic [ref=e1309]:
            - heading "Test case" [level=4] [ref=e1310]
            - generic [ref=e1311]:
              - text: "["
              - link "edit" [ref=e1312] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=59
              - text: "]"
          - note [ref=e1313]:
            - text: "Main article:"
            - link "Test case (software)" [ref=e1314] [cursor=pointer]:
              - /url: /wiki/Test_case_(software)
          - paragraph [ref=e1315]:
            - text: A
            - link "test case" [ref=e1316] [cursor=pointer]:
              - /url: /wiki/Test_case_(software)
            - text: normally consists of a unique identifier, requirement references from a design specification, preconditions, events, a series of steps (also known as actions) to follow, input, output, expected result, and the actual result. Clinically defined, a test case is an input and an expected result.
            - superscript [ref=e1317]:
              - link "[82]" [ref=e1318] [cursor=pointer]:
                - /url: "#cite_note-82"
            - text: This can be as terse as "for condition x your derived result is y", although normally test cases describe in more detail the input scenario and what results might be expected. It can occasionally be a series of steps (but often steps are contained in a separate test procedure that can be exercised against multiple test cases, as a matter of economy) but with one expected result or expected outcome. The optional fields are a test case ID, test step, or order of execution number, related requirement(s), depth, test category, author, and check boxes for whether the test is automatable and has been automated. Larger test cases may also contain prerequisite states or steps, and descriptions. A test case should also contain a place for the actual result. These steps can be stored in a word processor document, spreadsheet, database, or other common repositories. In a database system, you may also be able to see past test results, who generated the results, and what system configuration was used to generate those results. These past results would usually be stored in a separate table.
          - generic [ref=e1319]:
            - heading "Test script" [level=4] [ref=e1320]
            - generic [ref=e1321]:
              - text: "["
              - link "edit" [ref=e1322] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=60
              - text: "]"
          - paragraph [ref=e1323]:
            - text: A
            - link "test script" [ref=e1324] [cursor=pointer]:
              - /url: /wiki/Test_script
            - text: is a procedure or programming code that replicates user actions. Initially, the term was derived from the product of work created by automated regression test tools. A test case will be a baseline to create test scripts using a tool or a program.
          - generic [ref=e1325]:
            - heading "Test suite" [level=4] [ref=e1326]
            - generic [ref=e1327]:
              - text: "["
              - link "edit" [ref=e1328] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=61
              - text: "]"
          - generic [ref=e1329]:
            - note [ref=e1330]:
              - text: This section is an excerpt from
              - link "Test suite" [ref=e1331] [cursor=pointer]:
                - /url: /wiki/Test_suite
              - text: .
              - generic [ref=e1332]:
                - text: "["
                - link "edit" [ref=e1333] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/w/index.php?title=Test_suite&action=edit
                - text: "]"
            - paragraph [ref=e1335]:
              - text: In
              - link "software development" [ref=e1336] [cursor=pointer]:
                - /url: /wiki/Software_development
              - text: ", a"
              - link "test suite" [ref=e1337] [cursor=pointer]:
                - /url: /wiki/Test_suite
              - text: ", less commonly known as a validation suite, is a collection of"
              - link "test cases" [ref=e1338] [cursor=pointer]:
                - /url: /wiki/Test_case_(software)
              - text: that are intended to be used to test a software program to show that it has some specified set of behaviors.
              - superscript [ref=e1339]:
                - link "[83]" [ref=e1340] [cursor=pointer]:
                  - /url: "#cite_note-83"
              - text: A test suite often contains detailed instructions or goals for each collection of test cases and information on the system configuration to be used during testing. A group of test cases may also contain prerequisite states or steps and descriptions of the following tests.
          - generic [ref=e1341]:
            - heading "Test fixture or test data" [level=4] [ref=e1342]
            - generic [ref=e1343]:
              - text: "["
              - link "edit" [ref=e1344] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=62
              - text: "]"
          - note [ref=e1345]:
            - text: "Main article:"
            - link "Test fixture" [ref=e1346] [cursor=pointer]:
              - /url: /wiki/Test_fixture
          - paragraph [ref=e1347]: In most cases, multiple sets of values or data are used to test the same functionality of a particular feature. All the test values and changeable environmental components are collected in separate files and stored as test data. It is also useful to provide this data to the client and with the product or a project. There are techniques to generate Test data.
          - generic [ref=e1348]:
            - heading "Test harness" [level=4] [ref=e1349]
            - generic [ref=e1350]:
              - text: "["
              - link "edit" [ref=e1351] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=63
              - text: "]"
          - note [ref=e1352]:
            - text: "Main article:"
            - link "Test harness" [ref=e1353] [cursor=pointer]:
              - /url: /wiki/Test_harness
          - paragraph [ref=e1354]:
            - text: The software, tools, samples of data input and output, and configurations are all referred to collectively as a
            - link "test harness" [ref=e1355] [cursor=pointer]:
              - /url: /wiki/Test_harness
            - text: .
          - generic [ref=e1356]:
            - heading "Test run" [level=4] [ref=e1357]
            - generic [ref=e1358]:
              - text: "["
              - link "edit" [ref=e1359] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=64
              - text: "]"
          - paragraph [ref=e1360]: A test run is a collection of test cases or test suites that the user is executing and comparing the expected with the actual results. Once complete, a report or all executed tests may be generated.
          - generic [ref=e1361]:
            - heading "Certifications" [level=3] [ref=e1362]
            - generic [ref=e1363]:
              - text: "["
              - link "edit" [ref=e1364] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=65
              - text: "]"
          - note [ref=e1365]:
            - text: "Further information:"
            - link "Certification § In software testing" [ref=e1366] [cursor=pointer]:
              - /url: /wiki/Certification#In_software_testing
          - paragraph [ref=e1367]:
            - text: Several certification programs exist to support the professional aspirations of software testers and quality assurance specialists. A few practitioners argue that the testing field is not ready for certification, as mentioned in the
            - link "controversy" [ref=e1368] [cursor=pointer]:
              - /url: "#Controversy"
            - text: section.
          - generic [ref=e1369]:
            - heading "Controversy" [level=2] [ref=e1370]
            - generic [ref=e1371]:
              - text: "["
              - link "edit" [ref=e1372] [cursor=pointer]:
                - /url: /w/index.php?title=Software_testing&action=edit&section=66
              - text: "]"
          - paragraph [ref=e1373]:
            - text: Some of the major
            - link "software testing controversies" [ref=e1374] [cursor=pointer]:
              - /url: /wiki/Software_testing_controversies
            - text: "include:"
          - generic [ref=e1375]:
            - term [ref=e1376]: Agile vs. traditional
            - definition [ref=e1377]:
              - text: Should testers learn to work under conditions of uncertainty and constant change or should they aim at
              - link "process \"maturity\"" [ref=e1378] [cursor=pointer]:
                - /url: /wiki/Capability_Maturity_Model
              - text: "? The"
              - link "agile testing" [ref=e1379] [cursor=pointer]:
                - /url: /wiki/Agile_testing
              - text: movement has received growing popularity since the early 2000s mainly in commercial circles,
              - superscript [ref=e1380]:
                - link "[84]" [ref=e1381] [cursor=pointer]:
                  - /url: "#cite_note-84"
              - superscript [ref=e1382]:
                - link "[85]" [ref=e1383] [cursor=pointer]:
                  - /url: "#cite_note-85"
              - text: whereas government and military
              - superscript [ref=e1384]:
                - link "[86]" [ref=e1385] [cursor=pointer]:
                  - /url: "#cite_note-86"
              - text: software providers use this methodology but also the traditional test-last models (e.g., in the
              - link "Waterfall model" [ref=e1386] [cursor=pointer]:
                - /url: /wiki/Waterfall_model
              - text: ).
              - superscript [ref=e1387]:
                - link "[87]" [ref=e1388] [cursor=pointer]:
                  - /url: "#cite_note-87"
            - term [ref=e1389]: Manual vs. automated testing
            - definition [ref=e1390]:
              - text: Some writers believe that
              - link "test automation" [ref=e1391] [cursor=pointer]:
                - /url: /wiki/Test_automation
              - text: is so expensive relative to its value that it should be used sparingly.
              - superscript [ref=e1392]:
                - link "[88]" [ref=e1393] [cursor=pointer]:
                  - /url: "#cite_note-88"
              - text: The test automation then can be considered as a way to capture and implement the requirements. As a general rule, the larger the system and the greater the complexity, the greater the ROI in test automation. Also, the investment in tools and expertise can be amortized over multiple projects with the right level of knowledge sharing within an organization.
            - term [ref=e1394]:
              - text: Is the existence of the
              - link "ISO 29119" [ref=e1395] [cursor=pointer]:
                - /url: /wiki/ISO/IEC_29119
              - text: software testing standard justified?
            - definition [ref=e1396]:
              - text: Significant opposition has formed out of the ranks of the context-driven school of software testing about the ISO 29119 standard. Professional testing associations, such as the International Society for Software Testing, have attempted to have the standard withdrawn.
              - superscript [ref=e1397]:
                - link "[89]" [ref=e1398] [cursor=pointer]:
                  - /url: "#cite_note-89"
              - superscript [ref=e1399]:
                - link "[90]" [ref=e1400] [cursor=pointer]:
                  - /url: "#cite_note-90"
            - term [ref=e1401]: Some practitioners declare that the testing field is not ready for certification
            - definition [ref=e1402]:
              - superscript [ref=e1403]:
                - link "[91]" [ref=e1404] [cursor=pointer]:
                  - /url: "#cite_note-91"
              - text: No certification now offered actually requires the applicant to show their ability to test software. No certification is based on a widely accepted body of knowledge. Certification itself cannot measure an individual's productivity, their skill, or practical knowledge, and cannot guarantee their competence, or professionalism as a tester.
              - superscript [ref=e1405]:
                - link "[92]" [ref=e1406] [cursor=pointer]:
                  - /url: "#cite_note-92"
            - term [ref=e1407]: Studies used to show the relative expense of fixing defects
            - definition [ref=e1408]: "There are opposing views on the applicability of studies used to show the relative expense of fixing defects depending on their introduction and detection. For example:"
          - blockquote [ref=e1409]:
            - paragraph [ref=e1410]:
              - text: It is commonly believed that the earlier a defect is found, the cheaper it is to fix it. The following table shows the cost of fixing the defect depending on the stage it was found.
              - superscript [ref=e1411]:
                - link "[93]" [ref=e1412] [cursor=pointer]:
                  - /url: "#cite_note-93"
              - text: For example, if a problem in the requirements is found only post-release, then it would cost 10–100 times more to fix than if it had already been found by the requirements review. With the advent of modern
              - link "continuous deployment" [ref=e1413] [cursor=pointer]:
                - /url: /wiki/Continuous_deployment
              - text: practices and cloud-based services, the cost of re-deployment and maintenance may lessen over time.
            - table [ref=e1414]:
              - rowgroup [ref=e1415]:
                - row "Cost to fix a defect Time detected" [ref=e1416]:
                  - columnheader "Cost to fix a defect" [ref=e1417]
