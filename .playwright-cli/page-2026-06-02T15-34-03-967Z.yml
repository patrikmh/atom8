            - paragraph [ref=e254]: Client renders these messages as native components (Angular, Flutter, React, etc.).
            - heading "Core Value ¶" [level=2] [ref=e255]:
              - text: Core Value
              - link "¶" [ref=e256] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#core-value
            - paragraph [ref=e257]:
              - strong [ref=e258]: "1. Security:"
              - text: Declarative data, not code. Agent requests components from client's trusted catalog. No code execution risk.
            - paragraph [ref=e259]:
              - strong [ref=e260]: "2. Native Feel:"
              - text: No iframes. Client renders with its own UI framework. Inherits app styling, accessibility, performance.
            - paragraph [ref=e261]:
              - strong [ref=e262]: "3. Portability:"
              - text: One agent response works everywhere. Same JSON renders on web (Lit/Angular/React), mobile (Flutter/SwiftUI/Jetpack Compose), desktop.
            - heading "Design Principles ¶" [level=2] [ref=e263]:
              - text: Design Principles
              - link "¶" [ref=e264] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#design-principles
            - paragraph [ref=e265]:
              - strong [ref=e266]: "1. LLM-Friendly:"
              - text: Flat component list with ID references. Easy to generate incrementally, correct mistakes, stream.
            - paragraph [ref=e267]:
              - strong [ref=e268]: "2. Framework-Agnostic:"
              - text: Agent sends abstract component tree. Client maps to native widgets (web/mobile/desktop).
            - paragraph [ref=e269]:
              - strong [ref=e270]: "3. Separation of Concerns:"
              - text: Three layers—UI structure, application state, client rendering. Enables data binding, reactive updates, clean architecture.
            - heading "What A2UI Is NOT ¶" [level=2] [ref=e271]:
              - text: What A2UI Is NOT
              - link "¶" [ref=e272] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#what-a2ui-is-not
            - list [ref=e273]:
              - listitem [ref=e274]: Not a framework (it is a protocol).
              - listitem [ref=e275]: Not a replacement for HTML (for agent-generated UIs, not static sites).
              - listitem [ref=e276]: Not a robust styling system (client controls styling with limited server-side styling support).
              - listitem [ref=e277]: Not limited to web (works on mobile and desktop).
            - heading "Key Concepts ¶" [level=2] [ref=e278]:
              - text: Key Concepts
              - link "¶" [ref=e279] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#key-concepts
            - paragraph [ref=e280]: "A2UI relies on the following key concepts:"
            - list [ref=e281]:
              - listitem [ref=e282]:
                - strong [ref=e283]: Surface
                - text: ": Canvas for components (dialog, sidebar, main view)."
              - listitem [ref=e284]:
                - strong [ref=e285]: Component
                - text: ": UI element (Button, TextField, Card, etc.)."
              - listitem [ref=e286]:
                - strong [ref=e287]: Data Model
                - text: ": Application state, components bind to it."
              - listitem [ref=e288]:
                - strong [ref=e289]: Catalog
                - text: ": Available component types."
              - listitem [ref=e290]:
