            - heading "What is A2UI? ¶" [level=1] [ref=e134]:
              - text: What is A2UI?
              - link "¶" [ref=e135] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#what-is-a2ui
            - paragraph [ref=e136]:
              - strong [ref=e137]: A2UI (Agent to UI) is a declarative UI protocol for agent-driven interfaces.
              - text: AI agents generate rich, interactive UIs that render natively across platforms (web, mobile, desktop) without executing arbitrary code.
            - heading "The Problem ¶" [level=2] [ref=e138]:
              - text: The Problem
              - link "¶" [ref=e139] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#the-problem
            - paragraph [ref=e140]:
              - strong [ref=e141]: "Text-only agent interactions are inefficient:"
            - generic [ref=e143]:
              - navigation [ref=e144]:
                - button "Toggle line selection" [ref=e145] [cursor=pointer]
                - button "Copy to clipboard" [ref=e146] [cursor=pointer]
              - code [ref=e147]:
                - generic [ref=e148]: "User: \"Book a table for 2 tomorrow at 7pm\""
                - generic [ref=e149]: "Agent: \"Okay, for what day?\""
                - generic [ref=e150]: "User: \"Tomorrow\""
                - generic [ref=e151]: "Agent: \"What time?\""
                - generic [ref=e152]: ...
            - paragraph [ref=e153]:
              - strong [ref=e154]: "Better:"
              - text: Agent generates a form with date picker, time selector, and submit button. Users interact with UI, not text.
            - heading "The Challenge ¶" [level=2] [ref=e155]:
              - text: The Challenge
              - link "¶" [ref=e156] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#the-challenge
            - paragraph [ref=e157]: In multi-agent systems, agents often run remotely (different servers, organizations). They can't directly manipulate your UI—they must send messages.
            - paragraph [ref=e158]:
              - strong [ref=e159]: "Traditional approach:"
              - text: Send HTML/JavaScript in iframes.
            - list [ref=e160]:
              - listitem [ref=e161]: Heavy, visually disjointed.
              - listitem [ref=e162]: Security complexity.
              - listitem [ref=e163]: Doesn't match app styling.
            - paragraph [ref=e164]:
              - strong [ref=e165]: "Need:"
              - text: Transmit UI that's safe like data, expressive like code.
            - heading "The Solution ¶" [level=2] [ref=e166]:
              - text: The Solution
              - link "¶" [ref=e167] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#the-solution
            - paragraph [ref=e168]: "A2UI: JSON messages describing UI that:"
            - list [ref=e169]:
              - listitem [ref=e170]: LLMs generate as structured output.
              - listitem [ref=e171]: Travel over any transport (A2A, AG UI, SSE, WebSockets).
              - listitem [ref=e172]: Client renders using its own native components.
            - paragraph [ref=e173]:
              - strong [ref=e174]: "Result:"
              - text: Client controls security and styling, agent-generated UI feels native.
            - heading "Example ¶" [level=3] [ref=e175]:
              - text: Example
              - link "¶" [ref=e176] [cursor=pointer]:
                - /url: https://a2ui.org/introduction/what-is-a2ui/#example
