            - paragraph [ref=e289]:
              - strong [ref=e290]: easyops-cn/a2ui-sdk
              - text: (
              - code [ref=e291]: "@a2ui-sdk/react"
              - text: ) is the most fully-featured community React renderer, with 11 published versions, Radix UI primitives, Tailwind CSS styling, and a dedicated docs site. It was
              - link "announced on the A2UI discussions" [ref=e292] [cursor=pointer]:
                - /url: https://github.com/google/A2UI/discussions/489
              - text: . For the official A2UI React renderer, see
              - link "@a2ui/react" [ref=e293] [cursor=pointer]:
                - /url: https://www.npmjs.com/package/@a2ui/react
                - code [ref=e294]: "@a2ui/react"
              - text: .
            - paragraph [ref=e295]:
              - strong [ref=e296]: lmee/A2UI-Android
              - text: fills an important gap — it's currently the only Jetpack Compose renderer, covering Android 5.0+ with 20+ components, data binding, and accessibility support.
            - paragraph [ref=e297]:
              - strong [ref=e298]: sivamrudram-eng/a2ui-react-native
              - text: is the only React Native renderer, enabling A2UI on iOS and Android via a single codebase.
            - paragraph [ref=e299]:
              - strong [ref=e300]: BBC6BAE9/a2ui-swift
              - text: (formerly
              - strong [ref=e301]: a2ui-swiftui
              - text: ) is a native SwiftUI renderer supporting iOS, macOS, visionOS, watchOS, and tvOS. It covers all 18 basic A2UI components with dual v0.8 + v0.9 protocol support, includes JSONL streaming, and uses the Observation framework for reactivity.
            - paragraph [ref=e302]:
              - strong [ref=e303]: TanXudong-Vivo/A2UI-Android-Renderer
              - text: is a modular Android renderer built with Jetpack Compose and Material 3, and is the first Android implementation to support the A2UI v0.9 protocol. It covers 13 fully implemented components (including Image loading via Coil), streaming rendering from LLM token streams, data binding with
              - code [ref=e304]: path
              - text: expressions and
              - code [ref=e305]: formatDate
              - text: ", and a pluggable Custom Catalog for registering additional component types. The demo app includes a live connection to the official"
              - code [ref=e306]: restaurant_finder
              - text: ADK agent.
