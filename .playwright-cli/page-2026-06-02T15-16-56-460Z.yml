            - paragraph [ref=e312]: "To submit a renderer, follow these steps:"
            - list [ref=e313]:
              - listitem [ref=e314]:
                - strong [ref=e315]: Fork
                - text: the
                - link "google/A2UI" [ref=e316] [cursor=pointer]:
                  - /url: https://github.com/google/A2UI
                - text: repository
              - listitem [ref=e317]:
                - strong [ref=e318]: Edit
                - text: this file (
                - code [ref=e319]: docs/ecosystem/renderers.md
                - text: ) — add a row to the Community Renderers table with your renderer's name, platform, npm package (if any), version support, and a link to the source
              - listitem [ref=e320]:
                - strong [ref=e321]: Open a PR
                - text: against
                - code [ref=e322]: google/A2UI
                - text: with a short description of your renderer
              - listitem [ref=e323]:
                - strong [ref=e324]:
                  - text: Post in
                  - link "GitHub Discussions" [ref=e325] [cursor=pointer]:
                    - /url: https://github.com/google/A2UI/discussions
                - text: — let the community know what you built! A short demo video goes a long way.
            - paragraph [ref=e326]:
              - text: Need inspiration? Browse the
              - strong [ref=e327]:
                - link "community samples" [ref=e328] [cursor=pointer]:
                  - /url: https://github.com/google/A2UI/tree/main/samples
              - text: in the repo — these cover Angular, Lit, and ADK-based agents and are a good starting point.
            - heading "What makes a good community renderer? ¶" [level=3] [ref=e329]:
              - text: What makes a good community renderer?
              - link "¶" [ref=e330] [cursor=pointer]:
                - /url: https://a2ui.org/ecosystem/renderers/#what-makes-a-good-community-renderer
            - paragraph [ref=e331]: "A listing is more likely to be accepted and used if it meets the following criteria:"
            - list [ref=e332]:
              - listitem [ref=e333]:
                - text: Has
                - strong [ref=e334]: published source code
                - text: (open-source preferred, MIT or Apache 2.0).
              - listitem [ref=e335]:
                - text: Clearly states
                - strong [ref=e336]: which A2UI spec version
                - text: it supports (v0.8, v0.9, or both).
              - listitem [ref=e337]:
                - text: Covers the
                - strong [ref=e338]: basic components
                - text: "from the other A2UI renderers: text, buttons, inputs, basic layout components, etc."
              - listitem [ref=e339]:
                - text: Includes a
                - strong [ref=e340]: README
                - text: with install instructions and a minimal usage example.
              - listitem [ref=e341]:
                - text: Is
                - strong [ref=e342]: actively maintained
                - text: — flag it as archived if you're no longer supporting it.
            - paragraph [ref=e343]: Community renderers don't need to be production-ready to be listed — experimental and early-stage projects are welcome in the Notable Mentions section.
