          - generic [ref=e342]:
            - heading "Japan" [level=4] [ref=e343]
            - generic [ref=e344]:
              - text: "["
              - link "edit" [ref=e345] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=5
              - text: "]"
          - paragraph [ref=e346]:
            - link "Japan" [ref=e347] [cursor=pointer]:
              - /url: /wiki/Japan
            - text: implemented the examination system for 200 years during the
            - link "Heian period" [ref=e348] [cursor=pointer]:
              - /url: /wiki/Heian_period
            - text: (794–1185). Like the Chinese examinations, the curriculum revolved around the Confucian canon. However, unlike in China, it was only ever applied to the minor nobility and so gradually faded away under the hereditary system during the
            - link "Samurai" [ref=e349] [cursor=pointer]:
              - /url: /wiki/Samurai
            - text: era.
            - superscript [ref=e350]:
              - link "[7]" [ref=e351] [cursor=pointer]:
                - /url: "#cite_note-7"
          - generic [ref=e352]:
            - heading "Korea" [level=4] [ref=e353]
            - generic [ref=e354]:
              - text: "["
              - link "edit" [ref=e355] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=6
              - text: "]"
          - note [ref=e356]:
            - text: "Main article:"
            - link "Gwageo" [ref=e357] [cursor=pointer]:
              - /url: /wiki/Gwageo
          - paragraph [ref=e358]:
            - text: The
            - link "examination system" [ref=e359] [cursor=pointer]:
              - /url: /wiki/Gwageo
            - text: was established in
            - link "Korea" [ref=e360] [cursor=pointer]:
              - /url: /wiki/Korea
            - text: in 958 under the reign of
            - link "Gwangjong of Goryeo" [ref=e361] [cursor=pointer]:
              - /url: /wiki/Gwangjong_of_Goryeo
            - text: . Any free man (not
            - link "Nobi" [ref=e362] [cursor=pointer]:
              - /url: /wiki/Nobi
            - text: ) was able to take the examinations. By the
            - link "Joseon" [ref=e363] [cursor=pointer]:
              - /url: /wiki/Joseon
            - text: period, high offices were closed to aristocrats who had not passed the exams. The examination system continued until 1894 when it was abolished by the
            - link "Gabo Reform" [ref=e364] [cursor=pointer]:
              - /url: /wiki/Gabo_Reform
            - text: . As in China, the content of the examinations focused on the Confucian canon and ensured a loyal scholar bureaucrat class which upheld the throne.
            - superscript [ref=e365]:
              - link "[8]" [ref=e366] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEKo2017-8"
          - generic [ref=e367]:
            - heading "Vietnam" [level=4] [ref=e368]
            - generic [ref=e369]:
              - text: "["
              - link "edit" [ref=e370] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=7
              - text: "]"
          - paragraph [ref=e371]:
            - text: The
            - link "Confucian examination system in Vietnam" [ref=e372] [cursor=pointer]:
              - /url: /wiki/Confucian_examination_system_in_Vietnam
            - text: was established in 1075 under the
            - link "Lý dynasty" [ref=e373] [cursor=pointer]:
              - /url: /wiki/L%C3%BD_dynasty
            - text: Emperor
            - link "Lý Nhân Tông" [ref=e374] [cursor=pointer]:
              - /url: /wiki/L%C3%BD_Nh%C3%A2n_T%C3%B4ng
            - text: and lasted until the
            - link "Nguyễn dynasty" [ref=e375] [cursor=pointer]:
              - /url: /wiki/Nguy%E1%BB%85n_dynasty
            - text: Emperor
            - link "Khải Định" [ref=e376] [cursor=pointer]:
              - /url: /wiki/Kh%E1%BA%A3i_%C4%90%E1%BB%8Bnh
            - text: "(1919). There were only three levels of examinations in Vietnam: interprovincial, pre-court, and court."
            - superscript [ref=e377]:
              - link "[8]" [ref=e378] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEKo2017-8"
          - generic [ref=e379]:
            - heading "West" [level=4] [ref=e380]
            - generic [ref=e381]:
              - text: "["
              - link "edit" [ref=e382] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=8
              - text: "]"
          - paragraph [ref=e383]:
            - text: The imperial examination system was known to
            - link "Europeans" [ref=e384] [cursor=pointer]:
              - /url: /wiki/Europeans
            - text: as early as 1570. It received great attention from the
            - link "Jesuit" [ref=e385] [cursor=pointer]:
              - /url: /wiki/Jesuit
            - link "Matteo Ricci" [ref=e386] [cursor=pointer]:
              - /url: /wiki/Matteo_Ricci
            - text: (1552–1610), who viewed it and its Confucian appeal to rationalism favorably in comparison to religious reliance on "apocalypse." Knowledge of Confucianism and the examination system was disseminated broadly in
            - link "Europe" [ref=e387] [cursor=pointer]:
              - /url: /wiki/Europe
            - text: following the
            - link "Latin" [ref=e388] [cursor=pointer]:
              - /url: /wiki/Latin
            - text: translation of Ricci's journal in 1614. During the 18th century, the imperial examinations were often discussed in conjunction with Confucianism, which attracted great attention from contemporary European thinkers such as
            - link "Gottfried Wilhelm Leibniz" [ref=e389] [cursor=pointer]:
              - /url: /wiki/Gottfried_Wilhelm_Leibniz
            - text: ","
            - link "Voltaire" [ref=e390] [cursor=pointer]:
              - /url: /wiki/Voltaire
            - text: ","
            - link "Montesquieu" [ref=e391] [cursor=pointer]:
              - /url: /wiki/Montesquieu
            - text: ","
            - link "Baron d'Holbach" [ref=e392] [cursor=pointer]:
              - /url: /wiki/Baron_d%27Holbach
            - text: ","
            - link "Johann Wolfgang von Goethe" [ref=e393] [cursor=pointer]:
              - /url: /wiki/Johann_Wolfgang_von_Goethe
            - text: ", and"
            - link "Friedrich Schiller" [ref=e394] [cursor=pointer]:
              - /url: /wiki/Friedrich_Schiller
            - text: .
            - superscript [ref=e395]:
              - link "[9]" [ref=e396] [cursor=pointer]:
                - /url: "#cite_note-9"
            - text: In
            - link "France" [ref=e397] [cursor=pointer]:
              - /url: /wiki/France
            - text: and
            - link "Britain" [ref=e398] [cursor=pointer]:
              - /url: /wiki/United_Kingdom
            - text: ", Confucian ideology was used in attacking the privilege of the elite."
            - superscript [ref=e399]:
              - link "[10]" [ref=e400] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEYu200915-16-10"
            - text: Figures such as Voltaire claimed that the Chinese had "perfected moral science" and
            - link "François Quesnay" [ref=e401] [cursor=pointer]:
              - /url: /wiki/Fran%C3%A7ois_Quesnay
            - text: advocated an economic and political system modeled after that of the Chinese. According to
            - link "Ferdinand Brunetière" [ref=e402] [cursor=pointer]:
              - /url: /wiki/Ferdinand_Bruneti%C3%A8re
            - text: (1849–1906), followers of
            - link "Physiocracy" [ref=e403] [cursor=pointer]:
              - /url: /wiki/Physiocracy
            - text: such as François Quesnay, whose theory of free trade was based on Chinese classical theory, were sinophiles bent on introducing "l'esprit chinois" to France. He also admits that French education was really based on Chinese literary examinations which were popularized in France by philosophers, especially Voltaire. Western perception of China in the 18th century admired the Chinese bureaucratic system as favourable over European governments for its seeming meritocracy.
            - superscript [ref=e404]:
              - link "[11]" [ref=e405] [cursor=pointer]:
                - /url: "#cite_note-11"
            - superscript [ref=e406]:
              - link "[12]" [ref=e407] [cursor=pointer]:
                - /url: "#cite_note-Teng-12"
            - text: However those who admired China such as
            - link "Christian Wolff" [ref=e408] [cursor=pointer]:
              - /url: /wiki/Christian_Wolff_(philosopher)
            - text: were sometimes persecuted. In 1721 he gave a lecture at the
            - link "University of Halle" [ref=e409] [cursor=pointer]:
              - /url: /wiki/University_of_Halle
            - text: praising Confucianism, for which he was accused of atheism and forced to give up his position at the university.
            - superscript [ref=e410]:
              - link "[13]" [ref=e411] [cursor=pointer]:
                - /url: "#cite_note-Bodde-13"
          - paragraph [ref=e412]:
            - text: The earliest evidence of examinations in Europe date to 1215 or 1219 in
            - link "Bologna" [ref=e413] [cursor=pointer]:
              - /url: /wiki/Bologna
            - text: . These were chiefly oral in the form of a question or answer, disputation, determination, defense, or public lecture. The candidate gave a public lecture of two prepared passages assigned to him from the civil or canon law, and then doctors asked him questions, or expressed objections to answers. Evidence of written examinations do not appear until 1702 at
            - link "Trinity College, Cambridge" [ref=e414] [cursor=pointer]:
              - /url: /wiki/Trinity_College,_Cambridge
            - text: . According to
            - link "Sir Michael Sadler" [ref=e415] [cursor=pointer]:
              - /url: /wiki/Michael_Sadler_(educationist)
            - text: ", Europe may have had written examinations since 1518 but he admits the \"evidence is not very clear.\" In"
            - link "Prussia" [ref=e416] [cursor=pointer]:
              - /url: /wiki/Prussia
            - text: ", medication examinations began in 1725. The"
            - link "Mathematical Tripos" [ref=e417] [cursor=pointer]:
              - /url: /wiki/Mathematical_Tripos
            - text: ", founded in 1747, is commonly believed to be the first honor examination, but"
            - link "James Bass Mullinger" [ref=e418] [cursor=pointer]:
              - /url: /wiki/James_Bass_Mullinger
            - text: considered "the candidates not having really undergone any examination whatsoever" because the qualification for a degree was merely four years of residence. France adopted the examination system in 1791 as a result of the
            - link "French Revolution" [ref=e419] [cursor=pointer]:
              - /url: /wiki/French_Revolution
            - text: but it collapsed after only ten years.
            - link "Germany" [ref=e420] [cursor=pointer]:
              - /url: /wiki/Germany
            - text: implemented the examination system around 1800.
            - superscript [ref=e421]:
              - link "[12]" [ref=e422] [cursor=pointer]:
                - /url: "#cite_note-Teng-12"
          - paragraph [ref=e423]:
            - text: Englishmen in the 18th century such as
            - link "Eustace Budgell" [ref=e424] [cursor=pointer]:
              - /url: /wiki/Eustace_Budgell
            - text: recommended imitating the Chinese examination system but the first English person to recommend competitive examinations to qualify for employment was
            - link "Adam Smith" [ref=e425] [cursor=pointer]:
              - /url: /wiki/Adam_Smith
            - text: in 1776. In 1838, the
            - link "Congregational church" [ref=e426] [cursor=pointer]:
              - /url: /wiki/Congregational_church
            - text: missionary
            - link "Walter Henry Medhurst" [ref=e427] [cursor=pointer]:
              - /url: /wiki/Walter_Henry_Medhurst
            - text: considered the Chinese exams to be "worthy of imitating."
            - superscript [ref=e428]:
              - link "[12]" [ref=e429] [cursor=pointer]:
                - /url: "#cite_note-Teng-12"
            - text: In 1806, the British established
            - link "a Civil Service College" [ref=e430] [cursor=pointer]:
              - /url: /wiki/East_India_Company_College
            - text: near London for training of the East India Company's administrators in India. This was based on the recommendations of British East India Company officials serving in China and had seen the Imperial examinations. In 1829, the company introduced civil service examinations in India on a limited basis.
            - superscript [ref=e431]:
              - link "[14]" [ref=e432] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEHuddleston19969-14"
            - text: This established the principle of qualification process for civil servants in England.
            - superscript [ref=e433]:
              - link "[13]" [ref=e434] [cursor=pointer]:
                - /url: "#cite_note-Bodde-13"
            - text: In 1847 and 1856, Thomas Taylor Meadows strongly recommended the adoption of the Chinese principle of competitive examinations in
            - link "Great Britain" [ref=e435] [cursor=pointer]:
              - /url: /wiki/Great_Britain
            - text: in his Desultory Notes on the Government and People of China. According to Meadows, "the long duration of the Chinese empire is solely and altogether owing to the good government which consists in the advancement of men of talent and merit only."
            - superscript [ref=e436]:
              - link "[15]" [ref=e437] [cursor=pointer]:
                - /url: "#cite_note-15"
            - text: Both
            - link "Thomas Babington Macaulay" [ref=e438] [cursor=pointer]:
              - /url: /wiki/Thomas_Babington_Macaulay
            - text: ", who was instrumental in passing the"
            - link "Saint Helena Act 1833" [ref=e439] [cursor=pointer]:
              - /url: /wiki/Saint_Helena_Act_1833
            - text: ", and"
            - link "Stafford Northcote, 1st Earl of Iddesleigh" [ref=e440] [cursor=pointer]:
              - /url: /wiki/Stafford_Northcote,_1st_Earl_of_Iddesleigh
            - text: ", who prepared the"
            - link "Northcote–Trevelyan Report" [ref=e441] [cursor=pointer]:
              - /url: /wiki/Northcote%E2%80%93Trevelyan_Report
            - text: that catalyzed the
            - link "British civil service" [ref=e442] [cursor=pointer]:
              - /url: /wiki/Civil_Service_(United_Kingdom)
            - text: ", were familiar with Chinese history and institutions. The Northcote–Trevelyan Report of 1854 made four principal recommendations: that recruitment should be on the basis of merit determined through standardized written examination, that candidates should have a solid general education to enable inter-departmental transfers, that recruits should be graded into a hierarchy, and that promotion should be through achievement, rather than 'preferment, patronage, or purchase'."
            - superscript [ref=e443]:
              - link "[16]" [ref=e444] [cursor=pointer]:
                - /url: "#cite_note-APH-16"
          - paragraph [ref=e445]:
            - text: When the report was brought up in parliament in 1853, Lord Monteagle argued against the implementation of open examinations because it was a Chinese system and China was not an "enlightened country." Lord Stanley called the examinations the "Chinese Principle." The Earl of Granville did not deny this but argued in favor of the examination system, considering that the minority Manchus had been able to rule China with it for over 200 years. In 1854,
            - link "Edwin Chadwick" [ref=e446] [cursor=pointer]:
              - /url: /wiki/Edwin_Chadwick
            - text: reported that some noblemen did not agree with the measures introduced because they were Chinese. The examination system was finally implemented in the
            - link "British Indian Civil Service" [ref=e447] [cursor=pointer]:
              - /url: /wiki/Indian_Civil_Service_(British_India)
            - text: in 1855, prior to which admission into the civil service was purely a matter of patronage, and in
            - link "England" [ref=e448] [cursor=pointer]:
              - /url: /wiki/England
            - text: in 1870. Even as late as ten years after the competitive examination plan was passed, people still attacked it as an "adopted Chinese culture."
            - link "Alexander Baillie-Cochrane, 1st Baron Lamington" [ref=e449] [cursor=pointer]:
              - /url: /wiki/Alexander_Baillie-Cochrane,_1st_Baron_Lamington
            - text: insisted that the English "did not know that it was necessary for them to take lessons from the Celestial Empire." In 1875,
            - link "Archibald Sayce" [ref=e450] [cursor=pointer]:
              - /url: /wiki/Archibald_Sayce
            - text: voiced concern over the prevalence of competitive examinations, which he described as "the invasion of this new Chinese culture."
            - superscript [ref=e451]:
              - link "[12]" [ref=e452] [cursor=pointer]:
                - /url: "#cite_note-Teng-12"
          - paragraph [ref=e453]:
            - text: After Great Britain's successful implementation of systematic, open, and competitive examinations in India in the 19th century, similar systems were instituted in the
            - link "United Kingdom" [ref=e454] [cursor=pointer]:
              - /url: /wiki/Civil_Service_(United_Kingdom)
            - text: itself, and in other Western nations.
            - superscript [ref=e455]:
              - link "[17]" [ref=e456] [cursor=pointer]:
                - /url: "#cite_note-17"
            - text: Like the British, the development of the French and American civil service was influenced by the Chinese system. When
            - link "Thomas Jenckes" [ref=e457] [cursor=pointer]:
              - /url: /wiki/Thomas_Jenckes
            - text: made a Report from the Joint Select Committee on Retrenchment in 1868, it contained a chapter on the civil service in China. In 1870, William Spear wrote a book called The Oldest and the Newest Empire-China and the United States, in which he urged the United States government to adopt the Chinese examination system. Like in Britain, many of the American elites scorned the plan to implement competitive examinations, which they considered foreign, Chinese, and "un-American." As a result, the civil services reform introduced into the
            - link "House of Representatives" [ref=e458] [cursor=pointer]:
              - /url: /wiki/United_States_House_of_Representatives
            - text: "in 1868 was not passed until 1883. The Civil Service Commission tried to combat such sentiments in its report:"
            - superscript [ref=e459]:
              - link "[18]" [ref=e460] [cursor=pointer]:
                - /url: "#cite_note-18"
          - blockquote [ref=e461]:
            - paragraph [ref=e462]:
              - text: ...with no intention of commending either the religion or the imperialism of China, we could not see why the fact that the most enlightened and enduring government of the Eastern world had acquired an examination as to the merits of candidates for office, should any more deprive the American people of that advantage, if it might be an advantage, than the facts that Confucius had taught political morality, and the people of China had read books, used the compass, gunpowder, and the multiplication table, during centuries when this continent was a wilderness, should deprive our people of those conveniences.
              - superscript [ref=e463]:
                - link "[12]" [ref=e464] [cursor=pointer]:
                  - /url: "#cite_note-Teng-12"
          - paragraph [ref=e466]: — Civil Service Commission
          - generic [ref=e467]:
            - heading "Modern development" [level=3] [ref=e468]
            - generic [ref=e469]:
              - text: "["
              - link "edit" [ref=e470] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=9
              - text: "]"
          - figure "Students taking a scholarship examination in a classroom in 1940" [ref=e471]:
            - link [ref=e472] [cursor=pointer]:
              - /url: /wiki/File:StateLibQld_1_100348.jpg
              - img [ref=e473]
            - generic [ref=e474]:
              - text: Students taking a
              - link "scholarship" [ref=e475] [cursor=pointer]:
                - /url: /wiki/Scholarship
              - text: examination in a classroom in 1940
          - paragraph [ref=e476]:
            - link "Standardized testing" [ref=e477] [cursor=pointer]:
              - /url: /wiki/Standardized_test
            - text: began to influence the method of examination in British universities from the 1850s, where
            - link "oral exams" [ref=e478] [cursor=pointer]:
              - /url: /wiki/Oral_exam
            - text: had common since the
            - link "Middle Ages" [ref=e479] [cursor=pointer]:
              - /url: /wiki/Middle_Ages
            - text: . In the US, the transition happened under the influence of the educational reformer
            - link "Horace Mann" [ref=e480] [cursor=pointer]:
              - /url: /wiki/Horace_Mann
            - text: . The shift helped standardize an expansion of the curricula into the sciences and
            - link "humanities" [ref=e481] [cursor=pointer]:
              - /url: /wiki/Humanities
            - text: ", creating a rationalized method for the evaluation of teachers and institutions and creating a basis for the"
            - link "streaming of students" [ref=e482] [cursor=pointer]:
              - /url: /wiki/Tracking_(education)
            - text: according to ability.
            - superscript [ref=e483]:
              - link "[19]" [ref=e484] [cursor=pointer]:
                - /url: "#cite_note-19"
          - paragraph [ref=e485]:
            - text: Both World War I and World War II demonstrated the necessity of
            - link "standardized testing" [ref=e486] [cursor=pointer]:
              - /url: /wiki/Standardized_test
            - text: and the benefits associated with these tests. Tests were used to determine the mental aptitude of recruits to the military. The US Army used the
            - link "Stanford–Binet Intelligence Scale" [ref=e487] [cursor=pointer]:
              - /url: /wiki/Stanford%E2%80%93Binet_Intelligence_Scale
            - text: to test the
            - link "IQ" [ref=e488] [cursor=pointer]:
              - /url: /wiki/Intelligence_quotient
            - text: of the soldiers.
            - superscript [ref=e489]:
              - link "[20]" [ref=e490] [cursor=pointer]:
                - /url: "#cite_note-20"
            - text: After the War, industry began using tests to evaluate applicants for various jobs based on performance. In 1952, the first Advanced Placement (AP) test was administered to begin closing the gap between high schools and colleges.
            - superscript [ref=e491]:
              - link "[21]" [ref=e492] [cursor=pointer]:
                - /url: "#cite_note-21"
          - generic [ref=e493]:
            - heading "Contemporary tests" [level=2] [ref=e494]
            - generic [ref=e495]:
              - text: "["
              - link "edit" [ref=e496] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=10
              - text: "]"
          - generic [ref=e497]:
            - heading "Education" [level=3] [ref=e498]
            - generic [ref=e499]:
              - text: "["
              - link "edit" [ref=e500] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=11
              - text: "]"
          - paragraph [ref=e501]: Tests are used throughout most educational systems. Tests may range from brief, informal questions chosen by the teacher to major tests that students and teachers spend months preparing for.
          - paragraph [ref=e502]:
            - text: Some countries such as the United Kingdom and France require all their secondary school students to take a standardized test on individual subjects such as the
            - link "General Certificate of Secondary Education (GCSE)" [ref=e503] [cursor=pointer]:
              - /url: /wiki/General_Certificate_of_Secondary_Education
            - text: (in England) and
            - link "Baccalauréat" [ref=e504] [cursor=pointer]:
              - /url: /wiki/Baccalaur%C3%A9at
            - text: respectively as a requirement for graduation.
            - superscript [ref=e505]:
              - link "[22]" [ref=e506] [cursor=pointer]:
                - /url: "#cite_note-22"
            - text: These tests are used primarily to assess a student's proficiency in specific subjects such as mathematics, science, or literature. In contrast, high school students in other countries such as the United States may not be required to take a standardized test to graduate. Moreover, students in these countries usually take standardized tests only to apply for a position in a university program and are typically given the option of taking different standardized tests such as the
            - link "ACT" [ref=e507] [cursor=pointer]:
              - /url: /wiki/ACT_(test)
            - text: or
            - link "SAT" [ref=e508] [cursor=pointer]:
              - /url: /wiki/SAT
            - text: ", which are used primarily to measure a student's reasoning skill."
            - superscript [ref=e509]:
              - link "[23]" [ref=e510] [cursor=pointer]:
                - /url: "#cite_note-23"
            - superscript [ref=e511]:
              - link "[24]" [ref=e512] [cursor=pointer]:
                - /url: "#cite_note-ACThistory-24"
            - text: High school students in the United States may also take
            - link "Advanced Placement" [ref=e513] [cursor=pointer]:
              - /url: /wiki/Advanced_Placement
            - text: tests on specific subjects to fulfill university-level credit. Depending on the policies of the test maker or country, administration of standardized tests may be done in a large hall, classroom, or testing center. A
            - link "proctor or invigilator" [ref=e514] [cursor=pointer]:
              - /url: /wiki/Exam_invigilator
            - text: may also be present during the testing period to provide instructions, to answer questions, or to prevent cheating.
          - paragraph [ref=e515]:
            - text: Grades or test scores from standardized test may also be used by universities to determine whether a student applicant should be admitted into one of its academic or professional programs. For example, universities in the United Kingdom admit applicants into their undergraduate programs based primarily or solely on an applicant's grades on pre-university qualifications such as the
            - link "GCE A-levels" [ref=e516] [cursor=pointer]:
              - /url: /wiki/GCE_Advanced_Level
            - text: or
            - link "Cambridge Pre-U" [ref=e517] [cursor=pointer]:
              - /url: /wiki/Cambridge_Pre-U
            - text: .
            - superscript [ref=e518]:
              - link "[25]" [ref=e519] [cursor=pointer]:
                - /url: "#cite_note-Cambridge_Pre-U-25"
            - superscript [ref=e520]:
              - link "[26]" [ref=e521] [cursor=pointer]:
                - /url: "#cite_note-International_Qualifications_-_University_of_Oxford-26"
            - text: In contrast, universities in the United States use an applicant's test score on the SAT or ACT as just one of their many admission criteria to determine whether an applicant should be admitted into one of its undergraduate programs. The other criteria in this case may include the applicant's grades from high school, extracurricular activities, personal statement, and letters of recommendations.
            - superscript [ref=e522]:
              - link "[27]" [ref=e523] [cursor=pointer]:
                - /url: "#cite_note-Harvard_College_Admissions-27"
            - text: Once admitted, undergraduate students in the United Kingdom or United States may be required by their respective programs to take a
            - link "comprehensive examination" [ref=e524] [cursor=pointer]:
              - /url: /wiki/Comprehensive_examination
            - text: as a requirement for passing their courses or for graduating from their respective programs.
          - paragraph [ref=e525]:
            - text: Standardized tests are sometimes used by certain countries to manage the quality of their educational institutions. For example, the
            - link "No Child Left Behind Act" [ref=e526] [cursor=pointer]:
              - /url: /wiki/No_Child_Left_Behind_Act
            - text: in the United States requires individual states to develop assessments for students in certain grades. In practice, these assessments typically appear in the form of standardized tests. Test scores of students in specific grades of an educational institution are then used to determine the status of that educational institution, i.e., whether it should be allowed to continue to operate in the same way or to receive funding.
          - paragraph [ref=e527]:
            - text: Finally, standardized tests are sometimes used to compare proficiencies of students from different institutions or countries. For example, the
            - link "Organisation for Economic Co-operation and Development (OECD)" [ref=e528] [cursor=pointer]:
              - /url: /wiki/Organisation_for_Economic_Co-operation_and_Development
            - text: uses
            - link "Programme for International Student Assessment (PISA)" [ref=e529] [cursor=pointer]:
              - /url: /wiki/Programme_for_International_Student_Assessment
            - text: to evaluate certain skills and knowledge of students from different participating countries.
            - superscript [ref=e530]:
              - link "[28]" [ref=e531] [cursor=pointer]:
                - /url: "#cite_note-PISA-28"
          - generic [ref=e532]:
            - heading "Licensing and certification" [level=3] [ref=e533]
            - generic [ref=e534]:
              - text: "["
              - link "edit" [ref=e535] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=12
              - text: "]"
          - paragraph [ref=e536]:
            - text: Standardized tests are sometimes used by certain governing bodies to determine whether a test taker is allowed to practice a profession, to use a specific job title, or to claim competency in a specific set of skills. For example, a test taker who intends to become a lawyer is usually required by a governing body such as a governmental bar licensing agency to pass a
            - link "bar exam" [ref=e537] [cursor=pointer]:
              - /url: /wiki/Bar_exam
            - text: .
          - generic [ref=e538]:
            - heading "Immigration and naturalization" [level=3] [ref=e539]
            - generic [ref=e540]:
              - text: "["
              - link "edit" [ref=e541] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=13
              - text: "]"
          - paragraph [ref=e542]:
            - text: Standardized tests are also used in certain countries to regulate immigration. For example, intended immigrants to Australia are legally required to pass a citizenship test as part of that country's naturalization process.
            - superscript [ref=e543]:
              - link "[29]" [ref=e544] [cursor=pointer]:
                - /url: "#cite_note-Australian_Citizenship_-_Australian_Citizenship_test-29"
          - generic [ref=e545]:
            - heading "Language testing in naturalization process" [level=3] [ref=e546]
            - generic [ref=e547]:
              - text: "["
              - link "edit" [ref=e548] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=14
              - text: "]"
          - paragraph [ref=e549]:
            - text: When analyzed in the context of language texting in the naturalization processes, the ideology can be found from two distinct but nearly related points. One refers to the construction and deconstruction of the nation's constitutive elements that makes their own identity, while the second has a more restricted view of the notion of specific language and ideologies that may served in a specific purpose.
            - superscript [ref=e550]:
              - link "[30]" [ref=e551] [cursor=pointer]:
                - /url: "#cite_note-30"
          - generic [ref=e552]:
            - heading "Intelligence quotient" [level=3] [ref=e553]
            - generic [ref=e554]:
              - text: "["
              - link "edit" [ref=e555] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=15
              - text: "]"
          - note [ref=e556]:
            - text: "Main article:"
            - link "Intelligence quotient" [ref=e557] [cursor=pointer]:
              - /url: /wiki/Intelligence_quotient
          - generic [ref=e558]:
            - heading "Competitions" [level=3] [ref=e559]
            - generic [ref=e560]:
              - text: "["
              - link "edit" [ref=e561] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=16
              - text: "]"
          - paragraph [ref=e562]:
            - text: Tests are sometimes used as a tool to select for participants that have potential to succeed in a competition such as a sporting event. For example, skaters who wish to participate in figure skating competitions in the United States must pass official U.S. Figure Skating tests just to qualify.
            - superscript [ref=e563]:
              - link "[31]" [ref=e564] [cursor=pointer]:
                - /url: "#cite_note-Welcome_to_U.S._Figure_Skating-31"
          - generic [ref=e565]:
            - heading "Group memberships" [level=3] [ref=e566]
            - generic [ref=e567]:
              - text: "["
              - link "edit" [ref=e568] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=17
              - text: "]"
          - paragraph [ref=e569]:
            - text: Tests are sometimes used by a group to select for certain types of individuals to join the group. For example,
            - link "Mensa International" [ref=e570] [cursor=pointer]:
              - /url: /wiki/Mensa_International
            - text: is a
            - link "high-IQ society" [ref=e571] [cursor=pointer]:
              - /url: /wiki/High-IQ_society
            - text: that requires individuals to score at the 98th percentile or higher on a standardized, supervised IQ test.
            - superscript [ref=e572]:
              - link "[32]" [ref=e573] [cursor=pointer]:
                - /url: "#cite_note-What_is_Mensa?-32"
          - generic [ref=e574]:
            - heading "Types" [level=2] [ref=e575]
            - generic [ref=e576]:
              - text: "["
              - link "edit" [ref=e577] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=18
              - text: "]"
          - note [ref=e578]:
            - text: "Further information:"
            - link "Group tests" [ref=e579] [cursor=pointer]:
              - /url: /wiki/Group_tests
            - text: and
            - link "Educational assessment" [ref=e580] [cursor=pointer]:
              - /url: /wiki/Educational_assessment
          - paragraph [ref=e581]:
            - text: "Assessment types include:"
            - superscript [ref=e582]:
              - link "[33]" [ref=e583] [cursor=pointer]:
                - /url: "#cite_note-33"
            - superscript [ref=e584]:
              - link "[34]" [ref=e585] [cursor=pointer]:
                - /url: "#cite_note-34"
            - superscript [ref=e586]:
              - link "[35]" [ref=e587] [cursor=pointer]:
                - /url: "#cite_note-35"
          - generic [ref=e588]:
            - term [ref=e589]:
              - link "Formative assessment" [ref=e590] [cursor=pointer]:
                - /url: /wiki/Formative_assessment
            - definition [ref=e591]:
              - text: Formative assessments are informal and formal tests taken during the learning process. These assessments modify the later learning activities, to improve student achievement. They identify strengths and weaknesses and help target areas that need work. The goal of formative assessment is to monitor student learning to provide ongoing feedback that can be used by instructors to improve their teaching and by students to improve their learning.
              - superscript [ref=e592]:
                - text: "["
                - link "citation needed" [ref=e594] [cursor=pointer]:
                  - /url: /wiki/Wikipedia:Citation_needed
                - text: "]"
            - term [ref=e595]:
              - link "Summative assessment" [ref=e596] [cursor=pointer]:
                - /url: /wiki/Summative_assessment
            - definition [ref=e597]:
              - text: Summative assessments evaluate competence at the end of an instructional unit, with the goal of determining if the candidate has assimilated the knowledge or skills to the required standard. Summative assessments may cover a few days' instruction, an entire term's work in cases such as
              - link "final exams" [ref=e598] [cursor=pointer]:
                - /url: /wiki/Final_examination
              - text: ", or even multiple years' study, in the case of"
              - link "high school exit exams" [ref=e599] [cursor=pointer]:
                - /url: /wiki/High_school_exit_exam
              - text: ","
              - link "GCE Advanced Level" [ref=e600] [cursor=pointer]:
                - /url: /wiki/GCE_Advanced_Level
              - text: examples, or professional licensing tests such as the
              - link "United States Medical Licensing Examination" [ref=e601] [cursor=pointer]:
                - /url: /wiki/United_States_Medical_Licensing_Examination
              - text: .
            - term [ref=e602]:
              - link "Norm-referenced test" [ref=e603] [cursor=pointer]:
                - /url: /wiki/Norm-referenced_test
            - definition [ref=e604]:
              - text: Norm-referenced tests compare a student's performance against a national or other "norm" group. Only a certain percentage of test takers will get the best and worse scores. Norm-referencing is usually called
              - link "grading on a curve" [ref=e606] [cursor=pointer]:
                - /url: /wiki/Grading_on_a_curve
              - text: when the comparison group is students in the same classroom. Norm-referenced tests report whether test takers performed better or worse than a hypothetical average student, which is determined by comparing scores against the performance results of a statistically selected group of test takers, typically of the same age or grade level, who have already taken the exam.
              - superscript [ref=e607]:
                - link "[36]" [ref=e608] [cursor=pointer]:
                  - /url: "#cite_note-:0-36"
            - term [ref=e609]:
              - link "Criterion-referenced test" [ref=e610] [cursor=pointer]:
                - /url: /wiki/Criterion-referenced_test
          - paragraph [ref=e611]:
            - text: Criterion-referenced tests are designed to measure student performance against a fixed set of criteria or learning standards. It is possible for all test takers to pass, just like it is possible for all test takers to fail. These tests can use individual's scores to focus on improving the skills that were lacking in comprehension.
            - superscript [ref=e612]:
              - link "[36]" [ref=e613] [cursor=pointer]:
                - /url: "#cite_note-:0-36"
          - generic [ref=e614]:
            - term [ref=e615]: Performance-based assessments
            - definition [ref=e616]:
              - text: Performance-based assessments require students to solve real-world problems or produce something with real-world application. For example, the student can demonstrate
              - link "baking" [ref=e617] [cursor=pointer]:
                - /url: /wiki/Baking
              - text: skills by baking a cake, and having the outcome judged for appearance, flavor, and texture.
            - term [ref=e618]:
              - link "Authentic assessment" [ref=e619] [cursor=pointer]:
                - /url: /wiki/Authentic_assessment
            - definition [ref=e620]:
              - text: An authentic assessment is the measurement of accomplishments within a realistic, practical context that is relevant outside of the school setting.
              - superscript [ref=e621]:
                - link "[37]" [ref=e622] [cursor=pointer]:
                  - /url: "#cite_note-37"
              - text: For example, an authentic assessment of arithmetic skills is figuring out how much the family's groceries will cost this week. This provides as much information about the students' addition skills as a test question that asks what the sum of various numbers are.
            - term [ref=e623]:
              - link "Standardized test" [ref=e624] [cursor=pointer]:
                - /url: /wiki/Standardized_test
            - definition [ref=e625]:
              - text: Standardized tests are all tests that are administered and scored in a consistent manner, regardless of whether it is a quick quiz created by the local teacher or a heavily researched test given to millions of people.
              - superscript [ref=e626]:
                - link "[38]" [ref=e627] [cursor=pointer]:
                  - /url: "#cite_note-38"
              - text: Standardized tests are often used in
              - link "education" [ref=e628] [cursor=pointer]:
                - /url: /wiki/Education
              - text: ","
              - link "professional certification" [ref=e629] [cursor=pointer]:
                - /url: /wiki/Professional_certification
              - text: ","
              - link "psychology" [ref=e630] [cursor=pointer]:
                - /url: /wiki/Psychology
              - text: (e.g.,
              - link "MMPI" [ref=e631] [cursor=pointer]:
                - /url: /wiki/Minnesota_Multiphasic_Personality_Inventory
              - text: ), the
              - link "military" [ref=e632] [cursor=pointer]:
                - /url: /wiki/Military
              - text: ", and many other fields."
            - term [ref=e633]: Non-standardized test
            - definition [ref=e634]:
              - text: Non-standardized tests are flexible in scope and format, and variable in difficulty. For example, a teacher may go around the classroom and ask each student a different question. Some questions will inevitably be harder than others, and the teacher may be more strict with the answers from better students. A non-standardized test may be used to determine the proficiency level of students, to motivate students to study, to provide feedback to students, and to
              - link "modify the curriculum" [ref=e635] [cursor=pointer]:
                - /url: /wiki/Special_education
              - text: to make it more appropriate for either low- or high-skill students
            - term [ref=e636]:
              - link "High-stakes test" [ref=e637] [cursor=pointer]:
                - /url: /wiki/High-stakes_testing
            - definition [ref=e638]:
              - text: High-stakes tests are tests with important consequences for the individual test taker, such as getting a driver's license. A high-stakes test does not need to be a high-stress test, if the test taker is confident of passing.
              - superscript [ref=e639]:
                - text: "["
                - link "citation needed" [ref=e641] [cursor=pointer]:
                  - /url: /wiki/Wikipedia:Citation_needed
                - text: "]"
            - term [ref=e642]: Competitive examinations
          - paragraph [ref=e643]:
            - text: Competitive exams are norm-referenced, high-stakes tests in which candidates are ranked according to their grades and/or percentile, and then top rankers are selected. If the examination is open for n positions, then the first n candidates in ranks pass, the others are rejected. They are used as
            - link "entrance examinations" [ref=e644] [cursor=pointer]:
              - /url: /wiki/Entrance_examination
            - text: for
            - link "university and college admissions" [ref=e645] [cursor=pointer]:
              - /url: /wiki/University_and_college_admissions
            - text: such as the
            - link "Joint Entrance Examination" [ref=e646] [cursor=pointer]:
              - /url: /wiki/Joint_Entrance_Examination
            - text: or to
            - link "secondary schools" [ref=e647] [cursor=pointer]:
              - /url: /wiki/Secondary_school
            - text: . Types are
            - link "civil service examinations" [ref=e648] [cursor=pointer]:
              - /url: /wiki/Civil_service_examination
            - text: ", required for"
            - link "positions in the public sector" [ref=e649] [cursor=pointer]:
              - /url: /wiki/Civil_service
            - text: ; the U.S.
            - link "Foreign Service Exam" [ref=e650] [cursor=pointer]:
              - /url: /wiki/Foreign_Service_Exam
            - text: ", and the"
            - link "United Nations" [ref=e651] [cursor=pointer]:
              - /url: /wiki/United_Nations
            - text: Competitive Examination. Competitive examinations are considered an
            - link "egalitarian" [ref=e652] [cursor=pointer]:
              - /url: /wiki/Egalitarian
            - text: way to select worthy applicants without risking
            - link "influence peddling" [ref=e653] [cursor=pointer]:
              - /url: /wiki/Influence_peddling
            - text: ","
            - link "bias" [ref=e654] [cursor=pointer]:
              - /url: /wiki/Bias
            - text: or other concerns.
          - paragraph [ref=e655]:
            - text: A single test can have multiple qualities. For example, the
            - link "bar exam" [ref=e656] [cursor=pointer]:
              - /url: /wiki/Bar_examination
            - text: for aspiring lawyers may be a norm-referenced, standardized, summative assessment. This means that only the test takers with higher scores will pass, that all of them took the same test under the same circumstances and were graded with the same scoring standards, and that the test is meant to determine whether the law school graduates have learned enough to practice their profession.
          - generic [ref=e657]:
            - heading "Assessment formats" [level=2] [ref=e658]
