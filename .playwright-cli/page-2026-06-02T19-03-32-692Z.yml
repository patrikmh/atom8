          - generic [ref=e887]:
            - heading "Written tests" [level=3] [ref=e888]
            - generic [ref=e889]:
              - text: "["
              - link "edit" [ref=e890] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=20
              - text: "]"
          - figure "Indonesian students taking a written test" [ref=e891]:
            - link [ref=e892] [cursor=pointer]:
              - /url: /wiki/File:SMATrinitasUlum.JPG
              - img [ref=e893]
            - generic [ref=e894]: Indonesian students taking a written test
          - paragraph [ref=e895]:
            - link "Written tests" [ref=e896] [cursor=pointer]:
              - /url: /wiki/Writing_assessment
            - text: are tests that are administered on paper or on a computer (as an
            - link "eExam" [ref=e897] [cursor=pointer]:
              - /url: /wiki/EExam
            - text: ). A test taker who takes a written test could respond to specific
            - link "test items" [ref=e898] [cursor=pointer]:
              - /url: /wiki/Test_item
            - text: by writing or typing within a given space of the test or on a separate form or document.
          - paragraph [ref=e899]:
            - text: In some tests; where knowledge of many constants or technical terms is required to effectively answer questions, like
            - link "Chemistry" [ref=e900] [cursor=pointer]:
              - /url: /wiki/Chemistry
            - text: or
            - link "Biology" [ref=e901] [cursor=pointer]:
              - /url: /wiki/Biology
            - text: – the test developer may allow every test taker to bring with them a
            - link "cheat sheet" [ref=e902] [cursor=pointer]:
              - /url: /wiki/Cheat_sheet
            - text: .
          - paragraph [ref=e903]: A test developer's choice of which style or format to use when developing a written test is usually arbitrary given that there is no single invariant standard for testing. Be that as it may, certain test styles and formats have become more widely used than others. Below is a list of those formats of test items that are widely used by educators and test developers to construct paper or computer-based tests. As a result, these tests may consist of only one type of test item format (e.g., multiple-choice test, essay test) or may have a combination of different test item formats (e.g., a test that has multiple-choice and essay items).
          - generic [ref=e904]:
            - heading "Multiple choice" [level=4] [ref=e905]
            - generic [ref=e906]:
              - text: "["
              - link "edit" [ref=e907] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=21
              - text: "]"
          - note [ref=e908]:
            - text: "Main article:"
            - link "Multiple choice" [ref=e909] [cursor=pointer]:
              - /url: /wiki/Multiple_choice
          - paragraph [ref=e910]:
            - text: In a test that has items formatted as multiple-choice questions, a candidate would be given a number of set answers for each question, and the candidate must choose which answer or group of answers is correct. There are two families of multiple-choice questions.
            - superscript [ref=e911]:
              - link "[39]" [ref=e912] [cursor=pointer]:
                - /url: "#cite_note-Constructing_Written_Test_Questions_For_the_Basic_and_Clinical_Sciences-39"
            - text: The first family is known as the True/False question and it requires a test taker to choose all answers that are appropriate. The second family is known as One-Best-Answer question and it requires a test taker to answer only one from a list of answers.
          - paragraph [ref=e913]:
            - text: There are several reasons to using multiple-choice questions in tests. In terms of administration, multiple-choice questions usually requires less time for test takers to answer, are easy to score and grade, provide greater coverage of material, allows for a wide range of difficulty, and can easily diagnose a test taker's difficulty with certain concepts.
            - superscript [ref=e914]:
              - link "[40]" [ref=e915] [cursor=pointer]:
                - /url: "#cite_note-Types_of_Test_Item_Formats-40"
            - text: As an educational tool, multiple-choice items test many levels of learning as well as a test taker's ability to integrate information, and it provides feedback to the test taker about why distractors were wrong and why correct answers were right. Nevertheless, there are difficulties associated with the use of multiple-choice questions. In administrative terms, multiple-choice items that are effective usually take a great time to construct.
            - superscript [ref=e916]:
              - link "[40]" [ref=e917] [cursor=pointer]:
                - /url: "#cite_note-Types_of_Test_Item_Formats-40"
            - text: As an educational tool, multiple-choice items do not allow test takers to demonstrate knowledge beyond the choices provided and may even encourage guessing or approximation due to the presence of at least one correct answer. For instance, a test taker might not work out explicitly that
            - generic [ref=e918]:
              - math [ref=e920]:
                - generic [ref=e923]:
                  - generic [ref=e924]: "6.14"
                  - generic [ref=e925]: ⋅
                  - generic [ref=e926]: "7.95"
                  - generic [ref=e927]: =
                  - generic [ref=e928]: "48.813"
              - img [ref=e929]
            - text: ", but knowing that"
            - generic [ref=e930]:
              - math [ref=e932]:
                - generic [ref=e935]:
                  - generic [ref=e936]: "6"
                  - generic [ref=e937]: ⋅
                  - generic [ref=e938]: "8"
                  - generic [ref=e939]: =
                  - generic [ref=e940]: "48"
              - img [ref=e941]
            - text: ", they would choose an answer close to 48. Moreover, test takers may misinterpret these items and in the process, perceive these items to be tricky or picky. Finally, multiple-choice items do not test a test taker's attitudes towards learning because correct responses can be easily faked."
          - generic [ref=e942]:
            - heading "Alternative response" [level=4] [ref=e943]
            - generic [ref=e944]:
              - text: "["
              - link "edit" [ref=e945] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=22
              - text: "]"
          - paragraph [ref=e946]: True/False questions present candidates with a binary choice – a statement is either true or false. This method presents problems, as depending on the number of questions, a significant number of candidates could get 100% just by guesswork, and should on average get 50%.
          - generic [ref=e947]:
            - heading "Matching type" [level=4] [ref=e948]
            - generic [ref=e949]:
              - text: "["
              - link "edit" [ref=e950] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=23
              - text: "]"
          - paragraph [ref=e951]:
            - text: A matching item is an item that provides a defined term and requires a test taker to match identifying characteristics to the correct term.
            - superscript [ref=e952]:
              - link "[41]" [ref=e953] [cursor=pointer]:
                - /url: "#cite_note-MFO_Topic_C5:_Developing_Test_Questions-41"
            - superscript [ref=e954]:
              - text: "["
              - link "example needed" [ref=e956] [cursor=pointer]:
                - /url: /wiki/Wikipedia:AUDIENCE
              - text: "]"
          - generic [ref=e957]:
            - heading "Completion type" [level=4] [ref=e958]
            - generic [ref=e959]:
              - text: "["
              - link "edit" [ref=e960] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=24
              - text: "]"
          - paragraph [ref=e961]:
            - text: A fill-in-the-blank item provides a test taker with identifying characteristics and requires the test taker to recall the correct term.
            - superscript [ref=e962]:
              - link "[41]" [ref=e963] [cursor=pointer]:
                - /url: "#cite_note-MFO_Topic_C5:_Developing_Test_Questions-41"
            - text: There are two types of fill-in-the-blank tests. The easier version provides a word bank of possible words that will fill in the blanks. For some exams all words in the word bank are used exactly once. If a teacher wanted to create a test of medium difficulty, they would provide a test with a word bank, but some words may be used more than once and others not at all. The hardest variety of such a test is a fill-in-the-blank test in which no word bank is provided at all. This generally requires a higher level of understanding and memory than a multiple-choice test. Because of this, fill-in-the-blank tests with no word bank are often feared by students.
          - generic [ref=e964]:
            - heading "Essay" [level=4] [ref=e965]
            - generic [ref=e966]:
              - text: "["
              - link "edit" [ref=e967] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=25
              - text: "]"
          - note [ref=e968]:
            - text: "See also:"
            - link "Free response question" [ref=e969] [cursor=pointer]:
              - /url: /wiki/Free_response_question
            - text: and
            - link "Essay" [ref=e970] [cursor=pointer]:
              - /url: /wiki/Essay
          - paragraph [ref=e971]:
            - text: Items such as short answer or essay typically require a test taker to write a response to fulfill the requirements of the item. In administrative terms, essay items take less time to construct.
            - superscript [ref=e972]:
              - link "[40]" [ref=e973] [cursor=pointer]:
                - /url: "#cite_note-Types_of_Test_Item_Formats-40"
            - text: As an assessment tool, essay items can test complex learning objectives as well as processes used to answer the question. The items can also provide a more realistic and generalizable task for test. Finally, these items make it difficult for test takers to guess the correct answers and require test takers to demonstrate their writing skills as well as correct spelling and grammar.
          - paragraph [ref=e974]:
            - text: "The difficulties with essay items are primarily administrative: for example, test takers require adequate time to be able to compose their answers."
            - superscript [ref=e975]:
              - link "[40]" [ref=e976] [cursor=pointer]:
                - /url: "#cite_note-Types_of_Test_Item_Formats-40"
            - text: When these questions are answered, the answers themselves are usually poorly written because test takers may not have time to organize and proofread their answers. In turn, it takes more time to score or grade these items. When these items are being scored or graded, the grading process itself becomes subjective as non-test related information may influence the process. Thus, considerable effort is required to minimize the subjectivity of the grading process. Finally, as an assessment tool, essay questions may potentially be unreliable in assessing the entire content of a subject matter.
          - paragraph [ref=e977]:
            - text: "Instructions to exam candidates rely on the use of command words, which direct the examinee to respond in a particular way, for example by describing or defining a concept, or comparing and contrasting two or more scenarios or events. Some command words require more insight or skill than others: for example, \"analyse\" and \"synthesise\" assess higher-level skills than \"describe\"."
            - superscript [ref=e978]:
              - link "[42]" [ref=e979] [cursor=pointer]:
                - /url: "#cite_note-42"
            - text: More demanding command words usually attract greater mark weighting in the examination. In the UK,
            - link "Ofqual" [ref=e980] [cursor=pointer]:
              - /url: /wiki/Ofqual
            - text: maintains an official list of command words explaining their meaning.
            - superscript [ref=e981]:
              - link "[43]" [ref=e982] [cursor=pointer]:
                - /url: "#cite_note-43"
            - text: The
            - link "Welsh government" [ref=e983] [cursor=pointer]:
              - /url: /wiki/Welsh_government
            - text: "'s guidance on the use of command words advises that they should be used \"consistently and correctly\", but notes that some subjects have their own traditions and expectations in regard to candidates' responses,"
            - superscript [ref=e984]:
              - link "[44]" [ref=e985] [cursor=pointer]:
                - /url: "#cite_note-44"
            - text: and Cambridge Assessment notes that in some cases, subject-specific command words may be in used.
            - superscript [ref=e986]:
              - link "[45]" [ref=e987] [cursor=pointer]:
                - /url: "#cite_note-45"
          - generic [ref=e988]:
            - heading "Quizzes" [level=4] [ref=e989]
            - generic [ref=e990]:
              - text: "["
              - link "edit" [ref=e991] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=26
              - text: "]"
          - note [ref=e992]:
            - text: "See also:"
            - link "Quiz" [ref=e993] [cursor=pointer]:
              - /url: /wiki/Quiz
          - paragraph [ref=e994]:
            - text: A
            - link "quiz" [ref=e995] [cursor=pointer]:
              - /url: /wiki/Quiz
            - text: is a brief assessment which may cover a small amount of material that was given in a class. Some of them cover two to three lectures that were given in a period of times as a reading section or a given exercise in were the most important part of the class was summarize. However, a simple quiz usually does not count very much, and instructors usually provide this type of test as a formative assessment to help determine whether the student is learning the material. In addition, doing this at the time the instructor collected all can make a significant part of the final course grade.
            - superscript [ref=e996]:
              - link "[46]" [ref=e997] [cursor=pointer]:
                - /url: "#cite_note-46"
          - generic [ref=e998]:
            - heading "Mathematical questions" [level=4] [ref=e999]
            - generic [ref=e1000]:
              - text: "["
              - link "edit" [ref=e1001] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=27
              - text: "]"
          - paragraph [ref=e1002]:
            - text: Most
            - link "mathematics" [ref=e1003] [cursor=pointer]:
              - /url: /wiki/Mathematics
            - text: questions, or calculation questions from subjects such as
            - link "chemistry" [ref=e1004] [cursor=pointer]:
              - /url: /wiki/Chemistry
            - text: ","
            - link "physics" [ref=e1005] [cursor=pointer]:
              - /url: /wiki/Physics
            - text: ", or"
            - link "economics" [ref=e1006] [cursor=pointer]:
              - /url: /wiki/Economics
            - text: employ a style which does not fall into any of the above categories, although some papers, notably the
            - link "Maths Challenge" [ref=e1007] [cursor=pointer]:
              - /url: /wiki/United_Kingdom_Mathematics_Trust#Mathematical_Challenges
            - text: papers in the
            - link "United Kingdom" [ref=e1008] [cursor=pointer]:
              - /url: /wiki/United_Kingdom
            - text: employ multiple choice. Instead, most mathematics questions state a
            - link "mathematical problem" [ref=e1009] [cursor=pointer]:
              - /url: /wiki/Mathematical_problem
            - text: or
            - link "exercise" [ref=e1010] [cursor=pointer]:
              - /url: /wiki/Exercise_(mathematics)
            - text: that requires a student to write a freehand response. Marks are given more for the steps taken than for the correct answer. If the question has multiple parts, later parts may use answers from previous sections, and marks may be granted if an earlier incorrect answer was used but the correct method was followed, and an answer which is correct (given the incorrect input) is returned.
          - paragraph [ref=e1011]:
            - text: Higher-level mathematical papers may include variations on true/false, where the candidate is given a statement and asked to verify its validity by direct proof or stating a
            - link "counterexample" [ref=e1012] [cursor=pointer]:
              - /url: /wiki/Counterexample
            - text: .
          - generic [ref=e1013]:
            - heading "Open-book tests" [level=4] [ref=e1014]
            - generic [ref=e1015]:
              - text: "["
              - link "edit" [ref=e1016] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=28
              - text: "]"
          - paragraph [ref=e1017]:
            - text: Though not as popular as the closed-book test, open-book (or open-note) tests are slowly rising in popularity. An open-book test allows the test taker to access textbooks and all of their notes while taking the test.
            - superscript [ref=e1018]:
              - link "[47]" [ref=e1019] [cursor=pointer]:
                - /url: "#cite_note-47"
            - text: The questions asked on open-book exams are typically more thought provoking and intellectual than questions on a closed-book exam. Rather than testing what facts test takers know, open-book exams force them to apply the facts to a broader question. The main benefit that is seen from open-book tests is that they are a better preparation for the real world where one does not have to memorize and has anything they need at their disposal.
            - superscript [ref=e1020]:
              - link "[48]" [ref=e1021] [cursor=pointer]:
                - /url: "#cite_note-48"
          - generic [ref=e1022]:
            - heading "Oral tests" [level=3] [ref=e1023]
            - generic [ref=e1024]:
              - text: "["
              - link "edit" [ref=e1025] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=29
              - text: "]"
          - note [ref=e1026]:
            - text: "Main article:"
            - link "Oral exam" [ref=e1027] [cursor=pointer]:
              - /url: /wiki/Oral_exam
          - paragraph [ref=e1028]: An oral test is a test that is answered orally (verbally). The teacher or oral test assessor will verbally ask a question to a student, who will then answer it using words.
          - generic [ref=e1029]:
            - heading "Physical fitness tests" [level=3] [ref=e1030]
            - generic [ref=e1031]:
              - text: "["
              - link "edit" [ref=e1032] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=30
              - text: "]"
          - figure "A Minnesota National Guardsman performs pushups during a physical fitness test." [ref=e1033]:
            - link [ref=e1034] [cursor=pointer]:
              - /url: /wiki/File:APFT-JH-12-19.jpg
              - img [ref=e1035]
            - generic [ref=e1036]: A Minnesota National Guardsman performs pushups during a physical fitness test.
          - paragraph [ref=e1037]:
            - text: A physical fitness test is a test designed to measure
            - link "physical strength" [ref=e1038] [cursor=pointer]:
              - /url: /wiki/Physical_strength
            - text: ","
            - link "agility" [ref=e1039] [cursor=pointer]:
              - /url: /wiki/Sport_agility
            - text: ", and"
            - link "endurance" [ref=e1040] [cursor=pointer]:
              - /url: /wiki/Endurance
            - text: . They are commonly employed in educational institutions as part of the
            - link "physical education" [ref=e1041] [cursor=pointer]:
              - /url: /wiki/Physical_education
            - text: curriculum, in medicine as part of diagnostic testing, and as eligibility requirements in fields that focus on physical ability such as
            - link "military" [ref=e1042] [cursor=pointer]:
              - /url: /wiki/Military
            - text: or
            - link "police" [ref=e1043] [cursor=pointer]:
              - /url: /wiki/Police
            - text: . Throughout the 20th century, scientific evidence emerged demonstrating the usefulness of
            - link "strength training" [ref=e1044] [cursor=pointer]:
              - /url: /wiki/Strength_training
            - text: and
            - link "aerobic exercise" [ref=e1045] [cursor=pointer]:
              - /url: /wiki/Aerobic_exercise
            - text: in maintaining overall health, and more agencies began to incorporate standardized fitness testing. In the
            - link "United States" [ref=e1046] [cursor=pointer]:
              - /url: /wiki/United_States
            - text: ", the"
            - link "President's Council on Youth Fitness" [ref=e1047] [cursor=pointer]:
              - /url: /wiki/President%27s_Council_on_Physical_Fitness_and_Sports
            - text: was established in 1956 as a way to encourage and monitor fitness in schoolchildren.
          - paragraph [ref=e1048]:
            - text: Common tests
            - superscript [ref=e1049]:
              - link "[49]" [ref=e1050] [cursor=pointer]:
                - /url: "#cite_note-49"
            - superscript [ref=e1051]:
              - link "[50]" [ref=e1052] [cursor=pointer]:
                - /url: "#cite_note-50"
            - superscript [ref=e1053]:
              - link "[51]" [ref=e1054] [cursor=pointer]:
                - /url: "#cite_note-51"
            - text: include timed
            - link "running" [ref=e1055] [cursor=pointer]:
              - /url: /wiki/Running
            - text: or the
            - link "multi-stage fitness test" [ref=e1056] [cursor=pointer]:
              - /url: /wiki/Multi-stage_fitness_test
            - text: (commonly known as the "beep test"), and numbers of
            - link "push-ups" [ref=e1057] [cursor=pointer]:
              - /url: /wiki/Push-up
            - text: ","
            - link "sit-ups" [ref=e1058] [cursor=pointer]:
              - /url: /wiki/Sit-up_(exercise)
            - text: /
            - link "abdominal crunches" [ref=e1059] [cursor=pointer]:
              - /url: /wiki/Abdominal_crunch
            - text: ", and"
            - link "pull-ups" [ref=e1060] [cursor=pointer]:
              - /url: /wiki/Pull-up_(exercise)
            - text: that the individual can perform. More specialised tests may be used to test ability to perform a particular job or role. Many gyms, private organisations and event organizers have their own fitness tests. Using military techniques developed by the British Army and modern test like Illinois Agility Run and Cooper Test.
            - superscript [ref=e1061]:
              - link "[52]" [ref=e1062] [cursor=pointer]:
                - /url: "#cite_note-52"
          - paragraph [ref=e1063]:
            - text: Stop watch timing was common until recent years when hand timing had proven to be inaccurate and inconsistent.
            - superscript [ref=e1064]:
              - link "[53]" [ref=e1065] [cursor=pointer]:
                - /url: "#cite_note-53"
            - text: Electronic timing is the new standard in order to promote accuracy and consistency, and lessen bias.
            - superscript [ref=e1066]:
              - text: "["
              - link "citation needed" [ref=e1068] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - generic [ref=e1069]:
            - heading "Performance tests" [level=3] [ref=e1070]
            - generic [ref=e1071]:
              - text: "["
              - link "edit" [ref=e1072] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=31
              - text: "]"
          - paragraph [ref=e1073]:
            - text: A performance test is an assessment that requires an examinee to actually perform a task or activity, rather than simply answering questions referring to specific parts. The purpose is to ensure greater
            - link "fidelity" [ref=e1074] [cursor=pointer]:
              - /url: /wiki/Fidelity
            - text: to what is being tested.
          - paragraph [ref=e1075]: An example is a behind-the-wheel driving test to obtain a driver's license. Rather than only answering simple multiple-choice items regarding the driving of an automobile, a student is required to actually drive one while being evaluated.
          - paragraph [ref=e1076]:
            - text: Performance tests are commonly used in workplace and professional applications, such as professional certification and
            - link "licensure" [ref=e1077] [cursor=pointer]:
              - /url: /wiki/Licensure
            - text: . When used for personnel selection, the tests might be referred to as a work sample. A licensure example would be cosmetologists being required to demonstrate a haircut or manicure on a live person. The
            - link "Group–Bourdon test" [ref=e1078] [cursor=pointer]:
              - /url: /wiki/Bourdon%E2%80%93Wiersma_test
            - text: is one of a number of
            - link "psychometric" [ref=e1079] [cursor=pointer]:
              - /url: /wiki/Psychometrics
            - text: tests which trainee train drivers in the UK are required to pass.
            - superscript [ref=e1080]:
              - link "[54]" [ref=e1081] [cursor=pointer]:
                - /url: "#cite_note-54"
          - paragraph [ref=e1082]:
            - text: Some performance tests are simulations. For instance, the assessment to become certified as an ophthalmic technician includes two components, a multiple-choice examination and a computerized skill simulation. The examinee must demonstrate the ability to complete seven tasks commonly performed on the job, such as
            - link "retinoscopy" [ref=e1083] [cursor=pointer]:
              - /url: /wiki/Retinoscopy
            - text: ", that are simulated on a computer."
          - generic [ref=e1084]:
            - heading "Midterms and finals" [level=2] [ref=e1085]
            - generic [ref=e1086]:
              - text: "["
              - link "edit" [ref=e1087] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=32
              - text: "]"
          - generic [ref=e1088]:
            - heading "Midterm exam" [level=3] [ref=e1089]
            - generic [ref=e1090]:
              - text: "["
              - link "edit" [ref=e1091] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=33
              - text: "]"
          - paragraph [ref=e1092]:
            - text: A midterm exam, is an exam given near the middle of an academic
            - link "grading" [ref=e1093] [cursor=pointer]:
              - /url: /wiki/Grading_in_education
            - text: term, or near the middle of any given
            - link "quarter" [ref=e1094] [cursor=pointer]:
              - /url: /wiki/Academic_quarter_(year_division)
            - text: or
            - link "semester" [ref=e1095] [cursor=pointer]:
              - /url: /wiki/Semester
            - text: .
            - superscript [ref=e1096]:
              - link "[55]" [ref=e1097] [cursor=pointer]:
                - /url: "#cite_note-55"
            - text: Midterm exams are a type of
            - link "formative" [ref=e1098] [cursor=pointer]:
              - /url: /wiki/Formative_assessment
            - text: or
            - link "summative assessment" [ref=e1099] [cursor=pointer]:
              - /url: /wiki/Summative_assessment
            - text: .
            - superscript [ref=e1100]:
              - link "[56]" [ref=e1101] [cursor=pointer]:
                - /url: "#cite_note-56"
          - generic [ref=e1102]:
            - heading "Final examination" [level=3] [ref=e1103]
            - generic [ref=e1104]:
              - text: "["
              - link "edit" [ref=e1105] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=34
              - text: "]"
          - paragraph [ref=e1106]:
            - text: A final examination, annual, exam, final interview, or simply final, is a
            - link "test" [ref=e1107] [cursor=pointer]:
              - /url: /wiki/Test_(assessment)
            - text: given to students at the end of a course of study or training. Although the term can be used in the context of physical training, it most often occurs in the academic world. Most
            - link "high schools" [ref=e1108] [cursor=pointer]:
              - /url: /wiki/High_school
            - text: ","
            - link "colleges" [ref=e1109] [cursor=pointer]:
              - /url: /wiki/College
            - text: ", and"
            - link "universities" [ref=e1110] [cursor=pointer]:
              - /url: /wiki/University
            - text: run final exams at the end of a particular
            - link "academic term" [ref=e1111] [cursor=pointer]:
              - /url: /wiki/Academic_term
            - text: ", typically a"
            - link "quarter" [ref=e1112] [cursor=pointer]:
              - /url: /wiki/Academic_quarter_(year_division)
            - text: or
            - link "semester" [ref=e1113] [cursor=pointer]:
              - /url: /wiki/Academic_term
            - text: ", or more traditionally at the end of a complete degree course."
          - generic [ref=e1114]:
            - heading "Isolated purpose and common practice" [level=4] [ref=e1115]
            - generic [ref=e1116]:
              - text: "["
              - link "edit" [ref=e1117] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=35
              - text: "]"
          - paragraph [ref=e1118]:
            - text: The purpose of the test is to make a final review of the topics covered and assessment of each student's knowledge of the
            - link "subject" [ref=e1119] [cursor=pointer]:
              - /url: /wiki/Course_(education)
            - text: . A final is technically just a greater form of a "unit test". They have the same purpose; finals are simply larger. Not all courses or curricula culminate in a final exam; instructors may assign a
            - link "term paper" [ref=e1120] [cursor=pointer]:
              - /url: /wiki/Term_paper
            - text: or final project in some courses. The weighting of the final exam also varies. It may be the largest—or only—factor in the student's course grade; in other cases, it may carry the same weight as a midterm exam, or the student may be exempted. Not all finals need be cumulative, however, as some simply cover the material presented since the last exam. For example, a microbiology course might only cover fungi and parasites on the final exam if this were the policy of the professor, and all other subjects presented in the course would then not be tested on the final exam.
          - paragraph [ref=e1121]:
            - text: Prior to the examination period most students in the
            - link "Commonwealth" [ref=e1122] [cursor=pointer]:
              - /url: /wiki/Commonwealth_of_Nations
            - text: have a week or so of intense
            - link "revision" [ref=e1123] [cursor=pointer]:
              - /url: /wiki/Cramming_(memorization)
            - text: and study known as
            - link "swotvac" [ref=e1124] [cursor=pointer]:
              - /url: /wiki/Swotvac
            - text: .
          - paragraph [ref=e1125]:
            - text: In the
            - link "UK" [ref=e1126] [cursor=pointer]:
              - /url: /wiki/United_Kingdom
            - text: ", most universities hold a single set of \"Finals\" at the end of the entire degree course. In"
            - link "Australia" [ref=e1127] [cursor=pointer]:
              - /url: /wiki/Australia
            - text: ", the exam period varies, with high schools commonly assigning one or two weeks for final exams, but the university period—sometimes called \"exam week\" or just \"exams\"—may stretch to a maximum of three weeks."
          - paragraph [ref=e1128]:
            - text: Practice varies widely in the
            - link "United States" [ref=e1129] [cursor=pointer]:
              - /url: /wiki/United_States
            - text: ; "finals" or the "finals period" at the university level constitutes two or three weeks after the end of the academic term, but sometimes exams are administered in the last week of instruction. Some institutions designate a "study week" or "reading period" between the end of instruction and the beginning of finals, during which no examinations may be administered. Students at many institutions know the week before finals as "
            - link "dead week" [ref=e1130] [cursor=pointer]:
              - /url: /wiki/Dead_week
            - text: ." Most final exams incorporate the reading material that has been assigned throughout the term.
          - paragraph [ref=e1131]:
            - text: Though common in
            - link "French" [ref=e1132] [cursor=pointer]:
              - /url: /wiki/France
            - link "tertiary institutions" [ref=e1133] [cursor=pointer]:
              - /url: /wiki/Tertiary_education
            - text: ", final exams are not often assigned in French high schools. However, French high school students hoping to continue their studies at university level will sit a national exam, known as the"
            - link "Baccalauréat" [ref=e1134] [cursor=pointer]:
              - /url: /wiki/Baccalaur%C3%A9at
            - text: .
          - paragraph [ref=e1135]: In some countries and locales that hold standardised exams, it is customary for schools to administer mock examinations, with formats modelling the real exam. Students from different schools are often seen exchanging mock papers as a means of test preparation.
          - generic [ref=e1136]:
            - heading "Take-home finals" [level=4] [ref=e1137]
            - generic [ref=e1138]:
              - text: "["
              - link "edit" [ref=e1139] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=36
              - text: "]"
          - paragraph [ref=e1140]:
            - text: A take-home final is an examination at the end of an academic term that is usually too long or complex to be completed in a single session as an in-class final. There is usually a deadline for completion, such as within one or two weeks of the end of the semester. A take-home final differs from a final paper, often involving research, extended texts and display of data.
            - superscript [ref=e1141]:
              - text: "["
              - link "citation needed" [ref=e1143] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - generic [ref=e1144]:
            - heading "Schedule" [level=4] [ref=e1145]
            - generic [ref=e1146]:
              - text: "["
              - link "edit" [ref=e1147] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=37
              - text: "]"
          - paragraph [ref=e1148]:
            - text: In some cases, schools will run on a modified schedule for final exams to allow students more time to do their exams. However, this is not necessarily the case for every institution.
            - superscript [ref=e1149]:
              - text: "["
              - link "citation needed" [ref=e1151] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - generic [ref=e1152]:
            - heading "Preparations" [level=2] [ref=e1153]
            - generic [ref=e1154]:
              - text: "["
              - link "edit" [ref=e1155] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=38
              - text: "]"
          - paragraph [ref=e1156]: From the perspective of a test developer, there is great variability with respect to time and effort needed to prepare a test. Likewise, from the perspective of a test taker, there is also great variability with respect to the time and effort needed to obtain a desired grade or score on any given test. When a test developer constructs a test, the amount of time and effort is dependent upon the significance of the test itself, the proficiency of the test taker, the format of the test, class size, deadline of the test, and experience of the test developer.
          - paragraph [ref=e1157]:
            - text: The process of test construction has been aided in several ways. For one, many test developers were themselves students at one time, and therefore are able to modify or outright adopt questions from their previous tests. In some countries, book publishers often provide teaching packages that include test banks to university instructors who adopt their published books for their courses.
            - superscript [ref=e1158]:
              - link "[57]" [ref=e1159] [cursor=pointer]:
                - /url: "#cite_note-57"
            - text: These test banks may contain up to four thousand sample test questions that have been peer-reviewed and time-tested. The instructor who chooses to use this testbank would only have to select a fixed number of test questions from this test bank to construct a test.
          - paragraph [ref=e1160]:
            - text: As with test constructions, the time needed for a test taker to prepare for a test is dependent upon the frequency of the test, the test developer, and the significance of the test. In general, nonstandardized tests that are short, frequent, and do not constitute a major portion of the test taker's overall course grade or score do not require the test taker to spend much time preparing for the test.
            - superscript [ref=e1161]:
              - link "[58]" [ref=e1162] [cursor=pointer]:
                - /url: "#cite_note-How_to_study_for_Quizzes_and_Exams_in_Biochemistry-58"
            - text: Conversely, nonstandardized tests that are long, infrequent, and do constitute a major portion of the test taker's overall course grade or score usually require the test taker to spend great amounts of time preparing for the test. To prepare for a nonstandardized test, test takers may rely upon their reference books, class or lecture notes, Internet, and past experience. Test takers may also use various learning aids to study for tests such as
            - link "flashcards" [ref=e1163] [cursor=pointer]:
              - /url: /wiki/Flashcard
            - text: and
            - link "mnemonics" [ref=e1164] [cursor=pointer]:
              - /url: /wiki/Mnemonics
            - text: .
            - superscript [ref=e1165]:
              - link "[59]" [ref=e1166] [cursor=pointer]:
                - /url: "#cite_note-59"
            - text: Test takers may even hire tutors to coach them through the process so that they may increase the probability of obtaining a desired test grade or score. In countries such as the
            - link "United Kingdom" [ref=e1167] [cursor=pointer]:
              - /url: /wiki/United_Kingdom
            - text: ", demand for private tuition has increased significantly in recent years."
            - superscript [ref=e1168]:
              - link "[60]" [ref=e1169] [cursor=pointer]:
                - /url: "#cite_note-60"
            - text: Finally, test takers may rely upon past copies of a test from previous years or semesters to study for a future test. These past tests may be provided by a friend or a group that has copies of previous tests or by instructors and their institutions, or by the test provider (such as an
            - link "examination board" [ref=e1170] [cursor=pointer]:
              - /url: /wiki/Examination_board
            - text: ) itself.
            - superscript [ref=e1171]:
              - link "[61]" [ref=e1172] [cursor=pointer]:
                - /url: "#cite_note-61"
            - superscript [ref=e1173]:
              - link "[62]" [ref=e1174] [cursor=pointer]:
                - /url: "#cite_note-62"
          - paragraph [ref=e1175]:
            - text: Unlike a nonstandardized test, the time needed by test takers to prepare for standardized tests is less variable and usually considerable. This is because standardized tests are usually uniform in scope, format, and difficulty and often have important consequences with respect to a test taker's future such as a test taker's eligibility to attend a specific university program or to enter a desired profession. It is not unusual for test takers to prepare for standardized tests by relying upon commercially available books that provide in-depth coverage of the standardized test or compilations of previous tests (e.g.,
            - link "ten year series" [ref=e1176] [cursor=pointer]:
              - /url: /wiki/Ten_year_series
            - text: in Singapore). In many countries, test takers even enroll in test preparation centers or
            - link "cram schools" [ref=e1177] [cursor=pointer]:
              - /url: /wiki/Cram_schools
            - text: that provide extensive or supplementary instructions to test takers to help them better prepare for a standardized test. In Hong Kong, it has been suggested that the tutors running such centers are celebrities in their own right.
            - superscript [ref=e1178]:
              - link "[63]" [ref=e1179] [cursor=pointer]:
                - /url: "#cite_note-63"
            - text: This has led to private tuition being a popular career choice for new graduates in developed economies.
            - superscript [ref=e1180]:
              - link "[64]" [ref=e1181] [cursor=pointer]:
                - /url: "#cite_note-64"
            - superscript [ref=e1182]:
              - link "[65]" [ref=e1183] [cursor=pointer]:
                - /url: "#cite_note-65"
            - text: Finally, in some countries, instructors and their institutions have also played a significant role in preparing test takers for a standardized test.
          - generic [ref=e1184]:
            - heading "Cheating" [level=2] [ref=e1185]
            - generic [ref=e1186]:
              - text: "["
              - link "edit" [ref=e1187] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=39
              - text: "]"
          - figure "Invigilators may oversee a test to reduce cheating methods such as copying." [ref=e1188]:
            - link [ref=e1189] [cursor=pointer]:
              - /url: /wiki/File:US_Navy_120119-N-GZ832-006_Chief_Damage_Controlman_Ty_Griffin_proctors_the_chief_petty_officer_exam_aboard_the_Nimitz-class_aircraft_carrier_USS_Ca.jpg
              - img [ref=e1190]
            - generic [ref=e1191]:
              - link "Invigilators" [ref=e1192] [cursor=pointer]:
                - /url: /wiki/Exam_invigilator
              - text: may oversee a test to reduce cheating methods such as copying.
          - paragraph [ref=e1193]:
            - link "Cheating" [ref=e1194] [cursor=pointer]:
              - /url: /wiki/Cheating
            - text: on a test is the process of using unauthorized means or methods to obtain a desired test score or grade. This may range from bringing and using notes during a closed book examination, to copying another test taker's answer or choice of answers during an individual test, to sending a paid proxy to take the test.
            - superscript [ref=e1195]:
              - link "[66]" [ref=e1196] [cursor=pointer]:
                - /url: "#cite_note-66"
          - paragraph [ref=e1197]:
            - text: Several common methods have been employed to combat cheating. They include the use of multiple proctors or invigilators during a testing period to monitor test takers. Test developers may construct multiple variants of the same test to be administered to different test takers at the same time, or write tests with few multiple-choice options, based on the theory that fully worked answers are difficult to imitate.
            - superscript [ref=e1198]:
              - link "[67]" [ref=e1199] [cursor=pointer]:
                - /url: "#cite_note-67"
            - text: In some cases, instructors themselves may not administer their own tests but will leave the task to other instructors or invigilators, which may mean that the invigilators do not know the candidates, and thus some form of identification may be required. Finally, instructors or test providers may compare the answers of suspected cheaters on the test themselves to determine whether cheating did occur.
          - generic [ref=e1200]:
            - heading "See also" [level=2] [ref=e1201]
            - generic [ref=e1202]:
              - text: "["
              - link "edit" [ref=e1203] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=40
              - text: "]"
          - generic [ref=e1205]:
            - link "Wikisource logo" [ref=e1208] [cursor=pointer]:
              - /url: /wiki/File:Wikisource-logo.svg
              - img "Wikisource logo" [ref=e1209]
            - generic [ref=e1210]:
              - link "Wikisource" [ref=e1211] [cursor=pointer]:
                - /url: /wiki/Wikisource
              - text: has the text of the
              - link "1911 Encyclopædia Britannica" [ref=e1212] [cursor=pointer]:
                - /url: /wiki/Encyclop%C3%A6dia_Britannica_Eleventh_Edition
              - text: article "
              - link "Examinations" [ref=e1214] [cursor=pointer]:
                - /url: https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Examinations
              - text: "\"."
          - list [ref=e1216]:
            - listitem [ref=e1217]:
              - link "Academic dishonesty" [ref=e1218] [cursor=pointer]:
                - /url: /wiki/Academic_dishonesty
              - text: – Any type of cheating that occurs in relation to a formal academic exercise
            - listitem [ref=e1219]:
              - link "Homework" [ref=e1220] [cursor=pointer]:
                - /url: /wiki/Homework
              - text: ", also known as Assignment (education) – Educational practice"
            - listitem [ref=e1221]:
              - link "Bar examination" [ref=e1222] [cursor=pointer]:
                - /url: /wiki/Bar_examination
              - text: – Test required to practice law in a specific jurisdiction
            - listitem [ref=e1223]:
              - link "Blue book exam" [ref=e1224] [cursor=pointer]:
                - /url: /wiki/Blue_book_exam
              - text: – Type of exam in the United States, used in free response exams
            - listitem [ref=e1225]:
              - link "Computerized adaptive testing" [ref=e1226] [cursor=pointer]:
                - /url: /wiki/Computerized_adaptive_testing
              - text: – Form of computer-based test that adapts to the examinee's ability level
            - listitem [ref=e1227]:
              - link "Computerized classification test" [ref=e1228] [cursor=pointer]:
                - /url: /wiki/Computerized_classification_test
            - listitem [ref=e1229]:
              - link "Concept inventory" [ref=e1230] [cursor=pointer]:
                - /url: /wiki/Concept_inventory
              - text: – Knowledge assessment tool
            - listitem [ref=e1231]:
              - link "Cooper test" [ref=e1232] [cursor=pointer]:
                - /url: /wiki/Cooper_test
              - text: – Physical fitness test, used by Law, Military, and Fire services
            - listitem [ref=e1233]:
              - link "Credential" [ref=e1234] [cursor=pointer]:
                - /url: /wiki/Credential
              - text: – Document proving authority or qualification
            - listitem [ref=e1235]:
              - link "Driver's license" [ref=e1236] [cursor=pointer]:
                - /url: /wiki/Driver%27s_license
              - text: – Document allowing one to drive a motorized vehicle
            - listitem [ref=e1237]:
              - link "Electronic assessment" [ref=e1238] [cursor=pointer]:
                - /url: /wiki/Electronic_assessment
              - text: – Use of information technology in assessment
            - listitem [ref=e1239]:
              - link "E-scape" [ref=e1240] [cursor=pointer]:
                - /url: /wiki/E-scape
              - text: ", a technology and approach that looks specifically at the assessment of creativity and collaboration."
            - listitem [ref=e1241]:
              - link "Educational software" [ref=e1242] [cursor=pointer]:
                - /url: /wiki/Educational_software
              - text: – Software intended for an educational purpose
            - listitem [ref=e1243]:
              - link "Examination hell" [ref=e1244] [cursor=pointer]:
                - /url: /wiki/Examination_hell
              - text: – Annual educational event in Japan
            - listitem [ref=e1245]:
              - link "Test anxiety" [ref=e1246] [cursor=pointer]:
                - /url: /wiki/Test_anxiety
              - text: – Anxiety or stress triggered by exams
            - listitem [ref=e1247]:
              - link "General Educational Development" [ref=e1248] [cursor=pointer]:
                - /url: /wiki/General_Educational_Development
              - text: – High school diploma test
            - listitem [ref=e1249]:
              - link "Grading in education" [ref=e1250] [cursor=pointer]:
                - /url: /wiki/Grading_in_education
              - text: – Standardized measurement of academic performance
            - listitem [ref=e1251]:
              - link "Harvard step test" [ref=e1252] [cursor=pointer]:
                - /url: /wiki/Harvard_step_test
              - text: – Fitness test, a cardiovascular test
            - listitem [ref=e1253]:
              - link "Law" [ref=e1254] [cursor=pointer]:
                - /url: /wiki/Law
              - list [ref=e1255]:
                - listitem [ref=e1256]:
                  - link "Cross-examination" [ref=e1257] [cursor=pointer]:
                    - /url: /wiki/Cross-examination
