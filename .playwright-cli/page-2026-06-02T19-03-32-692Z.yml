          - figure "American students in a computer fundamentals class taking an online test in 2001" [ref=e250]:
            - link [ref=e251] [cursor=pointer]:
              - /url: /wiki/File:Students_taking_computerized_exam.jpg
              - img [ref=e252]
            - generic [ref=e253]:
              - link "American" [ref=e254] [cursor=pointer]:
                - /url: /wiki/United_States
              - text: students in a computer fundamentals class taking an online test in 2001
          - paragraph [ref=e255]:
            - text: An examination (exam or evaluation), or test, is an
            - link "educational assessment" [ref=e256] [cursor=pointer]:
              - /url: /wiki/Educational_assessment
            - text: intended to measure a test-taker's
            - link "knowledge" [ref=e257] [cursor=pointer]:
              - /url: /wiki/Knowledge
            - text: ","
            - link "skill" [ref=e258] [cursor=pointer]:
              - /url: /wiki/Skill
            - text: ","
            - link "aptitude" [ref=e259] [cursor=pointer]:
              - /url: /wiki/Aptitude
            - text: ","
            - link "physical fitness" [ref=e260] [cursor=pointer]:
              - /url: /wiki/Physical_fitness
            - text: ", or classification in many other topics (e.g.,"
            - link "beliefs" [ref=e261] [cursor=pointer]:
              - /url: /wiki/Belief
            - text: ).
            - superscript [ref=e262]:
              - link "[1]" [ref=e263] [cursor=pointer]:
                - /url: "#cite_note-1"
            - text: A test may be administered
            - link "verbally" [ref=e264] [cursor=pointer]:
              - /url: /wiki/Oral_exam
            - text: ", on"
            - link "paper" [ref=e265] [cursor=pointer]:
              - /url: /wiki/Paper
            - text: ", on a"
            - link "computer" [ref=e266] [cursor=pointer]:
              - /url: /wiki/Computer-adaptive_testing
            - text: ", or in a predetermined area that requires a test taker to demonstrate or perform a set of skills."
          - paragraph [ref=e267]: Tests vary in style, rigor and requirements. There is no general consensus or invariable standard for test formats and difficulty. Often, the format and difficulty of the test is dependent upon the educational philosophy of the instructor, subject matter, class size, policy of the educational institution, and requirements of accreditation or governing bodies.
          - paragraph [ref=e268]:
            - text: A test may be administered formally or informally. An example of an informal test is a reading test administered by a parent to a child. A formal test might be a
            - link "final examination" [ref=e269] [cursor=pointer]:
              - /url: /wiki/Final_examination
            - text: administered by a teacher in a classroom or an
            - link "IQ test" [ref=e270] [cursor=pointer]:
              - /url: /wiki/IQ_test
            - text: administered by a psychologist in a clinic. Formal testing often results in a
            - link "grade" [ref=e271] [cursor=pointer]:
              - /url: /wiki/Grading_in_education
            - text: or a
            - link "test score" [ref=e272] [cursor=pointer]:
              - /url: /wiki/Test_score
            - text: .
            - superscript [ref=e273]:
              - link "[2]" [ref=e274] [cursor=pointer]:
                - /url: "#cite_note-2"
            - text: A test score may be interpreted with regard to a
            - link "norm" [ref=e275] [cursor=pointer]:
              - /url: /wiki/Norm-referenced_test
            - text: or
            - link "criterion" [ref=e276] [cursor=pointer]:
              - /url: /wiki/Criterion-referenced_test
            - text: ", or occasionally both. The norm may be established independently, or by"
            - link "statistical" [ref=e277] [cursor=pointer]:
              - /url: /wiki/Statistics
            - text: analysis of a large number of participants.
          - paragraph [ref=e278]:
            - text: A test may be developed and administered by an instructor, a clinician, a governing body, or a test provider. In some instances, the developer of the test may not be directly responsible for its administration. For example, in the United States,
            - link "Educational Testing Service" [ref=e279] [cursor=pointer]:
              - /url: /wiki/Educational_Testing_Service
            - text: (ETS), a nonprofit educational testing and assessment organization, develops standardized tests such as the
            - link "SAT" [ref=e280] [cursor=pointer]:
              - /url: /wiki/SAT
            - text: but may not directly be involved in the administration or proctoring of these tests.
          - generic [ref=e281]:
            - heading "History" [level=2] [ref=e282]
            - generic [ref=e283]:
              - text: "["
              - link "edit" [ref=e284] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=1
              - text: "]"
          - figure "\"The Official Career of Xu Xianqing\" - on the bottom right the imperial examination examinees sit their exam, 1590, Ming dynasty" [ref=e285]:
            - link [ref=e286] [cursor=pointer]:
              - /url: /wiki/File:Xu_Xianqing_part11.jpg
              - img [ref=e287]
            - generic [ref=e288]:
              - text: "\"The Official Career of Xu Xianqing\" - on the bottom right the"
              - link "imperial examination" [ref=e289] [cursor=pointer]:
                - /url: /wiki/Imperial_examination
              - text: examinees sit their exam, 1590,
              - link "Ming dynasty" [ref=e290] [cursor=pointer]:
                - /url: /wiki/Ming_dynasty
          - generic [ref=e291]:
            - heading "Oral and informal examinations" [level=3] [ref=e292]
            - generic [ref=e293]:
              - text: "["
              - link "edit" [ref=e294] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=2
              - text: "]"
          - paragraph [ref=e295]:
            - text: Informal, unofficial, and non-standardized tests and testing systems have existed throughout history. For example, tests of skill such as
            - link "archery contests" [ref=e296] [cursor=pointer]:
              - /url: /wiki/Archery_contest
            - text: have existed in
            - link "China" [ref=e297] [cursor=pointer]:
              - /url: /wiki/China
            - text: since the
            - link "Zhou dynasty" [ref=e298] [cursor=pointer]:
              - /url: /wiki/Zhou_dynasty
            - text: (or, more mythologically,
            - link "Yao" [ref=e299] [cursor=pointer]:
              - /url: /wiki/Yao_(ruler)
            - text: ).
            - superscript [ref=e300]:
              - link "[3]" [ref=e301] [cursor=pointer]:
                - /url: "#cite_note-3"
            - text: Oral exams were administered in various parts of the world including ancient China and Europe. A precursor to the later Chinese
            - link "imperial examinations" [ref=e302] [cursor=pointer]:
              - /url: /wiki/Imperial_examination
            - text: was in place since the
            - link "Han dynasty" [ref=e303] [cursor=pointer]:
              - /url: /wiki/Han_dynasty
            - text: ", during which the"
            - link "Confucian" [ref=e304] [cursor=pointer]:
              - /url: /wiki/Confucian
            - text: characteristic of the examinations was determined. However these examinations did not offer an official avenue to government appointment, the majority of which were filled through recommendations based on qualities such as social status, morals, and ability.
          - generic [ref=e305]:
            - heading "China" [level=3] [ref=e306]
            - generic [ref=e307]:
              - text: "["
              - link "edit" [ref=e308] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=3
              - text: "]"
          - paragraph [ref=e309]:
            - text: Standardized written examinations were first implemented in China. They were commonly known as the
            - link "imperial examinations" [ref=e310] [cursor=pointer]:
              - /url: /wiki/Imperial_examination
            - text: (keju).
          - paragraph [ref=e311]:
            - text: The bureaucratic imperial examinations as a concept has its origins in the year 605 during the short lived
            - link "Sui dynasty" [ref=e312] [cursor=pointer]:
              - /url: /wiki/Sui_dynasty
            - text: . Its successor, the
            - link "Tang dynasty" [ref=e313] [cursor=pointer]:
              - /url: /wiki/Tang_dynasty
            - text: ", implemented imperial examinations on a relatively small scale until the examination system was extensively expanded during the reign of"
            - link "Wu Zetian" [ref=e314] [cursor=pointer]:
              - /url: /wiki/Wu_Zetian
            - text: .
            - superscript [ref=e315]:
              - link "[4]" [ref=e316] [cursor=pointer]:
                - /url: "#cite_note-4"
            - text: Included in the expanded examination system was a military exam that tested physical ability, but the military exam never had a significant impact on the Chinese officer corps and military degrees were seen as inferior to their civil counterpart. The exact nature of Wu's influence on the examination system is still a matter of scholarly debate.
          - paragraph [ref=e317]:
            - text: During the
            - link "Song dynasty" [ref=e318] [cursor=pointer]:
              - /url: /wiki/Song_dynasty
            - text: the emperors expanded both examinations and the government school system, in part to counter the influence of hereditary nobility, increasing the number of degree holders to more than five times that of the Tang. From the Song dynasty onward, the examinations played the primary role in selecting scholar-officials, who formed the literati elite of society. However the examinations co-existed with other forms of recruitment such as direct appointments for the ruling family, nominations, quotas, clerical promotions, sale of official titles, and special procedures for
            - link "eunuchs" [ref=e319] [cursor=pointer]:
              - /url: /wiki/Eunuchs
            - text: ". The regular higher level degree examination cycle was decreed in 1067 to be 3 years but this triennial cycle only existed in nominal terms. In practice both before and after this, the examinations were irregularly implemented for significant periods of time: thus, the calculated statistical averages for the number of degrees conferred annually should be understood in this context. The jinshi exams were not a yearly event and should not be considered so; the annual average figures are a necessary artifact of quantitative analysis."
            - superscript [ref=e320]:
              - link "[5]" [ref=e321] [cursor=pointer]:
                - /url: "#cite_note-5"
            - text: "The operations of the examination system were part of the imperial record keeping system, and the date of receiving the jinshi degree is often a key biographical datum: sometimes the date of achieving jinshi is the only firm date known for even some of the most historically prominent persons in Chinese history."
          - paragraph [ref=e322]:
            - text: A brief interruption to the examinations occurred at the beginning of the Mongol
            - link "Yuan dynasty" [ref=e323] [cursor=pointer]:
              - /url: /wiki/Yuan_dynasty
            - text: in the 13th century, but was later brought back with regional quotas which favored the Mongols and disadvantaged Southern Chinese. During the
            - link "Ming" [ref=e324] [cursor=pointer]:
              - /url: /wiki/Ming_dynasty
            - text: and
            - link "Qing" [ref=e325] [cursor=pointer]:
              - /url: /wiki/Qing_dynasty
            - text: dynasties, the system contributed to the narrow and focused nature of intellectual life and enhanced the autocratic power of the emperor. The system continued with some modifications until its abolition in 1905 during the last years of the Qing dynasty. The modern examination system for selecting civil servants also indirectly evolved from the imperial one.
            - superscript [ref=e326]:
              - link "[6]" [ref=e327] [cursor=pointer]:
                - /url: "#cite_note-6"
          - generic [ref=e328]:
            - heading "Spread" [level=3] [ref=e329]
            - generic [ref=e330]:
              - text: "["
              - link "edit" [ref=e331] [cursor=pointer]:
                - /url: /w/index.php?title=Exam&action=edit&section=4
              - text: "]"
