            - button "Send feedback" [ref=e230] [cursor=pointer]
            - heading "Gmail API overview" [level=1] [ref=e231]
            - generic [ref=e232]:
              - paragraph [ref=e233]: "The Gmail API is a RESTful API that can be used to access Gmail mailboxes and send mail. For most web applications the Gmail API is the best choice for authorized access to a user's Gmail data and is suitable for various applications, such as:"
              - list [ref=e234]:
                - listitem [ref=e235]: Read-only mail extraction, indexing, and backup
                - listitem [ref=e236]: Automated or programmatic message sending
                - listitem [ref=e237]: Email account migration
                - listitem [ref=e238]: Email organization including filtering and sorting of messages
                - listitem [ref=e239]: Standardization of email signatures across an organization
              - heading "Common terms" [level=2] [ref=e240]
              - paragraph [ref=e241]: "The following is a list of common terms used in this API:"
              - generic [ref=e242]:
                - term [ref=e243]:
                  - emphasis [ref=e244]: Delegator and Delegate
                - definition [ref=e245]:
                  - text: A delegator is a Gmail user who grants mailbox access to another user within the same Google Workspace organization. The user receiving this access is the delegate. Delegates can read, send, and delete messages, as well as view and add contacts on behalf of the delegator's account. For more information, see
                  - link "Manage delegates" [ref=e246] [cursor=pointer]:
                    - /url: /workspace/gmail/api/guides/delegate_settings
                  - text: .
                - term [ref=e247]:
                  - emphasis [ref=e248]: Draft
                - definition [ref=e249]:
                  - text: An unsent message. A message contained within the draft can be replaced. Sending a draft automatically deletes the draft and creates a message with the
                  - code [ref=e250]: SENT
                  - text: system label. A draft is represented by the
                  - link "drafts" [ref=e251] [cursor=pointer]:
                    - /url: /workspace/gmail/api/reference/rest/v1/users.drafts
                    - code [ref=e252]: drafts
                  - text: resource. For more information, see
                  - link "Work with drafts" [ref=e253] [cursor=pointer]:
                    - /url: /workspace/gmail/api/guides/drafts
                  - text: .
                - term [ref=e254]:
                  - emphasis [ref=e255]: Filters
                - definition [ref=e256]:
                  - text: Advanced rules configured for an account that evaluate incoming messages against specific matching criteria (like sender, subject, or size). When a message matches, filters automatically trigger actions such as adding or removing labels, or forwarding the email to a specified address. For more information, see
                  - link "Manage filters" [ref=e257] [cursor=pointer]:
                    - /url: /workspace/gmail/api/guides/filter_settings
                  - text: .
                - term [ref=e258]:
                  - emphasis [ref=e259]: Forwarding addresses
                - definition [ref=e260]:
                  - text: Specific, verified email addresses configured to receive auto-forwarded messages from a user's account. Before an address can be used in a forwarding rule or filter, it must be officially registered and verified to prove ownership. For more information, see
                  - link "Manage forwarding" [ref=e261] [cursor=pointer]:
                    - /url: /workspace/gmail/api/guides/forwarding_settings
                  - text: .
                - term [ref=e262]:
                  - emphasis [ref=e263]: Label
                - definition [ref=e264]:
                  - paragraph [ref=e265]:
                    - text: A mechanism for organizing messages and threads. For example, the label "taxes" might be created and applied to all messages and threads having to do with a user's taxes. For more information, see
                    - link "Manage labels" [ref=e266] [cursor=pointer]:
                      - /url: /workspace/gmail/api/guides/labels
                    - text: .
                  - paragraph [ref=e267]: "There are two types of labels:"
                  - generic [ref=e268]:
                    - term [ref=e269]:
                      - emphasis [ref=e270]: System labels
                    - definition [ref=e271]:
                      - text: Internally-created labels, such as
                      - code [ref=e272]: INBOX
                      - text: ","
                      - code [ref=e273]: TRASH
                      - text: ", or"
                      - code [ref=e274]: SPAM
                      - text: . These labels cannot be deleted or modified. However, some system labels, such as
                      - code [ref=e275]: INBOX
                      - text: can be applied to, or removed from, messages and threads.
                    - term [ref=e276]:
                      - emphasis [ref=e277]: User labels
                    - definition [ref=e278]:
                      - text: Labels created by a user. These labels can be deleted or modified by the user or an application. A user label is represented by the
                      - link "labels" [ref=e279] [cursor=pointer]:
                        - /url: /workspace/gmail/api/reference/rest/v1/users.labels
                        - code [ref=e280]: labels
                      - text: resource.
                - term [ref=e281]:
                  - emphasis [ref=e282]: Message
                - definition [ref=e283]:
                  - paragraph [ref=e284]:
                    - text: An email message containing the sender, recipients, subject, and body. Once a message is created, it cannot be changed. A message is represented by the
                    - link "messages" [ref=e285] [cursor=pointer]:
                      - /url: /workspace/gmail/api/reference/rest/v1/users.messages
                      - code [ref=e286]: messages
                    - text: resource.
                - term [ref=e287]:
                  - emphasis [ref=e288]: Push notifications
                - definition [ref=e289]:
                  - paragraph [ref=e290]:
                    - text: A server-side notification system integrating with Google Cloud Pub/Sub. Applications can "watch" a mailbox, and the Gmail API will send automatic webhooks or alerts whenever a change occurs (like a new email arriving), eliminating the need for the app to continuously poll the server for updates. For more information, see
                    - link "Push notifications" [ref=e291] [cursor=pointer]:
                      - /url: /workspace/gmail/api/guides/push
                    - text: .
                - term [ref=e292]:
                  - emphasis [ref=e293]: S/MIME certificates
                - definition [ref=e294]:
                  - paragraph [ref=e295]:
                    - text: Digital certificates uploaded to specific send-as aliases that allow a user to send encrypted and digitally signed emails, ensuring message security and sender authenticity. For more information, see
                    - link "Manage S/MIME certificates" [ref=e296] [cursor=pointer]:
                      - /url: /workspace/gmail/api/guides/smime_certs
                    - text: .
                - term [ref=e297]:
                  - emphasis [ref=e298]: Send-as aliases
                - definition [ref=e299]:
                  - paragraph [ref=e300]:
                    - text: These represent the various email addresses from which an account is authorized to send mail. Every account has at least one alias representing the primary email address. Aliases correspond to the "Send mail as" feature in the Gmail web interface and are also the basis for configuring per-address email signatures. For more information, see
                    - link "Manage aliases" [ref=e301] [cursor=pointer]:
                      - /url: /workspace/gmail/api/guides/alias_and_signature_settings
                    - text: .
                - term [ref=e302]:
                  - emphasis [ref=e303]: Thread
                - definition [ref=e304]:
                  - paragraph [ref=e305]:
                    - text: A collection of related messages forming a conversation. In an email client app, a thread is formed when one or more recipients respond to a message with their own message. For more information, see
                    - link "Manage threads" [ref=e306] [cursor=pointer]:
                      - /url: /workspace/gmail/api/guides/threads
                    - text: .
              - heading "Related topics" [level=2] [ref=e307]
              - list [ref=e308]:
