        - heading "A complete agent loop" [level=3] [ref=e164]:
          - strong [ref=e165]: A complete agent loop
        - paragraph [ref=e166]: Agent → protocol → frontend → user → agent
        - paragraph [ref=e167]: No custom engineering required.
        - heading "A more interpretable agent" [level=3] [ref=e168]:
          - strong [ref=e169]: A more interpretable agent
        - paragraph [ref=e170]: With streaming, intermediate states, and exposed tool use, you can debug and trust the agent in a way plain chat completions don’t allow.
        - heading "This allows a path to build real applications" [level=3] [ref=e171]:
          - strong [ref=e172]: This allows a path to build real applications
        - list [ref=e173]:
