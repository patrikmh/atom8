      - heading "How Microsoft Agent Framework + AG-UI Enable Agentic UX & Generative UI" [level=1] [ref=e60]
      - generic [ref=e61]:
        - generic [ref=e62]:
          - text: By
          - generic [ref=e63]: Nathan Tarbert
        - generic [ref=e65]: November 20, 2025
      - generic [ref=e66]:
        - paragraph [ref=e67]:
          - strong [ref=e68]: Building with the Microsoft Agent Framework + AG-UI, now in Python!
        - paragraph [ref=e69]: Microsoft’s Agent Framework (MAF) is an open-source agent framework that has recently emerged, offering exceptional ways to build agents and multi-step workflows in .NET or Python. Paired with AG-UI, the frontend/runtime layer that enables those agents to appear in your app with a clean UI, streaming responses, and shared state, etc., delivers a seamless agentic experience.
        - paragraph [ref=e70]: "The integration between the two is simple but powerful: MAF handles the reasoning and tool-use, and AG-UI bridges the interactions between the agent and the users."
        - paragraph [ref=e71]: "Microsoft Agent Framework (MAF) and AG-UI together offer a clean separation:"
        - list [ref=e72]:
          - listitem [ref=e73]:
            - strong [ref=e74]: MAF
            - text: handles the agent’s intelligence, workflows, memory, and tool use.
          - listitem [ref=e75]:
            - strong [ref=e76]: AG-UI
            - text: is the open protocol that standardizes how agents communicate with user interfaces.
        - figure [ref=e77]:
          - img "__wf_reserved_inherit" [ref=e79]
        - paragraph [ref=e80]: Once an agent speaks AG-UI, it becomes immediately compatible with any AG-UI-aware frontend, including Microsoft’s own Blazor client and CopilotKit.
        - paragraph [ref=e81]: This combination is what turns MAF agents from “backend processes” into interactive, stateful, user-facing agents.
        - heading "What the Microsoft Agent Framework Provides" [level=2] [ref=e82]
        - paragraph [ref=e83]: "MAF provides the core building blocks:"
        - list [ref=e84]:
          - listitem [ref=e85]:
            - strong [ref=e86]: Agents
            - text: that call models, use tools, and keep state across turns.
          - listitem [ref=e87]:
            - strong [ref=e88]: Workflows
            - text: for multi-step or multi-agent processes.
          - listitem [ref=e89]:
            - strong [ref=e90]: Model and memory providers
            - text: so your agents can store data or thread context.
        - paragraph [ref=e91]:
          - link "Check out MAF GitHub ⭐️" [ref=e92] [cursor=pointer]:
            - /url: https://github.com/microsoft/agent-framework
            - strong [ref=e93]: Check out MAF GitHub ⭐️
        - paragraph [ref=e94]: It’s practical if you want to move past “chat completion” and give the model structure, state, and the ability to act.
        - figure [ref=e95]:
          - img "__wf_reserved_inherit" [ref=e97]
        - heading "What AG-UI Adds to the Picture" [level=2] [ref=e98]
        - paragraph [ref=e99]:
          - text: AG-UI is the open protocol that defines
          - strong [ref=e100]: how an agent communicates with a user interface.
        - figure [ref=e101]:
          - img "__wf_reserved_inherit" [ref=e103]
        - paragraph [ref=e104]: "It standardizes things like:"
        - list [ref=e105]:
          - listitem [ref=e106]: Streaming messages
          - listitem [ref=e107]: State updates
          - listitem [ref=e108]: Tool invocations
          - listitem [ref=e109]: UI events
          - listitem [ref=e110]: Multi-agent routing
          - listitem [ref=e111]: Interruptions / tool-progress events
          - listitem [ref=e112]: Frontend → agent actions
        - paragraph [ref=e113]: This removes the need to design your own transport, your own formatting, your own event system, or your own UI message schema.
        - paragraph [ref=e114]: Instead of every framework inventing its own UI contract, AG-UI is the shared layer they converge on.
