                - heading "What is AG-UI?" [level=2] [ref=e154]
                - paragraph [ref=e155]:
                  - strong [ref=e156]: AG-UI (Agent-User Interaction Protocol)
                  - text: is an open, lightweight protocol that standardizes the way AI agents interact with frontend apps. Consider it a common language that eliminates the need for custom integration code by enabling any agent backend to communicate with any user interface. AG-UI employs an event-based architecture in which agents stream updates while working, as opposed to imposing the conventional request-response pattern on them. This implies that your interface can show progress in real-time, whether the agent is generating text, calling tools, or updating shared state.
                - paragraph [ref=e157]:
                  - text: AG-UI works over familiar technologies like HTTP, Server-Sent Events, or WebSockets, making it easy to adopt regardless of your tech stack. AG-UI was born from CopilotKit’s partnership with
                  - link "LangGraph" [ref=e158] [cursor=pointer]:
                    - /url: https://www.codecademy.com/article/building-ai-workflow-with-langgraph
                  - text: and
                  - link "CrewAI" [ref=e159] [cursor=pointer]:
                    - /url: https://www.codecademy.com/article/multi-agent-application-with-crewai
                  - text: ", emerging from real-world needs rather than theoretical design. It complements other protocols in the agent ecosystem - while MCP handles agent-to-tool communication and A2A manages agent-to-agent interaction, AG-UI focuses specifically on the agent-to-user connection. This creates a complete picture where each protocol handles its specialized domain without overlap."
                - paragraph [ref=e160]: So what happens behind the scenes when an agent uses AG-UI to communicate?
                - heading "How does AG-UI work?" [level=2] [ref=e161]
                - paragraph [ref=e162]: "AG-UI creates a two-way event-driven connection between your frontend and agent backend, enabling real-time interaction without polling or waiting for complete responses. This architecture allows agents to stream progress, pause for approvals, and synchronize state while users see everything unfold instantly. Here’s a breakdown of the interaction cycle:"
                - paragraph [ref=e163]:
                  - strong [ref=e164]: Establishing the connection
                - paragraph [ref=e165]: Your application sends a POST request to the agent endpoint with the user’s input, relevant context, and any configuration needed to begin execution.
                - paragraph [ref=e166]:
                  - strong [ref=e167]: Opening the event stream
                - paragraph [ref=e168]: Once the request is received, a persistent connection opens through Server-Sent Events (SSE) or WebSockets. This single channel carries all updates from the agent to your interface.
                - paragraph [ref=e169]:
                  - strong [ref=e170]: Event structure
                - paragraph [ref=e171]: "Each event the agent emits includes:"
                - list [ref=e172]:
                  - listitem [ref=e173]:
                    - text: A standard type identifier (like
                    - code [ref=e174]: TEXT_MESSAGE_CONTENT
                    - text: ","
                    - code [ref=e175]: TOOL_CALL_START
                    - text: ", or"
                    - code [ref=e176]: STATE_DELTA
                    - text: )
                  - listitem [ref=e177]: A lightweight payload containing only essential data for that event
                - paragraph [ref=e178]:
                  - strong [ref=e179]: Streaming events in real-time
                - paragraph [ref=e180]: While processing your request, the agent broadcasts events as actions happen. These could be text chunks, tool calls, state changes, or status updates, all delivered immediately as they occur.
                - paragraph [ref=e181]:
                  - strong [ref=e182]: Instant UI updates
                - paragraph [ref=e183]: Your frontend responds to each incoming event by refreshing the display, showing partial results, or prompting for user input, all without waiting for the entire process to complete.
                - paragraph [ref=e184]:
                  - strong [ref=e185]: Two-way communication
                - paragraph [ref=e186]: The frontend can send information back to the agent during execution, including user decisions, interface context, or cancellation requests. This creates interactive feedback loops where humans and agents collaborate actively.
                - paragraph [ref=e187]: This cycle repeats throughout the agent’s execution, maintaining continuous synchronization between what the agent is doing and what users see.
                - paragraph [ref=e188]:
                  - img "AG-UI Agent-User Interaction Protocol workflow showing connection establishment, event streaming, and two-way communication" [ref=e189]
                - paragraph [ref=e190]: Now, let’s explore the details of how this event communication actually works.
                - heading "Event stream communication" [level=3] [ref=e191]
                - paragraph [ref=e192]:
                  - text: AG-UI transmits a continuous sequence of
                  - link "JSON" [ref=e193] [cursor=pointer]:
                    - /url: https://www.codecademy.com/article/what-is-json
                  - text: "-formatted events through standard web protocols like HTTP, SSE, or WebSockets. Each event carries a type field that identifies the action taking place and a streamlined payload containing just the necessary information. The agent broadcasts these events the moment they happen, whether it’s generating text tokens, executing functions, or modifying application state. Your interface processes them instantly without repeatedly checking for updates or blocking while waiting for final results, creating a fluid experience where every development appears as it unfolds."
                - paragraph [ref=e194]:
                  - strong [ref=e195]: Why event-driven?
                - paragraph [ref=e196]: Traditional APIs leave users staring at loading indicators while agents complete their work. A task that takes 30 seconds means half a minute of a frozen screen with zero insight into what’s happening behind the scenes. AG-UI changes this by delivering updates every few hundred milliseconds. Rather than waiting and staring at the loading indicator, users watch the agent think, see which tools it’s calling, and observe results building incrementally. This visibility transforms agents from mysterious background processes into active collaborators, making it possible for humans and AI to work together in the same workspace on evolving documents, plans, and outputs.
                - paragraph [ref=e197]: But why did the developer community need yet another protocol?
                - heading "Why was AG-UI created?" [level=2] [ref=e198]
                - paragraph [ref=e199]:
                  - text: The AI agent landscape underwent a fundamental shift. Early agents like Devin operated as background workers, handling tasks autonomously without user interaction. Modern agents like
                  - link "Cursor" [ref=e200] [cursor=pointer]:
                    - /url: https://www.codecademy.com/article/how-to-use-cursor-ai-a-complete-guide-with-practical-examples
                  - text: work differently by collaborating with users in real-time, showing their thought process and co-creating in shared workspaces. This evolution exposed a critical gap that existing web protocols weren’t designed for this kind of dynamic, ongoing interaction between humans and AI.
                - paragraph [ref=e201]: "Without standardization, developers faced persistent technical challenges:"
                - list [ref=e202]:
                  - listitem [ref=e203]:
                    - paragraph [ref=e204]:
                      - strong [ref=e205]: "Real-time streaming:"
                      - text: LLMs generate text token by token, but users expect to see those tokens appear instantly rather than staring at blank screens waiting for complete responses.
                  - listitem [ref=e206]:
                    - paragraph [ref=e207]:
                      - strong [ref=e208]: "Tool orchestration:"
                      - text: Agents call functions, execute code, and interact with external APIs. Interfaces need to display this activity as it happens and sometimes pause to request human approval before sensitive actions proceed.
                  - listitem [ref=e209]:
                    - paragraph [ref=e210]:
                      - strong [ref=e211]: "Shared mutable state:"
                      - text: When agents generate evolving artifacts like plans, spreadsheets, or code folders, resending entire documents with each tiny change wastes bandwidth. Implementing efficient updates through diffs requires a standardized schema.
                  - listitem [ref=e212]:
                    - paragraph [ref=e213]:
                      - strong [ref=e214]: "Concurrency and cancellation:"
                      - text: Users launch multiple queries, cancel requests mid-execution, and switch between conversation threads. Systems need proper identifiers for threads and runs, plus graceful shutdown handling.
                  - listitem [ref=e215]:
                    - paragraph [ref=e216]:
                      - strong [ref=e217]: "Framework sprawl:"
                      - text: Popular frameworks like LangChain, CrewAI, Mastra, and AG2 each use different communication patterns. Without a common standard, developers write custom integration code for every agent-frontend combination.
                - paragraph [ref=e218]: AG-UI emerged from CopilotKit’s practical experience building in-app agent interactions, initially through partnerships with LangGraph and CrewAI. Born from production requirements rather than abstract design, the protocol establishes a consistent contract between agents and interfaces. This eliminates custom WebSocket formats, text parsing hacks, and framework-specific adapters, letting developers focus on building features instead of reinventing communication layers.
                - paragraph [ref=e219]: AG-UI organizes agent-user interactions into five distinct event categories.
                - heading "The core event types in AG-UI" [level=2] [ref=e220]
                - paragraph [ref=e221]: AG-UI has around 16 event types organized into five distinct categories, each serving a specific purpose in agent-user communication.
                - paragraph [ref=e222]: "These events provide a complete vocabulary for everything that happens during an agent interaction, from starting a run to streaming text to executing tools. Here are the different categories:"
                - paragraph [ref=e223]:
                  - strong [ref=e224]: Lifecycle events
                - paragraph [ref=e225]: "Lifecycle events track an agent run from beginning to end, providing clear signals about execution status at every stage. These events form the structural backbone that enables features like loading indicators, progress tracking, and graceful error recovery in your interface. Here are the key lifecycle events:"
                - list [ref=e226]:
                  - listitem [ref=e227]:
                    - paragraph [ref=e228]:
                      - code [ref=e229]: RUN_STARTED
                      - text: ": Signals the beginning of an agent execution"
                  - listitem [ref=e230]:
                    - paragraph [ref=e231]:
                      - code [ref=e232]: STEP_STARTED
                      - text: ": Marks the start of an individual step within a run"
                  - listitem [ref=e233]:
                    - paragraph [ref=e234]:
                      - code [ref=e235]: STEP_FINISHED
                      - text: ": Indicates completion of a specific step"
                  - listitem [ref=e236]:
                    - paragraph [ref=e237]:
                      - code [ref=e238]: RUN_FINISHED
                      - text: ": Confirms successful completion of the entire run"
                  - listitem [ref=e239]:
                    - paragraph [ref=e240]:
                      - code [ref=e241]: RUN_ERROR
                      - text: ": Provides failure details and error information when something goes wrong"
                - paragraph [ref=e242]: Lifecycle events enable frontends to show loading indicators, track progress through multi-step processes, and handle errors gracefully when they occur.
                - paragraph [ref=e243]:
                  - strong [ref=e244]: Text message events
                - paragraph [ref=e245]: "Text message events handle the streaming of generated text, delivering content piece by piece as the agent produces it. This creates the familiar “typing” effect you see in chat interfaces, where text appears progressively rather than all at once. Key text message events are:"
                - list [ref=e246]:
                  - listitem [ref=e247]:
                    - paragraph [ref=e248]:
                      - code [ref=e249]: TEXT_MESSAGE_START
                      - text: ": Begins a new message and signals that text generation is starting"
                  - listitem [ref=e250]:
                    - paragraph [ref=e251]:
                      - code [ref=e252]: TEXT_MESSAGE_CONTENT
                      - text: ": Delivers the token stream, with each event containing a chunk of text"
                  - listitem [ref=e253]:
                    - paragraph [ref=e254]:
                      - code [ref=e255]: TEXT_MESSAGE_END
                      - text: ": Completes the message, indicating no further content will be added"
                - paragraph [ref=e256]: Text message events are responsible for creating responsive chat interfaces where users see text appear in real-time as the agent generates it, providing immediate feedback instead of waiting for complete responses.
                - paragraph [ref=e257]:
                  - strong [ref=e258]: Tool call events
                - paragraph [ref=e259]: Tool call events signal when the agent needs to execute a function or perform an action. These events provide visibility into tool execution and enable human-in-the-loop workflows where users can approve or reject sensitive operations.
                - paragraph [ref=e260]: "Key events:"
                - list [ref=e261]:
                  - listitem [ref=e262]:
                    - paragraph [ref=e263]:
                      - code [ref=e264]: TOOL_CALL_START
                      - text: ": Indicates the agent is initiating a tool call"
                  - listitem [ref=e265]:
                    - paragraph [ref=e266]:
                      - code [ref=e267]: TOOL_CALL_ARGS
                      - text: ": Streams the tool’s arguments as they’re generated, allowing forms to pre-fill before the agent finishes"
                  - listitem [ref=e268]:
                    - paragraph [ref=e269]:
                      - code [ref=e270]: TOOL_CALL_END
                      - text: ": Marks the completion of the tool call"
                  - listitem [ref=e271]:
                    - paragraph [ref=e272]:
                      - code [ref=e273]: TOOL_RESULT
                      - text: ": Returns the outcome of the tool execution"
                - paragraph [ref=e274]: These events display tool execution progress in real-time, show which functions the agent is calling, and request human approval before performing sensitive actions like database modifications or financial transactions.
                - paragraph [ref=e275]:
                  - strong [ref=e276]: State management events
                - paragraph [ref=e277]: State management events synchronize the agent state with the frontend efficiently, enabling real-time collaboration on evolving content. Instead of resending entire documents with each update, these events use a snapshot-plus-delta pattern to minimize bandwidth and keep interfaces responsive.
                - paragraph [ref=e278]: "Key events:"
                - list [ref=e279]:
                  - listitem [ref=e280]:
                    - paragraph [ref=e281]:
                      - code [ref=e282]: STATE_SNAPSHOT
                      - text: ": Sends the complete state, typically used when initially loading or when a full refresh is needed"
                  - listitem [ref=e283]:
                    - paragraph [ref=e284]:
                      - code [ref=e285]: STATE_DELTA
                      - text: ": Transmits incremental updates as tiny diffs (like “add ‘hello’ at index 5” or “update cell B3”)"
                - paragraph [ref=e286]: State management events collaborate on evolving artifacts such as documents, spreadsheets, code files, or plans without the overhead of resending entire data structures. Users see changes appear incrementally as the agent generates them, creating a smooth co-editing experience.
                - paragraph [ref=e287]:
                  - strong [ref=e288]: Special events
                - paragraph [ref=e289]: Special events provide flexibility for system-specific functionality and edge cases that don’t fit standard categories. These events enable human oversight, protocol extensibility, and integration with external systems.
                - paragraph [ref=e290]: "Key events:"
                - list [ref=e291]:
                  - listitem [ref=e292]:
                    - paragraph [ref=e293]:
                      - code [ref=e294]: INTERRUPT
                      - text: ": Pauses agent execution to request human approval, acting as a safety valve for sensitive actions"
                  - listitem [ref=e295]:
                    - paragraph [ref=e296]:
                      - code [ref=e297]: CUSTOM
                      - text: ": Application-specific events that extend the protocol for unique use cases not covered by standard types"
                  - listitem [ref=e298]:
                    - paragraph [ref=e299]:
                      - code [ref=e300]: RAW
                      - text: ": Passthrough events from external systems, allowing integration with third-party tools and services"
                - paragraph [ref=e301]: Special events implement human-in-the-loop workflows where critical operations require explicit user confirmation before proceeding. They also enable custom functionality specific to your application without breaking protocol compatibility.
                - paragraph [ref=e302]:
                  - 'img "AG-UI Agent-User Interaction Protocol core event types: lifecycle, text message, tool call, state management, and special events" [ref=e303]'
                - paragraph [ref=e304]: These event types unlock several powerful capabilities for agent applications.
                - heading "Key features and capabilities of AG-UI" [level=2] [ref=e305]
                - paragraph [ref=e306]:
                  - text: The features of AG-UI work together to create responsive, transparent, and user-friendly experiences that go far beyond simple
                  - link "chatbots" [ref=e307] [cursor=pointer]:
                    - /url: https://www.codecademy.com/article/what-are-chatbots
                  - text: ". Here are some of the key features:"
                - list [ref=e308]:
                  - listitem [ref=e309]:
                    - paragraph [ref=e310]:
                      - strong [ref=e311]: "Real-time streaming:"
                      - text: Users see progress every few hundred milliseconds instead of waiting for complete responses, making even the minor tasks feel responsive
                  - listitem [ref=e312]:
                    - paragraph [ref=e313]:
                      - strong [ref=e314]: "Tool orchestration with human approval:"
                      - text: Interfaces display tool execution progress in real-time and can pause for human approval on sensitive operations while preserving context
                  - listitem [ref=e315]:
                    - paragraph [ref=e316]:
                      - strong [ref=e317]: "Efficient state synchronization:"
                      - text: Uses snapshot plus delta pattern to enable collaboration on evolving artifacts without resending entire documents, minimizing bandwidth
                  - listitem [ref=e318]:
                    - paragraph [ref=e319]:
                      - strong [ref=e320]: "Multimodality support:"
                      - text: Streams images, audio, and file attachments alongside text with standardized handling across all content types
                  - listitem [ref=e321]:
                    - paragraph [ref=e322]:
                      - strong [ref=e323]: "Thinking steps visibility:"
                      - text: Separates internal agent reasoning from public responses, letting you show or hide execution progress based on UX needs
                  - listitem [ref=e324]:
                    - paragraph [ref=e325]:
                      - strong [ref=e326]: "Generative UI compatibility:"
                      - text: Agents can return UI components instead of text and work seamlessly with A2UI for dynamic, declarative interfaces
                  - listitem [ref=e327]:
                    - paragraph [ref=e328]:
                      - strong [ref=e329]: "Interruptibility & concurrency:"
                      - text: Users can pause, override, or guide agent behavior mid-execution while the system handles multiple queries and thread switching without losing context
                - paragraph [ref=e330]: AG-UI protocol works across multiple frameworks and powers diverse applications.
                - heading "AG-UI framework integration and use cases" [level=2] [ref=e331]
                - paragraph [ref=e332]: AG-UI works with popular agent frameworks and frontend tools across the ecosystem. This flexibility helps choose the best tools for our needs without getting locked into a single vendor or technology stack.
                - heading "Supported frameworks" [level=3] [ref=e333]
                - paragraph [ref=e334]: AG-UI integrates seamlessly with leading frameworks across both backend and frontend, providing broad compatibility that makes adoption straightforward regardless of your existing technology choices.
                - paragraph [ref=e335]:
                  - strong [ref=e336]: Backend agent frameworks
                - paragraph [ref=e337]: "AG-UI works with major agent development platforms including:"
                - list [ref=e338]:
                  - listitem [ref=e339]:
                    - paragraph [ref=e340]: LangGraph for building stateful multi-agent workflows
                  - listitem [ref=e341]:
                    - paragraph [ref=e342]: CrewAI for role-based agent collaboration
                  - listitem [ref=e343]:
                    - paragraph [ref=e344]: Mastra for agent orchestration
                  - listitem [ref=e345]:
                    - paragraph [ref=e346]: Pydantic AI for type-safe agent development
                  - listitem [ref=e347]:
                    - paragraph [ref=e348]: Microsoft Agent Framework for enterprise agent applications.
                - paragraph [ref=e349]: This backend flexibility means we can switch between frameworks or use multiple ones simultaneously without rewriting frontend integration code.
                - paragraph [ref=e350]:
                  - strong [ref=e351]: Frontend SDKs
                - paragraph [ref=e352]: On the frontend, AG-UI supports multiple frameworks and languages to fit an application’s needs. React developers can use CopilotKit’s comprehensive components, while Vue and Angular applications have dedicated SDK support. The protocol also provides TypeScript and Python SDKs for building custom integrations or working with non-web interfaces like CLI tools or desktop applications.
                - heading "Real-world use cases" [level=3] [ref=e353]
                - paragraph [ref=e354]: AG-UI powers diverse applications where agents need dynamic user interaction, demonstrating how real-time capabilities translate into practical value across different domains.
                - list [ref=e355]:
                  - listitem [ref=e356]:
                    - paragraph [ref=e357]:
                      - strong [ref=e358]: "Collaborative coding tools:"
                      - text: Platforms like Cursor
                      - link "IDE" [ref=e359] [cursor=pointer]:
                        - /url: https://www.codecademy.com/article/what-is-an-ide
                      - text: enable agents that work alongside developers in real-time. Developers see code generation happen line by line, can interrupt to provide guidance, and collaborate on shared files while the agent explains its reasoning.
                  - listitem [ref=e360]:
                    - paragraph [ref=e361]:
                      - strong [ref=e362]: "In-app AI copilots:"
                      - text: Applications like Notion AI embed agents directly into their interfaces. These copilots update documents, generate content, and modify components while users continue working, making AI feel like a natural part of the application.
                  - listitem [ref=e363]:
                    - paragraph [ref=e364]:
                      - strong [ref=e365]: "Data dashboards:"
                      - text: Business intelligence tools stream insights and update visualizations as agents analyze data. Users watch charts populate and see trend analysis develop in real-time, understanding both results and reasoning.
                  - listitem [ref=e366]:
                    - paragraph [ref=e367]:
                      - strong [ref=e368]: "CRM systems:"
                      - text: Customer relationship platforms use AG-UI for agent-powered form autofill from natural language. Sales teams describe tasks in plain language and watch agents populate fields, select dates, and assign work while displaying each step.
                  - listitem [ref=e369]:
                    - paragraph [ref=e370]:
                      - strong [ref=e371]: "Multi-agent Workflows:"
                      - text: Complex processes orchestrate specialized agents with human oversight. Content workflows might coordinate research, writing, and review agents, with humans approving stage transitions and providing guidance when needed.
                - paragraph [ref=e372]: The protocol’s growing adoption across major frameworks signals a future where agent-user interactions are as standardized and reliable as REST APIs are today.
                - heading "Conclusion" [level=2] [ref=e373]
                - paragraph [ref=e374]: AG-UI standardizes agent-user interaction through an event-based protocol with approximately 16 event types covering text streaming, tool orchestration, and state synchronization. With support for major frameworks like LangGraph, CrewAI, and Microsoft Agent Framework, plus frontend integrations for React, Vue, and Angular, AG-UI eliminates custom integration code and vendor lock-in. Production adoption by companies like Microsoft and Oracle shows AG-UI is becoming the foundation for next-generation AI applications.
                - paragraph [ref=e375]:
                  - text: Explore Codecademy’s
                  - link "Intro to AI Agents" [ref=e376] [cursor=pointer]:
                    - /url: https://www.codecademy.com/learn/intro-to-ai-agents
                  - text: course to understand agentic workflows and autonomous systems that power protocols like AG-UI.
                - heading "Frequently asked questions" [level=2] [ref=e377]
                - heading "1. What kind of events does AG-UI support?" [level=3] [ref=e378]
                - paragraph [ref=e379]: "AG-UI supports around 16 event types across five categories: Lifecycle (starting/finishing runs), Text Messages (streaming text), Tool Calls (executing functions), State Management (syncing data), and Special events (pausing for approval or custom needs)."
                - heading "2. How does AG-UI fit with other AI agent protocols?" [level=3] [ref=e380]
                - paragraph [ref=e381]: AG-UI handles agent-to-user communication, MCP connects agents to tools, and A2A manages agent-to-agent communication. Each protocol specializes in one connection type, working together to create complete agent systems.
                - heading "3. What is the difference between MCP UI and AG-UI?" [level=3] [ref=e382]
                - paragraph [ref=e383]: MCP UI provides interfaces for specific tools that agents use. AG-UI manages the entire communication flow between agents and applications, including text streaming, tool execution, and user interactions throughout the experience.
                - heading "4. What is AG-UI used for?" [level=3] [ref=e384]
                - paragraph [ref=e385]: AG-UI powers collaborative coding tools, in-app AI assistants, real-time dashboards, automated form filling in business apps, and workflows where agents need human approval before taking actions.
                - heading "5. What is the difference between A2UI and AG-UI?" [level=3] [ref=e386]
                - paragraph [ref=e387]: A2UI defines how agents create visual components. AG-UI manages how agents and applications communicate in real-time. They work together, AG-UI uses A2UI when agents need to display custom interfaces.
