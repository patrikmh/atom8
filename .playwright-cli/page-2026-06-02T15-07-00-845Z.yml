        - heading "What is the AG-UI Protocol?" [level=2] [ref=e78]
        - paragraph [ref=e79]: The Agent User Interaction Protocol (AG-UI), developed by CopilotKit, is an open-source, lightweight, event-based protocol that facilitates rich, real-time interactions between the frontend and AI agents.
        - paragraph [ref=e80]: The AG-UI protocol enables event-driven communication, state management, tool usage, and streaming AI agent responses.
        - paragraph [ref=e81]: "To send information between the frontend and your AI agent, AG-UI uses events such as:"
        - list [ref=e82]:
          - listitem [ref=e83]:
            - strong [ref=e84]: Lifecycle events
            - text: ": These events mark the start or end of an agent’s work, like “The agent started processing your request” ("
            - code [ref=e85]: RUN_STARTED
            - text: ) or “The agent is done” (
            - code [ref=e86]: RUN_FINISHED
            - text: ).
          - listitem [ref=e87]:
            - strong [ref=e88]: Text message events
            - text: ": These events carry the actual conversation, like “The agent is starting a new message” ("
            - code [ref=e89]: TEXT_MESSAGE_START
            - text: ), “Here’s a piece of the response” (
            - code [ref=e90]: TEXT_MESSAGE_CONTENT
            - text: ), or “The message is complete” (
            - code [ref=e91]: TEXT_MESSAGE_END
            - text: ).
          - listitem [ref=e92]:
            - strong [ref=e93]: Tool call events
            - text: ": These events let the agent use tools, like “The agent wants to check the weather” ("
            - code [ref=e94]: TOOL_CALL_START
            - text: ) or “Here’s the weather data” (
            - code [ref=e95]: TOOL_CALL_END
            - text: ).
          - listitem [ref=e96]:
            - strong [ref=e97]: State management events
            - text: ": These events keep the frontend and the AI agent state in sync, like “Here’s the current state of the conversation” ("
            - code [ref=e98]: STATE_SNAPSHOT
            - text: ) or “Here’s a small update to the state” (
            - code [ref=e99]: STATE_DELTA
            - text: ).
        - paragraph [ref=e100]:
          - text: You can learn more about the AG-UI protocol and its architecture
          - link "here on AG-UI docs" [ref=e101] [cursor=pointer]:
            - /url: https://docs.ag-ui.com/introduction
          - text: .
        - figure:
          - generic:
            - img "Image"
        - paragraph [ref=e102]: Now that we have learned what the AG-UI protocol is, let us see how to integrate it with different AI agent frameworks
        - heading "Integrating AG2 AI agents with AG-UI protocol" [level=2] [ref=e103]
        - paragraph [ref=e104]: In this section, you will learn how to build a full-stack application demonstrating the integration of AutoGen agents with the AG-UI protocol to create an interactive AI travel assistant with human-in-the-loop capabilities.
        - paragraph [ref=e105]: The system allows users to interact with an AI travel assistant that can create custom travel plans, recommend destinations, and adjust itineraries based on user feedback - all with real-time streaming responses and interactive tool execution.
        - paragraph [ref=e106]: "Here’s a preview of what we will be building:"
        - paragraph [ref=e107]: Let’s jump in.
