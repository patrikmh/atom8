          - code [ref=e157]: ‍
        - generic [ref=e159]:
          - code [ref=e161]: "class AGUIAdapter(MessageProcessorMixin, CreateWorkflowUIMixin): def __init__( self, provider: ProviderProtocol, *, discovery_path: str = \"/fastagency/discovery\", agui_path: str = \"/fastagency/agui\", wf_name: Optional[str] = None, get_user_id: Optional[Callable[..., Optional[str]]] = None, filter: Optional[Callable[[BaseMessage], bool]] = None, ) -> None: \"\"\"Provider for AG-UI. This adapter connects FastAgency workflows with AG-UI interfaces, handling message routing, thread management, and real-time communication between agents and the frontend UI. Args: provider (ProviderProtocol): The workflow provider that executes agent workflows discovery_path (str, optional): API path for workflow discovery endpoint. Defaults to \"/fastagency/discovery\". agui_path (str, optional): API path for AG-UI communication endpoint. Defaults to \"/fastagency/agui\". wf_name (str, optional): Name of the default workflow to run. If None, uses the first available workflow. get_user_id (Optional[Callable[..., Optional[str]]], optional): Function to extract user ID from requests. Defaults to None. filter (Optional[Callable[[BaseMessage], bool]], optional): Optional filter function for messages. Defaults to None. \"\"\""
          - button [ref=e162] [cursor=pointer]:
