                - generic [ref=e697]:
                  - heading "How to use" [level=2] [ref=e698]
                  - 'link "Permalink: How to use" [ref=e699] [cursor=pointer]':
                    - /url: "#how-to-use"
                    - img [ref=e700]
                - paragraph [ref=e702]: "To try and keep things as generic as possible Morphorm does not provide any containers for representing the layout properties or the tree. Instead, two traits must be implemented by the users' containers in order to utilize the layout algorithm:"
                - list [ref=e703]:
                  - listitem [ref=e704]:
                    - code [ref=e705]: Node
                    - text: represents a UI element which can be sized and positioned. The node itself could contain the desired layout properties, or the properties can be provided by an external source (such as an ECS component store), which is provided by the
                    - code [ref=e706]: Store
                    - text: associated type. The node must also provide an iterator over its children, specified by the
                    - code [ref=e707]: ChildIter
                    - text: associated type, and to allow the children to be stored externally as well, there is a
                    - code [ref=e708]: Tree
                    - text: associated type. Additionally, there is a
                    - code [ref=e709]: SubLayout
                    - text: associated type which can be used to provide an external context when the size of a childless node is determined by its content, for example it may be used to provide a context for computing and caching the bounds of text within a node.
                  - listitem [ref=e710]:
                    - code [ref=e711]: Cache
                    - text: represents a store for the output of the layout computation. The store is indexed by a reference to the node type, however, to allow store types which cannot use the node reference as a key, the
                    - code [ref=e712]: Node
                    - text: trait also provides a
                    - code [ref=e713]: CacheKey
                    - text: associated type.
                - generic [ref=e714]:
                  - heading "Example (ECS)" [level=3] [ref=e715]
                  - 'link "Permalink: Example (ECS)" [ref=e716] [cursor=pointer]':
                    - /url: "#example-ecs"
                    - img [ref=e717]
                - paragraph [ref=e719]: In the following example, nodes are represented by an ID type, which is used as a key for slotmaps which store the properties of a layout node.
                - generic [ref=e720]:
                  - heading "Creating an ID type" [level=4] [ref=e721]
                  - 'link "Permalink: Creating an ID type" [ref=e722] [cursor=pointer]':
                    - /url: "#creating-an-id-type"
                    - img [ref=e723]
                - paragraph [ref=e725]:
                  - text: First we define an
                  - code [ref=e726]: Entity
                  - text: "type to act as the ID:"
                - generic [ref=e727]:
                  - generic [ref=e728]:
                    - generic [ref=e729]: "#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, PartialOrd, Ord)]"
                    - text: pub struct Entity(pub usize);
                  - button "Copy code to clipboard" [ref=e731] [cursor=pointer]:
                    - img [ref=e732]
                - paragraph [ref=e735]: We then create a simple entity manager which generates new entities. For this simple example the entity ID is generated from a counter, but a real system may need to handle the removal of entities.
                - generic [ref=e736]:
                  - generic [ref=e737]: "pub struct EntityManager { count: usize, } impl EntityManager { pub fn create(&mut self) -> Entity { self.count += 1; Entity(self.count - 1) } }"
                  - button "Copy code to clipboard" [ref=e739] [cursor=pointer]:
                    - img [ref=e740]
                - paragraph [ref=e743]:
                  - text: Next we'll implement the
                  - code [ref=e744]: Key
                  - text: trait and the
                  - code [ref=e745]: From<KeyData>
                  - text: trait so that the entity can be used as a key for a
                  - code [ref=e746]: SecondaryMap
                  - text: from the
                  - code [ref=e747]: slotmap
                  - text: "crate:"
                - generic [ref=e748]:
                  - generic [ref=e749]: "unsafe impl Key for Entity { fn data(&self) -> slotmap::KeyData { KeyData::from_ffi(self.0 as u64) } fn null() -> Self { Entity::default() } fn is_null(&self) -> bool { self.0 == usize::MAX } } impl From<KeyData> for Entity { fn from(value: KeyData) -> Self { Entity(value.as_ffi() as usize) } }"
                  - button "Copy code to clipboard" [ref=e751] [cursor=pointer]:
                    - img [ref=e752]
                - generic [ref=e755]:
                  - heading "Defining the Tree" [level=4] [ref=e756]:
                    - text: Defining the
                    - code [ref=e757]: Tree
                  - 'link "Permalink: Defining the Tree" [ref=e758] [cursor=pointer]':
                    - /url: "#defining-the-tree"
                    - img [ref=e759]
                - paragraph [ref=e761]: "One way to represent the layout tree using an ID type is to store the parent, first-child, and next/prev -sibling IDs for each entity:"
                - generic [ref=e762]:
                  - generic [ref=e763]: "pub struct Tree { pub parent: Vec<Option<Entity>>, pub first_child: Vec<Option<Entity>>, pub next_sibling: Vec<Option<Entity>>, pub prev_sibling: Vec<Option<Entity>>, }"
                  - button "Copy code to clipboard" [ref=e765] [cursor=pointer]:
                    - img [ref=e766]
                - paragraph [ref=e769]:
                  - text: See
                  - code [ref=e770]: ecs/tree.rs
                  - text: for full implementation.
                - paragraph [ref=e771]: "An iterator over the children of a node can then be constructed:"
                - generic [ref=e772]:
                  - generic [ref=e773]:
                    - text: /// An iterator for iterating the children of an entity.
                    - text: "pub struct ChildIterator<'a> { pub tree: &'a Tree, pub current_node: Option<&'a Entity>, } impl<'a> Iterator for ChildIterator<'a> { type Item = &'a Entity; fn next(&mut self) -> Option<Self::Item> { if let Some(entity) = self.current_node { self.current_node = self.tree.get_next_sibling(entity); return Some(entity); } None } }"
                  - button "Copy code to clipboard" [ref=e775] [cursor=pointer]:
                    - img [ref=e776]
                - generic [ref=e779]:
                  - heading "Defining the Store" [level=4] [ref=e780]:
                    - text: Defining the
