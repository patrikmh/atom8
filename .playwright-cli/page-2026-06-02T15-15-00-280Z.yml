                    - /url: "#size"
                    - img [ref=e478]
                - paragraph [ref=e480]:
                  - text: The size of a node is determined by its
                  - code [ref=e481]: width
                  - text: and
                  - code [ref=e482]: height
                  - text: properties. These properties are specified with
                  - code [ref=e483]: Units
                  - text: ", which has four variants:"
                - list [ref=e484]:
