                    - /url: "#defining-the-cache"
                    - img [ref=e799]
                - paragraph [ref=e801]: "Next, we'll need a cache to store the output of the layout computation, also keyed by the entity ID:"
                - generic [ref=e802]:
                  - generic [ref=e803]: "pub struct NodeCache { // Computed size and position of nodes. pub rect: SecondaryMap<Entity, Rect>, }"
                  - button "Copy code to clipboard" [ref=e805] [cursor=pointer]:
                    - img [ref=e806]
                - paragraph [ref=e809]:
                  - text: Then we'll implement the
                  - code [ref=e810]: Cache
                  - text: "trait on it:"
                - generic [ref=e811]:
                  - generic [ref=e812]: "impl Cache for NodeCache { type Node = Entity; fn set_bounds(&mut self, node: &Self::Node, posx: f32, posy: f32, width: f32, height: f32) { if let Some(rect) = self.rect.get_mut(*node) { rect.posx = posx; rect.posy = posy; rect.width = width; rect.height = height; } } fn width(&self, node: &Self::Node) -> f32 { if let Some(rect) = self.rect.get(*node) { return rect.width; } 0.0 } ... }"
                  - button "Copy code to clipboard" [ref=e814] [cursor=pointer]:
                    - img [ref=e815]
                - generic [ref=e818]:
                  - heading "Implementing the Node trait" [level=4] [ref=e819]:
                    - text: Implementing the
                    - code [ref=e820]: Node
                    - text: trait
                  - 'link "Permalink: Implementing the Node trait" [ref=e821] [cursor=pointer]':
                    - /url: "#implementing-the-node-trait"
                    - img [ref=e822]
                - paragraph [ref=e824]:
                  - text: We can now implement the
                  - code [ref=e825]: Node
                  - text: trait for
                  - code [ref=e826]: Entity
                  - text: "type, filling in the associated types:"
                - generic [ref=e827]:
                  - generic [ref=e828]: "impl Node for Entity { type Store = Store; type Tree = Tree; type ChildIter<'t> = ChildIterator<'t>; type CacheKey = Entity; type SubLayout<'a> = (); fn key(&self) -> Self::CacheKey { *self } fn children<'t>(&self, tree: &'t Tree) -> Self::ChildIter<'t> { let current_node = tree.get_first_child(self); ChildIterator { tree, current_node } } fn visible(&self, store: &Store) -> bool { store.visible.get(*self).copied().unwrap_or(true) } fn layout_type(&self, store: &Store) -> Option<LayoutType> { store.layout_type.get(*self).copied() } fn grid_columns(&self, store: &Store) -> Option<Vec<Units>> { store.grid_columns.get(*self).cloned() } fn grid_rows(&self, store: &Store) -> Option<Vec<Units>> { store.grid_rows.get(*self).cloned() } fn column_start(&self, store: &Store) -> Option<usize> { store.column_start.get(*self).copied() } fn row_start(&self, store: &Store) -> Option<usize> { store.row_start.get(*self).copied() } fn column_span(&self, store: &Store) -> Option<usize> { store.column_span.get(*self).copied() } fn row_span(&self, store: &Store) -> Option<usize> { store.row_span.get(*self).copied() } }"
                  - button "Copy code to clipboard" [ref=e830] [cursor=pointer]:
