                  - 'link "Permalink: Defining the Store" [ref=e782] [cursor=pointer]':
                    - /url: "#defining-the-store"
                    - img [ref=e783]
                - paragraph [ref=e785]: "Let's now create a store type which, as the name suggests, will store the properties of a node:"
                - generic [ref=e786]:
                  - generic [ref=e787]: "pub struct PropertyStore { pub visible: SecondaryMap<Entity, bool>, pub layout_type: SecondaryMap<Entity, LayoutType>, pub position_type: SecondaryMap<Entity, PositionType>, pub left: SecondaryMap<Entity, Units>, pub right: SecondaryMap<Entity, Units>, pub top: SecondaryMap<Entity, Units>, pub bottom: SecondaryMap<Entity, Units>, ... }"
                  - button "Copy code to clipboard" [ref=e789] [cursor=pointer]:
                    - img [ref=e790]
                - paragraph [ref=e793]:
                  - text: See
