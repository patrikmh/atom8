                  - heading "Morphorm" [level=1] [ref=e446]
                  - 'link "Permalink: Morphorm" [ref=e447] [cursor=pointer]':
                    - /url: "#morphorm"
                    - img [ref=e448]
                - paragraph [ref=e450]: Morphorm is a crate for efficiently determining the size and position of UI elements which are organized into a tree structure.
                - generic [ref=e451]:
                  - heading "Description" [level=2] [ref=e452]
                  - 'link "Permalink: Description" [ref=e453] [cursor=pointer]':
                    - /url: "#description"
                    - img [ref=e454]
                - paragraph [ref=e456]: Morphorm is a 'one-pass' algorithm which recurses down the layout tree (depth-first), and determines the position and size of nodes based on their parent and children. It can produce similar layouts to flexbox, but with fewer concepts that need to be learned.
                - generic [ref=e457]:
                  - heading "Layout Type" [level=3] [ref=e458]
                  - 'link "Permalink: Layout Type" [ref=e459] [cursor=pointer]':
                    - /url: "#layout-type"
                    - img [ref=e460]
                - paragraph [ref=e462]:
                  - text: The
                  - code [ref=e463]: layout-type
                  - text: "determines how a parent arranges its children. There are four variants:"
                - list [ref=e464]:
                  - listitem [ref=e465]:
                    - code [ref=e466]: LayoutType::Row
                    - text: "- The node will arrange its children into a horizontal row."
                  - listitem [ref=e467]:
                    - code [ref=e468]: LayoutType::Column
                    - text: "- The node will arrange its children into a vertical column."
                  - listitem [ref=e469]:
                    - code [ref=e470]: LayoutType::Overlay
                    - text: "- The node will align each relative child independently within its padded bounds, allowing children to overlap."
                  - listitem [ref=e471]:
                    - code [ref=e472]: LayoutType::Grid
                    - text: "- The node will arrange its children into rows and columns."
                - paragraph [ref=e473]:
                  - link [ref=e474] [cursor=pointer]:
                    - /url: /vizia/morphorm/blob/main/docs/images/layout_type.svg
                - generic [ref=e475]:
