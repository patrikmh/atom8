              - article [ref=e578]:
                - blockquote [ref=e579]:
                  - paragraph [ref=e580]:
                    - generic [ref=e581]: ⚠️
                    - text: "NOTICE: This repository will be moved to another GitHub organization on Wednesday June 3rd, 2026. We will be locking this repo on that day to facilitate the transfer. If you have this repo cloned or forked, you may need to re-clone, create a new fork, or modify your remotes in order to maintain your development setup. We will automatically migrate pull requests and issues as they are once the repo is locked."
                - generic [ref=e582]:
                  - 'heading "A2UI: Agent-to-User Interface" [level=1] [ref=e583]'
                  - 'link "Permalink: A2UI: Agent-to-User Interface" [ref=e584] [cursor=pointer]':
                    - /url: "#a2ui-agent-to-user-interface"
                    - img [ref=e585]
                - paragraph [ref=e587]: A2UI is an open-source project, complete with a format optimized for representing updatable agent-generated UIs and an initial set of renderers, that allows agents to generate or populate rich user interfaces.
                - paragraph [ref=e588]:
                  - link "Gallery of A2UI components" [ref=e589] [cursor=pointer]:
                    - /url: /google/A2UI/blob/main/docs/assets/a2ui_gallery_examples.png
                    - img "Gallery of A2UI components" [ref=e590]
                - paragraph [ref=e591]:
                  - emphasis [ref=e592]: A gallery of A2UI rendered cards, showing a variety of UI compositions that A2UI can achieve.
                - generic [ref=e593]:
                  - 'heading "⚠️ Status: Early stage public preview" [level=2] [ref=e594]':
                    - generic [ref=e595]: ⚠️
                    - text: "Status: Early stage public preview"
                  - 'link "Permalink: ⚠️ Status: Early stage public preview" [ref=e596] [cursor=pointer]':
                    - /url: "#️-status-early-stage-public-preview"
                    - img [ref=e597]
                - blockquote [ref=e599]:
                  - paragraph [ref=e600]:
                    - strong [ref=e601]: "Note:"
                    - text: A2UI is currently in
                    - strong [ref=e602]: v0.8 (Public Preview)
                    - text: . The specification and implementations are functional but are still evolving. We are opening the project to foster collaboration, gather feedback, and solicit contributions (e.g., on client renderers). Expect changes.
                - generic [ref=e603]:
                  - heading "Summary" [level=2] [ref=e604]
                  - 'link "Permalink: Summary" [ref=e605] [cursor=pointer]':
                    - /url: "#summary"
                    - img [ref=e606]
                - paragraph [ref=e608]: Generative AI excels at creating text and code, but agents can struggle to present rich, interactive interfaces to users, especially when those agents are remote or running across trust boundaries.
                - paragraph [ref=e609]:
                  - strong [ref=e610]: A2UI
                  - text: is an open standard and set of libraries that allows agents to "speak UI." Agents send a declarative JSON format describing the
                  - emphasis [ref=e611]: intent
                  - text: of the UI. The client application then renders this using its own native component library (Flutter, Angular, Lit, etc.).
                - paragraph [ref=e612]:
                  - text: This approach ensures that agent-generated UIs are
                  - strong [ref=e613]: safe like data, but expressive like code
                  - text: .
                - generic [ref=e614]:
                  - heading "High-level philosophy" [level=2] [ref=e615]
                  - 'link "Permalink: High-level philosophy" [ref=e616] [cursor=pointer]':
                    - /url: "#high-level-philosophy"
                    - img [ref=e617]
                - paragraph [ref=e619]: A2UI was designed to address the specific challenges of interoperable, cross-platform, generative or template-based UI responses from agents.
                - paragraph [ref=e620]: "The project's core philosophies:"
                - list [ref=e621]:
                  - listitem [ref=e622]:
                    - strong [ref=e623]: Security first
                    - text: ": Running arbitrary code generated by an LLM may present a security risk. A2UI is a declarative data format, not executable code. Your client application maintains a \"catalog\" of trusted, pre-approved UI components (e.g., Card, Button, TextField), and the agent can only request to render components from that catalog."
                  - listitem [ref=e624]:
                    - strong [ref=e625]: LLM-friendly and incrementally updatable
                    - text: ": The UI is represented as a flat list of components with ID references which is easy for LLMs to generate incrementally, allowing for progressive rendering and a responsive user experience. An agent can efficiently make incremental changes to the UI based on new user requests as the conversation progresses."
                  - listitem [ref=e626]:
                    - strong [ref=e627]: Framework-agnostic and portable
                    - text: ": A2UI separates the UI structure from the UI implementation. The agent sends a description of the component tree and its associated data model. Your client application is responsible for mapping these abstract descriptions to its native widgets—be it web components, Flutter widgets, React components, SwiftUI views or something else entirely. The same A2UI JSON payload from an agent can be rendered on multiple different clients built on top of different frameworks."
                  - listitem [ref=e628]:
                    - strong [ref=e629]: Flexibility
                    - text: ": A2UI also features an open registry pattern that allows developers to map server-side types to custom client implementations, from native mobile widgets to React components. By registering a \"Smart Wrapper,\" you can connect any existing UI component—including secure iframe containers for legacy content—to A2UI's data binding and event system. Crucially, this places security firmly in the developer's hands, enabling them to enforce strict sandboxing policies and \"trust ladders\" directly within their custom component logic rather than relying solely on the core system."
                - generic [ref=e630]:
                  - heading "Use cases" [level=2] [ref=e631]
                  - 'link "Permalink: Use cases" [ref=e632] [cursor=pointer]':
                    - /url: "#use-cases"
                    - img [ref=e633]
                - paragraph [ref=e635]: "Some of the use cases include:"
                - list [ref=e636]:
                  - listitem [ref=e637]:
                    - strong [ref=e638]: "Dynamic Data Collection:"
                    - text: An agent generates a bespoke form (date pickers, sliders, inputs) based on the specific context of a conversation (e.g., booking a specialized reservation).
                  - listitem [ref=e639]:
                    - strong [ref=e640]: "Remote Sub-Agents:"
                    - text: An orchestrator agent delegates a task to a remote specialized agent (e.g., a travel booking agent) which returns a UI payload to be rendered inside the main chat window.
                  - listitem [ref=e641]:
                    - strong [ref=e642]: "Adaptive Workflows:"
