                - blockquote [ref=e684]:
                  - paragraph [ref=e685]:
                    - strong [ref=e686]: "Note:"
                    - text: A2UI is currently in
                    - strong [ref=e687]: v0.8 (Public Preview)
                    - text: . The specification and implementations are functional but are still evolving. We are opening the project to foster collaboration, gather feedback, and solicit contributions (e.g., on client renderers). Expect changes.
                - generic [ref=e688]:
                  - heading "Summary" [level=2] [ref=e689]
                  - 'link "Permalink: Summary" [ref=e690] [cursor=pointer]':
                    - /url: "#summary"
                    - img [ref=e691]
                - paragraph [ref=e693]: Generative AI excels at creating text and code, but agents can struggle to present rich, interactive interfaces to users, especially when those agents are remote or running across trust boundaries.
                - paragraph [ref=e694]:
                  - strong [ref=e695]: A2UI
                  - text: is an open standard and set of libraries that allows agents to "speak UI." Agents send a declarative JSON format describing the
                  - emphasis [ref=e696]: intent
                  - text: of the UI. The client application then renders this using its own native component library (Flutter, Angular, Lit, etc.).
                - paragraph [ref=e697]:
                  - text: This approach ensures that agent-generated UIs are
                  - strong [ref=e698]: safe like data, but expressive like code
                  - text: .
                - generic [ref=e699]:
                  - heading "High-level philosophy" [level=2] [ref=e700]
                  - 'link "Permalink: High-level philosophy" [ref=e701] [cursor=pointer]':
                    - /url: "#high-level-philosophy"
                    - img [ref=e702]
                - paragraph [ref=e704]: A2UI was designed to address the specific challenges of interoperable, cross-platform, generative or template-based UI responses from agents.
                - paragraph [ref=e705]: "The project's core philosophies:"
                - list [ref=e706]:
                  - listitem [ref=e707]:
                    - strong [ref=e708]: Security first
                    - text: ": Running arbitrary code generated by an LLM may present a security risk. A2UI is a declarative data format, not executable code. Your client application maintains a \"catalog\" of trusted, pre-approved UI components (e.g., Card, Button, TextField), and the agent can only request to render components from that catalog."
                  - listitem [ref=e709]:
                    - strong [ref=e710]: LLM-friendly and incrementally updatable
                    - text: ": The UI is represented as a flat list of components with ID references which is easy for LLMs to generate incrementally, allowing for progressive rendering and a responsive user experience. An agent can efficiently make incremental changes to the UI based on new user requests as the conversation progresses."
                  - listitem [ref=e711]:
                    - strong [ref=e712]: Framework-agnostic and portable
                    - text: ": A2UI separates the UI structure from the UI implementation. The agent sends a description of the component tree and its associated data model. Your client application is responsible for mapping these abstract descriptions to its native widgets—be it web components, Flutter widgets, React components, SwiftUI views or something else entirely. The same A2UI JSON payload from an agent can be rendered on multiple different clients built on top of different frameworks."
                  - listitem [ref=e713]:
                    - strong [ref=e714]: Flexibility
                    - text: ": A2UI also features an open registry pattern that allows developers to map server-side types to custom client implementations, from native mobile widgets to React components. By registering a \"Smart Wrapper,\" you can connect any existing UI component—including secure iframe containers for legacy content—to A2UI's data binding and event system. Crucially, this places security firmly in the developer's hands, enabling them to enforce strict sandboxing policies and \"trust ladders\" directly within their custom component logic rather than relying solely on the core system."
                - generic [ref=e715]:
                  - heading "Use cases" [level=2] [ref=e716]
                  - 'link "Permalink: Use cases" [ref=e717] [cursor=pointer]':
                    - /url: "#use-cases"
                    - img [ref=e718]
                - paragraph [ref=e720]: "Some of the use cases include:"
                - list [ref=e721]:
                  - listitem [ref=e722]:
                    - strong [ref=e723]: "Dynamic Data Collection:"
                    - text: An agent generates a bespoke form (date pickers, sliders, inputs) based on the specific context of a conversation (e.g., booking a specialized reservation).
                  - listitem [ref=e724]:
                    - strong [ref=e725]: "Remote Sub-Agents:"
                    - text: An orchestrator agent delegates a task to a remote specialized agent (e.g., a travel booking agent) which returns a UI payload to be rendered inside the main chat window.
                  - listitem [ref=e726]:
                    - strong [ref=e727]: "Adaptive Workflows:"
                    - text: Enterprise agents that generate approval dashboards or data visualizations on the fly based on the user's query.
                - generic [ref=e728]:
                  - heading "Architecture" [level=2] [ref=e729]
                  - 'link "Permalink: Architecture" [ref=e730] [cursor=pointer]':
