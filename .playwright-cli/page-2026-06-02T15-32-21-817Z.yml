                    - img [ref=e731]
                - paragraph [ref=e733]: "The A2UI flow disconnects the generation of UI from the execution of UI:"
                - list [ref=e734]:
                  - listitem [ref=e735]:
                    - strong [ref=e736]: "Generation:"
                    - text: An Agent (using Gemini or another LLM) generates or uses a pre-generated
                    - code [ref=e737]: A2UI Response
                    - text: ", a JSON payload describing the composition of UI components and their properties."
                  - listitem [ref=e738]:
                    - strong [ref=e739]: "Transport:"
                    - text: This message is sent to the client application (via A2A, AG UI, etc.).
                  - listitem [ref=e740]:
                    - strong [ref=e741]: "Resolution:"
                    - text: The Client's
                    - strong [ref=e742]: A2UI Renderer
                    - text: parses the JSON.
