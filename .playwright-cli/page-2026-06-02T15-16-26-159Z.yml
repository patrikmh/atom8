            - heading "Client to server updates ¶" [level=3] [ref=e1115]:
              - text: Client to server updates
              - link "¶" [ref=e1116] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#client-to-server-updates
            - paragraph [ref=e1117]:
              - text: When
              - code [ref=e1118]: sendDataModel
              - text: is set to
              - code [ref=e1119]: "true"
              - text: for a surface, the client automatically appends the
              - strong [ref=e1120]: entire data model
              - text: of that surface to the metadata of every message (such as
              - code [ref=e1121]: action
              - text: or user query) sent to the server that created the surface. The data model is included using the transport's metadata facility (e.g., the
              - code [ref=e1122]: metadata
              - text: field in A2A or a header in HTTP). The payload follows the schema in
              - link "client_data_model.json" [ref=e1123] [cursor=pointer]:
                - /url: https://a2ui.org/specification/json/client_data_model.json
                - code [ref=e1124]: client_data_model.json
              - text: .
            - list [ref=e1125]:
              - listitem [ref=e1126]:
                - strong [ref=e1127]: Targeted Delivery
                - text: ": The data model is sent exclusively to the server that created the surface. Data cannot leak to other agents or servers."
              - listitem [ref=e1128]:
                - strong [ref=e1129]: "Trigger:"
                - text: Data is sent only when a client-to-server message is triggered (e.g., by a user action like a button click). Passive data changes (like typing in a text field) do not trigger a network request on their own; they simply update the local state, which will be sent with the next action.
              - listitem [ref=e1130]:
                - strong [ref=e1131]: "Payload:"
                - text: The data model is included in the transport metadata, tagged by its
                - code [ref=e1132]: surfaceId
                - text: .
              - listitem [ref=e1133]:
                - strong [ref=e1134]: "Convergence:"
                - text: The server treats the received data model as the current state of the client at the time of the action.
            - heading "Client-side logic & validation ¶" [level=2] [ref=e1135]:
              - text: Client-side logic & validation
              - link "¶" [ref=e1136] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#client-side-logic-validation
            - paragraph [ref=e1137]:
              - text: A2UI v0.9 generalizes client-side logic into
              - strong [ref=e1138]: Functions
              - text: . These can be used for validation, data transformation, and dynamic property binding.
            - heading "Registered functions ¶" [level=3] [ref=e1139]:
              - text: Registered functions
              - link "¶" [ref=e1140] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#registered-functions
            - paragraph [ref=e1141]:
              - text: The client supports a set of named
              - strong [ref=e1142]: Functions
              - text: (e.g.,
              - code [ref=e1143]: required
              - text: ","
              - code [ref=e1144]: regex
              - text: ","
              - code [ref=e1145]: email
              - text: ","
              - code [ref=e1146]: add
              - text: ","
              - code [ref=e1147]: concat
              - text: ) which are defined in the JSON schema (e.g.
              - code [ref=e1148]: catalogs/basic/catalog.json
              - text: ) alongside the component definitions. The server references these functions by name in
              - code [ref=e1149]: FunctionCall
              - text: objects. This avoids sending executable code.
            - paragraph [ref=e1150]:
              - text: Input components (like
              - code [ref=e1151]: TextField
              - text: ","
              - code [ref=e1152]: CheckBox
              - text: ) can define a list of checks. Each failure produces a specific error message that can be displayed when the component is rendered. Note that for validation checks, the function must return a boolean.
            - generic [ref=e1154]:
              - navigation [ref=e1155]:
                - button "Toggle line selection" [ref=e1156] [cursor=pointer]
                - button "Copy to clipboard" [ref=e1157] [cursor=pointer]
              - code [ref=e1158]:
                - generic [ref=e1159]: "\"checks\": ["
                - generic [ref=e1160]: "{"
                - generic [ref=e1161]: "\"call\": \"required\","
                - generic [ref=e1162]: "\"args\": { \"value\": { \"path\": \"/formData/zip\" } },"
                - generic [ref=e1163]: "\"message\": \"Zip code is required\""
                - generic [ref=e1164]: "},"
                - generic [ref=e1165]: "{"
                - generic [ref=e1166]: "\"call\": \"regex\","
                - generic [ref=e1167]: "\"args\": {"
                - generic [ref=e1168]: "\"value\": { \"path\": \"/formData/zip\" },"
                - generic [ref=e1169]: "\"pattern\": \"^[0-9]{5}$\""
                - generic [ref=e1170]: "},"
                - generic [ref=e1171]: "\"message\": \"Must be a 5-digit zip code\""
                - generic [ref=e1172]: "}"
                - generic [ref=e1173]: "]"
            - 'heading "Example: button validation ¶" [level=3] [ref=e1174]':
              - text: "Example: button validation"
              - link "¶" [ref=e1175] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#example-button-validation
            - paragraph [ref=e1176]:
              - text: Buttons can also define
              - code [ref=e1177]: checks
              - text: . If any check fails, the button is automatically disabled. This allows the button's state to depend on the validity of data in the model.
            - generic [ref=e1179]:
