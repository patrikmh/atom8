            - 'heading "Data model representation: binding, scope ¶" [level=2] [ref=e835]':
              - text: "Data model representation: binding, scope"
              - link "¶" [ref=e836] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#data-model-representation-binding-scope
            - paragraph [ref=e837]:
              - text: This section describes how UI components
              - strong [ref=e838]: represent
              - text: and reference data from the Data Model. A2UI relies on a strictly defined relationship between the UI structure (Components) and the state (Data Model), defining the mechanics of path resolution, variable scope during iteration.
            - heading "Path resolution & scope ¶" [level=3] [ref=e839]:
              - text: Path resolution & scope
              - link "¶" [ref=e840] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#path-resolution-scope
            - paragraph [ref=e841]:
              - text: Data bindings in A2UI are defined using
              - strong [ref=e842]: JSON Pointers
              - text: (
              - link "RFC 6901" [ref=e843] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc6901
              - text: ). How a pointer is resolved depends on the current
              - strong [ref=e844]: Evaluation Scope
              - text: .
            - blockquote [ref=e845]:
              - paragraph [ref=e846]:
                - text: "[!NOTE] A2UI extends JSON Pointer to support"
                - strong [ref=e847]: Relative Paths
                - text: that do not start with a forward slash
                - code [ref=e848]: /
                - text: . This is a deviation from strict RFC 6901 to support template-based list rendering.
              - paragraph [ref=e849]:
                - strong [ref=e850]: "Note on progressive rendering:"
                - text: During the initial streaming phase, data paths may resolve to
                - code [ref=e851]: undefined
                - text: if the
                - code [ref=e852]: updateDataModel
                - text: message containing that data has not yet arrived. Renderers should handle
                - code [ref=e853]: undefined
                - text: values gracefully (e.g., by treating them as empty strings or showing a loading indicator) to support progressive rendering.
            - heading "The root scope ¶" [level=4] [ref=e854]:
              - text: The root scope
              - link "¶" [ref=e855] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-root-scope
            - paragraph [ref=e856]:
              - text: By default, all components operate in the
              - strong [ref=e857]: Root Scope
              - text: .
            - list [ref=e858]:
              - listitem [ref=e859]:
                - text: Paths starting with
                - code [ref=e860]: /
                - text: (e.g.,
                - code [ref=e861]: /user/profile/name
                - text: ) are
                - strong [ref=e862]: Absolute Paths
                - text: . They always resolve from the root of the Data Model, regardless of where the component is nested in the UI tree.
            - heading "Collection scopes (relative paths) ¶" [level=4] [ref=e863]:
              - text: Collection scopes (relative paths)
              - link "¶" [ref=e864] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#collection-scopes-relative-paths
            - paragraph [ref=e865]:
              - text: When a container component (such as
              - code [ref=e866]: Column
              - text: ","
              - code [ref=e867]: Row
              - text: ", or"
              - code [ref=e868]: List
              - text: ) utilizes the
              - strong [ref=e869]: Template
              - text: feature of
              - code [ref=e870]: ChildList
              - text: ", it creates a new"
              - strong [ref=e871]: Child Scope
              - text: for each item in the bound array.
            - list [ref=e872]:
              - listitem [ref=e873]:
                - strong [ref=e874]: "Template definition:"
                - text: When a container binds its children to a path (e.g.,
                - code [ref=e875]: "path: \"/users\""
                - text: ), the client iterates over the array found at that location.
              - listitem [ref=e876]:
                - strong [ref=e877]: "Scope instantiation:"
                - text: For every item in the array, the client instantiates the template component.
              - listitem [ref=e878]:
                - strong [ref=e879]: "Relative resolution:"
                - text: Inside these instantiated components, any path that
                - strong [ref=e880]: does not
                - text: start with a forward slash
                - code [ref=e881]: /
                - text: is treated as a
                - strong [ref=e882]: Relative Path
                - text: .
              - listitem [ref=e883]:
                - text: A relative path
                - code [ref=e884]: firstName
                - text: inside a template iterating over
                - code [ref=e885]: /users
                - text: resolves to
                - code [ref=e886]: /users/0/firstName
                - text: for the first item,
                - code [ref=e887]: /users/1/firstName
                - text: for the second, etc.
              - listitem [ref=e888]:
                - paragraph [ref=e889]: It is an error to use a non-numeric index on a path segment that refers to an array.
              - listitem [ref=e890]:
                - paragraph [ref=e891]:
                  - strong [ref=e892]: "Mixing scopes:"
                  - text: Components inside a Child Scope can still access the Root Scope by using an Absolute Path.
            - 'heading "Example: scope resolution ¶" [level=4] [ref=e893]':
              - text: "Example: scope resolution"
              - link "¶" [ref=e894] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#example-scope-resolution
