            - paragraph [ref=e364]: A Specification for a JSON-Based, Streaming UI Protocol
            - heading "Introduction ¶" [level=2] [ref=e365]:
              - text: Introduction
              - link "¶" [ref=e366] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#introduction
            - paragraph [ref=e367]: The A2UI Protocol is designed for dynamically rendering user interfaces from a stream of JSON objects sent from a server (Agent). Its core philosophy emphasizes a clean separation of UI structure and application data, enabling progressive rendering as the client processes each message.
            - paragraph [ref=e368]: "Communication occurs via a stream of JSON objects. The client parses each object as a distinct message and incrementally builds or updates the UI. The server-to-client protocol defines four message types:"
            - list [ref=e369]:
              - listitem [ref=e370]:
                - code [ref=e371]: createSurface
                - text: ": Signals the client to create a new surface and begin rendering it."
              - listitem [ref=e372]:
                - code [ref=e373]: updateComponents
                - text: ": Provides a list of component definitions to be added to or updated in a specific surface."
              - listitem [ref=e374]:
                - code [ref=e375]: updateDataModel
                - text: ": Provides new data to be inserted into or to replace a surface's data model."
              - listitem [ref=e376]:
                - code [ref=e377]: deleteSurface
                - text: ": Explicitly removes a surface and its contents from the UI."
            - heading "Changes from previous versions ¶" [level=2] [ref=e378]:
              - text: Changes from previous versions
              - link "¶" [ref=e379] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#changes-from-previous-versions
            - paragraph [ref=e380]: Version 0.9 of the A2UI protocol represents a philosophical shift from previous versions. While v0.8 was optimized for LLMs that support structured output, v0.9 is designed to be embedded directly within a model's prompt. The LLM is then asked to produce JSON that matches the provided examples and schema descriptions.
            - paragraph [ref=e381]: "This \"prompt-first\" approach offers several advantages:"
            - list [ref=e382]:
              - listitem [ref=e383]:
                - strong [ref=e384]: "Richer schema:"
                - text: The protocol is no longer limited by the constraints of structured output formats. This allows for more readable, complex, and expressive component catalogs.
              - listitem [ref=e385]:
                - strong [ref=e386]: "Modularity:"
                - text: The schema is now refactored into separate, more manageable components (e.g., [
                - code [ref=e387]: common_types.json
                - text: "], ["
                - code [ref=e388]: catalogs/basic/catalog.json
                - text: "], ["
                - code [ref=e389]: server_to_client.json
                - text: "]), improving maintainability and modularity."
            - paragraph [ref=e390]: The main disadvantage of this approach is that it requires more complex post-generation validation, as the LLM is not strictly constrained by the schema. This requires robust error handling and correction, so the system can identify discrepancies and attempt to fix them before rendering, or request a retry or correction from the LLM.
            - paragraph [ref=e391]:
              - text: See
              - link "the evolution guide" [ref=e392] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/evolution_guide.md
              - text: for a detailed explanation of the differences between v0.8 and v0.9.
            - heading "Protocol overview & data flow ¶" [level=2] [ref=e393]:
              - text: Protocol overview & data flow
              - link "¶" [ref=e394] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#protocol-overview-data-flow
            - paragraph [ref=e395]: The A2UI protocol uses a unidirectional stream of JSON messages from the server to the client to describe and update the UI. The client consumes this stream, builds the UI, and renders it. User interactions are handled separately, typically by sending events to a different endpoint, which may in turn trigger new messages on the UI stream.
            - paragraph [ref=e396]: "Here is an example sequence of events (which don't have to be in exactly this order):"
            - list [ref=e397]:
              - listitem [ref=e398]:
                - strong [ref=e399]: "Create Surface:"
                - text: The server sends a
                - code [ref=e400]: createSurface
                - text: message to initialize the surface.
              - listitem [ref=e401]:
                - strong [ref=e402]: "Update Surface:"
                - text: Once a surface has been created, the server sends one or more
                - code [ref=e403]: updateComponents
                - text: messages containing the definitions for all the components that will be part of the surface.
              - listitem [ref=e404]:
                - strong [ref=e405]: "Update Data Model:"
                - text: Once a surface has been created, the server can send
                - code [ref=e406]: updateDataModel
                - text: messages at any time to populate or change the data that the UI components will display.
              - listitem [ref=e407]:
                - strong [ref=e408]: "Render:"
                - text: The client renders the UI for the surface, using the component definitions to build the structure and the data model to populate the content.
              - listitem [ref=e409]:
                - strong [ref=e410]: "Dynamic updates:"
                - text: As the user interacts with the application or as new information becomes available, the server can send additional
                - code [ref=e411]: updateComponents
                - text: and
                - code [ref=e412]: updateDataModel
                - text: messages to dynamically change the UI.
              - listitem [ref=e413]:
                - strong [ref=e414]: "Delete Surface:"
                - text: When a UI region is no longer needed, the server sends a
                - code [ref=e415]: deleteSurface
                - text: message to remove it.
            - heading "Transport decoupling ¶" [level=2] [ref=e417]:
              - text: Transport decoupling
              - link "¶" [ref=e418] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#transport-decoupling
            - paragraph [ref=e419]: The A2UI protocol is designed to be transport-agnostic. It defines the JSON message structure and the semantic contract between the server (Agent) and the client (Renderer), but it does not mandate a specific transport layer.
            - heading "The transport contract ¶" [level=3] [ref=e420]:
              - text: The transport contract
              - link "¶" [ref=e421] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-transport-contract
            - paragraph [ref=e422]: "To support A2UI, a transport layer must fulfill the following contract:"
            - list [ref=e423]:
              - listitem [ref=e424]:
                - strong [ref=e425]: Reliable delivery
                - text: ": Messages must be delivered in the order they were generated. A2UI relies on stateful updates (e.g., creating a surface before updating it), so out-of-order delivery can corrupt the UI state."
              - listitem [ref=e426]:
                - strong [ref=e427]: Message framing
                - text: ": The transport must clearly delimit individual JSON envelope messages (e.g., using newlines in JSONL, WebSocket frames, or SSE events)."
              - listitem [ref=e428]:
                - strong [ref=e429]: Metadata support
                - text: ": The transport must provide a mechanism to associate metadata with messages. This is critical for:"
                - list [ref=e430]:
                  - listitem [ref=e431]:
                    - strong [ref=e432]: Data model synchronization
                    - text: ": The"
                    - code [ref=e433]: sendDataModel
                    - text: feature requires the client to send the current data model state as metadata alongside user actions.
                  - listitem [ref=e434]:
                    - strong [ref=e435]: Capabilities exchange
                    - text: ": Client capabilities (supported catalogs, custom components) and Server capabilities are exchanged via metadata or transport-specific handshakes (like Agent Cards in A2A or initialization in MCP)."
              - listitem [ref=e436]:
                - strong [ref=e437]: Bidirectional capability (optional)
                - text: ": While the rendering stream is unidirectional (Server -> Client), interactive applications require a return channel for"
                - code [ref=e438]: action
                - text: messages (Client -> Server).
            - heading "Transport bindings ¶" [level=3] [ref=e439]:
              - text: Transport bindings
              - link "¶" [ref=e440] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#transport-bindings
            - paragraph [ref=e441]: While A2UI is agnostic, it is most commonly used with the following transports.
            - heading "A2A (Agent2Agent) binding ¶" [level=4] [ref=e442]:
              - text: A2A (Agent2Agent) binding
              - link "¶" [ref=e443] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#a2a-agent2agent-binding
            - paragraph [ref=e444]:
              - link "A2A (Agent-to-Agent)" [ref=e445] [cursor=pointer]:
                - /url: https://a2a-protocol.org/latest/
              - text: is an excellent transport option for A2UI in agentic systems, extending A2A with additional payloads. A2A is uniquely capable of handling remote agent communication, and can also provide a secure and effecient transport between an agentic backend and front end application.
            - list [ref=e446]:
              - listitem [ref=e447]:
                - strong [ref=e448]: Message mapping
                - text: ": Each A2UI envelope (e.g.,"
                - code [ref=e449]: updateComponents
                - text: ) corresponds to the payload of a single A2A message Part.
              - listitem [ref=e450]:
                - strong [ref=e451]: Metadata
                - text: ":"
              - listitem [ref=e452]:
                - strong [ref=e453]: Data model
                - text: ": When"
                - code [ref=e454]: sendDataModel
                - text: is active, the client's
                - code [ref=e455]: a2uiClientDataModel
                - text: object is placed in the
                - code [ref=e456]: metadata
                - text: field of the A2A message.
              - listitem [ref=e457]:
                - strong [ref=e458]: Capabilities
                - text: ": The"
                - code [ref=e459]: a2uiClientCapabilities
                - text: object is placed in the
                - code [ref=e460]: metadata
                - text: field of every A2A message sent from the client to the server.
              - listitem [ref=e461]:
                - strong [ref=e462]: Context
                - text: ": A2UI sessions typically map to A2A"
                - code [ref=e463]: contextId
                - text: . All messages for a set of related surfaces should share the same
                - code [ref=e464]: contextId
                - text: .
            - heading "AG UI (Agent to User Interface) binding ¶" [level=4] [ref=e465]:
              - text: AG UI (Agent to User Interface) binding
              - link "¶" [ref=e466] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#ag-ui-agent-to-user-interface-binding
            - paragraph [ref=e467]:
              - strong [ref=e468]:
                - link "AG-UI" [ref=e469] [cursor=pointer]:
                  - /url: https://docs.ag-ui.com/introduction
              - text: is also an excellent transport option for A2UI Agent–User Interaction protocol. AG UI provides convenient integrations into many agent frameworks and frontends. AG UI provides low latency and shared state message passing between front ends and agentic backends.
            - heading "Other transports ¶" [level=4] [ref=e470]:
              - text: Other transports
              - link "¶" [ref=e471] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#other-transports
            - paragraph [ref=e472]: "A2UI can also be carried over:"
            - list [ref=e473]:
              - listitem [ref=e474]:
                - strong [ref=e475]:
                  - link "MCP (Model Context Protocol)" [ref=e476] [cursor=pointer]:
                    - /url: https://modelcontextprotocol.io/docs/getting-started/intro
                - text: ": Delivered as tool outputs or resource subscriptions."
              - listitem [ref=e477]:
                - strong [ref=e478]:
                  - link "SSE" [ref=e479] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Server-sent_events
                  - text: with
                  - link "JSON RPC" [ref=e480] [cursor=pointer]:
                    - /url: https://www.jsonrpc.org/
                - text: ": Standard server-sent events for web integrations that support streaming, and JSON RPC for client-server communication."
              - listitem [ref=e481]:
                - strong [ref=e482]:
                  - link "WebSockets" [ref=e483] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/WebSocket
                - text: ": For bidirectional, real-time sessions."
              - listitem [ref=e484]:
                - strong [ref=e485]:
                  - link "REST" [ref=e486] [cursor=pointer]:
                    - /url: https://cloud.google.com/discover/what-is-rest-api?hl=en
                - text: ": For simple use case, REST APIs will work but lack streaming capabilities."
            - heading "The protocol schemas ¶" [level=2] [ref=e487]:
              - text: The protocol schemas
              - link "¶" [ref=e488] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-protocol-schemas
            - paragraph [ref=e489]: A2UI v0.9 is defined by three interacting JSON schemas.
            - heading "Common types ¶" [level=3] [ref=e490]:
              - text: Common types
              - link "¶" [ref=e491] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#common-types
            - paragraph [ref=e492]:
              - text: The [
              - code [ref=e493]: common_types.json
              - text: "] schema defines reusable primitives used throughout the protocol."
            - list [ref=e494]:
              - listitem [ref=e495]:
                - strong [ref=e496]:
                  - code [ref=e497]: DynamicString
                  - text: /
                  - code [ref=e498]: DynamicNumber
                  - text: /
                  - code [ref=e499]: DynamicBoolean
                  - text: /
                  - code [ref=e500]: DynamicStringList
                - text: ": The core of the data binding system. Any property that can be bound to data is defined as a"
                - code [ref=e501]: Dynamic*
                - text: type. It accepts either a literal value, a
                - code [ref=e502]: path
                - text: string (
                - link "JSON Pointer" [ref=e503] [cursor=pointer]:
                  - /url: https://datatracker.ietf.org/doc/html/rfc6901
                - text: ), or a
                - code [ref=e504]: FunctionCall
                - text: (function call).
              - listitem [ref=e505]:
                - strong [ref=e506]:
                  - code [ref=e507]: ChildList
                - text: ": Defines how containers hold children. It supports:"
              - listitem [ref=e508]:
                - code [ref=e509]: array
                - text: ": A static array of"
                - code [ref=e510]: ComponentId
                - text: component references.
              - listitem [ref=e511]:
                - paragraph [ref=e512]:
                  - code [ref=e513]: object
                  - text: ": A template for generating children from a data binding list (requires a template"
                  - code [ref=e514]: componentId
                  - text: and a data binding
                  - code [ref=e515]: path
                  - text: ).
              - listitem [ref=e516]:
                - paragraph [ref=e517]:
                  - strong [ref=e518]:
                    - code [ref=e519]: ComponentId
                  - text: ": A reference to the unique ID of another component within the same surface."
            - 'heading "Server to client message structure: the envelope ¶" [level=3] [ref=e520]':
              - text: "Server to client message structure: the envelope"
              - link "¶" [ref=e521] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#server-to-client-message-structure-the-envelope
            - paragraph [ref=e522]:
              - text: The [
              - code [ref=e523]: server_to_client.json
              - text: "] schema is the top-level entry point. Every message streamed by the server must validate against this schema. It handles the message dispatching."
            - heading "The Basic Catalog ¶" [level=3] [ref=e524]:
              - text: The Basic Catalog
              - link "¶" [ref=e525] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-basic-catalog
            - paragraph [ref=e526]:
              - text: The [
              - code [ref=e527]: catalogs/basic/catalog.json
              - text: "] schema contains the definitions for all specific UI components (e.g.,"
              - code [ref=e528]: Text
              - text: ","
              - code [ref=e529]: Button
              - text: ","
              - code [ref=e530]: Row
              - text: ), functions (e.g.,
              - code [ref=e531]: required
              - text: ","
              - code [ref=e532]: email
              - text: ), and the theme schema.
            - paragraph [ref=e533]:
              - strong [ref=e534]: "Swappable Catalogs & Validation:"
            - paragraph [ref=e535]:
              - text: The [
              - code [ref=e536]: server_to_client.json
              - text: "] envelope schema is designed to be catalog-agnostic. It references components and themes using a placeholder filename:"
              - code [ref=e537]: catalog.json
              - text: (specifically
              - code [ref=e538]: "$ref: \"catalog.json#/$defs/anyComponent\""
              - text: and
              - code [ref=e539]: "$ref: \"catalog.json#/$defs/theme\""
              - text: ).
            - paragraph [ref=e540]: "To validate A2UI messages:"
            - list [ref=e541]:
              - listitem [ref=e542]:
                - strong [ref=e543]: Basic Catalog
                - text: ": Map"
                - code [ref=e544]: catalog.json
                - text: to
                - code [ref=e545]: catalogs/basic/catalog.json
                - text: .
              - listitem [ref=e546]:
                - strong [ref=e547]: Client Catalog
                - text: ": Map"
                - code [ref=e548]: catalog.json
                - text: to your own catalog file (e.g.,
                - code [ref=e549]: my_company_catalog.json
                - text: ).
            - paragraph [ref=e550]: This indirection allows the same core envelope schema to be used with any compliant component catalog without modification.
            - paragraph [ref=e551]:
              - text: Defining your own catalog allows you to restrict the agent to using exactly the components and visual language that exist in your application. To use your own catalog, simply include it in the prompt in place of the basic catalog. It should have the same form as the basic catalog and use common elements in the [
              - code [ref=e552]: common_types.json
              - text: "] schema."
            - heading "Validator compliance when defining catalogs ¶" [level=3] [ref=e553]:
              - text: Validator compliance when defining catalogs
              - link "¶" [ref=e554] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#validator-compliance-when-defining-catalogs
            - paragraph [ref=e555]: "To ensure that automated validators can verify the integrity of your UI tree (checking that parents reference existing children), any catalog you define MUST adhere to the following strict typing rules:"
            - list [ref=e556]:
              - listitem [ref=e557]:
                - paragraph [ref=e558]:
                  - strong [ref=e559]: "Single child references:"
                  - text: Any property that holds the ID of another component MUST use the
                  - code [ref=e560]: ComponentId
                  - text: type defined in
                  - code [ref=e561]: common_types.json
                  - text: .
                - list [ref=e562]:
                  - listitem [ref=e563]:
                    - text: "Use:"
                    - code [ref=e564]: "\"$ref\": \"common_types.json#/$defs/ComponentId\""
                  - listitem [ref=e565]:
                    - text: "Do NOT use:"
                    - code [ref=e566]: "\"type\": \"string\""
              - listitem [ref=e567]:
                - paragraph [ref=e568]:
                  - strong [ref=e569]: "List references:"
                  - text: Any property that holds a list of children or a template MUST use the
                  - code [ref=e570]: ChildList
                  - text: type.
                - list [ref=e571]:
                  - listitem [ref=e572]:
                    - text: "Use:"
                    - code [ref=e573]: "\"$ref\": \"common_types.json#/$defs/ChildList\""
            - paragraph [ref=e574]: Validators determine which fields represent structural links by looking for these specific schema references. If you use a raw string type for an ID, the validator will treat it as static text (like a URL or label) and will not check if the target component exists.
            - heading "Envelope message structure ¶" [level=2] [ref=e575]:
              - text: Envelope message structure
              - link "¶" [ref=e576] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#envelope-message-structure
            - paragraph [ref=e577]:
              - text: "The envelope defines four primary message types, and every message streamed by the server must be a JSON object containing exactly one of the following keys:"
              - code [ref=e578]: createSurface
              - text: ","
              - code [ref=e579]: updateComponents
              - text: ","
              - code [ref=e580]: updateDataModel
              - text: ", or"
              - code [ref=e581]: deleteSurface
              - text: . The key indicates the type of message, and these are the messages that make up each message in the protocol stream.
            - heading "createSurface ¶" [level=3] [ref=e582]:
              - code [ref=e583]: createSurface
              - link "¶" [ref=e584] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#createsurface
            - paragraph [ref=e585]:
              - text: This message signals the client to create a new surface and begin rendering it. A surface must be created before any
              - code [ref=e586]: updateComponents
              - text: or
              - code [ref=e587]: updateDataModel
              - text: messages can be sent to it. While typically achieved by the agent sending a
              - code [ref=e588]: createSurface
              - text: message, an agent may skip this if it knows the surface has already been created (e.g., by another agent). Once a surface is created, its
              - code [ref=e589]: surfaceId
              - text: and
              - code [ref=e590]: catalogId
              - text: are fixed; to reconfigure them, the surface must be deleted and recreated. It is an error to send
              - code [ref=e591]: createSurface
              - text: for a
              - code [ref=e592]: surfaceId
              - text: that already exists without first deleting it. One of the components in one of the component lists MUST have an
              - code [ref=e593]: id
              - text: of
              - code [ref=e594]: root
              - text: to serve as the root of the component tree.
            - paragraph [ref=e595]:
              - strong [ref=e596]: "Properties:"
            - list [ref=e597]:
              - listitem [ref=e598]:
                - code [ref=e599]: surfaceId
                - text: "(string, required): The unique identifier for the UI surface to be rendered."
              - listitem [ref=e600]:
                - code [ref=e601]: catalogId
                - text: "(string, required): A string that uniquely identifies the catalog (components and functions) used for this surface. It is recommended to prefix this with an internet domain that you own, to avoid conflicts (e.g.,"
                - code [ref=e602]: https://mycompany.com/1.0/somecatalog
                - text: ). If it is a URL, the URL does not need to have any deployed resources, it is simply a unique identifier.
              - listitem [ref=e603]:
                - code [ref=e604]: theme
                - text: "(object, optional): A JSON object containing theme parameters (e.g.,"
                - code [ref=e605]: primaryColor
                - text: ) defined in the catalog's theme schema.
              - listitem [ref=e606]:
                - code [ref=e607]: sendDataModel
                - text: "(boolean, optional): If true, the client will send the full data model of this surface in the metadata of every message sent to the server (via the Transport's metadata mechanism). This ensures the surface owner receives the full current state of the UI alongside the user's action or query. Defaults to false."
            - paragraph [ref=e608]:
              - strong [ref=e609]: "Example:"
            - generic [ref=e611]:
              - navigation [ref=e612]:
                - button "Toggle line selection" [ref=e613] [cursor=pointer]
                - button "Copy to clipboard" [ref=e614] [cursor=pointer]
              - code [ref=e615]:
                - generic [ref=e616]: "{"
                - generic [ref=e617]: "\"version\": \"v0.9\","
                - generic [ref=e618]: "\"createSurface\": {"
                - generic [ref=e619]: "\"surfaceId\": \"user_profile_card\","
                - generic [ref=e620]: "\"catalogId\": \"https://a2ui.org/specification/v0_9/catalogs/basic/catalog.json\","
                - generic [ref=e621]: "\"theme\": {"
                - generic [ref=e622]: "\"primaryColor\": \"#00BFFF\""
                - generic [ref=e623]: "},"
                - generic [ref=e624]: "\"sendDataModel\": true"
                - generic [ref=e625]: "}"
                - generic [ref=e626]: "}"
            - heading "updateComponents ¶" [level=3] [ref=e627]:
              - code [ref=e628]: updateComponents
              - link "¶" [ref=e629] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#updatecomponents
            - paragraph [ref=e630]: This message provides a list of UI components to be added to or updated within a specific surface. The components are provided as a flat list, and their relationships are defined by ID references in an adjacency list. This message may only be sent to a surface that has already been created. Note that components may reference children or data bindings that do not yet exist; clients should handle this gracefully by rendering placeholders (progressive rendering).
            - paragraph [ref=e631]:
              - strong [ref=e632]: "Properties:"
            - list [ref=e633]:
              - listitem [ref=e634]:
                - code [ref=e635]: surfaceId
                - text: "(string, required): The unique identifier for the UI surface to be updated. This is typically a name with meaning (e.g. \"user_profile_card\"), and it has to be unique within the context of the GenUI session."
              - listitem [ref=e636]:
                - code [ref=e637]: components
                - text: "(array, required): A list of component objects. The components are provided as a flat list, and their relationships are defined by ID references in an adjacency list."
            - paragraph [ref=e638]:
              - strong [ref=e639]: "Example:"
            - generic [ref=e641]:
              - navigation [ref=e642]:
                - button "Toggle line selection" [ref=e643] [cursor=pointer]
                - button "Copy to clipboard" [ref=e644] [cursor=pointer]
              - code [ref=e645]:
                - generic [ref=e646]: "{"
                - generic [ref=e647]: "\"version\": \"v0.9\","
                - generic [ref=e648]: "\"updateComponents\": {"
                - generic [ref=e649]: "\"surfaceId\": \"user_profile_card\","
                - generic [ref=e650]: "\"components\": ["
                - generic [ref=e651]: "{"
                - generic [ref=e652]: "\"id\": \"root\","
                - generic [ref=e653]: "\"component\": \"Column\","
                - generic [ref=e654]: "\"children\": [\"user_name\", \"user_title\"]"
                - generic [ref=e655]: "},"
                - generic [ref=e656]: "{"
                - generic [ref=e657]: "\"id\": \"user_name\","
                - generic [ref=e658]: "\"component\": \"Text\","
                - generic [ref=e659]: "\"text\": \"John Doe\""
                - generic [ref=e660]: "},"
                - generic [ref=e661]: "{"
                - generic [ref=e662]: "\"id\": \"user_title\","
                - generic [ref=e663]: "\"component\": \"Text\","
