            - heading "Two-way binding & input components ¶" [level=3] [ref=e954]:
              - text: Two-way binding & input components
              - link "¶" [ref=e955] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#two-way-binding-input-components
            - paragraph [ref=e956]:
              - text: Interactive components that accept user input (
              - code [ref=e957]: TextField
              - text: ","
              - code [ref=e958]: CheckBox
              - text: ","
              - code [ref=e959]: Slider
              - text: ","
              - code [ref=e960]: ChoicePicker
              - text: ","
              - code [ref=e961]: DateTimeInput
              - text: ) establish a
              - strong [ref=e962]: Two-Way Binding
              - text: with the Data Model.
            - heading "The read/write contract ¶" [level=4] [ref=e963]:
              - text: The read/write contract
              - link "¶" [ref=e964] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-readwrite-contract
            - paragraph [ref=e965]:
              - text: Unlike static display components (like
              - code [ref=e966]: Text
              - text: ), input components modify the client-side data model immediately upon user interaction.
            - list [ref=e967]:
              - listitem [ref=e968]:
                - strong [ref=e969]: "Read (Model -> View):"
                - text: When the component renders, it reads its value from the bound
                - code [ref=e970]: path
                - text: . If the Data Model is updated via
                - code [ref=e971]: updateDataModel
                - text: ", the component re-renders to reflect the new value."
              - listitem [ref=e972]:
                - strong [ref=e973]: "Write (View -> Model):"
                - text: When the user interacts with the component (e.g., types a character, toggles a box), the client
                - strong [ref=e974]: immediately
                - text: updates the value at the bound
                - code [ref=e975]: path
                - text: in the local Data Model.
            - heading "Reactivity ¶" [level=4] [ref=e976]:
              - text: Reactivity
              - link "¶" [ref=e977] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#reactivity
            - paragraph [ref=e978]:
              - text: Because the local Data Model is the single source of truth, updates from input components are
              - strong [ref=e979]: reactive
              - text: .
            - list [ref=e980]:
              - listitem [ref=e981]:
                - text: If a
                - code [ref=e982]: TextField
                - text: is bound to
                - code [ref=e983]: /user/name
                - text: ", and a separate"
                - code [ref=e984]: Text
                - text: label is also bound to
                - code [ref=e985]: /user/name
                - text: ", the label must update in real-time as the user types in the text field."
            - heading "Server synchronization ¶" [level=4] [ref=e986]:
              - text: Server synchronization
              - link "¶" [ref=e987] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#server-synchronization
            - paragraph [ref=e988]:
              - text: It is critical to note that Two-Way Binding is
              - strong [ref=e989]: local to the client
              - text: .
            - list [ref=e990]:
              - listitem [ref=e991]:
                - text: User inputs (keystrokes, toggles) do
                - strong [ref=e992]: not
                - text: automatically trigger network requests to the server.
              - listitem [ref=e993]:
                - text: The updated state is sent to the server only when a specific
                - strong [ref=e994]: User Action
                - text: is triggered (e.g., a
                - code [ref=e995]: Button
                - text: click).
              - listitem [ref=e996]:
                - text: When an
                - code [ref=e997]: action
                - text: is dispatched, the
                - code [ref=e998]: context
                - text: property of the action can reference the modified data paths to send the user's input back to the server.
            - 'heading "Example: form submission pattern ¶" [level=4] [ref=e999]':
              - text: "Example: form submission pattern"
              - link "¶" [ref=e1000] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#example-form-submission-pattern
            - list [ref=e1001]:
              - listitem [ref=e1002]:
                - strong [ref=e1003]: "Bind:"
                - code [ref=e1004]: TextField
                - text: is bound to
                - code [ref=e1005]: /formData/email
                - text: .
              - listitem [ref=e1006]:
                - strong [ref=e1007]: "Interact:"
                - text: User types "jane@example.com". The local model at
                - code [ref=e1008]: /formData/email
                - text: is updated.
              - listitem [ref=e1009]:
                - paragraph [ref=e1010]:
                  - strong [ref=e1011]: "Action:"
                  - text: "A \"Submit\" button has the following action definition:"
                - generic [ref=e1013]:
                  - navigation [ref=e1014]:
                    - button "Toggle line selection" [ref=e1015] [cursor=pointer]
                    - button "Copy to clipboard" [ref=e1016] [cursor=pointer]
                  - code [ref=e1017]:
                    - generic [ref=e1018]: "\"action\": {"
                    - generic [ref=e1019]: "\"event\": {"
                    - generic [ref=e1020]: "\"name\": \"submit_form\","
                    - generic [ref=e1021]: "\"context\": {"
                    - generic [ref=e1022]: "\"email\": { \"path\": \"/formData/email\" }"
                    - generic [ref=e1023]: "}"
                    - generic [ref=e1024]: "}"
                    - generic [ref=e1025]: "}"
              - listitem [ref=e1026]:
                - paragraph [ref=e1027]:
                  - strong [ref=e1028]: "Send:"
                  - text: When clicked, the client resolves
                  - code [ref=e1029]: /formData/email
                  - text: (getting "jane@example.com") and sends it in the
                  - code [ref=e1030]: action
                  - text: payload.
            - 'heading "Data model updates: synchronization and convergence ¶" [level=2] [ref=e1031]':
              - text: "Data model updates: synchronization and convergence"
              - link "¶" [ref=e1032] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#data-model-updates-synchronization-and-convergence
            - paragraph [ref=e1033]:
              - text: While the sections above describe how components reference data, this section defines how the Data Model itself is
              - strong [ref=e1034]: updated
              - text: and synchronized.
            - paragraph [ref=e1035]:
              - text: To support reliable data synchronization between the Renderer and the Agent that created the surface, the A2UI protocol uses a simple synchronization mechanism controlled by the
              - code [ref=e1036]: sendDataModel
              - text: property in the
              - code [ref=e1037]: createSurface
              - text: message.
            - heading "Server to client updates ¶" [level=3] [ref=e1038]:
              - text: Server to client updates
              - link "¶" [ref=e1039] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#server-to-client-updates
            - paragraph [ref=e1040]:
              - text: The server sends
              - code [ref=e1041]: updateDataModel
              - text: "messages to modify the client's data model. These updates follow strict upsert semantics:"
            - list [ref=e1042]:
              - listitem [ref=e1043]: If the path exists, the value is updated.
              - listitem [ref=e1044]: If the path does not exist, the value is created.
              - listitem [ref=e1045]:
                - text: If the value is omitted (or set to
                - code [ref=e1046]: undefined
                - text: ), the key is removed. For arrays, the value at the index is set to
                - code [ref=e1047]: undefined
                - text: ", preserving length."
            - paragraph [ref=e1048]:
              - text: The
              - code [ref=e1049]: updateDataModel
              - text: message replaces the value at the specified
              - code [ref=e1050]: path
              - text: with the new content. If
              - code [ref=e1051]: path
              - text: is omitted (or is
              - code [ref=e1052]: /
              - text: ), the entire data model for the surface is replaced.
            - paragraph [ref=e1053]:
              - strong [ref=e1054]: "Properties:"
            - list [ref=e1055]:
              - listitem [ref=e1056]:
                - code [ref=e1057]: surfaceId
                - text: "(string, required): The ID of the surface to update."
              - listitem [ref=e1058]:
                - code [ref=e1059]: path
                - text: "(string, optional): A JSON Pointer to the location in the data model to update. Defaults to"
                - code [ref=e1060]: /
                - text: .
              - listitem [ref=e1061]:
                - code [ref=e1062]: value
                - text: "(any, optional): The new value for the specified path. If omitted, the key at"
                - code [ref=e1063]: path
                - text: is removed.
            - paragraph [ref=e1064]:
              - strong [ref=e1065]: "Examples:"
            - paragraph [ref=e1066]:
              - emphasis [ref=e1067]: "Update a specific field:"
            - generic [ref=e1069]:
              - navigation [ref=e1070]:
                - button "Toggle line selection" [ref=e1071] [cursor=pointer]
                - button "Copy to clipboard" [ref=e1072] [cursor=pointer]
              - code [ref=e1073]:
                - generic [ref=e1074]: "{"
                - generic [ref=e1075]: "\"version\": \"v0.9\","
                - generic [ref=e1076]: "\"updateDataModel\": {"
                - generic [ref=e1077]: "\"surfaceId\": \"surface_123\","
                - generic [ref=e1078]: "\"path\": \"/user/firstName\","
                - generic [ref=e1079]: "\"value\": \"Alice\""
                - generic [ref=e1080]: "}"
                - generic [ref=e1081]: "}"
            - paragraph [ref=e1082]:
              - emphasis [ref=e1083]: "Remove a field:"
            - generic [ref=e1085]:
              - navigation [ref=e1086]:
                - button "Toggle line selection" [ref=e1087] [cursor=pointer]
                - button "Copy to clipboard" [ref=e1088] [cursor=pointer]
              - code [ref=e1089]:
                - generic [ref=e1090]: "{"
                - generic [ref=e1091]: "\"version\": \"v0.9\","
                - generic [ref=e1092]: "\"updateDataModel\": {"
                - generic [ref=e1093]: "\"surfaceId\": \"surface_123\","
                - generic [ref=e1094]: "\"path\": \"/user/tempData\""
                - generic [ref=e1095]: "}"
                - generic [ref=e1096]: "}"
            - paragraph [ref=e1097]:
              - emphasis [ref=e1098]: "Replace the entire data model:"
            - generic [ref=e1100]:
              - navigation [ref=e1101]:
                - button "Toggle line selection" [ref=e1102] [cursor=pointer]
                - button "Copy to clipboard" [ref=e1103] [cursor=pointer]
              - code [ref=e1104]:
