              - link "¶" [ref=e671] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#updatedatamodel
            - paragraph [ref=e672]:
              - text: This message is used to send or update the data that populates the UI components. It allows the server to change the UI's content without resending the entire component structure. The
              - code [ref=e673]: updateDataModel
              - text: message replaces the value at the specified
              - code [ref=e674]: path
              - text: with the new content. If
              - code [ref=e675]: path
              - text: is omitted (or is
              - code [ref=e676]: /
              - text: ), the entire data model for the surface is replaced.
            - paragraph [ref=e677]:
              - strong [ref=e678]: "Properties:"
            - list [ref=e679]:
              - listitem [ref=e680]:
                - code [ref=e681]: surfaceId
                - text: "(string, required): The unique identifier for the UI surface this data model update applies to."
              - listitem [ref=e682]:
                - code [ref=e683]: path
                - text: "(string, optional): A JSON Pointer to the location in the data model to update. Defaults to"
                - code [ref=e684]: /
                - text: .
              - listitem [ref=e685]:
                - code [ref=e686]: value
                - text: "(any, optional): The new value for the specified path. If omitted, the key at"
                - code [ref=e687]: path
                - text: is removed.
            - paragraph [ref=e688]:
