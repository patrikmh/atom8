            - heading "Component model ¶" [level=2] [ref=e740]:
              - text: Component model
              - link "¶" [ref=e741] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#component-model
            - paragraph [ref=e742]: A2UI's component model is designed for flexibility, separating the protocol's structure from the set of available UI components.
            - heading "The component object ¶" [level=3] [ref=e743]:
              - text: The component object
              - link "¶" [ref=e744] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-component-object
            - paragraph [ref=e745]:
              - text: Each object in the
              - code [ref=e746]: components
              - text: array of an
              - code [ref=e747]: updateComponents
              - text: "message defines a single UI component. It has the following structure:"
            - list [ref=e748]:
              - listitem [ref=e749]:
                - code [ref=e750]: id
                - text: (
                - code [ref=e751]: ComponentId
                - text: ", required): A unique string that identifies this specific component instance. This is used for parent-child references."
              - listitem [ref=e752]:
                - code [ref=e753]: component
                - text: "(string, required): Specifies the component's type (e.g.,"
                - code [ref=e754]: "\"Text\""
                - text: ).
              - listitem [ref=e755]:
                - strong [ref=e756]: Component Properties
                - text: ": Other properties relevant to the specific component type (e.g.,"
                - code [ref=e757]: text
                - text: ","
                - code [ref=e758]: url
                - text: ","
                - code [ref=e759]: children
                - text: ) are included directly in the component object.
            - paragraph [ref=e760]: This structure is designed to be both flexible and strictly validated.
            - heading "The component catalog ¶" [level=3] [ref=e761]:
              - text: The component catalog
              - link "¶" [ref=e762] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-component-catalog
            - paragraph [ref=e763]:
              - text: The set of available UI components and functions is defined in a
              - strong [ref=e764]: Catalog
              - text: . The basic catalog is defined in [
              - code [ref=e765]: catalogs/basic/catalog.json
              - text: "]. While the Basic Catalog is useful for starting out, most production applications will define their own catalog to reflect their specific design system. The server must generate messages that conform to the catalog understood by the client."
            - 'heading "UI composition: the adjacency list model ¶" [level=3] [ref=e766]':
              - text: "UI composition: the adjacency list model"
              - link "¶" [ref=e767] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#ui-composition-the-adjacency-list-model
            - paragraph [ref=e768]: The A2UI protocol defines the UI as a flat list of components. The tree structure is built implicitly using ID references. This is known as an adjacency list model.
            - paragraph [ref=e769]:
              - text: Container components (like
              - code [ref=e770]: Row
              - text: ","
              - code [ref=e771]: Column
              - text: ","
              - code [ref=e772]: List
              - text: ", and"
              - code [ref=e773]: Card
              - text: ) have properties that reference the
              - code [ref=e774]: id
              - text: of their child component(s). The client is responsible for storing all components in a map (e.g.,
              - code [ref=e775]: Map<String, Component>
              - text: ) and recreating the tree structure at render time.
            - paragraph [ref=e776]:
              - text: This model allows the server to send component definitions in any order. Rendering can begin as soon as the
              - code [ref=e777]: root
              - text: component is defined, with the client filling in or updating the rest of the tree progressively as additional definitions arrive.
            - paragraph [ref=e778]:
              - text: There must be exactly one component with the ID
              - code [ref=e779]: root
              - text: in the component tree, acting as the root of the component tree. Until that component is defined, other component updates will have no visible effect, and they will be buffered until a root component is defined. Once a root component is defined, the client is responsible for rendering the tree in the best way possible based on the available data, skipping invalid references.
            - heading "Defining actions ¶" [level=3] [ref=e781]:
              - text: Defining actions
              - link "¶" [ref=e782] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#defining-actions
            - paragraph [ref=e783]:
              - text: Interactive components (like
              - code [ref=e784]: Button
              - text: ) use an
              - code [ref=e785]: action
              - text: property to define what happens when the user interacts with them. Actions can either trigger an event sent to the server or execute a local client-side function.
            - heading "Server actions ¶" [level=4] [ref=e786]:
              - text: Server actions
              - link "¶" [ref=e787] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#server-actions
            - paragraph [ref=e788]:
              - text: To send an event to the server, use the
              - code [ref=e789]: event
              - text: property within the
              - code [ref=e790]: action
              - text: object. It requires a
              - code [ref=e791]: name
              - text: and an optional
              - code [ref=e792]: context
              - text: .
            - generic [ref=e794]:
