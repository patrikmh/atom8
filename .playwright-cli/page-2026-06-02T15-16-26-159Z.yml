            - heading "Identity and attribution ¶" [level=4] [ref=e1399]:
              - text: Identity and attribution
              - link "¶" [ref=e1400] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#identity-and-attribution
            - paragraph [ref=e1401]:
              - text: The
              - code [ref=e1402]: iconUrl
              - text: and
              - code [ref=e1403]: agentDisplayName
              - text: fields are used to provide attribution to the user, identifying which sub-agent or tool is responsible for a particular UI surface.
            - paragraph [ref=e1404]:
              - text: In multi-agent systems or orchestrators, the orchestrator is responsible for setting or validating these fields. This ensures that the identity displayed to the user matches the actual agent server being contacted, preventing malicious agents from impersonating trusted services. For example, an orchestrator might overwrite these fields with the verified identity of the sub-agent before forwarding the
              - code [ref=e1405]: createSurface
              - text: message to the client.
            - heading "The formatString function ¶" [level=3] [ref=e1406]:
              - text: The
              - code [ref=e1407]: formatString
              - text: function
              - link "¶" [ref=e1408] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#the-formatstring-function
            - paragraph [ref=e1409]:
              - text: The
              - code [ref=e1410]: formatString
              - text: function supports embedding dynamic expressions directly within string properties. This allows for mixing static text with data model values and function results.
            - heading "formatString syntax ¶" [level=4] [ref=e1411]:
              - code [ref=e1412]: formatString
              - text: syntax
              - link "¶" [ref=e1413] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#formatstring-syntax
            - paragraph [ref=e1414]:
              - text: Interpolated expressions are enclosed in
              - code [ref=e1415]: "${...}"
              - text: . To include a literal
              - code [ref=e1416]: "${"
              - text: in a string, it must be escaped as
              - code [ref=e1417]: "\\${"
              - text: .
            - heading "formatString data model binding ¶" [level=4] [ref=e1418]:
              - code [ref=e1419]: formatString
              - text: data model binding
              - link "¶" [ref=e1420] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#formatstring-data-model-binding
            - paragraph [ref=e1421]: Values from the data model can be interpolated using their JSON Pointer path.
            - list [ref=e1422]:
              - listitem [ref=e1423]:
                - code [ref=e1424]: "${/user/profile/name}"
                - text: ": Absolute path."
              - listitem [ref=e1425]:
                - code [ref=e1426]: "${firstName}"
                - text: ": Relative path (resolved against the current collection scope)."
            - paragraph [ref=e1427]:
              - strong [ref=e1428]: "Example:"
            - generic [ref=e1430]:
              - navigation [ref=e1431]:
                - button "Toggle line selection" [ref=e1432] [cursor=pointer]
                - button "Copy to clipboard" [ref=e1433] [cursor=pointer]
              - code [ref=e1434]:
                - generic [ref=e1435]: "{"
                - generic [ref=e1436]: "\"id\": \"user_welcome\","
                - generic [ref=e1437]: "\"component\": \"Text\","
                - generic [ref=e1438]: "\"text\": {"
                - generic [ref=e1439]: "\"call\": \"formatString\","
                - generic [ref=e1440]: "\"args\": {"
                - generic [ref=e1441]: "\"value\": \"Hello, ${/user/firstName}! Welcome back to ${/appName}.\""
                - generic [ref=e1442]: "}"
                - generic [ref=e1443]: "}"
                - generic [ref=e1444]: "}"
            - heading "formatString client-side functions ¶" [level=4] [ref=e1445]:
              - code [ref=e1446]: formatString
              - text: client-side functions
              - link "¶" [ref=e1447] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#formatstring-client-side-functions
            - paragraph [ref=e1448]:
              - text: Results of client-side functions can be interpolated. Function calls are identified by the presence of parentheses
              - code [ref=e1449]: ()
              - text: .
            - list [ref=e1450]:
              - listitem [ref=e1451]:
                - code [ref=e1452]: "${now()}"
                - text: ": A function with no arguments."
              - listitem [ref=e1453]:
                - code [ref=e1454]: "${formatDate(value:${/currentDate}, format:'yyyy-MM-dd')}"
                - text: ": A function with named arguments."
            - paragraph [ref=e1455]:
              - text: Arguments can be
              - strong [ref=e1456]: Literals
              - text: (quoted strings, numbers, or booleans), or
              - strong [ref=e1457]: Nested Expressions
              - text: .
            - heading "formatString nested interpolation ¶" [level=4] [ref=e1458]:
              - code [ref=e1459]: formatString
              - text: nested interpolation
              - link "¶" [ref=e1460] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#formatstring-nested-interpolation
            - paragraph [ref=e1461]:
              - text: Expressions can be nested using additional
              - code [ref=e1462]: "${...}"
              - text: wrappers inside an outer expression to make bindings explicit or to chain function calls.
            - list [ref=e1463]:
              - listitem [ref=e1464]:
                - strong [ref=e1465]: Explicit Binding
                - text: ":"
                - code [ref=e1466]: "${formatDate(value:${/currentDate}, format:'yyyy-MM-dd')}"
              - listitem [ref=e1467]:
                - strong [ref=e1468]: Nested Functions
                - text: ":"
                - code [ref=e1469]: "${upper(${now()})}"
            - heading "formatString type conversion ¶" [level=4] [ref=e1470]:
              - code [ref=e1471]: formatString
              - text: type conversion
              - link "¶" [ref=e1472] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#formatstring-type-conversion
            - paragraph [ref=e1473]: "When a non-string value is interpolated, the client converts it to a string:"
            - list [ref=e1474]:
              - listitem [ref=e1475]:
                - strong [ref=e1476]: Numbers/Booleans
                - text: ": Standard string representation."
              - listitem [ref=e1477]:
                - strong [ref=e1478]: Null/Undefined
                - text: ": An empty string"
                - code [ref=e1479]: "\"\""
                - text: .
              - listitem [ref=e1480]:
                - strong [ref=e1481]: Objects/Arrays
                - text: ": Stringified as JSON to ensure consistency across different client implementations."
            - 'heading "Usage pattern: the prompt-generate-validate loop ¶" [level=2] [ref=e1482]':
              - text: "Usage pattern: the prompt-generate-validate loop"
              - link "¶" [ref=e1483] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#usage-pattern-the-prompt-generate-validate-loop
            - paragraph [ref=e1484]: "The A2UI protocol is designed to be used in a three-step loop with a Large Language Model:"
            - list [ref=e1485]:
              - listitem [ref=e1486]:
                - paragraph [ref=e1487]:
                  - strong [ref=e1488]: Prompt
                  - text: ": Construct a prompt for the LLM that includes:"
                - list [ref=e1489]:
                  - listitem [ref=e1490]: The desired UI to be generated.
                  - listitem [ref=e1491]: The A2UI JSON schema, including the component catalog.
                  - listitem [ref=e1492]: Examples of valid A2UI JSON.
              - listitem [ref=e1493]:
                - paragraph [ref=e1494]:
                  - strong [ref=e1495]: Generate
                  - text: ": Send the prompt to the LLM and receive the generated JSON output."
              - listitem [ref=e1496]:
                - paragraph [ref=e1497]:
                  - strong [ref=e1498]: Validate
                  - text: ": Validate the generated JSON against the A2UI schema. If the JSON is valid, it can be sent to the client for rendering. If it is invalid, the errors can be reported back to the LLM in a subsequent prompt, allowing it to self-correct."
            - paragraph [ref=e1499]: This loop allows for a high degree of flexibility and robustness, as the system can leverage the generative capabilities of the LLM while still enforcing the structural integrity of the UI protocol.
            - heading "Standard validation error format ¶" [level=3] [ref=e1500]:
              - text: Standard validation error format
              - link "¶" [ref=e1501] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#standard-validation-error-format
            - paragraph [ref=e1502]:
              - text: If validation fails, the client (or the system acting on behalf of the client) should send an
              - code [ref=e1503]: error
              - text: message back to the LLM. To ensure the LLM can understand and correct the error, use the following standard format within the
              - code [ref=e1504]: error
              - text: "message payload:"
            - list [ref=e1505]:
              - listitem [ref=e1506]:
                - code [ref=e1507]: code
                - text: "(string, required): Must be"
                - code [ref=e1508]: "\"VALIDATION_FAILED\""
                - text: .
              - listitem [ref=e1509]:
                - code [ref=e1510]: surfaceId
                - text: "(string, required): The ID of the surface where the error occurred."
              - listitem [ref=e1511]:
                - code [ref=e1512]: path
                - text: "(string, required): The JSON pointer to the field that failed validation (e.g."
                - code [ref=e1513]: /components/0/text
                - text: ).
              - listitem [ref=e1514]:
                - code [ref=e1515]: message
                - text: "(string, required): A short one-sentence description of why validation failed."
            - paragraph [ref=e1516]:
              - strong [ref=e1517]: "Example error message:"
            - generic [ref=e1519]:
              - navigation [ref=e1520]:
                - button "Toggle line selection" [ref=e1521] [cursor=pointer]
                - button "Copy to clipboard" [ref=e1522] [cursor=pointer]
              - code [ref=e1523]:
                - generic [ref=e1524]: "{"
                - generic [ref=e1525]: "\"error\": {"
                - generic [ref=e1526]: "\"code\": \"VALIDATION_FAILED\","
                - generic [ref=e1527]: "\"surfaceId\": \"user_profile_card\","
                - generic [ref=e1528]: "\"path\": \"/components/0/text\","
                - generic [ref=e1529]: "\"message\": \"Expected stringOrPath, got integer\""
                - generic [ref=e1530]: "}"
                - generic [ref=e1531]: "}"
            - heading "Client-to-server messages ¶" [level=2] [ref=e1532]:
              - text: Client-to-server messages
              - link "¶" [ref=e1533] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#client-to-server-messages
            - paragraph [ref=e1534]:
              - text: The protocol also defines messages that the client can send to the server, which are defined in the [
              - code [ref=e1535]: client_to_server.json
              - text: "] schema. These are used for handling user interactions and reporting client-side information."
            - heading "action ¶" [level=3] [ref=e1536]:
              - code [ref=e1537]: action
              - link "¶" [ref=e1538] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#action
            - paragraph [ref=e1539]:
              - text: This message is sent when the user interacts with a component that has an
              - code [ref=e1540]: action
              - text: defined, such as a
              - code [ref=e1541]: Button
              - text: .
            - paragraph [ref=e1542]:
              - strong [ref=e1543]: "Properties:"
            - list [ref=e1544]:
              - listitem [ref=e1545]:
                - code [ref=e1546]: name
                - text: "(string, required): The name of the action."
              - listitem [ref=e1547]:
                - code [ref=e1548]: surfaceId
                - text: "(string, required): The ID of the surface where the action originated."
              - listitem [ref=e1549]:
                - code [ref=e1550]: sourceComponentId
                - text: "(string, required): The ID of the component that triggered the action."
              - listitem [ref=e1551]:
                - code [ref=e1552]: timestamp
                - text: "(string, required): An ISO 8601 timestamp."
              - listitem [ref=e1553]:
                - code [ref=e1554]: context
                - text: "(object, required): A JSON object containing any context provided in the component's"
                - code [ref=e1555]: action
                - text: property.
            - heading "Capabilities & metadata ¶" [level=3] [ref=e1556]:
              - text: Capabilities & metadata
              - link "¶" [ref=e1557] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#capabilities-metadata
            - paragraph [ref=e1558]:
              - text: In A2UI v0.9, capabilities and other metadata are exchanged via
              - strong [ref=e1559]: Transport metadata
              - text: or initialization payloads (e.g., A2A metadata, Agent Cards, or MCP initialization), rather than as first-class A2UI messages.
            - heading "Server capabilities ¶" [level=4] [ref=e1560]:
              - text: Server capabilities
              - link "¶" [ref=e1561] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#server-capabilities
            - paragraph [ref=e1562]:
              - text: A server (or agent) advertises its capabilities using the [
              - code [ref=e1563]: server_capabilities.json
              - text: "] schema. This indicates which catalogs it can generate UI for, and whether it accepts inline catalogs from the client. The exact mechanism depends on the transport (e.g., the"
              - code [ref=e1564]: params
              - text: object in an A2A AgentCard, or server capabilities in MCP).
            - heading "Client capabilities ¶" [level=4] [ref=e1565]:
              - text: Client capabilities
              - link "¶" [ref=e1566] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#client-capabilities
            - paragraph [ref=e1567]:
              - text: The
              - code [ref=e1568]: a2uiClientCapabilities
              - text: object in the metadata follows the [
              - code [ref=e1569]: client_capabilities.json
              - text: "] schema."
            - paragraph [ref=e1570]:
              - strong [ref=e1571]: "Properties:"
            - list [ref=e1572]:
              - listitem [ref=e1573]:
                - code [ref=e1574]: supportedCatalogIds
                - text: "(array of strings, required): URIs of supported catalogs."
              - listitem [ref=e1575]:
                - code [ref=e1576]: inlineCatalogs
                - text: ": An array of inline catalog definitions provided directly by the client (useful for custom or ad-hoc components and functions)."
            - heading "Client data model ¶" [level=4] [ref=e1577]:
              - text: Client data model
              - link "¶" [ref=e1578] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#client-data-model
            - paragraph [ref=e1579]:
              - text: When
              - code [ref=e1580]: sendDataModel
              - text: is enabled for a surface, the client includes the
              - code [ref=e1581]: a2uiClientDataModel
              - text: object in the metadata, following the [
              - code [ref=e1582]: client_data_model.json
              - text: "] schema."
            - paragraph [ref=e1583]:
              - strong [ref=e1584]: "Properties:"
            - list [ref=e1585]:
              - listitem [ref=e1586]:
                - code [ref=e1587]: surfaces
                - text: "(object, required): A map of surface IDs to their current data models."
            - heading "error ¶" [level=3] [ref=e1588]:
              - code [ref=e1589]: error
              - link "¶" [ref=e1590] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-a2ui/#error
            - paragraph [ref=e1591]: This message is used to report a client-side error to the server.
