            - paragraph [ref=e358]: A Specification for a JSON-Based, Streaming UI Protocol.
            - paragraph [ref=e359]:
              - strong [ref=e360]: "Version:"
              - text: "0.9"
              - strong [ref=e361]: "Status:"
              - text: Draft
              - strong [ref=e362]: "Created:"
