        - paragraph [ref=e446]: Vattenfall är en av Europas största producenter och återförsäljare av el och värme. Vi arbetar för en framtid där alla kan välja fossilfria sätt att producera energi, förflytta sig och leva.För att klara klimatutmaningen behöver vi tänka nytt – både genom att utveckla ny teknik och genom att göra befintliga lösningar mer kostnadseffektiva.
