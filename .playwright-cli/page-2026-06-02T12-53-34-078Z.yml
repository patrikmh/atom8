        - paragraph [ref=e406]: Som teknikledare har vi en viktig roll i att skapa en bättre morgondag. För att fortsätta vara innovativa investerar vi kontinuerligt i ny kompetens och nya idéer.
        - paragraph [ref=e407]: Vi samarbetar och samskapar med andra ledande aktörer och utmanar oss själva att tänka stort. På så sätt framtidssäkrar vi våra kunder samtidigt som vi driver teknikutvecklingen framåt
      - generic [ref=e410]:
        - heading "KPMG" [level=3] [ref=e411]
        - figure [ref=e412]
        - paragraph [ref=e416]: KPMG Emerging Giants är en perfekt partner för startups och scaleups i Sverige. Med vårt globala nätverk och expertis erbjuder vi skräddarsydda tjänster som matchar ditt företags unika behov och ambitioner. Som en framväxande Emerging Giant, redo för betydande tillväxt, behöver du stöd som inte bara passar din nuvarande storlek, utan också din framtida potential.
        - paragraph [ref=e417]: Med KPMG:s experter vid din sida får du stöd genom finansiering, styrning och tillväxtutmaningar. Vi hjälper dig att navigera mot framgång och förbereder dig för framtida möjligheter och utmaningar. KPMG hjälper dig att accelerera din resa från startup till att bli en Emerging Giant.
      - generic [ref=e420]:
