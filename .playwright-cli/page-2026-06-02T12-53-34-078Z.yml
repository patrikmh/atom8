      - generic [ref=e390]:
        - heading "Södra" [level=3] [ref=e391]
        - figure [ref=e392]
        - paragraph [ref=e396]: Södra bildades 1938 ur idén om att vi är starkare tillsammans. I dag är vi Sveriges största skogsägarförening med fler än 50 000 familjeskogsbrukare som medlemmar och en världsledande industri som förädlar skogsråvaran till förnybara produkter. Vi jobbar ständigt på nya innovationer, forskning och utveckling med skogen som vår naturliga utgångspunkt. För att få fart på skogsbrukets utveckling behövs nya idéer och innovationer.
        - paragraph [ref=e397]: Genom vårt investmentbolag, Södra Ädla, investerar vi i start-ups som utvecklar skogsbruket inom olika viktiga områden och på så sätt stärka både skogen och skogsbruket. Tillsammans med andra vill vi utnyttja alla möjligheter att snabba på utvecklingen av skogsbruket och stärka vårt arbete med innovation och utveckling ännu mer..
