      - generic [ref=e314]:
        - heading "Skandia" [level=3] [ref=e315]
        - figure [ref=e316]
        - paragraph [ref=e320]:
          - link "Vi är pensionsbolaget som vill skapa trygghet" [ref=e321] [cursor=pointer]:
            - /url: https://www.skandia.se/om-oss/om-skandia/det-har-ar-skandia/?cmpid=aff-:sk_2023_b2b_tjp_halsa:na:ny_teknik:33-listan:2023:foretag
          - text: genom högre pensioner, ett friskt arbetsliv och hållbart sparande.
        - paragraph [ref=e322]: För teknikföretag gäller det att kunna erbjuda bra förmåner och visa att man satsar på personalen för att vara en attraktiv arbetsgivare. Ett av verktygen är att välja rätt tjänstepension som också ser till medarbetares hälsa.
        - paragraph [ref=e323]: Vi erbjuder en heltäckande tjänstepension med förebyggande insatser för att undvika sjukskrivning och skapa friskare medarbetare och som i förlängningen bidrar till mer lönsamma företag. Tillsammans tar vi ansvar för friskare företag och ett hållbart arbetsliv.
      - generic [ref=e326]:
        - heading "Energimyndigheten" [level=3] [ref=e327]
        - figure [ref=e328]
        - paragraph [ref=e332]: Energimyndigheten leder samhällets omställning till ett hållbart energisystem, där ekologisk hållbarhet, konkurrenskraft och försörjningstrygghet går hand i hand. Vi är den största offentliga finansiären av forskning och utveckling inom energi i Norden och därmed en drivande kraft för innovation både nationellt och globalt. Inom ramen för vårt uppdrag stöttar vi företag från konceptutveckling till kommersialisering och internationalisering.
        - paragraph [ref=e333]: Vårt internationella arbete fokuserar på att främja export, attrahera internationella investeringar och delta aktivt i global policyutveckling och kunskapsutbyte. Genom detta stärker vi Sveriges konkurrenskraft och bidrar till en hållbar energiomställning internationellt, i linje med vår vision om hållbar energi för alla.
      - generic [ref=e336]:
        - heading "Sigma Connectivity" [level=3] [ref=e337]
        - figure [ref=e338]
        - paragraph [ref=e342]: Accelerera din innovation med Sigma Connectivity
        - paragraph [ref=e343]: Sigma Connectivity är din pålitliga partner för att omvandla idéer till marknadsklara produkter. Med expertis inom hårdvara, mjukvara, IoT och AI-drivna lösningar erbjuder vi helhetslösningar från koncept till industrialisering. Våra samarbeten med branschledare som Spotify, Husqvarna och Electrolux Professional säkerställer innovation i världsklass. Som partner till Qualcomm, Nordic Semiconductor och andra ledande teknikleverantörer integrerar vi den senaste tekniken för att ge startups en konkurrensfördel. Oavsett om du behöver snabb prototypframtagning, skalbar produktion eller avancerad uppkoppling, levererar vi teknisk excellens och strategiska insikter för att driva din framgång.
        - paragraph [ref=e344]: Låt oss bygga framtiden – tillsammans.
      - generic [ref=e347]:
        - heading "Fairpoint Capital" [level=3] [ref=e348]
        - figure [ref=e349]
        - paragraph [ref=e353]: Fairpoint Capital är en nordisk venture capital-fond som investerar i teknikbolag med global potential inom B2B-mjukvara och innovation. Med bas i Stockholm och ett internationellt nätverk stöttar de entreprenörer med kapital och strategiskt stöd. Portföljen omfattar AI, säkerhet, halvledarteknik och enterprise-mjukvara. Fond I lanserades 2019 med 900 miljoner SEK och Fond II är öppen för investeringar under hela 2025.
      - generic [ref=e356]:
        - heading "Zinova" [level=3] [ref=e357]:
          - paragraph [ref=e358]: Zinova
        - figure [ref=e359]
        - paragraph [ref=e363]: Zinova är en ny finansiell partner för Sveriges små och medelstora företag. Vi startade Zinova för att det finns en lucka mellan vad företagare behöver och vad systemet erbjuder idag, långa beslutsvägar, opersonliga processer och bristande förståelse för affären bakom siffrorna.
        - paragraph [ref=e364]: Vi kombinerar digital infrastruktur med personlig rådgivning för att ge snabbare beslut, tydligare svar och mer relevant stöd. Vår vision är att göra Sverige till en bättre plats att bygga företag på.
