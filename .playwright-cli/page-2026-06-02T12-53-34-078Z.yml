        - figure [ref=e422]
        - paragraph [ref=e426]: Plug and Play är en riskkapitalfond och öppen innovationsplattform som sammanför startups och storbolag globalt. Plug and Play, idag världens mest aktiva investerare i tidiga startups, grundades i Silicon Valley och har hittills investerat i mer än 30 enhörningar, inklusive Google, Paypal, Dropbox, Danger, Einride och många fler. Vår innovationsplattform främjar tekniska framsteg genom att koppla samman storbolag med de bästa startupbolagen över hela världen. Plattformen består idag av över 550 partners inom alla industrier.
