      - generic [ref=e570]:
        - heading "33-listans effektmål" [level=2] [ref=e571]
        - heading "Skapa medial uppmärksamhet" [level=3] [ref=e572]
        - paragraph [ref=e573]: 33-listan skapar värdefull publicitet för entreprenörskap i allmänhet och de listade startupbolagen i synnerhet. Sedan premiären för 15 år sedan har 33-listan omnämnts i hela 2256 artiklar och inslag i tidningar, webbsidor, radio- och TV-program, enligt mediebevakningsföretaget Retriever. Därmed har 33-listan genererat i snitt 150 publiceringar per år. Bolagen som deltagit på listan lyfter den stora nyttan av att få uppmärksamhet i media samt att träffa andra i samma situation vilket ger många lärdomar. Dessa bolag uppmärksammas inte av andra medier förrän de har blivit större.
        - heading "Exponera bredden i Tekniksverige" [level=3] [ref=e574]
        - paragraph [ref=e575]: Alla har hört talas om våra svenska enhörningsbolag – men det svenska teknikundret är så mycket mer omfattande än de etablerade succéerna. Tack vare 33-listan manifesteras varje år startupscenens hela bredd av teknikbolag. Det är på startupscenen som det mest spännande innovationsarbetet sker. 33-listan presenterar företag inom mycket skilda teknikområden. Sedan starten har 348 avancerade teknikstartups introducerats och presenterats ingående för publiken i det svenska näringslivet. Här visar vi bredden i svensk innovationskraft. Många av bolagen på listan tar sig an riktigt stora globala mänskliga utmaningar
        - heading "Engagera näringslivets teknikföretagare" [level=3] [ref=e576]
        - paragraph [ref=e577]: Vägen till 33-listan går via en öppen nomineringsprocess som pågår i flera månader och engagerar hundratals entreprenörsbolag, ibland så många som 400 bolag. För varje bolag som hamnar på listan finns alltså 10 andra startups som hoppas på att få vara med. När 33-listan offentliggörs går det inte ta minste på glädjen och stoltheten hos de utvalda entreprenörerna. Entreprenörer som var med i bolag de tidigare åren återkommer i nya konstellationer, eller som investerare. Man har koll på listan för att hitta nya spännande bolag
        - heading "Attrahera riskkapital" [level=3] [ref=e578]
        - paragraph [ref=e579]: 33-listans noggranna urvalsprocess, fokus på innovationshöjd och bevisade förmåga att identifiera framtidsbolag, skapar respekt hos riskkapitalisterna. Mängder av 33-bolag har genom åren vittnat om hur en placering på listan öppnar dörren till nya investerare. Även befintliga investerare ser ofta en placering på 33-listan som en bekräftelse på att de satsat rätt. Det är även en lista som svenska storföretag har koll på för att hitta potentiella partners eller för att göra uppköp
        - heading "Stötta innovationssystemet" [level=3] [ref=e580]
        - paragraph [ref=e581]: 33-listans fokus på innovativ teknikutveckling och hållbar tillväxt linjerar med det svenska innovationssystemets ambitioner. För organisationer som exemplevis Vinnova, Rise, Almi och Energimyndigheten är 33-listan en naturlig referenspunkt och kvalitetsstämpel. Det är snarare regel än undantag att 33-bolagen medverkar i olika innovationsprogram eller tilldelas stödfinanisering.
        - heading "Bidra till långsiktig framgång" [level=3] [ref=e582]
        - paragraph [ref=e583]: Miljardbolag som Spotify, Mojang, Izettle, Tobii och Truecaller var alla små när de hamnad på 33- listan första gången. Men de är inte ensamma framgångssagor. När listans tolv första år utvärderades (2019) hade 24 bolag köpts upp och hela 33 bolag hade börsnoterats. Ett fantastiskt utfall och 33-listan kanske bidrog med något på vägen. I alla fall tror vi det!
