                - strong [ref=e394]: Reason
                - text: ": This \"flat\" structure with a discriminator field ("
                - code [ref=e395]: "component: \"Text\""
                - text: ) is much easier for LLMs to generate consistently than a dynamic key (
                - code [ref=e396]: "\"Text\": {...}"
                - text: ). It also simplifies polymorphism in many JSON parsers.
            - paragraph [ref=e397]: Specifying an unknown surfaceId will cause an error. It is recommended that clients implement a namespacing scheme internally to prevent separate agents from creating surfaces with the same ID, and to prevent agents from modifying surfaces created by other agents.
