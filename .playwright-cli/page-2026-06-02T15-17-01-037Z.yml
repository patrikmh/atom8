            - heading "2. Architectural & Schema Changes ¶" [level=2] [ref=e221]:
              - text: 2. Architectural & Schema Changes
              - link "¶" [ref=e222] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-evolution-guide/#2-architectural-schema-changes
            - heading "2.1. Modular Schema Architecture ¶" [level=3] [ref=e223]:
              - text: 2.1. Modular Schema Architecture
              - link "¶" [ref=e224] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-evolution-guide/#21-modular-schema-architecture
            - paragraph [ref=e225]:
              - strong [ref=e226]: "v0.8.1:"
            - list [ref=e227]:
              - listitem [ref=e228]:
                - text: Monolithic tendencies.
                - code [ref=e229]: server_to_client.json
                - text: often contained deep definitions or relied on complex
                - code [ref=e230]: oneOf
                - text: structures that were hard to decompose.
              - listitem [ref=e231]:
                - code [ref=e232]: basic_catalog_definition.json
                - text: existed but was often implicitly coupled.
            - paragraph [ref=e233]:
              - strong [ref=e234]: "v0.9:"
            - list [ref=e235]:
              - listitem [ref=e236]:
                - strong [ref=e237]: Modularization
                - text: ": The schema is strictly split into:"
              - listitem [ref=e238]:
                - code [ref=e239]: common_types.json
                - text: ": Reusable primitives (IDs, paths) and logic/expression types."
              - listitem [ref=e240]:
                - code [ref=e241]: server_to_client.json
                - text: ": The \"envelope\" defining the message types."
              - listitem [ref=e242]:
                - code [ref=e243]: catalogs/basic/catalog.json
                - text: ": The unified catalog of UI components and functions."
              - listitem [ref=e244]:
                - strong [ref=e245]: Swappable Catalogs
                - text: ":"
                - code [ref=e246]: server_to_client.json
                - text: now uses a relative reference to
                - code [ref=e247]: catalog.json
                - text: as a placeholder. This allows developers to alias
                - code [ref=e248]: catalog.json
                - text: to
                - code [ref=e249]: catalogs/basic/catalog.json
                - text: (or any custom catalog) during validation, enabling the use of custom component sets without modifying the core envelope schema.
              - listitem [ref=e250]:
                - strong [ref=e251]: Unification
                - text: ": Components and functions are now part of the same catalog object, simplifying capability negotiation and inline definitions."
            - heading "2.2. Strict Message Typing ¶" [level=3] [ref=e252]:
              - text: 2.2. Strict Message Typing
              - link "¶" [ref=e253] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-evolution-guide/#22-strict-message-typing
            - paragraph [ref=e254]:
              - strong [ref=e255]: "v0.8.1:"
            - list [ref=e256]:
              - listitem [ref=e257]:
                - text: Messages were objects where properties like
                - code [ref=e258]: surfaceUpdate
                - text: were optional keys.
              - listitem [ref=e259]: "Validation often relied on \"minProperties: 1\" constraints."
            - paragraph [ref=e260]:
              - strong [ref=e261]: "v0.9:"
            - list [ref=e262]:
              - listitem [ref=e263]:
                - text: Uses a top-level
                - strong [ref=e264]:
                  - code [ref=e265]: oneOf
                - text: constraint in
                - code [ref=e266]: server_to_client.json
                - text: .
              - listitem [ref=e267]:
                - strong [ref=e268]: Reason
                - text: ": This is a more natural way to express the schema to an LLM, and easier for the LLM to reason about. It's also a more natural form for the developer to read."
            - heading "2.3. Auxiliary Rules File ¶" [level=3] [ref=e269]:
              - text: 2.3. Auxiliary Rules File
              - link "¶" [ref=e270] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-evolution-guide/#23-auxiliary-rules-file
            - paragraph [ref=e271]:
              - strong [ref=e272]: "v0.9:"
            - list [ref=e273]:
              - listitem [ref=e274]:
                - strong [ref=e275]: New Artifact
                - text: ":"
                - code [ref=e276]: basic_catalog_rules.txt
                - text: .
              - listitem [ref=e277]:
                - strong [ref=e278]: Purpose
                - text: ": A plain-text prompt fragment containing rules for using the catalog schema (e.g., \"MUST provide 'action' for Button\")."
              - listitem [ref=e279]:
                - strong [ref=e280]: Usage
                - text: ": Designed to be included in the system prompt alongside the catalog schema."
              - listitem [ref=e281]:
                - strong [ref=e282]: Reason
                - text: ": Some constraints (like conditional requirements or specific property combinations) are difficult or verbose to express in JSON Schema but easy to express in natural language rules for an LLM, and it can be packaged with the catalog schema for ease of customizing the prompt for a particular catalog."
            - heading "3. Protocol Lifecycle Changes ¶" [level=2] [ref=e283]:
              - text: 3. Protocol Lifecycle Changes
