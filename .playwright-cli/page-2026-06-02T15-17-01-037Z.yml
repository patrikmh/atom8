            - paragraph [ref=e123]: This document serves as a comprehensive guide to the changes between A2UI version 0.8.1 and version 0.9. It details the shifts in philosophy, architecture, and implementation, providing a reference for stakeholders and developers migrating between versions.
            - heading "1. Executive Summary ¶" [level=2] [ref=e124]:
              - text: 1. Executive Summary
              - link "¶" [ref=e125] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-evolution-guide/#1-executive-summary
            - paragraph [ref=e126]: Version 0.9 represents a fundamental philosophical shift from "Structured Output First" to "Prompt First."
            - list [ref=e127]:
              - listitem [ref=e128]:
                - strong [ref=e129]: v0.8.1
                - text: was designed to be generated by an LLM using Structured Output above all else, optimized for LLMs that support strict JSON mode or function calling (which is also a form of Structured Output). It relied on deep nesting and specific wrapper structures that were definable in the limited schema features but often confusing for an LLM to generate.
              - listitem [ref=e130]:
                - strong [ref=e131]: v0.9
                - text: is designed to be
                - strong [ref=e132]: embedded directly in an LLM's system prompt
                - text: . The schema is refactored to be more human-readable and "token-efficient" for the model to understand. It prioritizes patterns that LLMs naturally excel at (like standard JSON objects for maps) over strict structured output-friendly structures (like arrays of key-value pairs).
