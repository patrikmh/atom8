            - list [ref=e491]:
              - listitem [ref=e492]:
                - text: Used
                - code [ref=e493]: dataBinding
                - text: in
                - code [ref=e494]: childrenProperty
                - text: templates.
              - listitem [ref=e495]:
                - text: Used
                - code [ref=e496]: path
                - text: in
                - code [ref=e497]: BoundValue
                - text: objects.
              - listitem [ref=e498]: Inconsistent terminology.
            - paragraph [ref=e499]:
              - strong [ref=e500]: "v0.9:"
            - list [ref=e501]:
              - listitem [ref=e502]:
                - strong [ref=e503]: Unified
                - text: ": Everything is now a"
                - strong [ref=e504]:
                  - code [ref=e505]: path
                - text: .
              - listitem [ref=e506]:
                - strong [ref=e507]: Reason
                - text: ": Reduces cognitive load for the LLM. \"Path\" always means \"JSON Pointer to data.\""
            - heading "5.2. Simplified Bound Values ¶" [level=3] [ref=e508]:
              - text: 5.2. Simplified Bound Values
              - link "¶" [ref=e509] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-evolution-guide/#52-simplified-bound-values
            - paragraph [ref=e510]:
              - strong [ref=e511]: "v0.8.1:"
            - list [ref=e512]:
              - listitem [ref=e513]:
                - code [ref=e514]: "{ \"literalString\": \"foo\" }"
                - text: or
                - code [ref=e515]: "{ \"path\": \"/foo\" }"
                - text: .
              - listitem [ref=e516]:
                - text: Explicit typing in keys (
                - code [ref=e517]: literalNumber
                - text: ","
                - code [ref=e518]: literalBoolean
                - text: ).
            - paragraph [ref=e519]:
              - strong [ref=e520]: "v0.9:"
            - list [ref=e521]:
              - listitem [ref=e522]:
                - strong [ref=e523]: Implicit Typing
                - text: ":"
                - code [ref=e524]: DynamicString
                - text: ","
                - code [ref=e525]: DynamicNumber
                - text: ", etc. are defined in"
                - code [ref=e526]: common_types.json
                - text: .
              - listitem [ref=e527]:
                - strong [ref=e528]: Structure
                - text: ": The schema allows"
                - code [ref=e529]: string
                - text: OR
                - code [ref=e530]: "{ \"path\": \"...\" }"
                - text: .
              - listitem [ref=e531]:
                - strong [ref=e532]: Reason
                - text: ": Much more natural JSON."
                - code [ref=e533]: "{ \"text\": \"Hello\" }"
                - text: is valid.
                - code [ref=e534]: "{ \"value\": { \"path\": \"/msg\" } }"
                - text: is valid. No need for
                - code [ref=e535]: "{ \"text\": { \"literalString\": \"Hello\" } }"
                - text: .
            - heading "5.3. String Interpolation ¶" [level=3] [ref=e536]:
              - text: 5.3. String Interpolation
              - link "¶" [ref=e537] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.9-evolution-guide/#53-string-interpolation
            - paragraph [ref=e538]:
              - strong [ref=e539]: "v0.8.1:"
            - list [ref=e540]:
              - listitem [ref=e541]:
                - strong [ref=e542]: Strict Envelopes
                - text: ": Static text and data model references had to be separate or wrapped in explicit objects. Mixing literal text and dynamic values in a single string was not officially supported at the protocol level without custom logic."
              - listitem [ref=e543]:
                - strong [ref=e544]: Structure
                - text: ":"
                - code [ref=e545]: "{ \"text\": \"static\" }"
                - text: OR
                - code [ref=e546]: "{ \"text\": { \"path\": \"/var\" } }"
                - text: .
            - paragraph [ref=e547]:
              - strong [ref=e548]: "v0.9:"
            - list [ref=e549]:
              - listitem [ref=e550]:
                - strong [ref=e551]: String Formatting
                - text: ": Introduced the"
                - code [ref=e552]: formatString
                - text: function, which supports
                - code [ref=e553]: "${expression}"
                - text: syntax for interpolation.
              - listitem [ref=e554]:
                - strong [ref=e555]: Unified Expression Language
                - text: ": Allows embedding JSON Pointer paths (absolute and relative) and client-side function calls directly within the format string."
              - listitem [ref=e556]:
                - strong [ref=e557]: Nesting
                - text: ": Supports recursive nesting of expressions (e.g.,"
                - code [ref=e558]: "${formatDate(value: ${/timestamp}, format: 'yyyy-MM-dd')}"
                - text: ).
              - listitem [ref=e559]:
                - strong [ref=e560]: Restriction
                - text: ": String interpolation"
                - code [ref=e561]: "${...}"
                - text: is
                - strong [ref=e562]: ONLY
                - text: supported within the
                - code [ref=e563]: formatString
                - text: function. It is not supported in general for string properties, in order to strictly separate data binding definitions from static content.
              - listitem [ref=e564]:
                - strong [ref=e565]: Reason
                - text: ": Improves readability for complex strings. Instead of generating complex nested JSON objects (like chained concatenations) to combine strings and data, the model can write natural-looking template literals within the"
                - code [ref=e566]: formatString
                - text: function.
            - heading "5.4. Data Synchronization ¶" [level=3] [ref=e567]:
              - text: 5.4. Data Synchronization
              - link "¶" [ref=e568] [cursor=pointer]:
