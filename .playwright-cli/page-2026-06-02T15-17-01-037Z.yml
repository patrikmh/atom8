                - text: (boolean).
              - listitem [ref=e580]:
                - strong [ref=e581]: Single-Path Updates
                - text: ": Server pushes updates via"
                - code [ref=e582]: updateDataModel
                - text: using simple
                - code [ref=e583]: path
                - text: /
                - code [ref=e584]: value
                - text: pairs.
              - listitem [ref=e585]:
                - strong [ref=e586]: Client->Server Data Model Sync
                - text: ": When"
                - code [ref=e587]: sendDataModel
                - text: is true, the client includes the full data model in every A2A message metadata.
