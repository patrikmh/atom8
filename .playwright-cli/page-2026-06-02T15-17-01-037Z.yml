              - text: ":"
            - list [ref=e452]:
              - listitem [ref=e453]:
                - strong [ref=e454]: Adjacency List
                - text: ": The"
                - code [ref=e455]: contents
                - text: property was an
                - strong [ref=e456]: array
                - text: of key-value pair objects.
              - listitem [ref=e457]:
                - strong [ref=e458]: Typed Values
                - text: ": Each entry required explicit typing like"
                - code [ref=e459]: valueString
                - text: ","
                - code [ref=e460]: valueNumber
                - text: ","
                - code [ref=e461]: valueBoolean
                - text: .
              - listitem [ref=e462]:
                - strong [ref=e463]: Structure
                - text: ":"
                - code [ref=e464]: "[{ \"key\": \"name\", \"valueString\": \"Alice\" }]"
            - paragraph [ref=e465]:
              - strong [ref=e466]:
                - text: v0.9 (
                - code [ref=e467]: updateDataModel
                - text: )
              - text: ":"
            - list [ref=e468]:
              - listitem [ref=e469]:
                - strong [ref=e470]: Renamed
                - text: ":"
                - code [ref=e471]: dataModelUpdate
                - text: "->"
                - code [ref=e472]: updateDataModel
                - text: .
              - listitem [ref=e473]:
                - strong [ref=e474]: Standard JSON
                - text: ": The"
                - code [ref=e475]: value
                - text: property is now a standard
                - strong [ref=e476]: JSON object
                - text: .
              - listitem [ref=e477]:
                - strong [ref=e478]: Simplified
                - text: ": The system relies on upsert semantics, so the client will create or update the data model at the specified path, or remove it if the value is null."
              - listitem [ref=e479]:
                - strong [ref=e480]: Structure
                - text: ":"
                - code [ref=e481]: "{ \"name\": \"Alice\" }"
              - listitem [ref=e482]:
                - strong [ref=e483]: Reason
                - text: ": LLMs are trained to generate JSON objects. Forcing them to generate an \"adjacency list\" representation of a map was inefficient and error-prone."
            - heading "5. Data Binding & State ¶" [level=2] [ref=e484]:
              - text: 5. Data Binding & State
              - link "¶" [ref=e485] [cursor=pointer]:
