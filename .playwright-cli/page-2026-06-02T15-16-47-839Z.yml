            - 'heading "Section 3: UI Composition ¶" [level=2] [ref=e639]':
              - text: "Section 3: UI Composition"
              - link "¶" [ref=e640] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#section-3-ui-composition
            - heading "3.1. The Adjacency List Model ¶" [level=3] [ref=e641]:
              - text: 3.1. The Adjacency List Model
              - link "¶" [ref=e642] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#31-the-adjacency-list-model
            - paragraph [ref=e643]: The A2UI protocol defines the UI as a flat list of components. The tree structure is built implicitly using ID references. This is known as an adjacency list model.
            - paragraph [ref=e644]:
              - text: Container components (like
              - code [ref=e645]: Row
              - text: ","
              - code [ref=e646]: Column
              - text: ","
              - code [ref=e647]: List
              - text: ","
              - code [ref=e648]: Card
              - text: ) have properties that reference the
              - code [ref=e649]: id
              - text: of their child component(s). The client is responsible for storing all components in a map (e.g.,
              - code [ref=e650]: Map<String, Component>
              - text: ) and recreating the tree structure at render time.
            - paragraph [ref=e651]:
              - text: This model allows the server to send component definitions in any order, as long as all necessary components are present by the time
              - code [ref=e652]: beginRendering
              - text: is sent.
            - 'heading "3.2. Container Children: explicitList vs. template ¶" [level=3] [ref=e654]':
              - text: "3.2. Container Children:"
              - code [ref=e655]: explicitList
              - text: vs.
              - code [ref=e656]: template
