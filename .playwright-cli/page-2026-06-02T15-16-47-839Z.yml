            - paragraph [ref=e658]:
              - text: Container components (
              - code [ref=e659]: Row
              - text: ","
              - code [ref=e660]: Column
              - text: ","
              - code [ref=e661]: List
              - text: ) define their children using a
              - code [ref=e662]: children
              - text: object, which must contain
              - emphasis [ref=e663]: either
              - code [ref=e664]: explicitList
              - text: or
              - code [ref=e665]: template
              - text: .
            - list [ref=e666]:
              - listitem [ref=e667]:
                - code [ref=e668]: explicitList
                - text: ": An array of component"
                - code [ref=e669]: id
                - text: strings. This is used for static, known children.
              - listitem [ref=e670]:
                - code [ref=e671]: template
                - text: ": An object used to render a dynamic list of children from a data-bound list."
            - generic [ref=e673]:
              - navigation [ref=e674]:
