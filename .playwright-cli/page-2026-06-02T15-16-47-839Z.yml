            - 'heading "Section 5: Event Handling ¶" [level=2] [ref=e845]':
              - text: "Section 5: Event Handling"
              - link "¶" [ref=e846] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#section-5-event-handling
            - paragraph [ref=e847]: While the server-to-client UI definition is a one-way stream (e.g., over SSE), user interactions are communicated back to the server using an A2A message.
            - heading "5.1. The Client Event Message ¶" [level=3] [ref=e848]:
              - text: 5.1. The Client Event Message
              - link "¶" [ref=e849] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#51-the-client-event-message
            - paragraph [ref=e850]:
              - text: "The client sends a single JSON object that acts as a wrapper. It must contain exactly one of the following keys:"
              - code [ref=e851]: userAction
              - text: or
              - code [ref=e852]: error
              - text: .
            - heading "5.2. The userAction Message ¶" [level=3] [ref=e853]:
              - text: 5.2. The
              - code [ref=e854]: userAction
              - text: Message
              - link "¶" [ref=e855] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#52-the-useraction-message
            - paragraph [ref=e856]: This message is sent when the user interacts with a component that has an action defined. It is the primary mechanism for user-driven events.
            - paragraph [ref=e857]:
              - text: The
              - code [ref=e858]: userAction
              - text: "object has the following structure:"
            - list [ref=e859]:
              - listitem [ref=e860]:
                - code [ref=e861]: name
                - text: "(string, required): The name of the action, taken directly from the"
                - code [ref=e862]: action.name
                - text: property of the component (e.g., "submit_form").
              - listitem [ref=e863]:
                - code [ref=e864]: surfaceId
                - text: "(string, required): The"
                - code [ref=e865]: id
                - text: of the surface where the event originated.
              - listitem [ref=e866]:
                - code [ref=e867]: sourceComponentId
                - text: "(string, required): The"
                - code [ref=e868]: id
                - text: of the component that triggered the event (e.g., "my_button").
              - listitem [ref=e869]:
                - code [ref=e870]: timestamp
                - text: "(string, required): An ISO 8601 timestamp of when the event occurred (e.g., \"2025-09-19T17:01:00Z\")."
              - listitem [ref=e871]:
                - code [ref=e872]: context
                - text: "(object, required): A JSON object containing the key-value pairs from the component's"
                - code [ref=e873]: action.context
                - text: ", after resolving all"
                - code [ref=e874]: BoundValue
                - text: s against the data model.
            - paragraph [ref=e875]:
              - text: The process for resolving the
              - code [ref=e876]: action.context
              - text: "remains the same: the client iterates over the"
              - code [ref=e877]: context
              - text: array, resolves all literal or data-bound values, and constructs the
              - code [ref=e878]: context
              - text: object.
            - heading "5.3. The error Message ¶" [level=3] [ref=e879]:
              - text: 5.3. The
              - code [ref=e880]: error
              - text: Message
              - link "¶" [ref=e881] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#53-the-error-message
            - paragraph [ref=e882]: This message provides a feedback mechanism for the server. It is sent when the client encounters an error, for instance, during UI rendering or data binding. The content of the object is flexible and can contain any relevant error information.
            - heading "5.4. Event Flow Example (userAction) ¶" [level=3] [ref=e883]:
