              - text: 3.3. Dynamic List Rendering with
              - code [ref=e708]: template
              - link "¶" [ref=e709] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#33-dynamic-list-rendering-with-template
            - paragraph [ref=e710]:
              - text: To render dynamic lists, a container uses the
              - code [ref=e711]: template
              - text: property.
            - list [ref=e712]:
              - listitem [ref=e713]:
                - code [ref=e714]: dataBinding
                - text: ": A path to a list in the data model (e.g.,"
                - code [ref=e715]: /user/posts
                - text: ).
