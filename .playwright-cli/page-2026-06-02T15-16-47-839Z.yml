            - paragraph [ref=e604]:
              - text: On the wire, this object is generic. Its structure is not defined by the core A2UI protocol. Instead, its validation is based on the active
              - strong [ref=e605]: Catalog
              - text: . It is a wrapper object that
              - strong [ref=e606]: must
              - text: contain exactly one key, where the key is the string name of the component type from the catalog (e.g.,
              - code [ref=e607]: "\"Text\""
              - text: ","
              - code [ref=e608]: "\"Row\""
              - text: ). The value is an object containing the properties for that component, as defined in the catalog.
            - paragraph [ref=e609]:
