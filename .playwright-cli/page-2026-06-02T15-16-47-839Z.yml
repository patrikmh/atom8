                - code [ref=e717]: componentId
                - text: ": The"
                - code [ref=e718]: id
                - text: of another component in the buffer to use as a template for each item in the list.
            - paragraph [ref=e719]:
              - text: The client will iterate over the list at
              - code [ref=e720]: dataBinding
              - text: and, for each item, render the component specified by
              - code [ref=e721]: componentId
              - text: . The item's data is made available to the template component for relative data binding.
            - 'heading "Section 4: Dynamic Data & State Management ¶" [level=2] [ref=e722]':
              - text: "Section 4: Dynamic Data & State Management"
              - link "¶" [ref=e723] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#section-4-dynamic-data-state-management
            - paragraph [ref=e724]: A2UI enforces a clean separation between the UI's structure (components) and its dynamic data (data model).
            - heading "4.1. The dataModelUpdate Message ¶" [level=3] [ref=e725]:
              - text: 4.1. The
              - code [ref=e726]: dataModelUpdate
              - text: Message
              - link "¶" [ref=e727] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#41-the-datamodelupdate-message
            - paragraph [ref=e728]: This message is the only way to modify the client's data model.
            - list [ref=e729]:
              - listitem [ref=e730]:
                - code [ref=e731]: surfaceId
                - text: ": The unique identifier for the UI surface this data model update applies to."
              - listitem [ref=e732]:
                - code [ref=e733]: path
                - text: ": An optional path to a location within the data model (e.g., '/user/name'). If omitted, the update applies to the root of the data model."
              - listitem [ref=e734]:
                - code [ref=e735]: contents
                - text: ": An array of data entries arranged as an adjacency list. Each entry must contain a 'key' and exactly one corresponding typed 'value*' property (e.g."
                - code [ref=e736]: valueString
                - text: ","
                - code [ref=e737]: valueNumber
                - text: ","
                - code [ref=e738]: valueBoolean
                - text: ","
                - code [ref=e739]: valueMap
                - text: ).
              - listitem [ref=e740]:
                - code [ref=e741]: valueMap
                - text: ": A JSON object representing a map as an adjacency list."
            - 'heading "Example: Updating the data model ¶" [level=4] [ref=e742]':
              - text: "Example: Updating the data model"
              - link "¶" [ref=e743] [cursor=pointer]:
