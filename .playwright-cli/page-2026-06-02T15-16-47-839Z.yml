            - heading "4.2. Data Binding (The BoundValue Object) ¶" [level=3] [ref=e767]:
              - text: 4.2. Data Binding (The
              - code [ref=e768]: BoundValue
              - text: Object)
              - link "¶" [ref=e769] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#42-data-binding-the-boundvalue-object
            - paragraph [ref=e770]:
              - text: Components connect to the data model through binding. Any property that can be data-bound (like
              - code [ref=e771]: text
              - text: on a
              - code [ref=e772]: Text
              - text: component) accepts a
              - code [ref=e773]: BoundValue
              - text: object. This object defines either a literal value, a data path, or both as a shorthand for initialization.
            - paragraph [ref=e774]:
              - text: From the catalog schema, a bound
              - code [ref=e775]: text
              - text: "property looks like this:"
            - generic [ref=e777]:
              - navigation [ref=e778]:
                - button "Toggle line selection" [ref=e779] [cursor=pointer]
                - button "Copy to clipboard" [ref=e780] [cursor=pointer]
              - code [ref=e781]:
                - generic [ref=e782]: "{"
                - generic [ref=e783]: "\"type\": \"object\","
