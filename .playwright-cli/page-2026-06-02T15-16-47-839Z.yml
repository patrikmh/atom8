            - separator [ref=e258]
            - generic [ref=e260]:
              - img "A2UI Protocol Logo" [ref=e261]
              - heading "A2UI (Agent to UI) Protocol" [level=1] [ref=e262]
            - paragraph [ref=e263]: A Specification for a JSONL-Based, Streaming UI Protocol
            - paragraph [ref=e264]: "Created: Sep 19, 2025 Updated: Nov 12, 2025"
            - heading "Design requirements ¶" [level=2] [ref=e265]:
              - text: Design requirements
              - link "¶" [ref=e266] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#design-requirements
            - paragraph [ref=e267]: The A2UI (Agent to UI) protocol should be a system where an LLM can stream a platform-agnostic, abstract UI definition to a client, which then renders it progressively using a native widget set. Every major design choice is traced back to the core challenges of LLM generation, perceived performance, and platform independence.
            - 'heading "Requirement: The protocol must be easily generated by a Transformer Large Language Model (LLM) ¶" [level=3] [ref=e268]':
              - text: "Requirement: The protocol must be easily generated by a Transformer Large Language Model (LLM)"
              - link "¶" [ref=e269] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#requirement-the-protocol-must-be-easily-generated-by-a-transformer-large-language-model-llm
            - paragraph [ref=e270]: "This is the most critical driver. This requirement directly leads to several design choices:"
            - paragraph [ref=e271]: "Declarative, Simple Structure: The protocol should use a straightforward, declarative format (\"this is a column with these children\") rather than an imperative one (\"now, add a column; then, append a text widget to it\"). LLMs excel at generating structured, declarative data."
            - paragraph [ref=e272]: "Flat Component List (Adjacency List): Requiring an LLM to generate a perfectly nested JSON tree in a single pass is difficult and error-prone. A flat list of components, where relationships are defined by simple string IDs, is much easier to generate piece by piece. The model can \"think\" of a component, give it an ID, and then reference that ID later without worrying about tree depth or object nesting."
            - paragraph [ref=e273]: "Stateless Messages: Each JSONL message is a self-contained unit of information (componentUpdate, dataModelUpdate). This is ideal for a streaming LLM, which can output these messages incrementally as it processes a request."
            - 'heading "Requirement: The UI must render progressively for a fast, responsive user experience ¶" [level=3] [ref=e274]':
              - text: "Requirement: The UI must render progressively for a fast, responsive user experience"
              - link "¶" [ref=e275] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#requirement-the-ui-must-render-progressively-for-a-fast-responsive-user-experience
            - paragraph [ref=e276]: The system must feel fast to the user, even if the full UI is complex and takes time to generate.
            - paragraph [ref=e277]: "Streaming via JSONL/SSE: This is a direct solution. The client doesn't have to wait for a single, massive JSON payload. It can start receiving and processing UI components immediately, improving perceived performance."
            - 'heading "Requirement: The protocol must be platform-agnostic ¶" [level=3] [ref=e278]':
              - text: "Requirement: The protocol must be platform-agnostic"
              - link "¶" [ref=e279] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#requirement-the-protocol-must-be-platform-agnostic
            - paragraph [ref=e280]: The same server-side logic should be able to render a UI on a Flutter app, a web browser, or potentially other platforms without modification.
            - paragraph [ref=e281]:
              - text: "Client-Defined widget catalog: This is the core of the platform-agnostic design. The protocol should define an abstract component tree (e.g., \"I need a Card with a Row inside\"). It is the client's responsibility to map these abstract types to its native widget implementations (a Flutter Card widget, an HTML"
              - code [ref=e282]: <div>
              - text: with card styling, etc.). The server only needs to know the names of the components the client supports.
            - 'heading "Requirement: State management must be efficient and decoupled from the UI structure ¶" [level=3] [ref=e283]':
              - text: "Requirement: State management must be efficient and decoupled from the UI structure"
              - link "¶" [ref=e284] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#requirement-state-management-must-be-efficient-and-decoupled-from-the-ui-structure
            - paragraph [ref=e285]: Changing a piece of text in the UI should not require resending the entire UI definition.
            - paragraph [ref=e286]: "Separation of Data and Components: Having distinct componentUpdate and data model update messages is key. The UI structure can be sent once, and subsequent updates can be small dataModelUpdate messages that only contain the changed data."
            - 'heading "Requirement: The communication architecture must be robust and scalable ¶" [level=3] [ref=e287]':
              - text: "Requirement: The communication architecture must be robust and scalable"
              - link "¶" [ref=e288] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#requirement-the-communication-architecture-must-be-robust-and-scalable
            - paragraph [ref=e289]: The system needs a clear, reliable way to handle both server-pushed UI and client-initiated events.
            - paragraph [ref=e290]: "Unidirectional UI Stream: Using a one-way stream (SSE) for UI updates simplifies the client's logic. It only needs to listen and react. This is a more robust pattern for server-push than trying to manage a complex bidirectional channel."
            - paragraph [ref=e291]: "Event Handling: Event handling is done via an A2A message from the client to the server agent"
            - heading "Introduction ¶" [level=2] [ref=e292]:
              - text: Introduction
              - link "¶" [ref=e293] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#introduction
            - paragraph [ref=e294]: The A2UI Protocol is a protocol designed for rendering user interfaces from a stream of JSON objects sent from a server. Its core philosophy emphasizes a clean separation of UI structure and application data, enabling progressive rendering as the client processes each message.
            - paragraph [ref=e295]:
              - text: The protocol is designed to be "LLM-friendly," meaning its structure is declarative and straightforward, making it easy for a generative model to produce. A core feature of A2UI is its extensible component model. The set of available UI components is not fixed by the protocol but is defined in a separate
              - strong [ref=e296]: Catalog
              - text: ", allowing for platform-specific or custom components."
            - paragraph [ref=e297]: "Communication occurs via a JSON Lines (JSONL) stream. The client parses each line as a distinct message and incrementally builds the UI. The server-to-client protocol defines four message types:"
            - list [ref=e298]:
              - listitem [ref=e299]:
                - code [ref=e300]: surfaceUpdate
                - text: ": Provides a list of component definitions to be added to or updated in a specific UI area called a \"surface.\""
              - listitem [ref=e301]:
                - code [ref=e302]: dataModelUpdate
                - text: ": Provides new data to be inserted into or to replace a surface's data model. Each surface has its own data model."
              - listitem [ref=e303]:
                - code [ref=e304]: beginRendering
                - text: ": Signals to the client that it has enough information to perform the initial render, specifying the ID of the root component and, optionally, the component catalog to use."
              - listitem [ref=e305]:
                - code [ref=e306]: deleteSurface
                - text: ": Explicitly removes a surface and its contents from the UI."
            - paragraph [ref=e307]: "Client-to-server communication for user interactions is handled separately via an A2A message. This message can be one of two types:"
            - list [ref=e308]:
              - listitem [ref=e309]:
                - code [ref=e310]: userAction
                - text: ": Reports a user-initiated action from a component."
              - listitem [ref=e311]:
                - code [ref=e312]: error
                - text: ": Reports a client-side error. This keeps the primary data stream unidirectional."
            - 'heading "Section 1: Foundational architecture and data flow ¶" [level=2] [ref=e313]':
              - text: "Section 1: Foundational architecture and data flow"
              - link "¶" [ref=e314] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#section-1-foundational-architecture-and-data-flow
            - paragraph [ref=e315]: This document specifies the architecture and data formats for the A2UI protocol. The design is guided by principles of strict separation of concerns, versioning, and progressive rendering.
            - 'heading "1.1. Core philosophy: decoupling and contracts ¶" [level=3] [ref=e316]':
              - text: "1.1. Core philosophy: decoupling and contracts"
              - link "¶" [ref=e317] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#11-core-philosophy-decoupling-and-contracts
            - paragraph [ref=e318]: "The central philosophy of A2UI is the decoupling of three key elements:"
            - list [ref=e319]:
              - listitem [ref=e320]:
                - strong [ref=e321]: "The Component Tree (The Structure):"
                - text: A server-provided tree of abstract components that describes the UI's structure. This is defined by
                - code [ref=e322]: surfaceUpdate
                - text: messages.
              - listitem [ref=e323]:
                - strong [ref=e324]: "The Data Model (The State):"
                - text: A server-provided JSON object containing the dynamic values that populate the UI, such as text, booleans, or lists. This is managed via
                - code [ref=e325]: dataModelUpdate
                - text: messages.
              - listitem [ref=e326]:
                - strong [ref=e327]: "The Widget Registry (The \"Catalog\"):"
                - text: A client-defined mapping of component types (e.g., "Row", "Text") to concrete, native widget implementations. This registry is
                - strong [ref=e328]: part of the client application
                - text: ", not the protocol stream. The server must generate components that the target client's registry understands."
            - 'heading "1.2. The JSONL stream: The unit of communication ¶" [level=3] [ref=e329]':
              - text: "1.2. The JSONL stream: The unit of communication"
              - link "¶" [ref=e330] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#12-the-jsonl-stream-the-unit-of-communication
            - paragraph [ref=e331]: All UI descriptions are transmitted from the server to the client as a stream of JSON objects, formatted as JSON Lines (JSONL). Each line is a separate, compact JSON object representing a single message. This allows the client to parse and process each part of the UI definition as it arrives, enabling progressive rendering.
            - 'heading "1.3. Surfaces: Managing Multiple UI Regions ¶" [level=3] [ref=e332]':
              - text: "1.3. Surfaces: Managing Multiple UI Regions"
              - link "¶" [ref=e333] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#13-surfaces-managing-multiple-ui-regions
            - paragraph [ref=e334]:
              - text: A
              - strong [ref=e335]: Surface
              - text: is a contiguous portion of screen real estate into which a A2UI UI can be rendered. The protocol introduces the concept of a
              - code [ref=e336]: surfaceId
              - text: to uniquely identify and manage these areas. This allows a single A2UI stream to control multiple, independent UI regions simultaneously. Each surface has a separate root component and a separate hierarchy of components. Each surface has a separate data model, to avoid collision of keys when working with a large number of surfaces.
            - paragraph [ref=e337]: For example, in a chat application, each AI-generated response could be rendered into a separate surface within the conversation history. A separate, persistent surface could be used for a side panel that displays related information.
            - paragraph [ref=e338]:
              - text: The
              - code [ref=e339]: surfaceId
              - text: is a property within each server-to-client message that directs changes to the correct area. It is used with messages like
              - code [ref=e340]: beginRendering
              - text: ","
              - code [ref=e341]: surfaceUpdate
              - text: ","
              - code [ref=e342]: dataModelUpdate
              - text: ", and"
              - code [ref=e343]: deleteSurface
              - text: to target a specific surface.
            - heading "1.4. Data Flow Model ¶" [level=3] [ref=e344]:
              - text: 1.4. Data Flow Model
              - link "¶" [ref=e345] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#14-data-flow-model
            - paragraph [ref=e346]:
              - text: The A2UI protocol is composed of a server-to-client stream describing UI and individual events sent to the server. The client consumes the stream, builds the UI, and renders it. Communication occurs via a JSON Lines (JSONL) stream, typically transported over
              - strong [ref=e347]: Server-Sent Events (SSE)
              - text: .
            - list [ref=e348]:
              - listitem [ref=e349]:
                - strong [ref=e350]: "Server Stream:"
                - text: The server begins sending the JSONL stream over an SSE connection.
              - listitem [ref=e351]:
                - paragraph [ref=e352]:
                  - strong [ref=e353]: "Client-Side Buffering:"
                  - text: "The client receives messages and buffers them:"
                - list [ref=e354]:
                  - listitem [ref=e355]:
                    - code [ref=e356]: surfaceUpdate
                    - text: ": Component definitions are stored in a"
                    - code [ref=e357]: Map<String, Component>
                    - text: ", organized by"
                    - code [ref=e358]: surfaceId
                    - text: . If a surface doesn't exist, it is created.
                  - listitem [ref=e359]:
                    - code [ref=e360]: dataModelUpdate
                    - text: ": The client's internal JSON data model is built or updated."
              - listitem [ref=e361]:
                - paragraph [ref=e362]:
                  - strong [ref=e363]: "Render Signal:"
                  - text: The server sends a
                  - code [ref=e364]: beginRendering
                  - text: message with the
                  - code [ref=e365]: root
                  - text: component's ID. This prevents a "flash of incomplete content." The client buffers incoming components and data but waits for this explicit signal before attempting the first render, ensuring the initial view is coherent.
              - listitem [ref=e366]:
                - strong [ref=e367]: "Client-Side Rendering:"
                - text: The client, now in a "ready" state, starts at the
                - code [ref=e368]: root
                - text: component. It recursively walks the component tree by looking up component IDs in its buffer. It resolves any data bindings against the data model and uses its
                - code [ref=e369]: WidgetRegistry
                - text: to instantiate native widgets.
              - listitem [ref=e370]:
                - strong [ref=e371]: "User Interaction and Event Handling:"
                - text: The user interacts with a rendered widget (e.g., taps a button). The client constructs a
                - code [ref=e372]: userAction
                - text: JSON payload, resolving any data bindings from the component's
                - code [ref=e373]: action.context
                - text: . It sends this payload to the server via an A2A message.
              - listitem [ref=e374]:
                - strong [ref=e375]: "Dynamic Updates:"
                - text: The server processes the
                - code [ref=e376]: userAction
                - text: . If the UI needs to change in response, the server sends new
                - code [ref=e377]: surfaceUpdate
                - text: and
                - code [ref=e378]: dataModelUpdate
                - text: messages over the original SSE stream. As these arrive, the client updates its component buffer and data model, and the UI re-renders to reflect the changes. The server can also send
                - code [ref=e379]: deleteSurface
                - text: to remove a UI region.
            - heading "1.5. Full Stream Example ¶" [level=3] [ref=e381]:
              - text: 1.5. Full Stream Example
              - link "¶" [ref=e382] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#15-full-stream-example
            - paragraph [ref=e383]: The following is a complete, minimal example of a JSONL stream that renders a user profile card.
            - generic [ref=e385]:
              - navigation [ref=e386]:
                - button "Toggle line selection" [ref=e387] [cursor=pointer]
                - button "Copy to clipboard" [ref=e388] [cursor=pointer]
              - code [ref=e389]:
                - generic [ref=e390]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"root\", \"component\": {\"Column\": {\"children\": {\"explicitList\": [\"profile_card\"]}}}}]}}"
                - generic [ref=e391]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"profile_card\", \"component\": {\"Card\": {\"child\": \"card_content\"}}}]}}"
                - generic [ref=e392]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"card_content\", \"component\": {\"Column\": {\"children\": {\"explicitList\": [\"header_row\", \"bio_text\"]}}}}]}}"
                - generic [ref=e393]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"header_row\", \"component\": {\"Row\": {\"alignment\": \"center\", \"children\": {\"explicitList\": [\"avatar\", \"name_column\"]}}}}]}}"
                - generic [ref=e394]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"avatar\", \"component\": {\"Image\": {\"url\": {\"literalString\": \"https://www.example.com/profile.jpg\"}}}}]}}"
                - generic [ref=e395]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"name_column\", \"component\": {\"Column\": {\"alignment\": \"start\", \"children\": {\"explicitList\": [\"name_text\", \"handle_text\"]}}}}]}}"
                - generic [ref=e396]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"name_text\", \"component\": {\"Text\": {\"usageHint\": \"h3\", \"text\": {\"literalString\": \"A2A Fan\"}}}}]}}"
                - generic [ref=e397]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"handle_text\", \"component\": {\"Text\": {\"text\": {\"literalString\": \"@a2a_fan\"}}}}]}}"
                - generic [ref=e398]: "{\"surfaceUpdate\": {\"components\": [{\"id\": \"bio_text\", \"component\": {\"Text\": {\"text\": {\"literalString\": \"Building beautiful apps from a single codebase.\"}}}}]}}"
                - generic [ref=e399]: "{\"dataModelUpdate\": {\"contents\": {}}}"
                - generic [ref=e400]: "{\"beginRendering\": {\"root\": \"root\"}}"
            - 'heading "Section 2: The Component Model ¶" [level=2] [ref=e401]':
              - text: "Section 2: The Component Model"
              - link "¶" [ref=e402] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#section-2-the-component-model
            - paragraph [ref=e403]: A2UI's component model is designed for flexibility, separating the protocol from the component set.
            - heading "2.1. Catalog Negotiation ¶" [level=3] [ref=e404]:
              - text: 2.1. Catalog Negotiation
              - link "¶" [ref=e405] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#21-catalog-negotiation
            - paragraph [ref=e406]:
              - text: A
              - strong [ref=e407]: Catalog
              - text: defines the contract between the server and the client for the UI that can be rendered. It contains a list of supported component types (e.g.,
              - code [ref=e408]: Row
              - text: ","
              - code [ref=e409]: Text
              - text: ), their properties, and available styles. A catalog is defined by a
              - strong [ref=e410]: Catalog Definition Document
              - text: .
            - paragraph [ref=e411]:
              - text: There is a
              - strong [ref=e412]: Standard Catalog
              - text: associated with each version of the A2UI protocol. For v0.8, its identifier is
              - code [ref=e413]: https://a2ui.org/specification/v0_8/standard_catalog_definition.json
              - text: .
            - paragraph [ref=e414]:
              - text: Catalog IDs are simple string identifiers. While they can be anything, it is conventional to use a URI within a domain that you own, to simplify debugging, avoid confusion, and avoid name collisions. Furthermore, if any changes are made to a catalog that could break compatibility between an agent and renderer, a new
              - code [ref=e415]: catalogId
              - strong [ref=e416]: must
              - text: be assigned. This ensures clear versioning and prevents unexpected behavior if an agent has changes but the client does not, or vice versa.
            - paragraph [ref=e417]: The negotiation process allows the client and server to agree on which catalog to use for a given UI surface. This process is designed to be flexible, supporting standard, custom, and even dynamically-defined catalogs.
            - paragraph [ref=e418]: "The flow is as follows:"
            - heading "1. Server Advertises Capabilities ¶" [level=4] [ref=e419]:
              - text: 1. Server Advertises Capabilities
              - link "¶" [ref=e420] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#1-server-advertises-capabilities
            - paragraph [ref=e421]: The server (agent) advertises its capabilities in its Agent Card as part of the A2A protocol. For A2UI, this includes which catalogs it supports and whether it can handle catalogs defined inline by the client.
            - list [ref=e422]:
              - listitem [ref=e423]:
                - code [ref=e424]: supportedCatalogIds
                - text: "(array of strings, optional): A list of IDs for all pre-defined catalogs the agent is known to support."
              - listitem [ref=e425]:
                - code [ref=e426]: acceptsInlineCatalogs
                - text: "(boolean, optional): If"
                - code [ref=e427]: "true"
                - text: ", the server can process"
                - code [ref=e428]: inlineCatalogs
                - text: sent by the client. Defaults to
                - code [ref=e429]: "false"
                - text: .
            - paragraph [ref=e430]:
              - strong [ref=e431]: "Example Server Agent Card Snippet:"
            - generic [ref=e433]:
              - navigation [ref=e434]:
                - button "Toggle line selection" [ref=e435] [cursor=pointer]
                - button "Copy to clipboard" [ref=e436] [cursor=pointer]
              - code [ref=e437]:
                - generic [ref=e438]: "{"
                - generic [ref=e439]: "\"name\": \"Restaurant Finder\","
                - generic [ref=e440]: "\"capabilities\": {"
                - generic [ref=e441]: "\"extensions\": ["
                - generic [ref=e442]: "{"
                - generic [ref=e443]: "\"uri\": \"https://a2ui.org/a2a-extension/a2ui/v0.8\","
                - generic [ref=e444]: "\"params\": {"
                - generic [ref=e445]: "\"supportedCatalogIds\": ["
                - generic [ref=e446]: "\"https://a2ui.org/specification/v0_8/standard_catalog_definition.json\","
                - generic [ref=e447]: "\"https://my-company.com/a2ui/v0.8/my_custom_catalog.json\""
                - generic [ref=e448]: "],"
                - generic [ref=e449]: "\"acceptsInlineCatalogs\": true"
                - generic [ref=e450]: "}"
                - generic [ref=e451]: "}"
                - generic [ref=e452]: "]"
                - generic [ref=e453]: "}"
                - generic [ref=e454]: "}"
            - paragraph [ref=e455]: Note that this is not a strict contract and purely included as a signal to help orchestrators and clients identify agents with matching UI capabilities. At runtime, orchestrating agents may dynamically delegate tasks to subagents which support additional catalogs that the orchestrating agent did not advertise. Thus, clients should consider the advertised supportedCatalogIds as a subset of the true catalogs that the agent or its subagents may support.
            - heading "2. Client Declares Supported Catalogs ¶" [level=4] [ref=e456]:
              - text: 2. Client Declares Supported Catalogs
              - link "¶" [ref=e457] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#2-client-declares-supported-catalogs
            - paragraph [ref=e458]:
              - text: In
              - strong [ref=e459]: every
              - text: message sent to the server, the client includes an
              - code [ref=e460]: a2uiClientCapabilities
              - text: object within the A2A
              - code [ref=e461]: Message
              - text: metadata. This object informs the agent server of all catalogs the client can render.
            - list [ref=e462]:
              - listitem [ref=e463]:
                - code [ref=e464]: supportedCatalogIds
                - text: "(array of strings, required): A list of identifiers for all pre-defined catalogs the client supports. The client must explicitly include the standard catalog ID here if it supports the standard catalog. The contents of these catalogs are expected to be compiled into the agent server and not downloaded at runtime, in order to prevent malicious content being injected into the prompt dynamically, and ensure predictable results."
              - listitem [ref=e465]:
                - code [ref=e466]: inlineCatalogs
                - text: "(array of objects, optional): An array of full Catalog Definition Documents. This allows a client to provide custom, on-the-fly catalogs, typically for use in local development workflows where it is faster to update a catalog in one place on the client. This may only be provided if the server has advertised"
                - code [ref=e467]: "acceptsInlineCatalogs: true"
                - text: .
            - paragraph [ref=e468]:
              - strong [ref=e469]: "Example A2A Message with Client Capabilities:"
            - generic [ref=e471]:
              - navigation [ref=e472]:
                - button "Toggle line selection" [ref=e473] [cursor=pointer]
                - button "Copy to clipboard" [ref=e474] [cursor=pointer]
              - code [ref=e475]:
                - generic [ref=e476]: "{"
                - generic [ref=e477]: "\"metadata\": {"
                - generic [ref=e478]: "\"a2uiClientCapabilities\": {"
                - generic [ref=e479]: "\"supportedCatalogIds\": ["
                - generic [ref=e480]: "\"https://a2ui.org/specification/v0_8/standard_catalog_definition.json\","
                - generic [ref=e481]: "\"https://my-company.com/a2ui_catalogs/custom-reporting-catalog-1.2\""
                - generic [ref=e482]: "],"
                - generic [ref=e483]: "\"inlineCatalogs\": ["
                - generic [ref=e484]: "{"
                - generic [ref=e485]: "\"catalogId\": \"https://my-company.com/inline_catalogs/temp-signature-pad-catalog\","
                - generic [ref=e486]: "\"components\": {"
                - generic [ref=e487]: "\"SignaturePad\": {"
                - generic [ref=e488]: "\"type\": \"object\","
                - generic [ref=e489]: "\"properties\": {\"penColor\": {\"type\": \"string\"}}"
                - generic [ref=e490]: "}"
                - generic [ref=e491]: "},"
                - generic [ref=e492]: "\"styles\": {}"
                - generic [ref=e493]: "}"
                - generic [ref=e494]: "]"
                - generic [ref=e495]: "}"
                - generic [ref=e496]: "},"
                - generic [ref=e497]: "\"message\": {"
                - generic [ref=e498]: "\"prompt\": {"
                - generic [ref=e499]: "\"text\": \"Find me a good restaurant\""
                - generic [ref=e500]: "}"
                - generic [ref=e501]: "}"
                - generic [ref=e502]: "}"
            - heading "3. Server Chooses Catalog and Renders ¶" [level=4] [ref=e503]:
              - text: 3. Server Chooses Catalog and Renders
              - link "¶" [ref=e504] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#3-server-chooses-catalog-and-renders
            - paragraph [ref=e505]:
              - text: The server receives the client's capabilities and chooses a catalog to use for a specific UI surface. The server specifies its choice in the
              - code [ref=e506]: beginRendering
              - text: message using the
              - code [ref=e507]: catalogId
              - text: field.
            - list [ref=e508]:
              - listitem [ref=e509]:
                - code [ref=e510]: catalogId
                - text: "(string, optional): The identifier of the chosen catalog. This ID must be one of the"
                - code [ref=e511]: supportedCatalogIds
                - text: or the
                - code [ref=e512]: catalogId
                - text: from one of the
                - code [ref=e513]: inlineCatalogs
                - text: provided by the client.
            - paragraph [ref=e514]:
              - text: If the
              - code [ref=e515]: catalogId
              - text: is omitted, the client
              - strong [ref=e516]: MUST
              - text: default to the standard catalog for the protocol version (
              - code [ref=e517]: https://a2ui.org/specification/v0_8/standard_catalog_definition.json
              - text: ).
            - paragraph [ref=e518]:
              - strong [ref=e519]:
                - text: Example
                - code [ref=e520]: beginRendering
                - text: "Message:"
            - generic [ref=e522]:
              - navigation [ref=e523]:
                - button "Toggle line selection" [ref=e524] [cursor=pointer]
                - button "Copy to clipboard" [ref=e525] [cursor=pointer]
              - code [ref=e526]:
                - generic [ref=e527]: "{"
                - generic [ref=e528]: "\"beginRendering\": {"
                - generic [ref=e529]: "\"surfaceId\": \"unique-surface-1\","
                - generic [ref=e530]: "\"catalogId\": \"https://my-company.com/inline_catalogs/temp-signature-pad-catalog\","
                - generic [ref=e531]: "\"root\": \"root-component-id\""
                - generic [ref=e532]: "}"
                - generic [ref=e533]: "}"
            - paragraph [ref=e534]: Each surface can use a different catalog, providing a high degree of flexibility, particularly in multi-agent systems where different agents may support different catalogs.
            - heading "Schemas for Developers ¶" [level=4] [ref=e535]:
              - text: Schemas for Developers
              - link "¶" [ref=e536] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#schemas-for-developers
            - paragraph [ref=e537]:
              - text: When building an agent, it is recommended to use a resolved schema that includes the specific component catalog you are targeting (e.g., a custom schema combining
              - code [ref=e538]: server_to_client.json
              - text: with your
              - code [ref=e539]: https://my-company.com/a2ui_catalogs/custom-reporting-catalog-1.2
              - text: definition). This provides the LLM with a strict definition of all available components and their properties, as well as the catalog-specific styles, leading to more reliable UI generation. The generic
              - code [ref=e540]: server_to_client.json
              - text: is the abstract wire protocol, while the resolved schema is the concrete tool for generation.
            - paragraph [ref=e541]:
              - text: In order to do the substitution, based on the standard
              - code [ref=e542]: server_to_client_schema
              - text: and a
              - code [ref=e543]: custom_catalog_definition
              - text: "object, you can use JSON manipulation logic similar to:"
            - generic [ref=e545]:
              - navigation [ref=e546]:
                - button "Toggle line selection" [ref=e547] [cursor=pointer]
                - button "Copy to clipboard" [ref=e548] [cursor=pointer]
              - code [ref=e549]:
                - generic [ref=e550]: component_properties = custom_catalog_definition["components"]
                - generic [ref=e551]: style_properties = custom_catalog_definition["styles"]
                - generic [ref=e552]: resolved_schema = copy.deepcopy(server_to_client_schema)
                - generic [ref=e554]: resolved_schema["properties"]["surfaceUpdate"]["properties"]["components"]["items"]["properties"]["component"]["properties"] = component_properties
                - generic [ref=e555]: resolved_schema["properties"]["beginRendering"]["properties"]["styles"]["properties"] = style_properties
            - paragraph [ref=e556]:
              - text: See
              - code [ref=e557]: server_to_client_with_standard_catalog.json
              - text: for an example of a resolved schema which has the components substituted in.
            - heading "2.2. The surfaceUpdate Message ¶" [level=3] [ref=e558]:
              - text: 2.2. The
              - code [ref=e559]: surfaceUpdate
              - text: Message
              - link "¶" [ref=e560] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#22-the-surfaceupdate-message
            - paragraph [ref=e561]:
              - text: This message is the primary way UI structure is defined. It contains a
              - code [ref=e562]: surfaceId
              - text: and a
              - code [ref=e563]: components
              - text: array.
            - generic [ref=e565]:
              - navigation [ref=e566]:
                - button "Toggle line selection" [ref=e567] [cursor=pointer]
                - button "Copy to clipboard" [ref=e568] [cursor=pointer]
              - code [ref=e569]:
                - generic [ref=e570]: "{"
                - generic [ref=e571]: "\"surfaceUpdate\": {"
                - generic [ref=e572]: "\"surfaceId\": \"main_content_area\","
                - generic [ref=e573]: "\"components\": ["
                - generic [ref=e574]: "{"
                - generic [ref=e575]: "\"id\": \"unique-component-id\","
                - generic [ref=e576]: "\"component\": {"
                - generic [ref=e577]: "\"Text\": {"
                - generic [ref=e578]: "\"text\": { \"literalString\": \"Hello, World!\" }"
                - generic [ref=e579]: "}"
                - generic [ref=e580]: "}"
                - generic [ref=e581]: "},"
                - generic [ref=e582]: "{"
                - generic [ref=e583]: "\"id\": \"another-component-id\","
                - generic [ref=e584]: "\"component\": { ... }"
                - generic [ref=e585]: "}"
                - generic [ref=e586]: "]"
                - generic [ref=e587]: "}"
                - generic [ref=e588]: "}"
            - list [ref=e589]:
              - listitem [ref=e590]:
                - code [ref=e591]: components
                - text: ": A required flat list of component instances."
            - heading "2.3. The Component Object ¶" [level=3] [ref=e592]:
              - text: 2.3. The Component Object
              - link "¶" [ref=e593] [cursor=pointer]:
                - /url: https://a2ui.org/specification/v0.8-a2ui/#23-the-component-object
            - paragraph [ref=e594]:
              - text: Each object in the
              - code [ref=e595]: components
              - text: "array has the following structure:"
            - list [ref=e596]:
              - listitem [ref=e597]:
                - code [ref=e598]: id
                - text: ": A required, unique string that identifies this specific component instance. This is used for parent-child references."
              - listitem [ref=e599]:
                - code [ref=e600]: component
                - text: ": A required object that defines the component's type and properties."
            - heading "2.4.component (Generic Object) ¶" [level=3] [ref=e601]:
