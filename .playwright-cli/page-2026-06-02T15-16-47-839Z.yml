            - paragraph [ref=e843]:
              - text: The client's interpreter is responsible for resolving these paths against the data model before rendering. The A2UI protocol supports direct 1:1 binding; it does not include transformers (e.g., formatters, conditionals). Any data transformation must be performed by the server before sending it in a
              - code [ref=e844]: dataModelUpdate
