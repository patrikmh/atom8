              - text: "]"
          - paragraph [ref=e673]:
            - text: In the old European system, a general, without prefix or suffix (and sometimes referred to informally as a "full general"), is usually the most senior type of general, above
            - link "lieutenant general" [ref=e674] [cursor=pointer]:
              - /url: /wiki/Lieutenant_general
            - text: and directly below
            - link "field marshal" [ref=e675] [cursor=pointer]:
              - /url: /wiki/Field_marshal
            - text: as a
            - link "four-star rank" [ref=e676] [cursor=pointer]:
              - /url: /wiki/Four-star_rank
            - text: (NATO OF-9).
          - paragraph [ref=e677]: Usually it is the most senior peacetime rank, with more senior ranks (for example, field marshal, marshal of the air force, fleet admiral) being used only in wartime or as honorary titles.
          - paragraph [ref=e678]:
            - text: In some armies, however, the rank of
            - link "captain general" [ref=e679] [cursor=pointer]:
              - /url: /wiki/Captain_general
            - text: ","
            - link "army general" [ref=e680] [cursor=pointer]:
              - /url: /wiki/Army_general
            - text: or
            - link "colonel general" [ref=e681] [cursor=pointer]:
              - /url: /wiki/Colonel_general
            - text: occupied or occupies this position. Depending on circumstances and the army in question, these ranks may be considered to be equivalent to a "full" general or to a field marshal
            - link "five-star rank" [ref=e682] [cursor=pointer]:
              - /url: /wiki/Five-star_rank
            - text: (NATO OF-10).
          - paragraph [ref=e683]: The rank of general came about as a "captain-general", the captain of an army in general (i.e., the whole army). The rank of captain-general began appearing around the time of the organisation of professional armies in the 17th century. In most countries "captain-general" contracted to just "general".
