          - paragraph [ref=e668]: In addition to militarily educated generals, there are also generals in medicine and engineering. The rank of the most senior chaplain, (chaplain general), is also usually considered to be a general officer rank.
          - generic [ref=e669]:
            - heading "Specific rank of general" [level=2] [ref=e670]
