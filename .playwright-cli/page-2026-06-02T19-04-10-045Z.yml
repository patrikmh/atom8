              - text: "]"
          - paragraph [ref=e492]: There are two common systems of general ranks used worldwide. In addition, there is a third system, the Arab system of ranks, which is used throughout the Middle East and North Africa.
          - paragraph [ref=e493]:
            - text: In the old European system, general officer ranks are named by prefixing "general", as an adjective, with field officer ranks, although in some countries the highest general officers are titled
            - link "field marshal" [ref=e494] [cursor=pointer]:
              - /url: /wiki/Field_marshal
            - text: or
            - link "marshal" [ref=e495] [cursor=pointer]:
              - /url: /wiki/Marshal
            - text: .
          - paragraph [ref=e496]:
            - text: The other is derived from the
            - link "French Revolution" [ref=e497] [cursor=pointer]:
              - /url: /wiki/French_Revolution
            - text: ", where generals' ranks are named according to the unit they (theoretically) command."
