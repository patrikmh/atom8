          - paragraph [ref=e484]: The adjective general had been affixed to officer designations since the late medieval period to indicate relative superiority or an extended jurisdiction.
          - paragraph [ref=e485]:
            - text: The various grades of general officer are at the top of the military rank structure. Lower-ranking officers are typically known as
            - link "field officers" [ref=e486] [cursor=pointer]:
              - /url: /wiki/Field_officer
            - text: or field-grade officers, and below them are
            - link "company-grade officers" [ref=e487] [cursor=pointer]:
              - /url: /wiki/Company-grade_officer
            - text: .
