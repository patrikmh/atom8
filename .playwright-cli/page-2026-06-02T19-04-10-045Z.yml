          - generic [ref=e1630]:
            - heading "Air force and naval equivalents" [level=2] [ref=e1631]
            - generic [ref=e1632]:
              - text: "["
              - link "edit" [ref=e1633] [cursor=pointer]:
                - /url: /w/index.php?title=General_officer&action=edit&section=12
              - text: "]"
          - paragraph [ref=e1634]:
            - text: Some countries (such as the United States) use the general officer ranks for both the
            - link "army" [ref=e1635] [cursor=pointer]:
              - /url: /wiki/Army
            - text: and the
            - link "air force" [ref=e1636] [cursor=pointer]:
              - /url: /wiki/Air_force
            - text: ", as well as their"
            - link "marine corps" [ref=e1637] [cursor=pointer]:
              - /url: /wiki/Marine_corps
            - text: ; other states only use the general officer ranks for the army, while in the air force they use
            - link "air officers" [ref=e1638] [cursor=pointer]:
              - /url: /wiki/Air_officer
            - text: as the equivalent of general officers. They use the air force rank of
            - link "air chief marshal" [ref=e1639] [cursor=pointer]:
              - /url: /wiki/Air_chief_marshal
            - text: as the equivalent of the specific army rank of general. This latter group includes the British
            - link "Royal Air Force" [ref=e1640] [cursor=pointer]:
              - /url: /wiki/Royal_Air_Force
            - text: and many current and former Commonwealth air forces—e.g.
            - link "Royal Australian Air Force" [ref=e1641] [cursor=pointer]:
              - /url: /wiki/Royal_Australian_Air_Force
            - text: ","
            - link "Indian Air Force" [ref=e1642] [cursor=pointer]:
              - /url: /wiki/Indian_Air_Force
            - text: ","
            - link "Royal New Zealand Air Force" [ref=e1643] [cursor=pointer]:
              - /url: /wiki/Royal_New_Zealand_Air_Force
            - text: ","
            - link "Nigerian Air Force" [ref=e1644] [cursor=pointer]:
              - /url: /wiki/Nigerian_Air_Force
            - text: ","
            - link "Pakistan Air Force" [ref=e1645] [cursor=pointer]:
              - /url: /wiki/Pakistan_Air_Force
            - text: ", etc."
          - paragraph [ref=e1646]:
            - text: In most
            - link "navies" [ref=e1647] [cursor=pointer]:
              - /url: /wiki/Navy
            - text: ","
            - link "flag officers" [ref=e1648] [cursor=pointer]:
              - /url: /wiki/Flag_officer
            - text: are the equivalent of general officers, and the naval rank of
            - link "admiral" [ref=e1649] [cursor=pointer]:
              - /url: /wiki/Admiral
            - text: is equivalent to the specific army rank of general. A noteworthy historical exception was the
            - link "Cromwellian" [ref=e1650] [cursor=pointer]:
              - /url: /wiki/Oliver_Cromwell
            - text: naval rank "
            - link "general at sea" [ref=e1651] [cursor=pointer]:
              - /url: /wiki/General_at_sea
            - text: "\". In recent years in the American service there is a tendency to use flag officer and flag rank to refer to generals and admirals of the services collectively."
