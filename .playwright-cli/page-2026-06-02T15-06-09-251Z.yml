                - generic [ref=e361] [cursor=pointer]:
                  - generic [ref=e362]: Streaming chat
                  - generic [ref=e363]: Live token and event streaming for responsive multi turn sessions, with cancel and resume.
                - generic [ref=e364] [cursor=pointer]:
                  - generic [ref=e365]: Multimodality
                  - generic [ref=e366]: Typed attachments and real time media (files, images, audio, transcripts); supports voice, previews, annotations, provenance.
                - generic [ref=e367] [cursor=pointer]:
                  - generic [ref=e368]: Generative UI, static
                  - generic [ref=e369]: Render model output as stable, typed components under app control.
                - generic [ref=e370] [cursor=pointer]:
                  - generic [ref=e371]: Generative UI, declarative
                  - generic [ref=e372]: Small declarative language for constrained yet open-ended agent UIs; agents propose trees and constraints, the app validates and mounts.
                - generic [ref=e373] [cursor=pointer]:
                  - generic [ref=e374]: Shared state
                  - generic [ref=e375]: (Read-only & read-write). Typed store shared between agent and app, with streamed event-sourced diffs and conflict resolution for snappy collaboration.
                - generic [ref=e376] [cursor=pointer]:
                  - generic [ref=e377]: Thinking steps
                  - generic [ref=e378]: Visualize intermediate reasoning from traces and tool events; no raw chain of thought.
                - generic [ref=e379] [cursor=pointer]:
                  - generic [ref=e380]: Frontend tool calls
                  - generic [ref=e381]: Typed handoffs from agent to frontend-executed actions, and back.
                - generic [ref=e382] [cursor=pointer]:
                  - generic [ref=e383]: Backend tool rendering
                  - generic [ref=e384]: Visualize backend tool outputs in app and chat, emit side effects as first-class events.
                - generic [ref=e385] [cursor=pointer]:
                  - generic [ref=e386]: Interrupts (human in the loop)
                  - generic [ref=e387]: Pause, approve, edit, retry, or escalate mid flow without losing state.
                - generic [ref=e388] [cursor=pointer]:
                  - generic [ref=e389]: Sub-agents and composition
                  - generic [ref=e390]: Nested delegation with scoped state, tracing, and cancellation.
                - generic [ref=e391] [cursor=pointer]:
                  - generic [ref=e392]: Agent steering
                  - generic [ref=e393]: Dynamically redirect agent execution with real-time user input to guide behavior and outcomes.
                - generic [ref=e394] [cursor=pointer]:
                  - generic [ref=e395]: Tool output streaming
                  - generic [ref=e396]: Stream tool results and logs so UIs can render long-running effects in real time.
                - generic [ref=e397] [cursor=pointer]:
                  - generic [ref=e398]: Custom events
                  - generic [ref=e399]: Open-ended data exchange for needs not covered by the protocol.
