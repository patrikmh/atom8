              - generic [ref=e291]:
                - text: AG-UI is an
                - strong [ref=e293]: open
                - text: ","
                - strong [ref=e295]: lightweight
                - text: ","
                - strong [ref=e297]: event-based
                - text: protocol that standardizes how AI agents connect to user-facing applications.
              - generic [ref=e298]: AG-UI is designed to be the general-purpose, bi-directional connection between a user-facing application and any agentic backend.
              - generic [ref=e299]: Built for simplicity and flexibility, it standardizes how agent state, UI intents, and user interactions flow between your model/agent runtime and user-facing frontend applications—to allow application developers to ship reliable, debuggable, user‑friendly agentic features fast while focusing on application needs and avoiding complex ad-hoc wiring.
              - generic [ref=e301]:
                - img "AG-UI Overview" [ref=e304]
                - generic:
                  - 'button "Expand image: AG-UI Overview"'
