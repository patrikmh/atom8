                - generic [ref=e406] [cursor=pointer]: Why Agentic Apps need AG-UI
              - generic [ref=e407]: "Agentic applications break the simple request/response model that dominated frontend-backend development in the pre-agentic era: a client makes a request, the server returns data, the client renders it, and the interaction ends."
              - heading "Navigate to header The requirements of user‑facing agents" [level=4] [ref=e408]:
                - link "Navigate to header" [ref=e409] [cursor=pointer]:
                  - /url: "#the-requirements-of-user‑facing-agents"
                  - img [ref=e411]
                - generic [ref=e413] [cursor=pointer]: The requirements of user‑facing agents
              - generic [ref=e414]: "While agents are just software, they exhibit characteristics that make them challenging to serve behind traditional REST/GraphQL APIs:"
              - list [ref=e415]:
                - listitem [ref=e416]:
                  - text: Agents are
                  - strong [ref=e417]: long‑running
                  - text: and
                  - strong [ref=e418]: stream
                  - text: intermediate work—often across multi‑turn sessions.
                - listitem [ref=e419]:
                  - text: Agents are
                  - strong [ref=e420]: nondeterministic
                  - text: and can
                  - strong [ref=e421]: control application UI nondeterministically
                  - text: .
                - listitem [ref=e422]:
                  - text: Agents simultanously mix
                  - strong [ref=e423]: structured + unstructured IO
                  - text: (e.g. text & voice, alongside tool calls and state updates).
                - listitem [ref=e424]:
                  - text: Agents need user-interactive
                  - strong [ref=e425]: composition
                  - text: ": e.g. they may call sub‑agents, often recursively."
                - listitem [ref=e426]: And more…
              - generic [ref=e427]: AG-UI is an event-based protocol that enables dynamic communication between agentic frontends and backends. It builds on top of the foundational protocols of the web (HTTP, WebSockets) as an abstraction layer designed for the agentic age—bridging the gap between traditional client-server architectures and the dynamic, stateful nature of AI agents.
