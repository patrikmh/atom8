                    - /url: ./concepts/generative-ui-specs
                  - text: "- allowing agents to deliver UI widgets, where AG-UI is the Agent↔User Interaction protocol - which connects an agentic frontend to any agentic backend."
                  - link "Learn more" [ref=e320] [cursor=pointer]:
                    - /url: https://copilotkit.ai/ag-ui-and-a2ui
