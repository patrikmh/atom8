                - link "full ecosystem renderers list" [ref=e238] [cursor=pointer]:
                  - /url: https://a2ui.org/ecosystem/renderers/
              - text: for more community projects and how to submit your own.
            - heading "How Renderers Work ¶" [level=2] [ref=e239]:
              - text: How Renderers Work
              - link "¶" [ref=e240] [cursor=pointer]:
                - /url: https://a2ui.org/reference/renderers/#how-renderers-work
            - paragraph [ref=e241]: "The rendering process typically involves the following steps:"
            - list [ref=e242]:
              - listitem [ref=e243]:
                - strong [ref=e244]: Receive
                - text: A2UI messages from the transport.
              - listitem [ref=e245]:
                - strong [ref=e246]: Parse
                - text: the JSON and validate against the schema.
              - listitem [ref=e247]:
                - strong [ref=e248]: Render
                - text: using platform-native components.
              - listitem [ref=e249]:
                - strong [ref=e250]: Style
                - text: according to your app's theme.
            - heading "Using a Renderer ¶" [level=2] [ref=e251]:
              - text: Using a Renderer
              - link "¶" [ref=e252] [cursor=pointer]:
                - /url: https://a2ui.org/reference/renderers/#using-a-renderer
            - paragraph [ref=e253]: "Get started integrating A2UI into your application by following the setup guide for your chosen renderer:"
            - list [ref=e254]:
              - listitem [ref=e255]:
                - strong [ref=e256]:
                  - link "React" [ref=e257] [cursor=pointer]:
