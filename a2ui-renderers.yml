            - heading "Renderers (Client Libraries) ¶" [level=1] [ref=e128]:
              - text: Renderers (Client Libraries)
              - link "¶" [ref=e129] [cursor=pointer]:
                - /url: https://a2ui.org/reference/renderers/#renderers-client-libraries
            - paragraph [ref=e130]: Renderers convert A2UI JSON messages into native UI components for different platforms.
            - paragraph [ref=e131]:
              - text: The
              - link "agents" [ref=e132] [cursor=pointer]:
                - /url: https://a2ui.org/reference/agents/
              - text: are responsible for generating the A2UI messages, and the
              - link "transports" [ref=e133] [cursor=pointer]:
                - /url: https://a2ui.org/concepts/transports/
              - text: are responsible for delivering the messages to the client. The client renderer library must buffer and handle A2UI messages, implement the A2UI lifecycle, render widgets, and route user actions back to the agent.
            - paragraph [ref=e134]: Let's use the web as an analogy. The A2UI protocol is like HTML. It provides a language and the semantics of the UI model. The agent is like the server that serves HTML to the client. The renderer is like a browser. It talks to the agent, interprets the A2UI protocol, and renders the UI. Just like there are multiple browser engines for HTML, there are multiple different renderers for A2UI.
            - paragraph [ref=e135]: You have a lot of flexibility, to bring custom components to a renderer, or build your own renderer to support your UI component framework.
            - heading "Maintained Renderers ¶" [level=2] [ref=e136]:
              - text: Maintained Renderers
              - link "¶" [ref=e137] [cursor=pointer]:
                - /url: https://a2ui.org/reference/renderers/#maintained-renderers
