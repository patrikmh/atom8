                    - /url: https://a2ui.org/guides/client-setup/#web-components-lit
              - listitem [ref=e261]:
                - strong [ref=e262]:
                  - link "Angular" [ref=e263] [cursor=pointer]:
                    - /url: https://a2ui.org/guides/client-setup/#angular
              - listitem [ref=e264]:
                - strong [ref=e265]:
                  - link "Flutter (GenUI SDK)" [ref=e266] [cursor=pointer]:
                    - /url: https://a2ui.org/guides/client-setup/#flutter-genui-sdk
            - heading "Building a Renderer ¶" [level=2] [ref=e267]:
              - text: Building a Renderer
              - link "¶" [ref=e268] [cursor=pointer]:
                - /url: https://a2ui.org/reference/renderers/#building-a-renderer
            - paragraph [ref=e269]: Want to build a renderer for your platform?
            - list [ref=e270]:
              - listitem [ref=e271]:
                - text: See the
                - link "Roadmap" [ref=e272] [cursor=pointer]:
                  - /url: https://a2ui.org/roadmap/
                - text: for planned frameworks.
              - listitem [ref=e273]: Review existing renderers for patterns.
              - listitem [ref=e274]:
                - text: Check out our
                - link "Renderer Development Guide" [ref=e275] [cursor=pointer]:
                  - /url: https://a2ui.org/guides/renderer-development/
                - text: for details on implementing a renderer.
            - paragraph [ref=e276]: "A compliant renderer must meet the following key requirements:"
            - list [ref=e277]:
              - listitem [ref=e278]: Parse A2UI JSON messages, specifically the adjacency list format.
              - listitem [ref=e279]: Map A2UI components to native widgets.
              - listitem [ref=e280]: Handle data binding, lifecycle events.
              - listitem [ref=e281]: Process a sequence of incremental A2UI messages to build and update the UI.
              - listitem [ref=e282]: Support server-initiated updates.
              - listitem [ref=e283]: Support user actions.
            - paragraph [ref=e284]: "For more information, see the following resources:"
            - list [ref=e285]:
              - listitem [ref=e286]:
                - strong [ref=e287]:
                  - link "Client Setup Guide" [ref=e288] [cursor=pointer]:
